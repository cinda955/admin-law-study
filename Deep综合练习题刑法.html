                  d:'<b>A选项</b>：不适用。犯罪时不满18周岁的人，一律不适用死刑（包括死缓）。<br><b>B选项</b>：不适用。审判时怀孕的妇女不适用死刑，"审判时"扩大解释到从羁押到执行前。<br><b>C选项</b>：不属于。注意是"审判时"已满75岁，而不是"犯罪时"。<br><b>D选项</b>：不属于。审判时已满75但以特别残忍手段致人死亡的，仍然可以适用死刑。<br><b>E选项</b>：不属于。不满16岁是因为年龄未达到完全责任年龄，不是死刑适用限制的特定条件。',
                  t:'死刑三大禁区：①犯罪时未满18岁 ②审判时怀孕 ③审判时已满75岁（残忍手段除外）。C和E都不是正确的不适用情形。' },
                { q:'属于中级人民法院管辖的一审案件有？', o:['A. 危害国家安全案件','B. 恐怖活动案件','C. 可能判处无期徒刑的案件','D. 盗窃案','E. 可能判处死刑的案件'], c:[0,1,2,4],
                  d:'<b>A选项</b>：属于。危害国家安全案件由中院一审管辖。<br><b>B选项</b>：属于。恐怖活动案件由中院一审管辖。<br><b>C选项</b>：属于。可能判处无期徒刑的普通刑事案件由中院管辖。<br><b>D选项</b>：不属于。盗窃案一般由基层法院管辖，除非可能判无期。<br><b>E选项</b>：属于。可能判处死刑的案件由中院管辖。',
                  t:'口诀"国恐无死"——危害国家安全、恐怖活动、无期徒刑、死刑归中院。D盗窃案通常去基层。' },
                { q:'应当不公开审理的案件包括？', o:['A. 涉及国家秘密','B. 涉及个人隐私','C. 涉及商业秘密','D. 审判时被告人不满18周岁','E. 被告人认罪的案件'], c:[0,1,3],
                  d:'<b>A选项</b>：应当不公开。国家秘密案件一律不公开审理，无需当事人申请。<br><b>B选项</b>：应当不公开。个人隐私案件一律不公开审理。<br><b>C选项</b>：不属于"应当"。商业秘密案件需要当事人申请才不公开。<br><b>D选项</b>：应当不公开。审判时被告人不满18周岁的，一律不公开审理。<br><b>E选项</b>：不属于。认罪与否和是否公开审理无关。',
                  t:'C是陷阱！"应当不公开"和"可以不公开"不一样。国家秘密、个人隐私、未成年人=应当不公开。商业秘密=申请了才不公开。' },
                { q:'刑事诉讼证据的"三性"包括？', o:['A. 客观性','B. 关联性','C. 合法性','D. 真实性','E. 充分性'], c:[0,1,2],
                  d:'<b>A选项</b>：应选。证据必须是客观存在的事实，不能是主观猜测或臆想。<br><b>B选项</b>：应选。证据必须与案件待证事实存在客观联系。<br><b>C选项</b>：应选。证据必须是依照法定程序取得，非法证据应被排除。<br><b>D选项</b>：不选。"真实性"不是证据三性的法定表述，司法实践中用"客观性"表述。<br><b>E选项</b>：不选。"充分性"是证明标准的问题，不是证据的个体特征。',
                  t:'证据三性=客观性+关联性+合法性。"客关合"——缺一不可。"真实性"和"充分性"不是三性内容。' },
                { q:'检察院直接立案侦查的案件包括？', o:['A. 刑讯逼供罪','B. 贪污贿赂罪','C. 虐待被监管人罪','D. 非法拘禁罪（司法工作人员实施的）','E. 盗窃罪'], c:[0,2,3],
                  d:'<b>A选项</b>：应选。刑讯逼供罪属于司法工作人员利用职权实施的犯罪，由检察院立案侦查。<br><b>B选项</b>：不选。贪污贿赂罪现在由监察委员会调查，检察院不再直接受理此类案件。<br><b>C选项</b>：应选。虐待被监管人罪由检察院立案侦查。<br><b>D选项</b>：应选。司法工作人员利用职权实施的非法拘禁罪由检察院立案侦查。<br><b>E选项</b>：不选。盗窃罪是普通刑事案件，由公安机关立案侦查。',
                  t:'B是监察委的活，不是检察院的。记住：检察院只管司法工作人员利用职权犯的罪，贪污贿赂归监察委。' },
                { q:'公安机关对现行犯可以先行拘留的情形有？', o:['A. 正在预备犯罪','B. 被被害人指认','C. 在身边发现犯罪证据','D. 企图自杀逃跑','E. 可能判处罚金'], c:[0,1,2,3],
                  d:'<b>A选项</b>：应选。正在预备犯罪、实行犯罪或犯罪后即时被发觉的，可以先行拘留。<br><b>B选项</b>：应选。被害人或在场亲眼看见的人指认他犯罪的，可以先行拘留。<br><b>C选项</b>：应选。在身边或住处发现有犯罪证据的，可以先行拘留。<br><b>D选项</b>：应选。犯罪后企图自杀、逃跑或在逃的，可以先行拘留。<br><b>E选项</b>：不选。罚金是轻刑，不是先行拘留的法定情形。',
                  t:'E罚金太轻，不构成先行拘留条件。先行拘留针对的是有社会危险性、可能逃跑或继续犯罪的紧急情况。' },
                { q:'关于自首，以下说法正确的有？', o:['A. 自首是主动投案如实供述','B. 自首可以从轻或减轻处罚','C. 犯罪较轻的自首可以免除处罚','D. 自首必须在被抓获前','E. 自首与坦白是一回事'], c:[0,1,2],
                  d:'<b>A选项</b>：正确。自首=主动投案+如实供述自己的罪行。<br><b>B选项</b>：正确。自首可以从轻或减轻处罚。<br><b>C选项</b>：正确。犯罪较轻的，可以免除处罚。<br><b>D选项</b>：错误。被通缉后主动投案的也算自首，不要求必须在被抓获前。<br><b>E选项</b>：错误。自首是主动投案，坦白是被动归案后如实供述，两者性质不同。',
                  t:'D和E是陷阱！被通缉了去自首也算自首。自首和坦白不一样——自首是主动去找警察，坦白是被抓了才说。' },
                { q:'以下哪些是抢劫罪的加重情节？', o:['A. 入户抢劫','B. 在公共交通工具上抢劫','C. 持枪抢劫','D. 抢劫致人死亡','E. 冒充军警人员抢劫'], c:[0,1,2,3,4],
                  d:'<b>A选项</b>：加重。入户抢劫处十年以上有期徒刑、无期徒刑或死刑。<br><b>B选项</b>：加重。在公共交通工具上抢劫属于加重情节。<br><b>C选项</b>：加重。持枪抢劫属于加重情节。<br><b>D选项</b>：加重。抢劫致人重伤或死亡的属于加重情节。<br><b>E选项</b>：加重。冒充军警人员抢劫属于加重情节。',
                  t:'全选。抢劫罪的8种加重情节统统十年起步，最高死刑。' },
                { q:'关于紧急避险，以下正确的有？', o:['A. 针对正在发生的危险','B. 不得已而采取','C. 损害必须小于所避免的损害','D. 警察执行职务时不能紧急避险','E. 可以损害不法侵害人本人'], c:[0,1,2,3],
                  d:'<b>A选项</b>：正确。危险必须正在发生，事前事后都不能避险。<br><b>B选项</b>：正确。紧急避险必须是"不得已"的选择，没有其他办法。<br><b>C选项</b>：正确。避险造成的损害必须小于所避免的损害。<br><b>D选项</b>：正确。职务上有特定责任的人（如警察、消防员）在职责范围内不能以紧急避险为由逃避职责。<br><b>E选项</b>：错误。针对不法侵害人本人是正当防卫的特点，紧急避险损害的是无辜第三人的合法利益。',
                  t:'E是正当防卫的特点，不是紧急避险。紧急避险损害的是路人，防卫损害的是坏人。' },
                { q:'以下哪些是刑事强制措施？', o:['A. 拘传','B. 取保候审','C. 监视居住','D. 传唤','E. 逮捕'], c:[0,1,2,4],
                  d:'<b>A选项</b>：属于。拘传是五种刑事强制措施中最轻的一种。<br><b>B选项</b>：属于。取保候审是限制人身自由的强制措施。<br><b>C选项</b>：属于。监视居住是半羁押性的强制措施。<br><b>D选项</b>：不属于。传唤是通知行为，不具有强制性，不属于强制措施。<br><b>E选项</b>：属于。逮捕是最严厉的刑事强制措施。',
                  t:'D传唤=通知你来，不来才可能用拘传。传唤本身不是强制措施。刑事强制措施只有五种：拘传、取保、监视、拘留、逮捕。' },
                { q:'关于缓刑，以下说法正确的有？', o:['A. 缓刑适用3年以下有期或拘役','B. 累犯不适用缓刑','C. 缓刑考验期需社区矫正','D. 缓刑期满原判刑罚不再执行','E. 犯罪集团首要分子可缓刑'], c:[0,1,2,3],
                  d:'<b>A选项</b>：正确。被判处拘役或3年以下有期徒刑的，可以宣告缓刑。<br><b>B选项</b>：正确。累犯不适用缓刑。<br><b>C选项</b>：正确。缓刑考验期内依法实行社区矫正。<br><b>D选项</b>：正确。缓刑考验期满，原判刑罚不再执行并公开宣告。<br><b>E选项</b>：错误。犯罪集团的首要分子不适用缓刑。',
                  t:'E是陷阱！首要分子和累犯一样，都不能缓刑。缓刑条件：3年以下+悔罪+无危险。' },
                { q:'以下哪些情形属于"意志以外的原因"导致犯罪未完成？', o:['A. 警察突然出现','B. 被害人强烈反抗','C. 行为人良心发现停止','D. 作案工具失灵','E. 被人发现后逃跑'], c:[0,1,3,4],
                  d:'<b>A选项</b>：意志外。警察出现属于客观环境阻止了犯罪继续。<br><b>B选项</b>：意志外。被害人反抗导致行为人无法继续实施。<br><b>C选项</b>：意志内。良心发现是主动放弃，属于犯罪中止。<br><b>D选项</b>：意志外。工具失灵是客观原因无法继续。<br><b>E选项</b>：意志外。被人发现后逃跑是被迫停止。',
                  t:'C是唯一意志内的——主动放弃=中止。其他都是被迫停=未遂或预备。"能而不欲=中止，欲而不能=未遂"。' },
                { q:'关于法律援助辩护，以下说法正确的有？', o:['A. 盲聋哑人未委托辩护人的应当指派律师','B. 经济困难的可以申请法律援助','C. 可能判处死刑的应当指派律师','D. 未成年人应当指派律师','E. 所有案件都应当指派律师'], c:[0,1,2,3],
                  d:'<b>A选项</b>：正确。盲、聋、哑人未委托辩护人的，公检法应当通知法律援助机构指派律师。<br><b>B选项</b>：正确。经济困难或其他原因未委托辩护人的，本人及近亲属可申请法律援助。<br><b>C选项</b>：正确。可能判处无期徒刑或死刑的，应当通知法律援助机构指派律师。<br><b>D选项</b>：正确。未成年人未委托辩护人的，应当指派律师。<br><b>E选项</b>：错误。"所有案件"太绝对，只有法定情形才应当指派。',
                  t:'E太绝对。口诀"盲聋哑、半疯傻、无死未"——这四类应当指派，经济困难需自己申请。' },
                { q:'侦查机关可以采取技术侦查措施的案件类型包括？', o:['A. 危害国家安全犯罪','B. 恐怖活动犯罪','C. 黑社会性质组织犯罪','D. 重大毒品犯罪','E. 普通盗窃犯罪'], c:[0,1,2,3],
                  d:'<b>A选项</b>：应选。危害国家安全犯罪可以采用技术侦查措施。<br><b>B选项</b>：应选。恐怖活动犯罪可以采用技术侦查措施。<br><b>C选项</b>：应选。黑社会性质组织犯罪可以采用技术侦查措施。<br><b>D选项</b>：应选。重大毒品犯罪可以采用技术侦查措施。<br><b>E选项</b>：不选。普通盗窃犯罪不能使用技术侦查，否则侵犯公民隐私权。',
                  t:'口诀"国恐黑毒"才能用技术侦查（监听、监控）。普通盗窃不行，侵犯隐私。' },
                { q:'关于刑事拘留，以下说法正确的有？', o:['A. 拘留时必须出示拘留证','B. 拘留后24小时内送看守所','C. 拘留后24小时内通知家属','D. 国恐犯罪有碍侦查可不通知家属','E. 拘留期限最长37天'], c:[0,1,2,3,4],
                  d:'<b>A选项</b>：正确。拘留人时必须出示拘留证。<br><b>B选项</b>：正确。拘留后应立即送看守所，至迟不超过24小时。<br><b>C选项</b>：正确。除无法通知或国恐有碍侦查外，24小时内通知家属。<br><b>D选项</b>：正确。危害国家安全犯罪、恐怖活动犯罪通知可能有碍侦查的，可以不通知家属。<br><b>E选项</b>：正确。流窜作案、多次作案、结伙作案的，拘留期限可延长至30日，加上检察院7日审查批捕，共37日。',
                  t:'全选。拘留程序：出示拘留证→24h内送看守所→24h内通知家属（国恐例外）→24h内讯问。最长37天。' },
                { q:'以下哪些属于侵犯财产罪？', o:['A. 抢劫罪','B. 盗窃罪','C. 诈骗罪','D. 绑架罪','E. 敲诈勒索罪'], c:[0,1,2,4],
                  d:'<b>A选项</b>：属于。抢劫罪侵犯财产权（同时侵犯人身权，是复杂客体）。<br><b>B选项</b>：属于。盗窃罪侵犯财产权。<br><b>C选项</b>：属于。诈骗罪侵犯财产权。<br><b>D选项</b>：不属于。绑架罪侵犯的是人身权利，在刑法分则第四章。<br><b>E选项</b>：属于。敲诈勒索罪侵犯财产权。',
                  t:'绑架是人身犯罪，不是财产犯罪。' },
                { q:'关于取保候审，以下说法正确的有？', o:['A. 保证金起点1000元','B. 保证金和保证人只能选其一','C. 被取保人不得离开所居住的市县','D. 取保候审最长12个月','E. 被取保人无需遵守任何义务'], c:[0,1,2,3],
                  d:'<b>A选项</b>：正确。取保候审保证金起点为1000元。<br><b>B选项</b>：正确。保证金和保证人只能二选一。<br><b>C选项</b>：正确。未经批准不得离开所居住的市、县。<br><b>D选项</b>：正确。取保候审最长不得超过12个月。<br><b>E选项</b>：错误。被取保人需遵守一系列义务（及时到案、不干扰证人等）。',
                  t:'E明显错误。取保候审不是"放羊"，有一堆规矩要遵守。' },
                { q:'第二审程序的特点包括？', o:['A. 不能独任审理','B. 由审判员组成合议庭','C. 不能有人民陪审员','D. 审理期限一般为2个月','E. 判决为终审判决'], c:[0,1,2,3,4],
                  d:'<b>A选项</b>：应选。二审必须组成合议庭，不得独任审理。<br><b>B选项</b>：应选。二审由审判员三人或五人组成合议庭。<br><b>C选项</b>：应选。二审不能有人民陪审员，全部由审判员组成。<br><b>D选项</b>：应选。二审应在2个月内审结，特殊情况可延长2个月。<br><b>E选项</b>：应选。二审判决为终审判决，不得再上诉。',
                  t:'全选。二审=审判员合议庭（3或5人）+2个月+终审。独任和陪审员只存在于一审。' },
                { q:'以下哪些可以作为辩护人？', o:['A. 律师','B. 被告人的监护人','C. 正在服刑的人','D. 被告人所在单位推荐的人','E. 被吊销律师证的人（系被告人近亲属）'], c:[0,1,3,4],
                  d:'<b>A选项</b>：可以。律师是最常见的辩护人。<br><b>B选项</b>：可以。监护人、亲友可以担任辩护人。<br><b>C选项</b>：不可以。正在被执行刑罚或限制人身自由的人不能担任辩护人。<br><b>D选项</b>：可以。人民团体或嫌疑人被告人所在单位推荐的人可以担任辩护人。<br><b>E选项</b>：可以。被吊销律师证的人一般不能担任辩护人，但系近亲属的除外。',
                  t:'C不行——自己都关着，怎么给别人辩护。E虽然是吊销律师证的人，但因为是近亲属所以可以。' },
                { q:'关于刑事诉讼中的近亲属，以下哪些属于？', o:['A. 夫','B. 妻','C. 父','D. 母','E. 同胞兄弟姐妹'], c:[0,1,2,3,4],
                  d:'<b>A选项</b>：属于。配偶属于近亲属。<br><b>B选项</b>：属于。配偶属于近亲属。<br><b>C选项</b>：属于。父母属于近亲属。<br><b>D选项</b>：属于。父母属于近亲属。<br><b>E选项</b>：属于。同胞兄弟姐妹属于近亲属。',
                  t:'全选。刑诉近亲属=配偶+父母+子女+同胞兄弟姐妹。比民法范围窄（民法的近亲属还包括祖父母、外祖父母、孙子女等）。' },
                { q:'关于认罪认罚从宽制度，以下说法正确的有？', o:['A. 适用于所有刑事案件','B. 贯穿诉讼全过程','C. 从宽幅度大于坦白','D. 与自首不作重复评价','E. 只在审判阶段适用'], c:[0,1,2,3],
                  d:'<b>A选项</b>：正确。认罪认罚从宽没有适用罪名和可能判处刑罚的限定，所有刑事案件都可以适用。<br><b>B选项</b>：正确。认罪认罚从宽贯穿侦查、起诉、审判各个阶段。<br><b>C选项</b>：正确。认罪认罚的从宽幅度一般大于仅有坦白的从宽幅度。<br><b>D选项</b>：正确。认罪认罚与自首、坦白不作重复评价，但可在法定刑幅度内给予更大从宽幅度。<br><b>E选项</b>：错误。不是只在审判阶段，而是适用于诉讼全过程。',
                  t:'E错了。认罪认罚从侦查阶段开始就可以适用，不是只有到了法院才能用。' }
            ];
            return m.map(function(q,i){ return { type:'multi', q:q.q, opts:q.o, correct:q.c, multi:true, detail:q.d, tip:q.t, quizIndex:i+1 }; });
        })()
    }
];
</script>
<script>
// ==================== 渲染引擎 ====================
function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title">'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;}
function renderQuiz(q,qid){var qTypeLabel=q.isTF?'【判断题】':(q.multi?'【多选题】':'【单选题】');var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else if(q.tfId){h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div>';h+='<ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul>';h+='<div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div>';h+='<div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.detail){var detailHtml=q.detail
    .replace(/"([^"]*)"/g,'$1')
    .replace(/([A-E])正确<\/b>：正确/g,'$1选项</b>：<span style="color:#145a32;">✅ 正确</span>')
    .replace(/([A-E])错误<\/b>：错误/g,'$1选项</b>：<span style="color:#b22222;">❌ 错误</span>')
    .replace(/([A-E])正确<\/b>：错误/g,'$1选项</b>：<span style="color:#b22222;">❌ 错误</span>')
    .replace(/([A-E])错误<\/b>：正确/g,'$1选项</b>：<span style="color:#145a32;">✅ 正确</span>')
    .replace(/([A-E])选项<\/b>：(正确|属于|应选|是|可)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>')
    .replace(/([A-E])选项<\/b>：(错误|不属于|不选|不是|不可)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>')
    .replace(/([A-E])<\/b>：(正确|属于|应选|是|可)/g,'<span style="color:#145a32;">✅ $1</b>：$2</span>')
    .replace(/([A-E])<\/b>：(错误|不属于|不选|不是|不可)/g,'<span style="color:#b22222;">❌ $1</b>：$2</span>');
h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.tip+'</div>';h+='</div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
</body>
</html>
