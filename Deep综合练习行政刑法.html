<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行政法+刑法 · 综合练习</title>
    <style>
        :root {
            --bg: #fdf8f3; --card-bg: #ffffff; --text: #2c2416; --text-light: #5c5347;
            --accent: #b22222; --highlight: #fff3cd; --highlight-border: #f0c040;
            --example-bg: #f0faf5; --example-border: #a3e4bc;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px; --radius-sm: 10px;
            --font: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans SC',system-ui,-apple-system,sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: 20px; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.75; padding: 12px; font-size: 16px; -webkit-font-smoothing: antialiased; }
        a { color: var(--accent); text-decoration: none; }
        .toc-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.35); z-index:98; }
        .toc-overlay.show { display:block; }
        .toc { position:fixed; top:16px; left:16px; width:230px; max-height:calc(100vh - 32px); background:var(--card-bg); border-radius:var(--radius); box-shadow:0 8px 30px rgba(0,0,0,0.12); padding:18px 14px; overflow-y:auto; z-index:100; font-size:0.84rem; transition:transform 0.3s; }
        .toc.hidden { transform:translateX(-260px); }
        .toc-title { font-weight:700; margin-bottom:10px; color:var(--accent); font-size:1rem; display:flex; align-items:center; gap:6px; position:sticky; top:0; background:var(--card-bg); padding-bottom:8px; border-bottom:1px solid #f0ebe0; }
        .toc a { display:block; padding:7px 10px; border-radius:6px; margin:2px 0; color:var(--text-light); transition:all 0.2s; font-size:0.82rem; }
        .toc a:hover,.toc a.active { background:#fdedec; color:var(--accent); font-weight:600; }
        .toc-toggle { position:fixed; top:16px; left:16px; width:42px; height:42px; border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:1.3rem; cursor:pointer; z-index:101; display:none; box-shadow:0 4px 14px rgba(178,34,34,0.3); align-items:center; justify-content:center; }
        .main { max-width:820px; margin:0 auto 0 270px; display:flex; flex-direction:column; gap:20px; padding-bottom:40px; }
        .card { background:var(--card-bg); border-radius:var(--radius); padding:22px 26px; box-shadow:var(--shadow-md); border:1px solid #f0ebe0; }
        .section-title { font-size:1.45rem; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:10px; }
        .section-title .icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
        .icon-red { background:#fdedec; color:#b22222; } .icon-blue { background:#eaf2f8; color:#1a5276; }
        .icon-green { background:#eafaf1; color:#145a32; } .icon-yellow { background:#fef9e7; color:#b7950b; }
        .subtitle { color:var(--text-light); font-size:0.9rem; margin-bottom:18px; padding-left:44px; }
        .quiz-wrap { border:2px solid #f0ebe0; border-radius:var(--radius-sm); padding:18px 20px; margin-top:12px; background:#fefefe; }
        .quiz-wrap .q-type { font-size:0.78rem; font-weight:700; color:var(--accent); margin-bottom:4px; }
        .quiz-wrap .q-text { font-weight:600; margin-bottom:12px; font-size:0.98rem; }
        .opt-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
        .opt-list li { padding:10px 14px; border-radius:var(--radius-sm); cursor:pointer; border:2px solid #e9e4db; transition:all 0.2s; background:#fdfdfc; font-size:0.9rem; user-select:none; }
        .opt-list li:hover { border-color:#c0b090; background:#fefdf9; }
        .opt-list li.selected { border-color:#1a5276; background:#eaf2f8; font-weight:600; }
        .opt-list li.correct { border-color:#1e8449 !important; background:#eafaf1 !important; color:#145a32 !important; }
        .opt-list li.wrong { border-color:#b22222 !important; background:#fdedec !important; color:#922b21 !important; }
        .opt-list li.disabled { pointer-events:none; opacity:0.85; }
        .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
        .btn { display:inline-block; padding:10px 22px; border-radius:25px; font-weight:600; cursor:pointer; border:none; font-size:0.88rem; }
        .btn-primary { background:var(--accent); color:#fff; } .btn-primary:hover { background:#8b1a1a; }
        .btn-outline { background:#fff; color:var(--accent); border:2px solid var(--accent); } .btn-outline:hover { background:#fdedec; }
        .explain-card { margin-top:12px; padding:14px 18px; border-radius:var(--radius-sm); display:none; font-size:0.9rem; line-height:1.7; }
        .explain-card.show { display:block; }
        .explain-card.correct-ex { background:#eafaf1; border:1px solid #a3e4bc; color:#145a32; }
        .explain-card.wrong-ex { background:#fdedec; border:1px solid #f5b7b1; color:#922b21; }
        .explain-card .ex-head { font-weight:700; margin-bottom:6px; font-size:0.95rem; }
        @media (max-width:768px) {
            .toc { transform:translateX(-260px); } .toc.show { transform:translateX(0); }
            .toc-toggle { display:flex; } .main { max-width:100%; margin:0 auto; } .card { padding:18px 14px; }
        }
    </style>
</head>

<button class="toc-toggle" id="tocToggle" aria-label="目录" onclick="toggleToc()">☰</button>

<script>
const knowledgeData = [
    {
        id: 'mod_single', iconClass: 'icon-red', iconEmoji: '📝',
        title: '综合练习 · 单选题40道',
        subtitle: '行政法（许可/处罚/强制/复议/诉讼）+ 刑法（总论/刑诉）',
        quizzes: [
            { q: '行政许可直接涉及申请人与他人之间重大利益关系的，行政机关应当告知申请人、利害关系人享有什么权利？', opts: ['A. 陈述权', 'B. 申辩权', 'C. 要求听证的权利', 'D. 行政复议权'], correct: 2, type: 'single', quizIndex: 1,
              d: '<b>A</b>：错误。陈述权是基本权利，但此处法条特别强调听证权。<br><b>B</b>：错误。申辩权也是基本权利，非此处特指。<br><b>C</b>：正确。根据《行政许可法》第47条，直接涉及重大利益关系的，应告知听证权利。<br><b>D</b>：错误。复议权是事后救济，非许可审查阶段的告知义务。',
              t: '许可涉及别人重大利益时，必须告诉人家可以申请听证——"你的许可影响我，我要说话！"' },
            { q: '行政机关实施行政强制措施时，当事人不到场的，应如何处理？', opts: ['A. 直接实施', 'B. 邀请见证人到场并签名盖章', 'C. 暂停实施等当事人', 'D. 两名执法人员签名即可'], correct: 1, type: 'single', quizIndex: 2,
              d: '<b>A</b>：错误。不能直接实施，需有见证人。<br><b>B</b>：正确。根据《行政强制法》第18条，应邀请见证人到场。<br><b>C</b>：错误。不一定暂停。<br><b>D</b>：错误。仅执法人员签名不够。',
              t: '当事人不来？找个路人见证一下，签个字，程序就合法了。' },
            { q: '根据《行政处罚法》，违法行为在几年内未被发现的，不再给予行政处罚（涉及生命健康安全且有危害后果的除外）？', opts: ['A. 6个月', 'B. 1年', 'C. 2年', 'D. 3年'], correct: 2, type: 'single', quizIndex: 3,
              d: '<b>A</b>：错误。6个月是治安案件时效。<br><b>B</b>：错误。无此规定。<br><b>C</b>：正确。一般2年，涉生命健康安全且后果的5年。<br><b>D</b>：错误。无此规定。',
              t: '一般违法2年过了就算了，严重的（生命健康）5年，治安问题只有6个月。' },
            { q: '行政复议机关收到行政复议申请后，应在几日内进行审查？', opts: ['A. 3日', 'B. 5日', 'C. 7日', 'D. 10日'], correct: 1, type: 'single', quizIndex: 4,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。5日内审查是否受理。<br><b>C</b>：错误。7日是发送申请书副本。<br><b>D</b>：错误。10日是补正材料。',
              t: '复议机关5天决定接不接你的案子。过了5天没说不受理，就当受理了。' },
            { q: '行政诉讼中，被告应当在收到起诉状副本之日起多少日内提交证据？', opts: ['A. 5日', 'B. 10日', 'C. 15日', 'D. 20日'], correct: 2, type: 'single', quizIndex: 5,
              d: '<b>A</b>：错误。5日是法院发送副本。<br><b>B</b>：错误。10日是复议被申请人。<br><b>C</b>：正确。被告15日内提交证据。<br><b>D</b>：错误。无此规定。',
              t: '被告15天交证据，过期不交=没证据=等着输。' },
            { q: '下列哪项不属于行政强制措施？', opts: ['A. 查封场所', 'B. 扣押财物', 'C. 冻结存款', 'D. 加处罚款'], correct: 3, type: 'single', quizIndex: 6,
              d: '<b>A</b>：属于措施。<br><b>B</b>：属于措施。<br><b>C</b>：属于措施。<br><b>D</b>：不属于。加处罚款是行政强制执行。',
              t: '措施=暂时控制（查扣冻），执行=最终处置（划拨拍卖加罚）。' },
            { q: '行政复议中，被申请人不履行复议决定的，复议机关可以采取什么措施？', opts: ['A. 强制执行', 'B. 责令限期履行', 'C. 提起行政诉讼', 'D. 申请法院执行'], correct: 1, type: 'single', quizIndex: 7,
              d: '<b>A</b>：错误。不能强制被申请人。<br><b>B</b>：正确。责令限期履行，可约谈通报批评。<br><b>C</b>：错误。<br><b>D</b>：错误。申请执行是对申请人。',
              t: '被申请人不履行=内部督促（责令、约谈、通报）。申请人不履行=外部强制。' },
            { q: '行政许可的延续申请应在有效期届满多少日前提出？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 2, type: 'single', quizIndex: 8,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。20日是许可决定期限。<br><b>C</b>：正确。30日前申请。<br><b>D</b>：错误。60日是复议申请。',
              t: '提前一个月续证！行政机关逾期未决=默认同意延续。' },
            { q: '根据《治安管理处罚法》，派出所可以决定的罚款最高限额是？', opts: ['A. 200元', 'B. 500元', 'C. 1000元', 'D. 2000元'], correct: 1, type: 'single', quizIndex: 9,
              d: '<b>A</b>：错误。200元是简易程序上限。<br><b>B</b>：正确。派出所只能警告或500元以下罚款。<br><b>C</b>：错误。超出权限。<br><b>D</b>：错误。2000元是听证门槛。',
              t: '派出所是小角色，只能罚500元以内。超出权限的罚款会被撤销。' },
            { q: '行政诉讼中，因不动产提起的案件最长起诉期限是？', opts: ['A. 2年', 'B. 5年', 'C. 10年', 'D. 20年'], correct: 3, type: 'single', quizIndex: 10,
              d: '<b>A</b>：错误。2年是处罚时效。<br><b>B</b>：错误。其他案件5年。<br><b>C</b>：错误。无此规定。<br><b>D</b>：正确。不动产最长20年。',
              t: '房子是大事，20年内发现都能告。其他事情只有5年。' },
            { q: '行政许可直接关系人身健康的重要设备定期检验，依据只能是？', opts: ['A. 法律', 'B. 行政法规', 'C. 法律、行政法规', 'D. 规章'], correct: 2, type: 'single', quizIndex: 11,
              d: '<b>A</b>：不全面。<br><b>B</b>：不全面。<br><b>C</b>：正确。只能依据法律或行政法规。<br><b>D</b>：错误。规章无权。',
              t: '规章不能规定检验——层级太低。必须法律或行政法规才够格。' },
            { q: '行政强制措施实施前，须向谁报告并经批准？', opts: ['A. 上级机关', 'B. 行政机关负责人', 'C. 法院', 'D. 同级人大'], correct: 1, type: 'single', quizIndex: 12,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。向本机关负责人报告批准。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '先请示领导批准才能动手。紧急情况可先斩后奏，24小时内补办。' },
            { q: '行政复议期间，行政行为原则上是否停止执行？', opts: ['A. 停止', 'B. 不停止', 'C. 由申请人决定', 'D. 由被申请人决定'], correct: 1, type: 'single', quizIndex: 13,
              d: '<b>A</b>：错误。停止是例外。<br><b>B</b>：正确。原则不停止。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '不能因为告了就暂停处罚，否则大家都会用复议拖延时间。' },
            { q: '行政诉讼中，人民法院应当在立案之日起几日内将起诉状副本发送被告？', opts: ['A. 3日', 'B. 5日', 'C. 7日', 'D. 10日'], correct: 1, type: 'single', quizIndex: 14,
              d: '<b>A</b>：错误。3日是简易程序。<br><b>B</b>：正确。5日内发送。<br><b>C</b>：错误。7日是复议发送。<br><b>D</b>：错误。',
              t: '法院手脚快，5天就送达。被告15天内交答辩。' },
            { q: '行政处罚中，当事人到期不缴纳罚款的，每日按罚款数额的多少加处罚款？', opts: ['A. 1%', 'B. 2%', 'C. 3%', 'D. 5%'], correct: 2, type: 'single', quizIndex: 15,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。每日3%，最多加罚到原罚款本金。<br><b>D</b>：错误。5‱是税收滞纳金。',
              t: '每天3%，一个月就翻倍。加罚不能超过原罚款数额。' },
            { q: '关于刑事责任年龄，以下说法正确的是？', opts: ['A. 不满14周岁一律不负刑责', 'B. 12-14周岁经最高检核准可对故意杀人负责', 'C. 14-16周岁对盗窃负刑责', 'D. 16周岁以上对所有犯罪负刑责'], correct: 1, type: 'single', quizIndex: 16,
              d: '<b>A</b>：错误。12-14岁特定罪行经核准也负责。<br><b>B</b>：正确。经最高检核准追诉应负刑责。<br><b>C</b>：错误。盗窃不在8种重罪中。<br><b>D</b>：正确但非本题最佳选项。',
              t: '12-14岁不是"绝对不负责"，故意杀人等特别严重的，最高检核准了也要管。' },
            { q: '刑事诉讼中，逮捕的批准机关是？', opts: ['A. 公安机关', 'B. 人民检察院', 'C. 人民法院', 'D. 监察委员会'], correct: 1, type: 'single', quizIndex: 17,
              d: '<b>A</b>：错误。只能提请。<br><b>B</b>：正确。批准逮捕是检察院专属权力。<br><b>C</b>：错误。法院可决定不能批准。<br><b>D</b>：错误。',
              t: '公安想抓人？找检察院批条子。法院和检察院可自己决定逮捕。' },
            { q: '监视居住最长不得超过多久？', opts: ['A. 3个月', 'B. 6个月', 'C. 12个月', 'D. 24个月'], correct: 1, type: 'single', quizIndex: 18,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。最长6个月。<br><b>C</b>：错误。12个月是取保候审。<br><b>D</b>：错误。',
              t: '监视6个月，取保12个月。两倍关系。' },
            { q: '被取保候审人住址、工作单位变动的，应在多少小时内报告？', opts: ['A. 12小时', 'B. 24小时', 'C. 48小时', 'D. 72小时'], correct: 1, type: 'single', quizIndex: 19,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。变动后24小时内报告。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '换地址、换工作、换手机号？24小时内必须报告！' },
            { q: '拘役由哪个机关执行？', opts: ['A. 监狱', 'B. 社区矫正机构', 'C. 公安机关', 'D. 人民法院'], correct: 2, type: 'single', quizIndex: 20,
              d: '<b>A</b>：错误。监狱执行有期、无期、死缓。<br><b>B</b>：错误。社区矫正执行管制、缓刑。<br><b>C</b>：正确。拘役由公安机关执行。<br><b>D</b>：错误。法院执行没收财产、罚金。',
              t: '拘役=公安就近关押，每月可回家1-2天。管制才不用关。' },
            { q: '关于辩护律师的阅卷权，以下正确的是？', opts: ['A. 侦查阶段即可查阅', 'B. 自审查起诉之日起可查阅', 'C. 需经检察院许可', 'D. 只能查阅不能复制'], correct: 1, type: 'single', quizIndex: 21,
              d: '<b>A</b>：错误。侦查阶段无阅卷权。<br><b>B</b>：正确。审查起诉之日起可查阅复制。<br><b>C</b>：错误。无需许可。<br><b>D</b>：错误。可查阅摘抄复制。',
              t: '侦查阶段只能会见不能看卷。等到检察院才能看。' },
            { q: '行政许可听证的费用由谁承担？', opts: ['A. 申请人', 'B. 利害关系人', 'C. 行政机关', 'D. 申请人和利害关系人共同'], correct: 2, type: 'single', quizIndex: 22,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。听证费用由行政机关承担。<br><b>D</b>：错误。',
              t: '听证不要钱！不管谁申请的，费用都是行政机关出。' },
            { q: '行政处罚中，对公民处以多少元以下罚款可以适用简易程序？', opts: ['A. 50元', 'B. 100元', 'C. 200元', 'D. 500元'], correct: 2, type: 'single', quizIndex: 23,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。100元是当场收缴上限。<br><b>C</b>：正确。200元以下简易程序。<br><b>D</b>：错误。',
              t: '当场罚200元以下，当场收100元以下。两个数字别搞混。' },
            { q: '地方性法规可以设定哪些行政强制措施？', opts: ['A. 限制人身自由', 'B. 冻结存款', 'C. 查封和扣押', 'D. 行政强制执行'], correct: 2, type: 'single', quizIndex: 24,
              d: '<b>A</b>：错误。只能法律设定。<br><b>B</b>：错误。只能法律设定。<br><b>C</b>：正确。地方性法规只能设查封扣押。<br><b>D</b>：错误。只能法律设定。',
              t: '地方性法规权限最小——只能"查扣"两件事。' },
            { q: '行政复议决定中，禁止什么原则？', opts: ['A. 禁止维持原行为', 'B. 禁止加重申请人负担', 'C. 禁止撤销原行为', 'D. 禁止变更原行为'], correct: 1, type: 'single', quizIndex: 25,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。类似"上诉不加刑"。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '复议不能让你"越告越惨"，不能因为你告了就加罚。' },
            { q: '行政诉讼的举证责任主要由谁承担？', opts: ['A. 原告', 'B. 被告', 'C. 法院', 'D. 第三人'], correct: 1, type: 'single', quizIndex: 26,
              d: '<b>A</b>：错误。原告只承担初步证明。<br><b>B</b>：正确。被告承担主要举证责任。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '官要证明自己做得对——你罚我的，你得拿出证据来。' },
            { q: '犯罪时不满18周岁的人，以下说法正确的是？', opts: ['A. 可以从轻或减轻处罚', 'B. 应当从轻或减轻处罚', 'C. 可以免除处罚', 'D. 正常处罚'], correct: 1, type: 'single', quizIndex: 27,
              d: '<b>A</b>：错误。"应当"不是"可以"。<br><b>B</b>：正确。未成年人应当从轻减轻。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '未成年=应当从轻。老人=可以从轻。' },
            { q: '讯问已被羁押的犯罪嫌疑人，应当在何处进行？', opts: ['A. 公安机关办案场所', 'B. 看守所内', 'C. 嫌疑人住处', 'D. 检察院办公室'], correct: 1, type: 'single', quizIndex: 28,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。送交看守所后只能在所内讯问。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '人关进看守所了，就得在所里审，不能提出来。' },
            { q: '下列哪项属于行政许可？', opts: ['A. 婚姻登记', 'B. 企业法人登记（营业执照）', 'C. 税务登记', 'D. 户口登记'], correct: 1, type: 'single', quizIndex: 29,
              d: '<b>A</b>：行政确认。<br><b>B</b>：正确。营业执照是行政许可。<br><b>C</b>：行政确认。<br><b>D</b>：行政确认。',
              t: '许可=给你"资格"去做以前不能做的事。婚姻、税务、户口都是确认已有状态。' },
            { q: '行政处罚中，不予处罚的情形不包括？', opts: ['A. 不满14周岁', 'B. 精神病人不能辨认行为时', 'C. 违法行为轻微及时纠正无后果', 'D. 受他人教唆'], correct: 3, type: 'single', quizIndex: 30,
              d: '<b>A</b>：属于不予处罚。<br><b>B</b>：属于不予处罚。<br><b>C</b>：属于不予处罚。<br><b>D</b>：不属于。教唆不是免责理由。',
              t: '别人叫你干坏事你就干了？不能免责。被胁迫才可以从轻。' },
            { q: '查封扣押的最长期限是？', opts: ['A. 30日', 'B. 45日', 'C. 60日', 'D. 90日'], correct: 2, type: 'single', quizIndex: 31,
              d: '<b>A</b>：一般期限。<br><b>B</b>：错误。<br><b>C</b>：正确。30+30=60日。<br><b>D</b>：错误。',
              t: '一般30天，延长30天，封顶60天。' },
            { q: '行政复议的申请期限一般是自知道行政行为之日起多少日内？', opts: ['A. 15日', 'B. 30日', 'C. 60日', 'D. 6个月'], correct: 2, type: 'single', quizIndex: 32,
              d: '<b>A</b>：复议后诉讼期限。<br><b>B</b>：错误。<br><b>C</b>：正确。复议申请60日。<br><b>D</b>：直接诉讼6个月。',
              t: '复议60天，诉讼6个月。复议更快。' },
            { q: '行政诉讼简易程序的审理期限是？', opts: ['A. 30日', 'B. 45日', 'C. 60日', 'D. 3个月'], correct: 1, type: 'single', quizIndex: 33,
              d: '<b>A</b>：复议简易30日。<br><b>B</b>：正确。诉讼简易45日。<br><b>C</b>：普通程序。<br><b>D</b>：二审期限。',
              t: '诉讼简易45天，复议简易30天。' },
            { q: '下列哪项不属于中院管辖的第一审刑事案件？', opts: ['A. 危害国家安全案件', 'B. 恐怖活动案件', 'C. 可能判处无期徒刑案件', 'D. 故意伤害致轻伤案件'], correct: 3, type: 'single', quizIndex: 34,
              d: '<b>A</b>：属于。<br><b>B</b>：属于。<br><b>C</b>：属于。<br><b>D</b>：不属于。基层管辖。',
              t: '口诀"国恐无死"归中院。轻伤去基层。' },
            { q: '公安机关执行逮捕时，执行人员不得少于几人？', opts: ['A. 1人', 'B. 2人', 'C. 3人', 'D. 5人'], correct: 1, type: 'single', quizIndex: 35,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。不得少于2人。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '抓人也得至少两个人——互相监督，防止意外。' },
            { q: '关于自首，以下说法正确的是？', opts: ['A. 自首是主动投案如实供述', 'B. 自首可以从轻或减轻处罚', 'C. 自首与坦白性质相同', 'D. A和B都正确'], correct: 3, type: 'single', quizIndex: 36,
              d: '<b>A</b>：正确。<br><b>B</b>：正确。<br><b>C</b>：错误。自首主动，坦白被动。<br><b>D</b>：正确。',
              t: '自首=主动找警察，坦白=被抓了才说。自首比坦白宽得多。' },
            { q: '省级政府规章可以设定什么类型的行政许可？', opts: ['A. 经常性许可', 'B. 临时性许可，有效期1年', 'C. 所有类型', 'D. 不能设定任何许可'], correct: 1, type: 'single', quizIndex: 37,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。省级规章只能设临时许可。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '省级政府可设1年临时许可，到期转正需省人大制定地方性法规。' },
            { q: '行政处罚听证费用由谁承担？', opts: ['A. 当事人', 'B. 行政机关', 'C. 各半', 'D. 利害关系人'], correct: 1, type: 'single', quizIndex: 38,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。行政机关承担。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '听证不收费！不管谁申请的，钱都是行政机关出。' },
            { q: '行政机关对行政许可申请进行审查后，除当场作出决定的外，应当在多久内作出决定？', opts: ['A. 10日', 'B. 20日', 'C. 30日', 'D. 45日'], correct: 1, type: 'single', quizIndex: 39,
              d: '<b>A</b>：错误。10日是材料补正期限。<br><b>B</b>：正确。一般20日内作出决定，可延长10日。<br><b>C</b>：错误。<br><b>D</b>：错误。45日是行政诉讼法简易程序。',
              t: '许可决定一般20天，复杂可再延10天，封顶30天。' },
            { q: '下列哪种情形下，行政机关可以当场收缴罚款？', opts: ['A. 对法人处以1000元罚款', 'B. 在边远水上交通不便地区，当事人到指定银行缴纳确有困难', 'C. 对公民处以200元罚款', 'D. 对公民处以50元罚款，当事人无异议'], correct: 1, type: 'single', quizIndex: 40,
              d: '<b>A</b>：错误。法人不适用当场收缴。<br><b>B</b>：正确。交通不便地区，当事人提出或确有困难可当场收缴。<br><b>C</b>：错误。200元是简易程序，不是当场收缴条件。<br><b>D</b>：错误。50元不适用当场收缴，需100元以下。',
              t: '当场收缴看两个：金额100元以下，或者偏远地区银行远。不是所有简易程序都能当场收钱。' }
        ]
    },
,
    {

        quizzes: [
            { q: '行政许可的延续申请应在有效期届满前30日内提出。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf1',
              d: '<b>A"正确"</b>：正确。根据《行政许可法》，延续申请应在有效期届满30日前提出。<br><b>B"错误"</b>：错误。法律规定确实是30日。',
              t: '提前一个月申请续证！晚了就可能过期不候。这个数字要记牢。' },

              d: '<b>A"正确"</b>：错误。收取的费用必须全部上缴国库，不得截留或留作经费。<br><b>B"错误"</b>：正确。任何行政机关不得以任何形式截留、私分。',

            { q: '行政处罚中，罚缴分离是原则，当场收缴是例外。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf3',
              d: '<b>A"正确"</b>：正确。罚款决定与罚款收缴应当分离，当场收缴仅限于法定情形。<br><b>B"错误"</b>：错误。这正是罚缴分离原则的内涵。',
              t: '开罚单的不收钱，收钱的是银行。只有100元以下、交通不便等特殊情况才能当场收。' },
            { q: '行政机关实施行政强制措施时，当事人不到场的，应当暂停实施，等待当事人到场。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf4',
              d: '<b>A"正确"</b>：错误。当事人不到场不一定要暂停，可以邀请见证人到场。<br><b>B"错误"</b>：正确。根据《行政强制法》第18条，不到场应邀请见证人到场。',
              t: '当事人不来？不一定要等他。找个路人见证一下，签个字，程序照样合法。' },
            { q: '行政复议机关审理行政复议案件，可以调解。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf5',
              d: '<b>A"正确"</b>：正确。2024年新修订的行政复议法将调解写入总则，成为基本原则。<br><b>B"错误"</b>：错误。复议调解已成为原则。',
              t: '复议可以调解了！调解书三方签章就生效。以前只能对自由裁量权案件调解，现在原则上都可以。' },
            { q: '行政诉讼中，被告承担全部举证责任，原告无需提供任何证据。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf6',

            { q: '行政强制执行的设定权仅限于法律。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf7',
              d: '<b>A"正确"</b>：正确。行政强制执行只能由法律设定，行政法规、地方性法规、规章均无权。<br><b>B"错误"</b>：错误。',
              t: '"执行唯法律"——这是最霸道的手段，只能由最高级别的法律来规定。' },
            { q: '行政复议实行一级复议原则，对复议决定不服只能提起行政诉讼。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf8',

            { q: '监察委员会有权批准逮捕犯罪嫌疑人。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf11',

            { q: '行政复议的申请期限一律为60日，法律不得规定超过60日的申请期限。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf22',
              d: '<b>A"正确"</b>：错误。法律可以规定超过60日的申请期限。<br><b>B"错误"</b>：正确。"一律"太绝对。',
              t: '一般是60天，但法律可以规定更长的申请期限。"一律"二字是陷阱。' },
            { q: '行政许可直接关系公共利益的重大事项，行政机关应当向社会公告并举行听证。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf23',
              d: '<b>A"正确"</b>：正确。涉及公共利益的重大许可事项，应当公告并举行听证。<br><b>B"错误"</b>：错误。',
              t: '修高速公路、建核电站这种大事，必须告诉公众，还要开听证会。' },
            { q: '被取保候审人未经批准不得离开所居住的市、县。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf24',
              d: '<b>A"正确"</b>：正确。这是被取保候审人的法定义务。<br><b>B"错误"</b>：错误。',

              d: '<b>A"正确"</b>：错误。2021年修订后，简易程序也需2名以上执法人员。<br><b>B"错误"</b>：正确。',

              d: '<b>A"正确"</b>：正确。被告在诉讼期间不得自行收集证据。<br><b>B"错误"</b>：错误。',
              t: '处罚时就应该证据齐全，被告了才去找证据=心虚+违法。事后补的一律不算。' },
            { q: '行政复议机关无正当理由不予受理的，上级行政机关应当责令其受理，必要时可以直接受理。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf27',
              d: '<b>A"正确"</b>：正确。上级可责令受理或直接受理。<br><b>B"错误"</b>：错误。',
              t: '下级不理？找上级！上级可以骂他一顿让他理，也可以自己亲自理。' },
            { q: '被告人是盲、聋、哑人且没有委托辩护人的，人民法院应当通知法律援助机构指派律师为其辩护。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf28',
              d: '<b>A"正确"</b>：正确。盲聋哑人属于应当指派律师的情形。<br><b>B"错误"</b>：错误。',
              t: '盲聋哑=必须给律师，不用他们自己申请。口诀"盲聋哑、半疯傻、无死未"。' },
            { q: '行政强制措施中，查封、扣押的期限一般不得超过30日。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf29',
              d: '<b>A"正确"</b>：正确。一般30日，最长60日。<br><b>B"错误"</b>：错误。',

              d: '<b>A"正确"</b>：正确。在共同正犯中，一人完成犯罪，全体都算既遂。<br><b>B"错误"</b>：错误。',

<script>
// ==================== 渲染引擎（修复✅❌标识） ====================
function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}

function renderQuiz(q,qid){
  var qTypeLabel='【单选题】';
  var h='<div class="quiz-wrap" data-qid="'+qid+'">';
  if(q.quizIndex){
    h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';
  }else if(q.tfId){
    h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';
  }else{
    h+='<div class="q-type">📝 '+qTypeLabel+'</div>';
  }
  h+='<div class="q-text">'+q.q+'</div><ul class="opt-list">';
  for(var i=0;i<q.opts.length;i++){
    h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';
  }
  h+='</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div>';
  h+='<div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';
  if(q.d){
    var detail = q.d;
    // 1. 判断题格式：<b>A"正确"</b>：正确 → ✅
    detail = detail.replace(/<b>([A-E])"正确"<\/b>：正确/g, '<span style="color:#145a32;">✅ $1选项</b>：正确</span>');
    detail = detail.replace(/<b>([A-E])"错误"<\/b>：错误/g, '<span style="color:#b22222;">❌ $1选项</b>：错误</span>');
    // 2. 判断题型中“说了正确但结论是错误”的情况（题目里没有，但为了安全加上）
    detail = detail.replace(/<b>([A-E])"正确"<\/b>：错误/g, '<span style="color:#b22222;">❌ $1选项</b>：错误</span>');
    detail = detail.replace(/<b>([A-E])"错误"<\/b>：正确/g, '<span style="color:#145a32;">✅ $1选项</b>：正确</span>');
    // 3. 单选题格式：<b>A</b>：正确 → ✅
    detail = detail.replace(/<b>([A-E])<\/b>：(正确)/g, '<span style="color:#145a32;">✅ $1选项</b>：$2</span>');
    detail = detail.replace(/<b>([A-E])<\/b>：(错误)/g, '<span style="color:#b22222;">❌ $1选项</b>：$2</span>');
    // 4. 可选：处理其他正向/负向词（如“属于”“不属于”等），视题目需要可扩展
    h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detail+'</div>';
  }
  h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.t+'</div></div></div>';
  return h;
}

function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 综合练习目录</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
