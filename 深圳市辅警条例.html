              title: '2. 兼职辅警与附则（第45-49条）',
              content: '🔹 <span class="kh kh-green">文职辅警</span>可采用<span class="kh kh-blue">劳务派遣</span>方式招录，但应<span class="kh kh-red">严格控制规模</span>。<br>🔹 公安机关可招聘<span class="kh kh-green">非全日制兼职辅警</span>，参照本条例执行。<br>🔹 <span class="kh kh-green">法院、检察院、司法行政机关</span>的辅警可<span class="kh kh-blue">参照</span>本条例执行。<br>🔹 本条例自<span class="kh kh-blue">2017年12月1日</span>起施行。',
              extra: '📌 文职辅警可以用劳务派遣，但要控制规模。兼职辅警参照执行。' },
            { type: 'ki', badge: '补充', badgeClass: 'badge-num',
              title: '3. 公文格式核心要点（第2章）',
              content: '🔹 公文<span class="kh kh-red">主体</span>：标题、主送机关、正文、附件说明、发文机关署名、成文日期、印章等。<br>🔹 <span class="kh kh-red">正文</span>：公文的核心，用<span class="kh kh-blue">3号仿宋体</span>。结构层次序数：<span class="kh kh-blue">一、（一）1.（1）</span>；第一层用<span class="kh kh-red">黑体</span>，第二层用<span class="kh kh-blue">楷体</span>，第三四层用仿宋体。<br>🔹 <span class="kh kh-red">附件说明</span>：正文下空一行，左空二字编排"附件"二字。',
              extra: '📌 公文格式考得不多，记住字体和层次序数就够了。' },
            { type: 'ki', badge: '补充', badgeClass: 'badge-num',
              title: '4. 马克思主义哲学核心要点（第3章）',
              content: '🔹 <span class="kh kh-red">唯物主义</span>：物质第一性，意识第二性。三种形态：<span class="kh kh-blue">古代朴素</span>（水/火/气）→<span class="kh kh-blue">近代形而上学</span>（原子）→<span class="kh kh-blue">现代辩证唯物主义</span>。<br>🔹 <span class="kh kh-red">唯心主义</span>：意识第一性。两种形态：<span class="kh kh-green">主观唯心</span>（我思故我在、心外无物）→<span class="kh kh-green">客观唯心</span>（绝对观念、道生万物）。',
              extra: '📌 考试常考：判断某句话属于哪种哲学流派。"水是万物的始基"=古代朴素唯物主义；"存在就是被感知"=主观唯心主义。' },
            { type: 'ki', badge: '补充', badgeClass: 'badge-num',
              title: '5. 二十大报告要点速记（第4章）',
              content: '🔹 <span class="kh kh-red">大会主题</span>：高举中国特色社会主义伟大旗帜。<br>🔹 <span class="kh kh-red">"三个务必"</span>：务必不忘初心、牢记使命；务必谦虚谨慎、艰苦奋斗；务必敢于斗争、善于斗争。<br>🔹 <span class="kh kh-blue">"三件大事"</span>：建党百年、新时代、脱贫攻坚。<br>🔹 <span class="kh kh-blue">"六个必须坚持"</span>：人民至上、自信自立、守正创新、问题导向、系统观念、胸怀天下。<br>🔹 <span class="kh kh-green">中心任务</span>：中国式现代化全面推进中华民族伟大复兴。',
              extra: '📌 辅警考试中二十大要点偶尔出现，记住"三个务必""三件大事""六个必须坚持"即可。' }
        ],
        quizzes: [
            { q: '辅警在履行职责时侵犯他人合法权益造成损害的，由谁赔偿？', opts: ['A. 辅警个人', 'B. 公安机关', 'C. 市财政部门', 'D. 不赔偿'], correct: 1, type: 'single', quizIndex: 16,
              d: '<b>A</b>：错误。辅警履职侵权由国家赔偿。<br><b>B</b>：正确。第42条：由公安机关依照国家赔偿有关规定予以赔偿。<br><b>C</b>：错误。财政部门是拨款方。<br><b>D</b>：错误。',
              t: '辅警打人→公安赔。但如果是辅警个人行为，与履职无关，那就自己赔。' },
            { q: '非法使用辅警制式服装、标识的，由公安机关予以没收，并处罚款多少元？', opts: ['A. 200元', 'B. 500元', 'C. 1000元', 'D. 2000元'], correct: 1, type: 'single', quizIndex: 17,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。第44条：非法使用制式服装、辅警标识的，没收并处500元罚款。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '乱穿辅警制服=没收+500元罚款。非法制造贩卖更严重：没收+货值5倍以下罚款。' },
            { q: '"存在就是被感知"属于哪种哲学流派？', opts: ['A. 古代朴素唯物主义', 'B. 近代形而上学唯物主义', 'C. 主观唯心主义', 'D. 客观唯心主义'], correct: 2, type: 'single', quizIndex: 18,
              d: '<b>A</b>：错误。这句话是唯心主义不是唯物主义。<br><b>B</b>：错误。<br><b>C</b>：正确。"存在就是被感知"强调人的感觉决定存在，属于主观唯心主义。<br><b>D</b>：错误。客观唯心主义强调独立于人的客观精神。',
              t: '主观唯心=我的心决定世界（我思故我在）。客观唯心=世界上有个绝对精神主宰一切（道生万物）。' }
        ]
    },

,
    // ==================== 综合练习（单选20+判断15+多选10） ====================
    {
        id: 'mod_final', iconClass: 'icon-red', iconEmoji: '🏆',
        title: '综合练习 · 单选20道 + 判断15道 + 多选10道',
        subtitle: '覆盖深圳辅警条例全部核心考点',
        quizzes: [
            // ===== 单选题20道 =====
            { q: '根据《深圳经济特区警务辅助人员条例》，辅警的身份性质是什么？', opts: ['A. 人民警察', 'B. 非人民警察身份的工作人员', 'C. 公务员', 'D. 事业单位人员'], correct: 1, type: 'single', quizIndex: 1,
              d: '<b>A</b>：错误。人民警察是通过公务员考试或警校招录的正式警察，有执法权。辅警不是人民警察。<br><b>B</b>：正确。条例第3条明确写了：辅警是"由公安机关统一招聘和管理，为非人民警察身份的工作人员"。辅警是辅助警察工作的人，本身不是警察。<br><b>C</b>：错误。辅警签的是劳动合同，不是公务员编制。公务员需要通过国家或省级统一考试。<br><b>D</b>：错误。辅警不属于事业单位人员，他们是与公安机关直接签订劳动合同的。',
              t: '辅警=非人民警察身份。第3条说得明明白白：辅警是辅助警察的人，不是警察本身。' },
            { q: '深圳辅警分为哪两类？', opts: ['A. 行政辅警和刑事辅警', 'B. 勤务辅警和文职辅警', 'C. 专职辅警和兼职辅警', 'D. 一级辅警和二级辅警'], correct: 1, type: 'single', quizIndex: 2,
              d: '<b>A</b>：错误。条例没有按行政/刑事来分类辅警。<br><b>B</b>：正确。条例第3条明确规定："辅警分为勤务辅警和文职辅警。"勤务辅警协助执法执勤，文职辅警做文书和技术工作。<br><b>C</b>：错误。条例第46条虽然规定了可以招聘兼职辅警，但这不是辅警的基本分类。<br><b>D</b>：错误。一级、二级是辅警的层级（第21条规定辅警分一级至六级），不是分类。',
              t: '辅警分两类：勤务辅警（协助执法执勤）+ 文职辅警（做文书和技术活）。这是第3条规定的。' },
            { q: '辅警依法履行职责的后果由谁承担？', opts: ['A. 辅警个人', 'B. 其所在的公安机关', 'C. 市人力资源和社会保障部门', 'D. 市财政部门'], correct: 1, type: 'single', quizIndex: 3,
              d: '<b>A</b>：错误。辅警个人不直接对外承担法律后果，否则没人敢干辅警了。<br><b>B</b>：正确。条例第7条第2款规定："辅警依法履行职责的行为受法律保护，具有法律效力，履行职责的后果由其所在的公安机关承担。"也就是说辅警做事，公安兜底。<br><b>C</b>：错误。人社部门负责招聘指导和薪酬核定，不承担履职后果。<br><b>D</b>：错误。财政部门负责经费保障，不承担法律后果。',
              t: '辅警做事=公安担责。第7条说得很清楚：履职后果由公安机关承担。' },
            { q: '勤务辅警在无人民警察带领时，从事治安巡逻不得少于几人？', opts: ['A. 1人', 'B. 2人', 'C. 3人', 'D. 4人'], correct: 1, type: 'single', quizIndex: 4,
              d: '<b>A</b>：错误。第8条明确规定不能单独巡逻。<br><b>B</b>：正确。第8条规定：勤务辅警从事治安巡逻（第三项）、安全巡查（第四项）、消防巡查（第七项），无人民警察带领时，不得少于两人。这是出于安全和互相监督的考虑。<br><b>C</b>：错误。条例没有要求3人以上。<br><b>D</b>：错误。',
              t: '辅警巡逻不能落单！没警察带的时候，至少两个人一组。第8条明确写了。' },
            { q: '下列哪项工作辅警绝对不得从事？', opts: ['A. 采集交通违法信息', 'B. 疏导交通', 'C. 作出行政处理决定', 'D. 治安巡逻'], correct: 2, type: 'single', quizIndex: 5,
              d: '<b>A</b>：错误。第8条第(六)项明确规定勤务辅警可以"采集交通违法信息"，如拍违停。<br><b>B</b>：错误。第8条第(六)项规定辅警可以"疏导交通，劝阻交通安全违法行为"。<br><b>C</b>：正确。第11条第(七)项规定公安机关不得安排辅警"作出行政处理决定"。也就是说辅警不能开罚单、不能作出处罚决定，这是警察的专属权力。<br><b>D</b>：错误。治安巡逻是辅警的基本职责之一。',
              t: '辅警可以拍违停、指挥交通，但不能开罚单！"作出行政处理决定"是第11条明令禁止的——那是警察的权力。' },
            { q: '勤务辅警可以在人民警察带领下从事哪项工作？', opts: ['A. 作出交通事故责任认定', 'B. 执行刑事强制措施', 'C. 对醉酒人员采取临时保护性约束措施', 'D. 办理涉及国家秘密的事项'], correct: 2, type: 'single', quizIndex: 6,
              d: '<b>A</b>：错误。第11条第(六)项规定交通事故责任认定是辅警绝对不能从事的，即使在警察带领下也不行。<br><b>B</b>：错误。第11条第(四)项规定执行刑事强制措施绝对禁止。<br><b>C</b>：正确。第9条第(五)项允许辅警在一名以上民警带领下"对行为举止失控的醉酒人员、实施暴力行为的精神病人采取临时保护性约束措施"。<br><b>D</b>：错误。第11条第(一)项规定涉及国家秘密的事项绝对禁止。',
              t: '醉酒闹事的，辅警可以跟着警察一起控制他——但警察必须在场。第9条第(五)项明确写了。' },
            { q: '文职辅警可以从事下列哪项工作？', opts: ['A. 传唤违法犯罪嫌疑人', 'B. 档案管理', 'C. 执行刑事强制措施', 'D. 作出行政处罚决定'], correct: 1, type: 'single', quizIndex: 7,
              d: '<b>A</b>：错误。传唤需在第9条规定的一名以上民警带领下进行，文职辅警不涉及这类执法工作。<br><b>B</b>：正确。第10条第(三)项明确文职辅警可以从事"文书助理、档案管理、证照办理等行政助理工作"。<br><b>C</b>：错误。第11条第(四)项绝对禁止辅警执行刑事强制措施。<br><b>D</b>：错误。第11条第(七)项绝对禁止辅警作出行政处理决定。',
              t: '文职辅警=做"文"的工作。档案管理、文书助理、证照办理都是第10条明确列出的工作。' },
            { q: '应聘辅警的最低年龄要求是多少周岁？', opts: ['A. 18周岁', 'B. 20周岁', 'C. 22周岁', 'D. 25周岁'], correct: 1, type: 'single', quizIndex: 8,
              d: '<b>A</b>：错误。18岁是报考普通公务员的年龄下限，但辅警要求更高。<br><b>B</b>：正确。第14条第(二)项规定应聘辅警应"年满二十周岁的中华人民共和国公民"。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '辅警要20岁才能考！第14条明确写了"年满二十周岁"，比普通公务员（18岁）晚两年。' },
            { q: '应聘辅警的一般学历要求是什么？', opts: ['A. 高中以上', 'B. 大学专科以上', 'C. 大学本科以上', 'D. 研究生以上'], correct: 1, type: 'single', quizIndex: 9,
              d: '<b>A</b>：错误。高中以上是专门给退役士兵的放宽条件，不是一般要求。<br><b>B</b>：正确。第14条第(三)项规定应聘辅警应"具有大学专科以上学历"。<br><b>C</b>：错误。条例没有要求本科。<br><b>D</b>：错误。',
              t: '辅警大专起步！第14条写的"大学专科以上"。退伍兵可以放宽到高中，但4年内必须补上大专。' },
            { q: '退役士兵应聘辅警，学历可放宽至高中以上，但入职后最长多久内须取得大专以上学历？', opts: ['A. 2年', 'B. 3年', 'C. 4年', 'D. 5年'], correct: 2, type: 'single', quizIndex: 10,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。第14条第2款规定："未取得大学专科以上学历的，应当在入职后最长四年内取得大学专科以上学历；四年内未取得大学专科以上学历的，聘用期满后不予续聘。"<br><b>D</b>：错误。',
              t: '4年内拿不到大专文凭，期满不续聘。先上车后补票，但票必须补。' },
            { q: '下列哪种情形不得招聘为辅警？', opts: ['A. 曾被行政拘留', 'B. 曾辞职换工作', 'C. 学历为大专', 'D. 年满20周岁'], correct: 0, type: 'single', quizIndex: 11,
              d: '<b>A</b>：正确。第15条第(二)项明确规定"曾被行政拘留、收容教养、收容教育或者有吸毒史的"不得招聘为辅警。<br><b>B</b>：错误。换工作是正常的人员流动，第15条没有禁止。<br><b>C</b>：错误。大专学历符合第14条的基本要求。<br><b>D</b>：错误。20周岁符合第14条的年龄要求。',
              t: '有过行政拘留记录=一票否决，别想考辅警了。第15条写得清清楚楚。' },
            { q: '勤务辅警初任培训时间不少于多少天？', opts: ['A. 30天', 'B. 60天', 'C. 90天', 'D. 120天'], correct: 2, type: 'single', quizIndex: 12,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。第22条规定："勤务辅警初任培训时间不少于九十天，年度培训时间不少于十天，晋升培训时间不少于十五天。"<br><b>D</b>：错误。',
              t: '初任培训=90天（三个月）。第22条三组数字：初90、年10、晋15。' },
            { q: '辅警的层级从高到低依次为？', opts: ['A. 一级辅警至六级辅警', 'B. 六级辅警至一级辅警', 'C. 高级辅警至初级辅警', 'D. 一级警员至六级警员'], correct: 0, type: 'single', quizIndex: 13,
              d: '<b>A</b>：正确。第21条规定："辅警实行层级管理制度，从高到低依次设置为一级辅警至六级辅警。"一级最高，六级最低。<br><b>B</b>：错误。顺序说反了。<br><b>C</b>：错误。条例没有高级/初级这种分类。<br><b>D</b>：错误。"警员"是人民警察的序列，不是辅警的。',
              t: '一级最高，六级最低。总共六个层级。第21条明确写了。' },
            { q: '勤务辅警工作期间可以配备什么？', opts: ['A. 枪支', 'B. 警棍和安全防护装备', 'C. 催泪弹', 'D. 手铐（任何时候都可以）'], correct: 1, type: 'single', quizIndex: 14,
              d: '<b>A</b>：错误。第27条只允许配备"警棍和安全防护装备"，没有授权配备枪支。<br><b>B</b>：正确。第27条第1款规定勤务辅警工作期间"可以配备警棍和安全防护装备，可以驾驶警用汽车、摩托车等交通工具"。<br><b>C</b>：错误。催泪弹属于驱逐性警械，第27条未授权辅警使用。<br><b>D</b>：错误。第27条第2款规定约束性警械只能在"遇有危害公共安全、社会秩序和公民人身、财产安全的紧急情况"且"从事巡逻、检查、抓捕、押解等工作期间"才能使用，不是任何时候都可以。',
              t: '辅警=警棍+防护装备。枪和辣椒水不能碰。手铐只能在紧急情况且执行特定任务时用。' },
            { q: '辅警可以驾驶警用车辆吗？', opts: ['A. 不可以', 'B. 可以，勤务辅警可以驾驶警用汽车、摩托车', 'C. 需要取得特殊驾驶证', 'D. 仅文职辅警可以'], correct: 1, type: 'single', quizIndex: 15,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。第27条第1款明确规定勤务辅警工作期间"可以驾驶警用汽车、摩托车等交通工具"。<br><b>C</b>：错误。条例没有要求特殊驾驶证，普通驾驶证即可。<br><b>D</b>：错误。文职辅警不涉及驾驶警车执勤。',
              t: '辅警可以开警车！第27条白纸黑字写了。当然前提是你要有驾驶证。' },
            { q: '辅警因公死亡被评定为革命烈士的，遗属享有什么待遇？', opts: ['A. 仅发放一次性抚恤金', 'B. 依照革命烈士褒扬规定享受抚恤待遇', 'C. 与普通因公死亡相同', 'D. 仅享受工伤保险待遇'], correct: 1, type: 'single', quizIndex: 16,
              d: '<b>A</b>：不全面。烈士遗属享受的是全方位的抚恤待遇，不是一次性抚恤金。<br><b>B</b>：正确。第39条第2款规定："辅警因公死亡被评定为革命烈士的，其遗属依照革命烈士褒扬有关规定享受相关抚恤待遇。"<br><b>C</b>：错误。烈士待遇高于普通因公死亡。<br><b>D</b>：错误。除工伤保险外还有烈士抚恤待遇。',
              t: '辅警也可以成为烈士！牺牲后被评烈士，家人享受烈属待遇。第39条写得明白。' },
            { q: '非法使用辅警制式服装、标识的，罚款多少？', opts: ['A. 200元', 'B. 500元', 'C. 1000元', 'D. 2000元'], correct: 1, type: 'single', quizIndex: 17,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。第44条规定：非法使用制式服装、辅警标识的，由公安机关予以没收，并处五百元罚款。非法制造、贩卖的处罚更重——没收并处货值五倍以下罚款。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '乱穿辅警制服=没收+罚500元。制造贩卖的罚得更狠：没收+货值5倍以下罚款。' },
            { q: '公文正文一般用什么字体？', opts: ['A. 黑体', 'B. 楷体', 'C. 3号仿宋体', 'D. 宋体'], correct: 2, type: 'single', quizIndex: 18,
              d: '<b>A</b>：错误。黑体用于公文第一层标题（"一、"层级）。<br><b>B</b>：错误。楷体用于公文第二层标题（"（一）"层级）。<br><b>C</b>：正确。公文正文一般用3号仿宋体字。结构层次：第一层黑体→第二层楷体→第三四层仿宋体。<br><b>D</b>：错误。',
              t: '正文=3号仿宋。标题第一层=黑体，第二层=楷体。这是公文格式的规定。' },
            { q: '"水是万物的始基"属于哪种哲学观点？', opts: ['A. 古代朴素唯物主义', 'B. 近代形而上学唯物主义', 'C. 主观唯心主义', 'D. 客观唯心主义'], correct: 0, type: 'single', quizIndex: 19,
              d: '<b>A</b>：正确。古代朴素唯物主义把世界的本原归结为一种或几种具体的物质，如"水""火""气"。这句话把万物归结为"水"，是典型的古代朴素唯物主义。<br><b>B</b>：错误。近代形而上学唯物主义把物质归结为"原子"，而不是具体实物。<br><b>C</b>：错误。主观唯心主义认为人的感觉或精神是世界的本原（如"存在就是被感知"）。<br><b>D</b>：错误。客观唯心主义认为独立于人之外的"客观精神"是世界的本原（如"道生万物"）。',
              t: '古代朴素唯物主义=万物由水/火/气等具体东西构成。把世界归结为一种常见物质。' },
            { q: '党的二十大报告提出的"三个务必"不包括？', opts: ['A. 务必不忘初心、牢记使命', 'B. 务必谦虚谨慎、艰苦奋斗', 'C. 务必敢于斗争、善于斗争', 'D. 务必解放思想、实事求是'], correct: 3, type: 'single', quizIndex: 20,
              d: '<b>A</b>：属于三个务必。报告原文："全党同志务必不忘初心、牢记使命"。<br><b>B</b>：属于三个务必。报告原文："务必谦虚谨慎、艰苦奋斗"。<br><b>C</b>：属于三个务必。报告原文："务必敢于斗争、善于斗争"。<br><b>D</b>：不属于。"解放思想、实事求是"是党的思想路线，不是二十大提出的"三个务必"内容。',
              t: '二十大三个务必：不忘初心、谦虚谨慎、敢于斗争。没有"解放思想"。' },

            // ===== 判断题15道 =====
            { q: '辅警是人民警察的一种。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf1',
              d: '<b>A"正确"</b>：错误。第3条明确规定辅警是"非人民警察身份的工作人员"，也就是说辅警不是人民警察。辅警是辅助警察工作的人，本身不具有警察身份。<br><b>B"错误"</b>：正确。题干说法错误。',
              t: '辅警≠警察。第3条说得明明白白：辅警是"非人民警察身份的工作人员"。' },
            { q: '辅警依法履行职责的行为受法律保护，具有法律效力。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf2',
              d: '<b>A"正确"</b>：正确。第7条第2款原文就是："辅警依法履行职责的行为受法律保护，具有法律效力，履行职责的后果由其所在的公安机关承担。"<br><b>B"错误"</b>：错误。',
              t: '辅警拍违停、采集违法信息——合法！具有法律效力。第7条写得清清楚楚。' },
            { q: '辅警可以独立作出行政处理决定。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf3',
              d: '<b>A"正确"</b>：错误。第11条第(七)项明确规定：公安机关不得安排辅警"作出行政处理决定"。行政处理决定（如开罚单、作出处罚）是人民警察的专属权力，辅警绝对不能做。<br><b>B"错误"</b>：正确。',
              t: '开罚单=警察的事，辅警不能干。第11条把"作出行政处理决定"列为绝对禁止事项。' },
            { q: '勤务辅警在无人民警察带领时，可以独自进行治安巡逻。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf4',
              d: '<b>A"正确"</b>：错误。第8条明确规定勤务辅警从事治安巡逻（第三项）、安全巡查（第四项）、消防巡查（第七项）时，"无人民警察带领时，不得少于两人"。也就是说最少要两个人一起巡逻。<br><b>B"错误"</b>：正确。',
              t: '辅警不能单枪匹马巡逻。第8条说得很清楚：没警察带的时候，至少两人一组。' },
            { q: '应聘辅警的最低年龄要求是18周岁。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf5',
              d: '<b>A"正确"</b>：错误。第14条第(二)项规定应聘辅警应当"年满二十周岁的中华人民共和国公民"，是20周岁，不是18周岁。18岁是普通公务员的报考年龄下限。<br><b>B"错误"</b>：正确。',
              t: '辅警要20岁才能考，不是18岁。第14条明确写了"年满二十周岁"。' },
            { q: '曾被行政拘留的人不得招聘为辅警。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf6',
              d: '<b>A"正确"</b>：正确。第15条第(二)项明确将"曾被行政拘留、收容教养、收容教育或者有吸毒史的"列为不得招聘为辅警的情形之一，没有任何例外。<br><b>B"错误"</b>：错误。',
              t: '有过行政拘留=一票否决。第15条是硬性红线，没有例外。' },
            { q: '退役士兵应聘辅警，学历必须为大学专科以上。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf7',
              d: '<b>A"正确"</b>：错误。第14条第2款专门为退役士兵开了口子："退役士官和士兵应聘辅警的，其学历条件可以为高中以上。"所以他们不一定需要大专学历就能报考。<br><b>B"错误"</b>：正确。',
              t: '退伍兵可以先上车后补票——高中学历就能考，但入职后4年内要补上大专。' },
            { q: '勤务辅警初任培训时间不少于60天。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf8',
              d: '<b>A"正确"</b>：错误。第22条明确规定"勤务辅警初任培训时间不少于九十天"，是90天（三个月），不是60天。<br><b>B"错误"</b>：正确。',
              t: '初任培训=90天（3个月）。第22条写的是"九十天"，不是60天。' },
            { q: '辅警可以在非履行职责期间穿着制式服装。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf9',
              d: '<b>A"正确"</b>：错误。第25条第1款规定辅警"非履行职责期间，不得穿着制式服装、佩戴辅警标识"。下班了就不能穿制服。<br><b>B"错误"</b>：正确。',
              t: '下班了就不能穿辅警制服。第25条明确写了"非履行职责期间不得穿着"。' },
            { q: '辅警离职时应当交回配发的证件、服装和标识。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf10',
              d: '<b>A"正确"</b>：正确。第25条第2款规定："辅警离职时，应当交回配发的证件、服装和标识。"<br><b>B"错误"</b>：错误。',
              t: '离职=交回"行头"。证件、衣服、标识一样不能带走。' },
            { q: '勤务辅警工作期间可以配备枪支。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf11',
              d: '<b>A"正确"</b>：错误。第27条只规定勤务辅警可以配备"警棍和安全防护装备"，没有授权配备枪支。枪支是致命性武器，只有人民警察在法定情形下才能使用。<br><b>B"错误"</b>：正确。',
              t: '辅警不能配枪！第27条只给了警棍和防护装备，枪是警察才能用的。' },
            { q: '辅警不享有申诉和控告的权利。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf12',
              d: '<b>A"正确"</b>：错误。第34条第(五)项明确将"提出申诉和控告"列为辅警享有的权利之一。辅警也是劳动者，受到不公正待遇可以申诉控告。<br><b>B"错误"</b>：正确。',
              t: '辅警也有申诉控告权。第34条明确写了——受了委屈可以告。' },
            { q: '公安机关应当为辅警购买人身意外伤害保险。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf13',
              d: '<b>A"正确"</b>：正确。第37条第2款规定："公安机关应当为辅警购买包含附加意外伤害医疗险、意外伤害住院保障险的人身意外伤害保险。"<br><b>B"错误"</b>：错误。',
              t: '辅警也有意外险——公安给买的。第37条明文规定的。' },
            { q: '非法制造、贩卖辅警制式服装的，由公安机关予以没收，并处货值三倍以下罚款。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf14',
              d: '<b>A"正确"</b>：错误。第44条规定的罚款是"货值五倍以下"，不是三倍。非法制造贩卖=没收+货值5倍以下罚款；非法使用=没收+500元罚款。<br><b>B"错误"</b>：正确。',
              t: '制造贩卖=5倍罚款，不是3倍。非法使用=500元。第44条两个数字要分清。' },
            { q: '文职辅警可以采用劳务派遣方式招录。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf15',
              d: '<b>A"正确"</b>：正确。第45条规定："文职辅警可以采用劳务派遣方式招录，其招聘和管理依照本条例相关规定由劳务派遣协议另行约定。但是，应当严格控制文职辅警的招录规模。"<br><b>B"错误"</b>：错误。',
              t: '文职辅警可以走劳务派遣。第45条允许，但要控制规模。' },

            // ===== 多选题10道 =====
            { q: '根据条例，辅警依法履行职责的行为具有哪些特征？', opts: ['A. 受法律保护', 'B. 具有法律效力', 'C. 后果由辅警个人承担', 'D. 后果由公安机关承担', 'E. 需经当事人同意'], correct: [0,1,3], type: 'multi', multi: true, quizIndex: '多1',
              d: '<b>A</b>：正确。第7条第2款规定辅警依法履职行为"受法律保护"。<br><b>B</b>：正确。第7条第2款规定辅警依法履职行为"具有法律效力"，比如辅警拍的违停照片可以作为处罚依据。<br><b>C</b>：错误。第7条第2款明确说后果由公安机关承担，不是辅警个人。<br><b>D</b>：正确。第7条第2款原文："履行职责的后果由其所在的公安机关承担。"<br><b>E</b>：错误。辅警依法履职是行使公权力，不需要当事人同意。',
              t: '辅警履职=受保护+有法律效力+公安担责。第7条第2款把这三项都写了。' },
            { q: '下列哪些属于勤务辅警可独立从事的警务工作？', opts: ['A. 治安巡逻', 'B. 疏导交通', 'C. 执行刑事强制措施', 'D. 采集交通违法信息', 'E. 消防安全巡查'], correct: [0,1,3,4], type: 'multi', multi: true, quizIndex: '多2',
              d: '<b>A</b>：正确。第8条第(三)项明确勤务辅警可以从事"治安巡逻、值守"。但无民警带领时不得少于两人。<br><b>B</b>：正确。第8条第(六)项规定可以"疏导交通，劝阻交通安全违法行为"。<br><b>C</b>：错误。第11条第(四)项规定"执行刑事强制措施"是绝对禁止事项，辅警任何时候都不能做。<br><b>D</b>：正确。第8条第(六)项规定可以"采集交通违法信息"，如拍摄违停车辆。<br><b>E</b>：正确。第8条第(七)项规定可以从事"消防安全巡查"。无民警带领时不得少于两人。',
              t: '巡逻、疏导、拍违停、消防巡查=辅警可以自己干（部分需两人以上）。刑事强制措施=绝对不能碰。' },
            { q: '下列哪些属于第11条规定的辅警绝对禁止从事的工作？', opts: ['A. 涉及国家秘密的事项', 'B. 国内安全保卫', 'C. 刑事案件调查取证', 'D. 技术侦察', 'E. 交通事故责任认定'], correct: [0,1,2,3,4], type: 'multi', multi: true, quizIndex: '多3',
              d: '<b>A</b>：正确。第11条第(一)项：涉及国家秘密的事项。<br><b>B</b>：正确。第11条第(二)项：国内安全保卫。<br><b>C</b>：正确。第11条第(三)项：刑事案件调查取证。<br><b>D</b>：正确。第11条第(五)项：技术侦察。<br><b>E</b>：正确。第11条第(六)项：交通事故责任认定。<br>另外还有第(四)项"执行刑事强制措施"和第(七)项"作出行政处理决定"，共七项绝对禁止事项。',
              t: '这五项全是第11条明令禁止的！共七项绝对禁止：国秘、国保、刑调、刑强制、技侦、事故认定、行政处理决定。' },
            { q: '下列哪些情形不得招聘为辅警？', opts: ['A. 曾被追究刑事责任', 'B. 曾被行政拘留', 'C. 有吸毒史', 'D. 有较为严重的个人不良信用记录', 'E. 曾辞职换过工作'], correct: [0,1,2,3], type: 'multi', multi: true, quizIndex: '多4',
              d: '<b>A</b>：正确。第15条第(一)项：曾被追究刑事责任或涉嫌犯罪尚未结案的。<br><b>B</b>：正确。第15条第(二)项：曾被行政拘留、收容教养、收容教育或有吸毒史的。<br><b>C</b>：正确。同样属于第15条第(二)项。<br><b>D</b>：正确。第15条第(五)项：有较为严重的个人不良信用记录。<br><b>E</b>：错误。辞职换工作是正常的人员流动，第15条没有将其列为禁止条件。',
              t: '有前科、被拘留、吸毒、失信=一票否决。换工作不碍事，第15条没禁止。' },
            { q: '关于辅警培训，下列说法正确的有？', opts: ['A. 勤务辅警初任培训不少于90天', 'B. 勤务辅警年度培训不少于10天', 'C. 勤务辅警晋升培训不少于15天', 'D. 文职辅警培训时间与勤务辅警完全相同', 'E. 辅警可以不参加培训直接上岗'], correct: [0,1,2], type: 'multi', multi: true, quizIndex: '多5',

<script>
// ==================== 渲染引擎（纯字符串拼接，完全兼容） ====================
function renderAll(){
    var m = document.getElementById('mainContent');
    var h = '';
    knowledgeData.forEach(function(mod){
        h += '<div class="card" id="' + mod.id + '"><div class="section-title"><div class="icon ' + mod.iconClass + '">' + mod.iconEmoji + '</div>' + mod.title + '</div>';
        if(mod.subtitle) h += '<div class="subtitle">' + mod.subtitle + '</div>';
        if(mod.items && mod.items.length > 0){
            h += '<div class="ki-grid">';
            mod.items.forEach(function(item){
                if(item.type === 'table'){
                    h += item.html;
                } else if(item.type === 'ki'){
                    h += renderKI(item);
                }
            });
            h += '</div>';
        }
        if(mod.quizzes && mod.quizzes.length > 0){
            mod.quizzes.forEach(function(q, qi){
                h += renderQuiz(q, mod.id + '-q' + qi);
            });
        }
        h += '</div>';
    });
    m.innerHTML = h;
    generateTOC();
}

function renderKI(item){
    var h = '<div class="ki-item">';
    h += '<div class="ki-title-row">' + (item.badge ? '<span class="badge ' + (item.badgeClass || 'badge-num') + '">' + item.badge + '</span> ' : '') + item.title + '</div>';
    h += '<div class="ki-content">' + item.content + '</div>';
    if(item.extra) h += '<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">' + item.extra + '</div>';
    if(item.example){
        h += '<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">' + item.example.q + '</div><div class="ex-a">' + item.example.a + '</div></div>';
    }
    h += '</div>';
    return h;
}

function renderQuiz(q, qid){
    var qTypeLabel = q.multi ? '【多选题】' : '【单选题】';
    var h = '<div class="quiz-wrap" data-qid="' + qid + '">';
    if(q.quizIndex){
        h += '<div class="q-type">📝 ' + qTypeLabel + ' · 第' + q.quizIndex + '题</div>';
    } else if(q.tfId){
        h += '<div class="q-type">📝 ' + qTypeLabel + ' · ' + q.tfId + '</div>';
    } else {
        h += '<div class="q-type">📝 ' + qTypeLabel + '</div>';
    }
    h += '<div class="q-text">' + q.q + '</div><ul class="opt-list">';
    for(var i = 0; i < q.opts.length; i++){
        h += '<li data-idx="' + i + '" onclick="selectOpt(this,\'' + qid + '\',' + i + ',' + (q.multi || false) + ')">' + q.opts[i] + '</li>';
    }
    h += '</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\'' + qid + '\',' + JSON.stringify(q.correct) + ',' + (q.multi || false) + ')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\'' + qid + '\')">🔄 重做</button></div>';
    h += '<div class="explain-card" id="ex-' + qid + '"><div class="ex-head"></div><div class="ex-body"></div>';
    if(q.d){
        var detailHtml = q.d;
        detailHtml = detailHtml.replace(/<b>([A-E])"正确"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');
        detailHtml = detailHtml.replace(/<b>([A-E])"错误"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');
        detailHtml = detailHtml.replace(/<b>([A-E])<\/b>：(正确)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>');
        detailHtml = detailHtml.replace(/<b>([A-E])<\/b>：(错误)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>');
        detailHtml = detailHtml.replace(/<b>([A-E])<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');
        detailHtml = detailHtml.replace(/<b>([A-E])<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');
        h += '<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>' + detailHtml + '</div>';
    }
    h += '<div class="ex-tip">💡 <b>大白话理解：</b>' + q.t + '</div></div></div>';
    return h;
}

function selectOpt(el, qid, idx, multi){
    var w = el.closest('.quiz-wrap');
    if(w.classList.contains('submitted')) return;
    var o = w.querySelectorAll('.opt-list li');
    if(multi){
        el.classList.toggle('selected');
    } else {
        o.forEach(function(x){ x.classList.remove('selected'); });
        el.classList.add('selected');
    }
}

function submitQuiz(qid, correct, multi){
    var w = document.querySelector('[data-qid="' + qid + '"]');
    if(w.classList.contains('submitted')) return;
    w.classList.add('submitted');
    var o = w.querySelectorAll('.opt-list li');
    var ca = Array.isArray(correct) ? correct : [correct];
    var si = [];
    for(var i = 0; i < o.length; i++){
        if(o[i].classList.contains('selected')) si.push(i);
    }
    var ic;
    if(multi){
        ic = si.length === ca.length;
        for(var j = 0; j < si.length; j++){
            if(ca.indexOf(si[j]) === -1){ ic = false; break; }
        }
    } else {
        ic = si.length === 1 && si[0] === ca[0];
    }
    for(var k = 0; k < o.length; k++){
        o[k].classList.add('disabled');
        if(ca.indexOf(k) !== -1) o[k].classList.add('correct');
    }
    if(!ic){
        for(var m = 0; m < si.length; m++){
            if(ca.indexOf(si[m]) === -1) o[si[m]].classList.add('wrong');
        }
    }
    var ex = document.getElementById('ex-' + qid);
    ex.classList.add('show');
    if(ic){
        ex.classList.add('correct-ex'); ex.classList.remove('wrong-ex');
        ex.querySelector('.ex-head').textContent = '🎉 回答正确！';
        ex.querySelector('.ex-body').textContent = '';
        var ed = ex.querySelector('.ex-detail');
        if(ed) ed.style.display = 'block';
    } else {
        ex.classList.add('wrong-ex'); ex.classList.remove('correct-ex');
        ex.querySelector('.ex-head').textContent = '😞 回答错误';
        var lt = ['A','B','C','D','E'];
        var cl = ca.map(function(c){ return lt[c]; }).join('、');
        ex.querySelector('.ex-body').innerHTML = '正确答案是：<b>' + cl + '</b>';
        var ed2 = ex.querySelector('.ex-detail');
        if(ed2) ed2.style.display = 'block';
    }
}

function resetQuiz(qid){
    var w = document.querySelector('[data-qid="' + qid + '"]');
    w.classList.remove('submitted');
    w.querySelectorAll('.opt-list li').forEach(function(o){ o.classList.remove('selected','correct','wrong','disabled'); });
    var ex = document.getElementById('ex-' + qid);
    ex.classList.remove('show','correct-ex','wrong-ex');
}

function generateTOC(){
    var toc = document.getElementById('toc');
    if(!toc) return;
    var th = '<div class="toc-title">📑 深圳辅警条例 · 知识目录</div>';
    var links = '';
    knowledgeData.forEach(function(mod){
        links += '<a href="#' + mod.id + '">' + mod.title + '</a>';
    });
    toc.innerHTML = th + links;
    document.querySelectorAll('.toc a').forEach(function(link){
        link.addEventListener('click', function(){
            if(window.innerWidth <= 768) closeToc();
        });
    });
}

function toggleToc(){ document.getElementById('toc').classList.toggle('show'); document.getElementById('tocOverlay').classList.toggle('show'); }
function closeToc(){ document.getElementById('toc').classList.remove('show'); document.getElementById('tocOverlay').classList.remove('show'); }
document.addEventListener('DOMContentLoaded', renderAll);
</script>
</body>
</html>
