<script>
const knowledgeData = [
    {
        id: 'mod_s1', iconClass: 'icon-red', iconEmoji: '📝',
        title: '第一节 · 中心理解题（8道）',
        subtitle: '主题词 · 转折关系 · 递进关系 · 因果关系 · 必要条件 · 并列关系',
        quizzes: (function(){
            var qs = [];
            qs.push({ q: "反传统是中国革命的主线。五四运动之后，学习西方变成了向西方追求真理。学习西方并没有错，但把西方视为真理则大错特错了。中国并不拒绝其他文明和价值，但西方文化主导下的西方话语解释不了中国的一切，所以中国文化必须成为主体。因此我们，尤其是知识分子必须花大力气从长达一个多世纪的思维和思想被“殖民”的状态中解放出来。西方继续要学，但中国的主体地位也必须得到确立。这段文字主要谈的是：", opts: ['A. 如何推广中国文化','B. 学习西方文化的方法和策略','C. 中国文化的核心价值','D. 确立中国文化主体地位的必要性'], correct: 3, type: 'single', quizIndex: 1,
              d: 'A项错误：文段强调的是“确立中国的主体地位”，而不是“如何推广中国文化”，推广是具体做法，文段并未涉及。\nB项错误：文段并未提及学习西方文化的“方法和策略”，属于无中生有。\nC项错误：文段并未具体阐述“中国文化的核心价值”是什么，偏离了文段核心话题。\nD项正确：文段通过“因此”总结，强调必须确立中国文化的主体地位，最后一句再次重申观点。',
              t: '文段通过“因此”引出结论：必须确立中国文化的主体地位。“必要性”三个字是对文段核心的准确概括。' });
            qs.push({ q: "人类很早就只知道城墙的防御效果，古往今来，不知上演过多少隔墙而战的攻防战役。蒙古人开始征战世界时，善于野战的游牧骑兵团对攻城战束手无策。但蒙古人善于学习，很快就掌握了攻城的战术，并将各地的攻城武器集中起来综合使用，达到了很好的效果，许多固若金汤的城池都被摧毁了。欧洲当时那些较薄的城墙，根本不能抵御蒙古人的攻击，特别是蒙古人开始使用多种威力巨大的火器，更具破坏性。从此以后，由于火炮的火力改进，城墙的作用就逐渐从人类历史中消失了。这段文字意在说明：", opts: ['A. 蒙古兵团是怎样征服欧洲的','B. 城墙是如何退出历史舞台的','C. 火器是如何在攻城战中发挥作用的','D. 蒙古的游牧兵团是如何调整战术的'], correct: 1, type: 'single', quizIndex: 2,
              d: 'A项错误：蒙古兵团征服欧洲只是文段的例子，不是核心观点。\nB项正确：文段最后一句“由于火炮的火力改进，城墙的作用就逐渐从人类历史中消失了”是主旨句，全文围绕城墙是如何消失的展开。\nC项错误：火器只是导致城墙消失的原因之一，不是文段主体。\nD项错误：游牧兵团调整战术是细节，不是文段主旨。',
              t: '文段的主题词是“城墙”，全篇在讲城墙是怎么从历史中消失的，最后一句是总结。' });
            qs.push({ q: "政治责任的实现，就其理想状况而言是从履行积极意义的政治责任开始的，这需要政治责任主体的责任感和自觉性。尽管我们强调评判政治责任不能以个人道德为标准，但我们并不能否认个人道德在政治责任实现问题上的作用和意义。因此，对于政治责任主体个人而言，道德规范和政治规范在个人实践中往往是相互联系、相互影响的，在同等条件下，个人道德水平较高的政治责任主体，能够更自觉地履行自己的积极意义的政治责任，也能够更主动地承担消极意义的政治责任。我们很难设想，一个道德败坏的人，能够很好地履行自己的政治责任。这段话的中心意思是：", opts: ['A. 政治责任主体的责任感更有利于政治责任的实现','B. 道德败坏的人也能履行好自己的政治责任','C. 评判政治责任不能以个人道德为标准','D. 个人道德对于政治责任的实现是必要的'], correct: 3, type: 'single', quizIndex: 3,
              d: 'A项错误：文段强调的是“个人道德”而非“责任感”，偷换概念。\nB项错误：文段结尾明确指出“一个道德败坏的人，能够很好地履行自己的政治责任”是难以设想的，与文意相反。\nC项错误：这是“但”之前的内容，是让步部分，不是文段重点。\nD项正确：文段通过“因此”得出结论，强调个人道德对政治责任实现的重要作用，并以反面论证强化观点。',
              t: '“因此”之后是重点：个人道德水平高的人能更好地履行政治责任，道德是必要的。' });
            qs.push({ q: "“一个流动的中国，充满了繁荣发展的活力。”1979年春节期间，只有1亿人次乘火车出行；2006年达到20亿人次，被称为“人类史上最大规模的周期性迁徙”。与以往相比，如今探亲流、学生流保持稳定，旅游流强劲提升。大众旅游已成为中国人的新年味。从三四线城市到北上广深“反春运”、从国内游到出境游，过年的流动色彩越来越浓，人的流动必然伴随着经济活动。这段文字的主旨是：", opts: ['A. 中国人春节出游越来越多','B. 大众旅游成为中国人的新年味','C. 春节成为人类史上最大规模的周期性迁徙','D. 人的流动带来繁荣发展和经济活力'], correct: 3, type: 'single', quizIndex: 4,
              d: 'A项错误：春节出游只是例子，不是文段主旨。\nB项错误：“新年味”是具体表现，不是核心观点。\nC项错误：这是文段中的背景数据，不是主旨。\nD项正确：文段开篇点明“流动的中国充满活力”，结尾总结“人的流动必然伴随着经济活动”，首尾呼应，强调人的流动带来经济活力。',
              t: '开头说流动带来活力，结尾说流动伴随经济，D概括了全文主旨。' });
            qs.push({ q: "在付费知识的市场宣传重点中，最吸引人的莫过于能有效地利用碎片时间，如在等公共汽车、跑步时进行学习和提升自我，进而有效管理时间。这种碎片化学习的方式虽然看似很灵活，并可以提高时间利用率，但科学研究表明，它不能真正地让你吸收学到的知识，不符合大脑吸收知识的运行机制。那些让你啧啧称奇的金句，那些让你醍醐灌顶的时刻，过不了几日就会被忘得精光，更别提知识内化和迁移了。正如快餐虽然好吃，也有饱腹感，但并不代表有营养。这段文字意在强调：", opts: ['A. 付费知识领域前景尚未明朗','B. 付费知识的宣传导向言不符实','C. 学习是一个长期而艰苦的过程','D. “碎片化学习”的方式并不理想'], correct: 3, type: 'single', quizIndex: 5,
              d: 'A项错误：文段讨论的是碎片化学习方式的问题，而非付费知识领域的“前景”。\nB项错误：文段没有说付费知识的宣传“言不符实”，只是说碎片化学习效果不理想。\nC项错误：文段并未讨论“学习是长期艰苦的过程”，而是聚焦于碎片化学习方式本身的问题。\nD项正确：文段通过“但”转折指出碎片化学习不能真正吸收知识，并用快餐比喻说明其“不理想”。',
              t: '“但”之后是重点：碎片化学习看似灵活，实际上吸收不了知识，不理想。' });
            qs.push({ q: "老师肩负着培养下一代的重要责任。正确的理想信念是教书育人、播种未来的指路明灯。不能想象一个没有正确理想信念的人能够成为好老师。唐代韩愈说：“师者，所以传道授业解惑也。”“传道”是第一位的。一个老师，如果只知道“授业”“解惑”而不“传道”，不能说这个老师是完全称职的，充其量只能是“经师”“句读之师”，而非“人师”了。古人云：“经师易求，人师难得。”一个优秀的老师，应该是“经师”和“人师”的统一，既要精于“授业”“解惑”，更要以“传道”为责任和使命。好老师心中要有国家和民族，要明确意识到肩负的国家使命和社会责任。这段文字的主旨是：", opts: ['A. 做好老师，要有理想信念','B. 做好老师，要有道德情操','C. 做好老师，要有扎实学识','D. 做好老师，要有引路意识'], correct: 0, type: 'single', quizIndex: 6,
              d: 'A项正确：文段开篇指出“正确的理想信念是教书育人的指路明灯”，后文反复强调“传道”即理想信念的重要性，结尾再次呼应。\nB项错误：文段讨论的是“理想信念”而非“道德情操”，偷换概念。\nC项错误：“扎实学识”对应“授业解惑”，但文段强调“传道”比“授业解惑”更重要。\nD项错误：“引路意识”是对“传道”的片面理解，文段强调的是理想信念。',
              t: '全篇反复出现“理想信念”“传道”“国家和民族”，主旨就是好老师要有理想信念。' });
            qs.push({ q: "锂金属的微观形状在充放电过程中会发生剧烈变化，从而导致金属锂的锂枝晶的析出。锂枝晶不仅会降低电池的容量，还可能造成电池内短路，诱发起火和爆炸等安全事故。如果将一层厚度仅约1微米的橡皮泥涂在锂金属表面，可以近乎完美地保护锂金属电极。在正常的充放电过程中，锂金属在电极表面均匀沉积，对橡皮泥的作用力很小。软软的橡皮泥可以很好地适应锂金属的形状和体积变化，牢牢地贴在锂的表面，起到保护涂层的作用。一旦在某些区域有锂枝晶“刺出”，橡皮泥涂层就会迅速变硬，从而有效阻挡锂枝晶的生长。这段文字主要介绍的是：", opts: ['A. 锂电池发展的历史','B. 锂电池容量的影响因素','C. 橡皮泥涂层提高锂电池性能的机理','D. 锂枝晶的危害及抑制方法'], correct: 2, type: 'single', quizIndex: 7,
              d: 'A项错误：文段没有讨论锂电池的发展历史。\nB项错误：文段重点是橡皮泥涂层的保护作用，而非锂电池容量本身。\nC项正确：文段从提出问题到解决方案，详细介绍了橡皮泥如何保护锂金属电极、阻挡锂枝晶生长。\nD项错误：文段重点是橡皮泥涂层这一具体方案，而非笼统的“抑制方法”。',
              t: '文段的核心是“橡皮泥涂层”，详细介绍了它如何保护锂电池、阻挡锂枝晶。C项最准确。' });
            qs.push({ q: "在利益多元、信息网络高度发达的今天，政府的施政离不开公众参与。闭门造车、我行我素，很容易跟公众产生分歧，并不得不面对来自社会舆论、维稳考量甚至上级机关的压力。公众还往往因为对决策缺乏预知和了解而对政府产生不信任感，影响政府公信力。从这个意义上，引入公众参与是政府在施政过程中的必要选择。这段文字重在说明：", opts: ['A. 如何维护公众的知情权','B. 公众参与政府施政的必要性','C. 如何保证政府执政的有效性','D. 政府决策过程透明化的重要性'], correct: 1, type: 'single', quizIndex: 8,
              d: 'A项错误：文段讨论的是“公众参与”，而非单纯的“知情权”。\nB项正确：文段开篇提出“政府的施政离不开公众参与”，结尾总结“引入公众参与是必要选择”，首尾呼应。\nC项错误：文段没有具体讨论“如何保证执政有效性”的方法。\nD项错误：“透明化”只是公众参与的组成部分，不能概括全文主旨。',
              t: '开头和结尾都在强调同一个意思：政府施政离不开公众参与，这是“必要选择”。' });
            return qs;
        })()
    },
    {
        id: 'mod_s2a', iconClass: 'icon-blue', iconEmoji: '🔍',
        title: '第二节 · 细节理解题（10道）',
        subtitle: '例1-6 + 练习1-4',
        quizzes: (function(){
            var qs = [];

            qs.push({ q: "调查显示，少儿图书在2007年的销售量同比增长近25%，成为继经管、学术文化类图书后的又一高增长板块。在2007年全国图书零售市场中，少儿图书所占的比重达到11%以上；本土原创儿童文学作品销量更是呈井喷之势，在各大书店的少儿图书畅销排行榜上，往往占据至少一半以上的席位。根据这段文字可知，2007年：", opts: ['A. 少儿图书销量超过学术文化图书','B. 图书市场整体结构发生较大变化','C. 少儿图书销量占零售市场的两成以上','D. 畅销儿童文学作品有本土原创化的倾向'], correct: 3, type: 'single', quizIndex: 11,

            qs.push({ q: "生长在水中或水边的动植物的遗体是最容易被保存下来的，因为保存动植物遗体的必要条件是快速掩埋，而在淤泥不断淤积的海洋、河流乃至湖泊中，动植物的遗体以及其他东西能够被快速掩埋。对这段话的理解正确的一项是：", opts: ['A. 动植物遗体很容易在淤泥不断淤积的海洋、河流乃至湖泊中保存下来','B. 只有生长在水中或者水边的动植物遗体才能被保存下来','C. 淤泥不断淤积的海洋、河流乃至湖泊是保存动植物遗体的最佳环境','D. 只要被快速掩埋，动植物遗体就能被保存'], correct: 0, type: 'single', quizIndex: 12,

            qs.push({ q: "美国交通运输业正逐渐从以石油为基础过渡为采用多种替代能源，如乙醇、生物柴油、电力或氢能等。为了更加壮大这支队伍，能源部阿贡国家实验室的研究人员已经开始调查将压缩天然气（CNG）作为轻型轿车和卡车能源选择的可能性。CNG汽车是指主要由甲烷构成的天然气在25兆帕左右的压力下储存在车内类似于油箱的气瓶内、用作汽车燃料。使用CNG替代汽油作为汽车燃料，可大量减少温室气体排放和噪音污染，而且其不含铅、苯等致癌的有毒物质。下列说法与原文不符的是：", opts: ['A. CNG作为卡车能源可能性很大','B. CNG可能会成为一种替代能源','C. 美国交通运输业现在仍以石油为基础','D. CNG替代汽油作为汽车燃料好处很多'], correct: 0, type: 'single', quizIndex: 14,

            qs.push({ q: "心理学研究的一个基本任务就是探寻人的行为背后有什么心理原因。日常生活中我们都是从外表来观察别人的行为，然后去推测脑子里发生了什么，但并不能准确地推论出行为背后的原因，这是因为人的行为表现极为复杂。对人的情感的研究对于把握和认识人的行为有着很大的帮助，因为情感是我们各种不同的内心体验，像情绪、心境都是情感的表现。当我们做一件事情的时候，做还是不做，怎么去做，在很大程度上受到情感等因素的影响。下列说法与原文意思不相符的是：", opts: ['A. 心理学把研究人的行为背后的心理原因作为基本任务之一','B. 通过人的外在行为来推测心理原因不是正确的途径','C. 研究人的情感对于研究人的行为有很大帮助','D. 人的行为在很大程度上受情感因素影响'], correct: 1, type: 'single', quizIndex: 15,

              t: '“尽可能”≠“所有”；“发挥乡贤作用”≠“乡贤主要作用”。注意程度差异。' });
            qs.push({ q: "高科技跑鞋是利用高科技结合人体运动力学原理研究出来的新一代跑鞋。它采用各种特殊的材料制作而成，重量轻，避震效果好。同时，它附着力强，易于运动员控制身体，保持正确姿势，避免滑倒。此外，它还具有回输功能，利用鞋跟中央位置的气垫吸震并同时吸收能量产生反弹力，使运动员轻松省力。穿上它，运动员如虎添翼，佳绩连连。下列说法与原文意思不相符的是：", opts: ['A. 高科技跑鞋体现了研究者对人体运动力学原理的运用','B. 高科技跑鞋的附着力是为了控制运动员的身体姿势','C. 高科技跑鞋可以帮助运动员获得更好成绩','D. 高科技跑鞋不仅能避震，还能吸震并反弹'], correct: 1, type: 'single', quizIndex: 21,
              d: 'A项相符：文段开篇说“利用高科技结合人体运动力学原理研究出来”。\nB项不符：文段说“附着力强，易于运动员控制身体”，是帮助运动员自己控制身体，而非跑鞋控制运动员身体，偷换概念。\nC项相符：文段结尾说“佳绩连连”。\nD项相符：文段说“避震效果好”“利用气垫吸震并同时吸收能量产生反弹力”。',
              t: '跑鞋是帮运动员更好控制身体，不是跑鞋替运动员控制。主体搞反了。' });
            qs.push({ q: "孟子的政治思想主要表现在两个方面：一是“王道”，一是“民本”，孟子崇尚“王道”政治，以“王道”为最高政治理想，而贬黜“霸道”，他分别以尧舜禹、“春秋五霸”为“王道”和“霸道”的代表，孟子所说的“王”，就是“以德行仁”，让人“中心悦而诚服”；他所说的“霸”是“以力服人”，结果是“非心服”。孟子要求行“仁政”、讲“民本”，其落脚点都在“王道”上。以下说法不符合原文意思的是：", opts: ['A. “王道”和“民本”是孟子的主要政治思想，其中，“王道”是最高政治理想','B. 在孟子看来，尧舜禹是“王道”的代表，“春秋五霸”是“霸道”的代表','C. 在孟子看来，“霸”与“王”的区别在于“霸”不能“服人”，而“王”能让人“心悦诚服”','D. 孟子立足于“王道”，主张统治者施行“仁政”，重视“民本”'], correct: 2, type: 'single', quizIndex: 22,

              t: '“霸”能让人“服”（用武力），只是不能让人“心服”。所以“霸不能服人”是错的。' });
            qs.push({ q: "我国现存最早的毛笔实物，是1954年6月出土于湖南省长沙市左家公山战国晚期楚墓里的一支毛笔。笔杆竹质，长18.5厘米，直径0.4厘米，笔头为优质兔箭毛（即紫毫），长2.5厘米，有竹管笔套，长23.5厘米。此笔与现代毛笔有些不同，一是将笔毛围在杆的一端，用细丝线缠绕，外面涂漆，使其牢固，而不是将笔毛插在杆腔内，这与东汉蔡邕在《笔赋》中所描述的“削文竹以为管，加漆丝之缠束”的情况相仿，二是笔套的用法与现在不同，笔套很长，毛笔出土时是整体装在笔套中的。由此可以推出：", opts: ['A. 我国现存最早的毛笔实物，其笔套很长，比笔杆和笔头长度的总和更长','B. 战国时代的毛笔制作工艺非常考究','C. 战国时代的毛笔构造和东汉蔡邕在《笔赋》中所描述的情况相同','D. 战国时代的毛笔保管技术水平较高，所以到出土时还保存完好'], correct: 0, type: 'single', quizIndex: 23,

            qs.push({ q: "行书的产生也是很早的，某种程度上可以说是与楷书、草书同时产生，因为所谓“行楷”“行草”，只是很模糊的概念，没有绝对的界限。但是到了这三大书体各自成熟之后，彼此的风格与特点还是判然可分的。无论如何，大概在魏晋时代，行书就开始在民间流行了。20世纪初，我国新疆地区古楼兰国遗址出土了大量的魏晋文书残纸，里头有不少已经是相当成熟的行书了。被称为“书圣”的东晋大书法家王羲之创作了大量的行书作品，长期以来备受后人的珍爱。下列说法与原文意思相符的是：", opts: ['A. “行楷”“行草”没有绝对的界限，所以两者是同时产生的','B. 成熟的行书、楷书和草书都是具有独特的风格与鲜明的特点','C. 古楼兰国遗址出土的文书残纸说明在魏晋时行书已经普及','D. 王羲之创作的行书属于相当成熟的行书作品，因此备受后人喜爱'], correct: 1, type: 'single', quizIndex: 24,

              t: '成熟后风格判然可分=B项原话。其他项都有“绝对化”或“强加因果”的问题。' });
            qs.push({ q: "校园欺凌事件中，对受害者的界定，是一个需要审慎打量的命题，显见的自然是受欺凌者，如果长期生活在暴力的阴影下，受欺凌者会遭遇严重的心理创伤。而这种伤害如果不能得到及时的心理治疗和干预，往往会延续至成年后，影响当事者一生的性格发展和身心健康。然而容易被忽视的是，受害者还包括那些施暴者以及看起来与事件不直接相关的学生。规则和秩序对于社会组织的构建，对于人与人之间的相处至关重要。如果没有良好的规则和秩序，施暴者会变本加厉，本无意施暴的人也可能最终滑向另一端。下列说法不符合原文意思的是：", opts: ['A. 校园欺凌的根源在于没有良好的规则与秩序','B. 有的学生在不自觉中也成为欺凌的受害者','C. 校园欺凌事件中，其实没有真正的旁观者','D. 学生时期的经历可能会影响一个人的一生'], correct: 0, type: 'single', quizIndex: 25,
              d: 'A项不符：文段说规则秩序“至关重要”，并未说“根源在于”没有规则秩序，“根源”属于无中生有。\nB项相符：文段说“受害者还包括那些施暴者以及看起来与事件不直接相关的学生”。\nC项相符：基于“受害者还包括看起来不直接相关的学生”，可推出没有真正的旁观者。\nD项相符：文段说伤害“往往会延续至成年后，影响当事者一生的性格发展和身心健康”。',
              t: '“根源”二字在原文中找不到。文段只说规则秩序很重要，但没说校园欺凌的根源就是它。' });
            qs.push({ q: "来自德国的研究人员发现，地球早期生命体系中就有蓝藻的身影。他们认为，如果能够将蓝藻成功引入火星，火星就有望成为第二个地球，其中一个途径是将蓝藻发送到火星上。通过光合作用产生氧气，进而改造火星大气。科学家判断，27亿年以来，这些蓝藻将早期地球上的二氧化碳转化为富氮和氧的大气，并且促进了臭氧层的形成，为地球生命的诞生创造了有利条件。当然，科学家目前还不知道需要多少蓝藻才能改造火星大气，美国宇航局和其他空间机构也在研究生物改造火星大气的可能性。国际空间站上已经开展了蓝藻的实验，有望为未来火星移民计划提供必要的支持。对上文理解不正确的是：", opts: ['A. 研究人员尚未在火星发现蓝藻的存在','B. 蓝藻曾有效改造了地球大气','C. 蓝藻在地球上已存在了数千亿年','D. 生物改造火星大气的实验将为未来火星移民提供支持'], correct: 2, type: 'single', quizIndex: 26,
              d: 'A项正确：文段说“如果能够将蓝藻成功引入火星”，说明火星上还没有蓝藻。\nB项正确：文段说蓝藻将早期地球二氧化碳转化为富氮和氧的大气，有效改造了地球大气。\nC项错误：文段说“27亿年以来”，不是“数千亿年”，属于偷换数量。\nD项正确：文段说“有望为未来火星移民计划提供必要的支持”。',
              t: '27亿年≠数千亿年。差了两个数量级！' });
            qs.push({ q: "纳米机器人的研发是当今科技的前沿热点，目前开发的纳米机器人属于第一代，是生物系统和机械系统的有机结合体；第二代纳米机器人是直接把原子或分子装配成具有特定功能的纳米尺度的分子装置。第三代纳米机器人将包含有纳米计算机，是一种可以进行人机对话的智能装置。专家指出，纳米机器人的潜在用途十分广泛；其中特别重要的就是应用于医疗领域。随着科学技术的发展和现代医学的进步，医用纳米机器人将在治疗癌症、清洁伤口、去除血块、清除毒素、治疗痛风、粉碎结石、纠正DNA错误、精准释放药物、充当免疫系统、提高人类智力、延长人类寿命等方面释放出巨大的潜力。因此，纳米机器人在未来很可能带来一场医学革命。上文没有提及纳米机器人的：", opts: ['A. 应用领域','B. 外观形态','C. 发展前景','D. 研发现状'], correct: 1, type: 'single', quizIndex: 27,
              d: 'A项提及：医疗领域等。\nB项未提及：文段只说了三代机器人的功能和构成，没有描述它们长什么样（外观形态）。\nC项提及：“很可能带来一场医学革命”。\nD项提及：第一代、第二代、第三代及国际空间站实验。',
              t: '文中只说了功能和原理，没描述纳米机器人长什么样。' });
            qs.push({ q: "“马服”“马甲”与“马褂”，我国在唐代以前汉族都穿传统的上衣下裳的汉服（冠服），裳类似裙子。但是自从“五胡乱华”后，适应北方冬寒夏凉气候和骑射需要的胡服首先在北方流行。例如紧身窄袖，长裤马靴很适应骑射需要；而长袍帷帽可挡风防沙；小口衣裤和皮靴则利于严寒冬季中的保暖。实际上，“胡服骑射”最早出现在战国时期的赵国建立骑兵的需要，但未能普及与流传。下列说法与原文相符的一项是：", opts: ['A. 紧身窄袖，长裤马靴可以遮挡风沙','B. 胡服在北方流行是在“五胡乱华”之后','C. 小口衣裤和长袍帷帽有利于严寒冬季中的保暖','D. “胡服骑射”早在战国时期就已经得到普及'], correct: 1, type: 'single', quizIndex: 28,
              d: 'A项错误：文段说“紧身窄袖，长裤马靴很适应骑射需要”，“长袍帷帽可挡风防沙”，选项张冠李戴。\nB项正确：文段说“自从‘五胡乱华’后，……胡服首先在北方流行”。\nC项错误：“长袍帷帽”是挡风防沙，“小口衣裤和皮靴”是严寒保暖，选项同样张冠李戴。\nD项错误：文段说“未能普及与流传”，与“已经得到普及”相反。',

            var qs = [];
            qs.push({ q: "盘龙类动物在头部背面有一块很大的骨，用以支持颌骨，在兽孔类动物中，这块骨头已大大的缩小了，而四角龙的这块骨头要较兽孔类大，又较盘龙类稍小。更为重要的是，四角龙的头角上有个骨架，穿越颞孔的咀嚼肌肉像兽孔类那样直接依附其上，而不像盘龙类那样由肌腱相接。文中“直接依附其上”的“其”指代的是：", opts: ['A. 四角龙的骨头','B. 头角上的骨架','C. 被穿越的颞孔','D. 穿越颞孔的肌肉'], correct: 1, type: 'single', quizIndex: 29,

            qs.push({ q: "“粉墙”象征着艺术家及收藏者与世俗阶层的趣味隔阂，他们通过粉墙圈筑出自己的庭院，就等于塑造了趣味的共同体，正如布迪厄所说：“趣味是分等级的，它会区分出不同的级别群体。被分成不同等级的社会主体，通过自身制造的隔阂，会在美与丑、杰出与庸俗之间区分自己。”下列对“粉墙”的理解正确的一项是：", opts: ['A. “粉墙”区分出人们精神境界的高低','B. “粉墙”暗示群体之间存在趣味差异','C. “粉墙”阻隔了人们去观赏艺术作品','D. “粉墙”禁止了不谙风雅的欣赏行为'], correct: 1, type: 'single', quizIndex: 30,

            qs.push({ q: "市场既然具有刺激产品革新的作用，当然也对工程革新具有间接的刺激作用。特别是激烈的市场竞争，推动广大企业努力提高产品质量，降低成本，这些都要通过工程革新来实现。文中“这些”指代的是：", opts: ['A. 激烈的市场竞争和产品革新','B. 市场具有刺激产品革新的作用，也对工程革新具有间接的刺激作用','C. 提高产品质量，降低成本','D. 通过工程革新来实现的成本的降低'], correct: 2, type: 'single', quizIndex: 31,

              t: '往前找最近的：提高产品质量、降低成本，这两个就是“这些”。' });
            qs.push({ q: "炫耀的目的，都是希望在某个层次上获得成功，如某人确有钱财，确实美貌，确有文才，有口才，那你就炫耀吧，用现在一个词儿：展示。你总能获得局部成功，但成本太大，别人在认可你的同时，也要剥夺你本来具有的一些别的美德，比如稳重，比如谦虚。世人总是心照不宣地认为，看他那个讨厌劲儿啊！由上述文字可推知，“炫耀”是：", opts: ['A. 施展的舞台','B. 成功的催化剂','C. “双刃剑”','D. 金玉其外，败絮其中'], correct: 2, type: 'single', quizIndex: 32,
              d: 'A项错误：炫耀不是舞台，是行为。\nB项错误：文段强调炫耀有负面效果。\nC项正确：文段说炫耀能获得认可（好的一面），但也会剥夺稳重谦虚等美德（坏的一面），两面性，即“双刃剑”。\nD项错误：文段未说炫耀的人内在破败。',
              t: '炫耀=既能让人认可你，又让你失去稳重谦虚。一面好一面坏=双刃剑。' });
            qs.push({ q: "如果说在小说观念上，从真实到虚构是一条必然之路，中国的小说家们也在这条必然之路上，自觉不自觉地朝背离历史叙事的方向走去。同时，从话本的兴起兴盛，再到拟话本、短篇小说、长篇小说，中国的小说家汲取各种语言文字形式的养分，也在从话本的语言文字传统逐步演进的道路上朝着背离文言传统的方向走去。上面这段话中谈到中国小说家的两个“背离”，下列对“背离”的涵义解说不正确的一项是：", opts: ['A. 摆脱了以历史故事为题材的叙事模式','B. 背离了虽然典雅、精美，但缺乏浅易、通俗特点的文言叙述方式','C. 汲取各种语言文字形式的养分，使小说创作的语言更加丰富多彩','D. 抛弃了中国小说的传统创作方法，完全走向背离传统的另一条创作之路'], correct: 3, type: 'single', quizIndex: 33,
              d: 'A项正确：对应第一个背离——背离历史叙事方向。\nB项正确：对应第二个背离——背离文言传统方向。\nC项正确：对应第二个背离中汲取各种语言形式养分。\nD项错误：“完全走向背离传统”过于绝对，文段只是说“朝着背离……的方向走去”，并非完全抛弃。',
              t: '“背离”方向≠“完全抛弃”。文段说的是趋向，不是结果。' });
            qs.push({ q: "为了迎接电视的挑战，宽银幕及超大银幕从20世纪30年代到50年代逐渐走向成熟，它用大画框的银幕和电视争夺观众。一方面构筑惊心动魄的大场面，另一方面更加敏锐地捕捉演员的每一个细微表情，更加强地冲击观众的视线。与此同时，立体声技术创造出立体空间声音感觉，覆盖了整个放映厅。文中“与此同时”中的“此”所指内容是：", opts: ['A. 迎接电视的挑战','B. 大画框银幕的利用','C. 构筑惊心动魄的场面','D. 创造立体空间声音感觉'], correct: 1, type: 'single', quizIndex: 34,
              d: 'A项错误：迎接挑战是背景，不是“此”的直接指代。\nB项正确：“此”指前文整个关于宽银幕利用大画框争夺观众的内容。\nC项错误：只是其中的一方面。\nD项错误：这是“与此同时”之后的内容，不是指代对象。',
              t: '“此”=前面说的宽银幕用大画框的各种做法。' });
            qs.push({ q: "众所周知，机械加工、热加工、电加工和化学加工，是通用的材料加工技术，本世纪50年代发展起来的辐照加工技术，是继上述四大加工技术之后，正在崛起并逐渐成熟的一种加工工艺技术，辐照加工技术具有许多传统加工工艺无法比拟的优点，早期的辐照加工，是利用射线的杀菌灭虫性能来达到消毒，保持新鲜等目的，现代的辐照加工技术已经突破上述范围。文段结尾处的“上述范围”是指：", opts: ['A. 辐照加工技术具有许多传统加工工艺无法比拟的优点','B. 利用射线的杀菌灭虫性能来达到消毒，保持新鲜等目的','C. 正在崛起并逐渐成熟的一种加工工艺技术','D. 机械加工、热加工、电加工和化学加工四大加工技术'], correct: 1, type: 'single', quizIndex: 35,
              d: 'A项错误：这是优点描述，不是“范围”。\nB项正确：“上述范围”指代前文“早期的辐照加工，是利用射线的杀菌灭虫性能来达到消毒，保持新鲜等目的”。\nC项错误：这是定义。\nD项错误：这是四大加工技术，不是辐照加工的范围。',
              t: '往前找：早期的辐照加工是用来杀菌消毒保鲜的，这就是“上述范围”。' });
            qs.push({ q: "母亲被一场突如其来的疾病夺去了生命，年仅36岁，当医院为取母亲的眼睛角膜来征求父亲的意见时，我惊呆了，不明白医生为什么要将母亲的角膜给予他人，而父亲居然回答“可以。”我痛苦难忍地冲着父亲哭喊：“你怎么能让他们这样对待妈妈！她完整地来世上也应该完整地离去。”父亲平静地搂着我说：“你所能给予他人的最珍贵东西莫过于你自身的一部分，很久以前你妈妈就认为，如果我们的死亡之躯能有助于他人健康的恢复，我们的死就是有意义的。”他们早已决定死后捐赠器官了，父亲的话语给我上了一生中最重要的一课，影响了我往后漫长的人生。这一段文字中“一生中最重要的一课”指的是：", opts: ['A. 一个人能给予他人最珍贵的东西莫过于自身的一部分','B. 如果死亡之躯有助于他人健康的恢复，那么死就是有意义的','C. 生命的价值在于对他人的帮助和无私的奉献','D. 父亲和母亲早已决定死后捐赠器官'], correct: 2, type: 'single', quizIndex: 36,
              d: 'A项错误：这是父亲的原话，但“最重要的一课”是更本质的道理。\nB项错误：同样是父亲话语的一部分。\nC项正确：整段文字的核心是父母通过捐赠器官这件事，教会作者生命的价值在于帮助他人、无私奉献。\nD项错误：这是事实，不是“一课”的内涵。',
              t: '这一课的核心不是“捐器官”这个行为，而是背后的道理：生命的价值在于奉献。' });
            return qs;
        })()
    },

        quizzes: (function(){
            var qs = [];
            qs.push({ q: "最珍贵的化石丢了，周口店遗址还剩下什么？据了解，解放后，周口店遗址挖掘工作重新恢复，并先后获得一些新猿人的化石及其他标本。一位在当地开出租车的师傅说，他小时候经常溜进来参观，东西很多，后来大多搬到北京保存，从此遗址的吸引力逐渐下降，现在参观门票20元都被人嫌贵，好不容易来个外地人，看了也没啥东西，“有上当的感觉”。目前周口店遗址有20多处参观景点（洞穴），全部位于北京房山区龙骨山东坡的一个大坑内，一个多小时可以大致走完全程。因沿途无从观赏，拍照不受干扰，零星冷风不时刮来，静悄悄的，感觉自己也在考古。临走前，想给博物馆的领导提点搞活动遗址“钱景”的建议，但工作人员似乎没有兴趣，好不容易遇到一位愿意搭腔的人，却得到领导进城开会的消息，要记者“三天后再来”。根据上文，面对周口店北京人遗址，作者的心情不包括：", opts: ['A. 关切','B. 苍凉','C. 无奈','D. 冷漠'], correct: 3, type: 'single', quizIndex: 37,
              d: 'A项包括：作者想去提建议，说明关切。\nB项包括：文中描绘的景象“静悄悄的”“零星冷风”透出苍凉感。\nC项包括：提建议无人理睬，感到无奈。\nD项不包括：作者对遗址现状有感受和意见，说明不是冷漠对待。',
              t: '作者有心提建议，说明他关心，不是冷漠。' });
            qs.push({ q: "对此，英国皇家学会副主席阿里斯泰尔认为：“再过几十年甚至几百年，人类大脑进化出的许多复杂的信息处理系统也不能在任何机器上复制出来。大脑极其复杂。人类和机器之间将依然存在人格鸿沟，人类的智能、情绪方面的洞察力和处理不确定性的能力是机器得不到的。在目前可以想象的将来，人类和机器将保持互补。”根据这段文字，阿里斯泰尔对人工智能取代大脑功能最可能的态度是：", opts: ['A. 未置可否','B. 不以为然','C. 乐见其成','D. 半信半疑'], correct: 1, type: 'single', quizIndex: 38,
              d: 'A项错误：他有明确观点。\nB项正确：他认为机器不能复制大脑，人类和机器保持互补，说明他不认为人工智能能取代大脑功能，即“不以为然”（不认为是对的）。\nC项错误：非乐观态度。\nD项错误：态度明确，不是半信半疑。',
              t: '他明确说了“不能复制”“存在鸿沟”“机器得不到”，态度很鲜明：不认为AI能取代大脑。' });
            qs.push({ q: "有些日本人认为不应该纠缠于中日间过去的鸡毛蒜皮的陈年旧账，要放眼中日友好的巨大利益，他们中一些“杰出的”代表还根据欧洲经济共同体的模式提出了一个中日关系新思维理论。这个所谓的新思维认为，如果早在20世纪就建立起日本人设计的“大东亚共荣圈”，将会给亚洲人民带来巨大福祉。作者对“他们”的态度是：", opts: ['A. 否定','B. 肯定','C. 未置可否','D. 有肯定有否定'], correct: 0, type: 'single', quizIndex: 39,
              d: 'A项正确：文中“杰出的”加引号表示反讽，“所谓的新思维”也带有否定意味，可见作者持否定态度。\nB项错误：非肯定。\nC项错误：态度明确。\nD项错误：没有肯定成分。',
              t: '“杰出的”加引号、“所谓的新思维”都是在讽刺，作者的态度是否定的。' });
            qs.push({ q: "不少基层探索的经验，成了点上试验的宣传典型，甚至成了远近闻名的“网红”。“网红”层出不穷投射出基层工作源源不断的生命力，这些都是日后推广复制、带出更大一片“风景”的基础。不过，既是试验，成功的定义往往不能下得太早，一切都应交给时间作出评价。可是事物的传播规律往往不受人力控制。有时候基层干部还不想红，却已经万众瞩目了，工程尚未完结，考察队伍却早早到了门口；项目还没运作，学习参观者就蜂拥而至，还有从上至下的领导，时刻“关心”能不能一夜搞出“花头”来，于是，基层干部只得摇身一变，成了导游、推销员、接待员，甚至是演员，提前透支其“流量”。作者对文中现象所持的最主要态度是：", opts: ['A. 赞扬','B. 批判','C. 同情','D. 中立'], correct: 1, type: 'single', quizIndex: 40,
              d: 'A项错误：无赞扬之意。\nB项正确：文段描述了基层干部被过度关注、不得不做表面文章的现象，“透支流量”“摇身一变成了导游、演员”等表述带有批判色彩。\nC项错误：虽对基层干部有同情，但最主要态度是对这种现象的批判。\nD项错误：态度明确。',
              t: '作者在批评这种“未完成就过度宣传、透支流量”的现象。' });
            qs.push({ q: "翡翠二字皆有“羽”，翡翠最初应是指鸟，对此学术界观点基本一致。有学者认为翡翠是一种集红、绿于一体的鸟。但多数人接受这样的观点：翡翠是雌雄异色的鸟，翡翠是雄鸟呈红色，翠是雌鸟呈绿色，支持此观点的证据主要有：汉代许慎《说文解字》第四篇上：“翡，赤羽雀也。”“翠，青羽雀也。”汉代汤孚《异物志》：“翠鸟形似燕，翡赤而翠青，其羽可以为饰。”唐代玄应《切经音义》卷十六：“翡翠，雄赤曰翡，雌青曰翠。”对上述文段中“观点”一词所指代的含义，下列分析正确的是：", opts: ['A. 观点①、观点②、观点③均相同','B. 观点①、观点②相同、观点③不同','C. 观点②、观点③相同、观点①不同','D. 观点①、观点②、观点③各不相同'], correct: 2, type: 'single', quizIndex: 41,
              d: 'A项错误。\nB项错误。\nC项正确：观点①指翡翠最初应是指鸟；观点②是多数人接受的观点（雌雄异色）；观点③前的“此”指代的就是观点②。所以②和③相同，与①不同。\nD项错误。',
              t: '观点①=翡翠是鸟；观点②=雌雄异色；观点③=观点②（“支持此观点”）。' });
            qs.push({ q: "自互联网技术应用于传媒领域以来，阅读的碎片化以及浅表性问题是不断地招致各种批评，许多有识之士表达了深切的忧虑。本人也曾在一些撰文中，为碎片化阅读的泛滥痛心疾首、大声疾呼。不过，平心静气去想，人类社会的阅读历史其实正是由碎片化和整体性两类阅读构成。《论语》和柏拉图《理想国》难道不正是一种碎片式结构吗？老子的《道德经》只有5000字，也就是一篇博客的字数，也属于碎片一类，先秦经典大都是最短小碎片的文本，这些碎片的存在并没有干扰到后来大量鸿篇巨制的诞生和阅读。再如，现代人的读报与读书，显然分别属于碎片化阅读和整体化阅读。当19世纪中叶国人开始创办中文报纸时，不知社会上是否有过关于碎片化阅读的批评，我们所知道的只是，近代报业的兴起带来了我国近代科学和思想文化的解放，催生了大量现代经典性著作的诞生。下列最有可能属于上文作者的观点的是：", opts: ['A. 社会应当提供更精致的碎片来善待互联网读者','B. 碎片式的先秦经典文本与今日的博客别无二致','C. 19世纪中叶国人创办的报纸是碎片化阅读的起源','D. 即将有新的鸿篇巨制在互联网发展大潮中诞生'], correct: 3, type: 'single', quizIndex: 42,

              t: '作者拿近代报纸催生经典著作来类比，暗示互联网时代也会有新经典诞生。' });

            qs.push({ q: "对下列病语的语病分析，正确的是：（1）省教育学会常务副秘书长认为，学习不能剥夺学生使用手机，但是为了保证更多人受教育的权利，在学校范围内作出限制性的规定无可厚非。（2）深圳市首次举办万绿园新春年会，中华民俗文化村推出第一届炮仗烟花节和狗文化系列活动都给节日添上了喜庆的色彩。", opts: ['A. 第一句为成分赘余、第二句为中途易辙','B. 第一句为成分残缺、第二句为句式杂糅','C. 第一句为成分残缺、第二句为中途易辙','D. 第一句为成分残缺、第二句为句式杂糅'], correct: 1, type: 'single', quizIndex: 5,

              t: '总起→解释→对付→具体表现（脚冻烂、食物少）→结果（身体虚弱）。' });
            qs.push({ q: "将以下6个句子重新排列组合，排列组合最连贯的是：<br>（1）城内大街小巷中辣子与熏肉的香味四季飘香，多情湘女，婆娑而过。有月光的晚上，苗民男女的对歌声可惊醒每一扇临水的窗户。<br>（2）凤凰县位于吉首市与怀化市之间偏西的地方，城区傍沱江而建，沱江如酒，沿江的吊脚楼就如美人醉酒一样憨态可掬。<br>（3）出了城，见一山如利剑穿空，拔地而起，曰天星山。<br>（4）下得山来，兴犹未尽，还可去奇梁洞。<br>（5）进山，再见斧削刀砍的绝壁中一清溪婉转。跨过清溪，登栈道，古树夹道，怪石峥嵘。<br>（6）上山顶，一平台豁然开朗，中有一方池为“天池”，汩汩溪流，却久旱不涸，常有麝獐叹水，百鸟低回。", opts: ['A.2-1-5-3-4-6','B.2-1-3-5-6-4','C.6-2-5-1-3-4','D.5-3-4-2-1-6'], correct: 1, type: 'single', quizIndex: 17,
              d: 'B项正确。首句判断：（2）句介绍凤凰县的地理位置和整体风貌，适合做首句。（1）句描写城内景象，紧承（2）句。（3）句“出了城”承接城内描写，（5）句“进山”，（6）句“上山顶”，（4）句“下得山来”应在进山之后。整个文段按空间顺序：县城→城内→出城→进山→山顶→下山→奇梁洞。',
              t: '按游览顺序：先到凤凰县城→逛城内→出城看山→进山→上山顶→下山再去别处。' });
            qs.push({ q: "将下列句子按语序先后排列的最连贯的一项是：<br>（1）直到1757年，牛顿的万有引力学说已经确立很久。<br>（2）1882年，教皇才被迫承认地动学说。<br>（3）科学终于以伟大的不可压抑的力量战胜了神权。<br>（4）1616年，教皇宣布《天体运行》列入禁书。<br>（5）地动学说成了天经地义，这才解除了禁令。", opts: ['A.1-3-2-5-4','B.4-2-1-3-5','C.4-1-5-2-3','D.1-4-5-2-3'], correct: 2, type: 'single', quizIndex: 18,
              d: 'C项正确。按时间顺序排列：（4）1616年教皇宣布禁书→（1）1757年万有引力学说确立→（5）地动学说成天经地义，解除禁令→（2）1882年教皇被迫承认→（3）科学战胜神权。',
              t: '按年份排：1616→1757→解除禁令→1882→最终胜利。' });
            qs.push({ q: "依次填入下面一段文字横线处的语句，衔接最恰当的一项是：中国梦不同于美国梦。_____。历史告诉我们，每个人的前途命运都与国家和民族的前途命运紧密相连。个人的梦想要在国家和民族的梦想中实现。<br>（1）我们中国人不仅关心自己<br>（2）我们不仅追求个人的成功<br>（3）还以仁待人，心怀天下，崇尚个人价值与社会价值的高度和谐<br>（4）更要实现中华民族的伟大复兴<br>（5）美国梦是强调一个人只要辛勤工作就能有体面的生活，实现自己的理想<br>（6）有着强烈的集体主义倾向", opts: ['A.5-2-4-1-3-6','B.1-3-6-2-4-5','C.5-1-3-6-2-4','D.1-4-2-3-6-5'], correct: 0, type: 'single', quizIndex: 19,
              d: 'A项正确。横线前说“中国梦不同于美国梦”，（5）紧承说明美国梦的含义。（2）（4）讲中国梦（不仅追求个人成功，更要实现民族复兴），（1）（3）（6）进一步展开（不仅关心自己，还心怀天下，有集体主义倾向）。由（5）转（2）（4）再到（1）（3）（6），对比中展开。',
              t: '先说美国梦是什么，再对比说中国梦追求个人成功+民族复兴+心怀天下。' });
            qs.push({ q: "把下面几个句子组成语意连贯的一段文字，排序正确的一项是：<br>（1）由于画院画家的风格过于近似。<br>（2）甚至假定越精彩、越优秀的画作越有可能出自徽宗皇帝之手也未必准确<br>（3）徽宗每创作一副精品，画院画家们便争相模仿<br>（4）尽管有过不少尝试，但事实上很难将他们的作品区分开来<br>（5）如果他们足够幸运，皇帝就会在他们画作上题签以示确认", opts: ['A.3-5-1-4-2','B.3-5-4-2-1','C.1-4-2-3-5','D.1-3-5-4-2'], correct: 0, type: 'single', quizIndex: 20,
              d: 'A项正确。首句判断：（3）描述徽宗创作后画家模仿的现象，引出话题。（5）说画家幸运的话皇帝会题签，（1）说画家风格近似，（4）说难以区分作品，（2）进一步说甚至假定优秀作品都出自徽宗之手也不准确。逻辑：模仿→题签→风格近似→难区分→极端假设。',
              t: '徽宗画→画家模仿→皇帝题签→风格相似→分不清谁画的→甚至可能好作品都以为是徽宗的。' });
            qs.push({ q: "把下面几个句子组成语意连贯的一段话，排序最合理的一项是：<br>（1）我归来，小屋是我幸福的终结<br>（2）归来时带几分雀跃的心情，一跳一跳就跳过了那些山坡<br>（3）往返于快乐与幸福之间，哪儿还有不好走的路呢？<br>（4）我出外，小屋是我快乐的起点<br>（5）我只觉得出外时身轻如飞，山路自动地后退。<br>（6）出入的主要道路，是一条类似苏花公路的山路，虽不便于行车，却便于我行走。", opts: ['A.6-5-1-4-2-3','B.4-1-3-2-5-6','C.4-1-5-2-6-3','D.6-4-1-3-5-2'], correct: 3, type: 'single', quizIndex: 21,
              d: 'D项正确。首句判断：（6）引出“出入的道路”，适合做首句。（4）说“出外”是快乐的起点，（1）说“归来”是幸福的终结。（4）（1）顺序——先出后归。（3）总结“往返于快乐与幸福之间”。（5）描述出外时的感受，（2）描述归来时的心情，（5）（2）分别对应（4）（1）。',
              t: '先说出入的路→出外是快乐起点→归来是幸福终点→往返都美好→出外时身轻如飞→归来时雀跃。' });
            return qs;
        })()
    },
,
    {
        id: 'mod_ch2_s3', iconClass: 'icon-green', iconEmoji: '🔗',
        title: '第二章·第三节 语句衔接（5道）',
        subtitle: '例1-5',
        quizzes: (function(){
            var qs = [];
            qs.push({ q: "“孩子们带我们看帆船落日、出海、沙滩散步、跳伞，很开心。”这是一位高中数学老师在鸡年春节期间发布的一则朋友圈，也是无数中国家庭春节团圆相聚的新缩影。春节期间的数据显示，团聚主体没有变，但团聚的方式却有了新变化，许多家庭“要么在景区，要么在去景区的路上”。旅游_________。填入画横线处最恰当的一句是：", opts: ['A. 为春节团聚提供了新形式','B. 正成为春节消费的新热点','C. 是观察当代中国的新窗口','D. 为子女尽孝提供了新样板'], correct: 0, type: 'single', quizIndex: 22,
              d: 'A项正确：横线出现在末尾，需对文段进行概括总结。文段通过朋友圈引出旅游是中国家庭春节团聚的新缩影，用转折词“但”指出团聚方式发生了新变化——许多家庭选择旅游过年。因此旅游是春节团聚的一种新方式，对应A项。\nB项错误：文段强调的是团聚方式的变化，而非“消费热点”，且未提及消费相关内容。\nC项错误：文段未涉及“观察当代中国”的内容，无中生有。\nD项错误：文段未提及“子女尽孝”相关内容，无中生有。',
              t: '文段在说春节团聚从“在家过”变成了“出去旅游过”，所以旅游是团聚的新形式。' });
            qs.push({ q: "科学是认识客观世界的动态过程。科学活动特别是现代科学活动，可以根据社会需要、已有知识的指导、前人的经验和学科的预测而设定目标，安排计划。然而，与按既定规程运作的物质生产过程不同，_________，因而难以完全按预定的目的和计划进行，有其不确定性和强烈的探索性。填入划横线部分最恰当的一句是：", opts: ['A. 科学活动面对的是未知的或知之较少的世界','B. 科学活动是社会的一种精神生产','C. 科学活动的具体形式多种多样','D. 科学活动需要不断创新'], correct: 0, type: 'single', quizIndex: 23,
              d: 'A项正确：解题关键是转折词“然而”。根据“与按既定规程运作的物质生产过程不同”可知，下文要讲的内容与其有“相反”之意。首句中的“动态过程”和尾句中的“有其不确定性和强烈的探索性”可知，科学活动面对的是未知世界，充满了不确定性与探索性。A项符合语境。\nB项错误：文段未提及“精神生产”相关内容。\nC项错误：文段未提及科学活动“形式多种多样”。\nD项错误：文段未提及“需要不断创新”。',
              t: '科学和物质生产的区别在于：物质生产按规程来，科学是探索未知，所以不确定、难按计划。' });
            qs.push({ q: "好的散文不会让读者感到与作者生疏。作者在描摹眼中世界的同时，也在清晰地勾画着自身的影像。实际上无论作品本身是优是劣，_________。“作者形象”并不等同于作家的自画像，它是作家灵魂的投影，是展现在文字中的一种人生境界，是写作视角和阅读视角综合的结果。填入划横线处最恰当的一句是：", opts: ['A. 写作是一种意味深长的印记','B. 作品传达的是作者独有的情感体验','C. 每一篇散文都是人文情怀与精神价值的融合','D. 没有一部作品不在描绘着“作者形象”'], correct: 3, type: 'single', quizIndex: 24,
              d: 'D项正确：根据横线后面的语境，后文是对“作者形象”的具体阐述，可知横线处应该引出“作者形象”这一概念。D项“没有一部作品不在描绘着‘作者形象’”正好引出下文对“作者形象”的详细解释。\nA项错误：未提及“作者形象”这一核心概念。\nB项错误：未提及“作者形象”，且“情感体验”与下文话题不一致。\nC项错误：未提及“作者形象”，偏离了横线后文的论述对象。',
              t: '横线后面全在说“作者形象”，横线处就要把“作者形象”这个词引出来。' });
            qs.push({ q: "由于海沟深埋于数千米甚至万米海水之下，难于寻找，因此大部分主要海沟都是直到20世纪才被发现。不过它们都有着明显的“影子”：_________，如阿留申海沟对应阿留申群岛、日本海沟对应日本列岛、菲律宾海沟对应菲律宾群岛等。不过秘鲁—智利海沟对应的不是岛弧，而是高耸绵长的安第斯山脉。填入画横线部分最恰当的一项是：", opts: ['A. 凡是有岛弧的地方，就可以找到海沟','B. 凡是有海沟的地方，就可以找到岛弧','C. 凡是海沟所在的区域，就有与之对应的岛弧相伴而生','D. 凡是岛弧所在的区域，就有与之对应的海沟相伴而生'], correct: 2, type: 'single', quizIndex: 25,
              d: 'C项正确：横线后“如”表示举例说明。根据举例内容可知，横线上应表示“海沟”对应“群岛”，选项当中要出现“对应”一词，排除A项和B项。同时根据叙述的先后顺序，“海沟”在前，“岛弧”在后，对应C项。D项将“岛弧”放在“海沟”前面，顺序反了。C项和尾句“不过”之后的内容也形成转折关系，符合语境要求。\nA项错误：缺少“对应”关系，且将岛弧作为前提条件，与举例顺序不符。\nB项错误：缺少“对应”关系。\nD项错误：将岛弧放在前面，顺序与文段举例相反。',
              t: '举例是先说海沟再说对应的群岛，所以横线处也应该是“海沟对应岛弧”这个顺序。' });
            qs.push({ q: "相关研究表明，_________；由于气候变暖，中国冬小麦的安全种植北界已由长城沿线向北扩展了1至2个纬度；华北地区冬小麦正由冬性向半冬性过渡，东北地区粮食产量显著提高，水稻面积和总产量迅速增加；喜温作物玉米目前已经成为中国第一大作物，除了利好消息，气候变化也有不利影响：各种极端天气事件增多，各种病虫害危害加重，都会导致农业减产。填入画横线部分最恰当的一句是：", opts: ['A. 气候变暖对农业的影响并不像想象的那么悲观','B. 各种气象灾害对农业生产的影响日益突出','C. 中国主要农作物的种植面积正在日益扩大','D. 气候变化给中国农业带来的影响以好处居多'], correct: 3, type: 'single', quizIndex: 26,
              d: 'D项正确：横线出现在文段首句，且由冒号可知后文对横线处进行解释说明。后文分号连接并列结构，介绍了气候变暖给我国农业带来的许多积极影响，接着用“除了利好消息，也有不利影响”引出负面内容。横线处应重点概括气候变化的积极影响，对应D项。\nA项错误：“农业”概念扩大，文段重在阐述“中国农业”，且“想象的那么悲观”与文段逻辑不符。\nB项错误：“气象灾害”偷换概念，文段强调的是“气候变化”，且“农业”也为概念扩大。\nC项错误：“种植面积正在日益扩大”仅为积极影响中的一部分，表述片面。',
              t: '冒号后面先讲了一堆好处，再说“也有不利影响”。说明前面主要是在说好处，所以D项最合适。' });
            return qs;
        })()
    },
    {
        id: 'mod_ch2_s4', iconClass: 'icon-yellow', iconEmoji: '➡️',
        title: '第二章·第四节 接语推断（8道）',
        subtitle: '例1-8',
        quizzes: (function(){
            var qs = [];
            qs.push({ q: "“点击此处设为首页”，这句提示在2000年的时候遍布各个网站。不论中文网站还是英文网站，都会习惯性地在右上角添加上这么一条，生怕电脑白丁们不知道如何设置首页。可2005年之后，这种“善意”的提示仿佛一夜之间消失了，就如同一份报纸省略掉了自己的征订热线一样，大网站们不再过分热情地推荐首页设置。这段文字接下来最可能谈论的是：", opts: ['A. 网页形式变迁的原因','B. 首页设置的提醒并非善意','C. 如何避免网络陷阱','D. 网络行为更具跟风的特点'], correct: 0, type: 'single', quizIndex: 27,
              d: 'A项正确：文段提出了一种现象，即2000年开始各大网站都会在右上角添加“设为首页”的提示，但2005年之后这种提示就消失了。那么接下来文段最可能论述的是出现这种现象的原因。\nB项错误：文段并未讨论提示是否善意的问题。\nC项错误：“网络陷阱”在文段中未涉及，无中生有。\nD项错误：“网络行为更具跟风”与文段话题无关。',
              t: '先抛出一个现象（提示消失了），接下来自然要解释为什么消失了。' });
            qs.push({ q: "焚香的习俗在中国有着悠久的历史，通常人们为了礼仪将衣服熏香，古代文人雅士也喜欢在书房内焚上一炉香，营造“红袖添香夜读书”的意境。因此，早在汉代以前就出现了以陶、瓷、铜、铁、瓦为材料制成的香炉。汉代时，佛教的传入对香炉的发展起了相当大的作用。元末明初，原先其它材料制成的香炉逐渐被铜香炉所取代，明代宣德年间则是铜香炉制作的巅峰时期。这段文字是一篇文章的引言，文章接下来最可能讲述的是：", opts: ['A. 宗教对于香炉制作技术的影响','B. 焚香习俗逐渐淡出礼仪的原因','C. 香炉制作材料的发展演变过程','D. 宣德香炉的制作及其艺术成就'], correct: 3, type: 'single', quizIndex: 28,
              d: 'D项正确：文段从焚香习俗引出香炉，再讲到香炉的发展历程，最后说到“明代宣德年间则是铜香炉制作的巅峰时期”。按照承接一致原则，下文应围绕宣德年间铜香炉展开，对应D项。\nA项错误：汉代佛教对香炉的影响是前文已提及的内容。\nB项错误：“淡出礼仪”与文段话题无关。\nC项错误：材料发展演变是前文已论述过的内容。',
              t: '最后一句停在“宣德年间是巅峰”，下文自然要介绍巅峰时期的香炉是什么样的。' });
            qs.push({ q: "要最大限度地提高老年人生命质量，就必须最大限度地了解衰老的机制。就目前所知，人体衰老是由器官衰老引起的。而器官衰老是由组织衰老引起的，人体的所有器官和组织又都由细胞组成，引起组织衰老的主要是干细胞功能的衰竭。以此作为开头的一篇文章，最有可能讨论的问题是：", opts: ['A. 如何提高老年人的生命质量','B. 人体衰老是如何发生的','C. 人体衰老与器官衰老的关系','D. 干细胞功能衰竭的过程'], correct: 3, type: 'single', quizIndex: 29,
              d: 'D项正确：重点看文段最后一句，引出人体衰老的原因是“干细胞功能的衰竭”，即引出“干细胞”这一话题，接下来文段应围绕这一话题展开论述，对应D项。\nA项错误：是文段开头引出的话题，而非接下来要讨论的核心。\nB项错误：范围过大，文段已锁定到干细胞层面。\nC项错误：器官衰老是前文已讨论的内容。',
              t: '最后一句话落脚到“干细胞功能衰竭”，下文就要具体讲干细胞是怎么衰竭的。' });
            qs.push({ q: "“人造”美女是最近非常抢眼的一个词。爱美之心人皆有之，丑小鸭变成白天鹅的梦想，通过整形手术就可以在短时间内成为现实，对每一位爱美女性来说，都是一种诱惑。目前，整形美容已成为诸多爱美女性增加个人靓丽指数的时尚选择。与此同时，也有许多女性为此付出了惨痛的代价……作为文章的引言，该文章最有可能谈的是：", opts: ['A. 整形美容的方法、原理和效果','B. 整形美容受到众多女性的青睐','C. 整形美容给女性生活带来的变化','D. 失败的整形美容所带来的痛苦'], correct: 3, type: 'single', quizIndex: 30,
              d: 'D项正确：根据原文“与此同时”可知文段谈论了两方面的问题，先提到了整形美容手术给女性带来的好的变化。在“与此同时”之后接下来应谈负面的影响，对应D项“失败的整形美容所带来的痛苦”。\nA项错误：属于积极方面，与转折后的内容不对应。\nB项错误：开头已论述过。\nC项错误：“变化”包含好与坏两方面，但根据“与此同时”后的“惨痛代价”，下文应侧重消极影响，且“变化”不如D项具体。',
              t: '“与此同时，也有许多女性为此付出了惨痛的代价”这句话后面接什么？自然是具体说惨痛的代价是什么。' });
            qs.push({ q: "了解点美国历史的人都知道，美国的历史和现实中有许多稀奇古怪的事情，但是一样东西是没有的，就是皇帝，因为美国从来就没有实行过帝制，因而也就不可能有所谓的皇帝。然而，1880年1月9日作为旧金山主要报纸之一的《旧金山纪事报》却在头版头条刊登了这样一条消息：“君王驾崩”，宣布“美国皇帝和墨西哥保护者诺顿一世逝世”。根据上文推断，作者接下来最可能讲述的内容是：", opts: ['A. 美国没有实行帝制的原因分析','B. 对该报纸的性质、宗旨进行简要介绍','C. 告诉读者美国政治制度的演变过程','D. 介绍诺顿一世的传奇故事'], correct: 3, type: 'single', quizIndex: 31,
              d: 'D项正确：文段结尾点出了“诺顿一世”这个自称美国皇帝的人物，那么接下来应该是讲他的有关故事。\nA项错误：“原因分析”文段并未展开，属于无关推断。\nB项错误：报纸只是引出诺顿一世的媒介，不是文段核心。\nC项错误：“政治制度演变”文段没有涉及。',
              t: '结尾抛出一个自称“美国皇帝”的人，下文当然要介绍这个人到底是谁、干了什么。' });
            qs.push({ q: "许多优秀人才仅因在招聘面试过程中的小小失误就失去了良好的工作机会。尽管面试形式多种多样，主考官的提问五花八门，目前尚无万无一失的应试方法可供应聘者借鉴，但以下要点可以使应聘者提高应试能力，提高成功率。可推知下文谈论的是：", opts: ['A. 在应聘中主考官提问的各式问题','B. 各种各样的面试形式','C. 一些可供借鉴的应试要点','D. 优秀人才在招聘中失败的原因'], correct: 2, type: 'single', quizIndex: 32,
              d: 'C项正确：从“但以下要点可以使应聘者提高应试能力，提高成功率”可以推知下面的内容一定是围绕一些可供借鉴的应试要点展开的。\nA项错误：主考官提问五花八门在前文中已经提及。\nB项错误：面试形式多种多样在前文中已经提及。\nD项错误：优秀人才在招聘中失败在开头已经提及。',
              t: '"但以下要点……"这句话就像一个预告，下面自然要列出这些要点是什么。' });
            qs.push({ q: "你肯定听过这种理论：左撇子的右脑运作比较活跃，因此更为感性，具有艺术天赋；右撇子则充分锻炼了左脑，因而擅长逻辑思维，性格更为理性。这个观念是如此深入人心，以至于有些父母或教育者煞费苦心地让孩子平衡左右手活动。接下来作者最有可能谈论的是：", opts: ['A. 左右脑为何存在分工','B. 左右脑如何协调工作','C. 左右脑分工不同的例子','D. 左右脑未必存在明确分工'], correct: 3, type: 'single', quizIndex: 33,
              d: 'D项正确：从最后一句话“这个观念是如此深入人心，以至于有些父母或教育者煞费苦心地让孩子平衡左右手活动”，通过“如此的”“以至于”，可以看出作者对左右脑存在明确分工这一理论存在异议。根据承接一致原则，接下来文段应围绕“左右脑未必存在明确分工”展开论述。\nA项错误：肯定了前文引用的理论。\nB项错误：肯定了前文引用的理论。\nC项错误：肯定了前文引用的理论。',
              t: '作者用“煞费苦心”这个词暗示这种观念可能有问题，接下来可能就要推翻它。' });
            qs.push({ q: "无人机蜂群由大量无人机组成，以单机的作战能力为基础，以无人机之间的通信能力为支撑，以智能化为核心，具有抗毁性、单机成本低、功能分布化等特征，通常以数量优势突破防空火力网，对目标形成打击，给未来防空作战带来巨大威胁。构成蜂群的无人机体型较小，造价低廉，数量众多且具有一定机动能力，使得机枪、高炮等难以命中，而导弹等攻击手段作战效率比很低，作战成本无法承受。因此，迫切需要反制无人机蜂群的新型手段和作战模式，尤其是作为战略要害的防御地区，更加迫切需要新式防空作战模式来抵消无人机蜂群带来的威胁。下文接下来最有可能介绍的内容是：", opts: ['A. 无人机蜂群的主要作战模式','B. 无人机蜂群的防御对策','C. 无人机蜂群对未来防空作战的影响','D. 无人机蜂群对战略要害防御地区的威胁'], correct: 1, type: 'single', quizIndex: 34,
              d: 'B项正确：重点关注尾句核心话题。尾句通过结论词“因此”表示迫切需要反制“无人机蜂群”的新型手段和作战模式。故接下来应围绕如何抵御“无人机蜂群”带来的威胁进行讲述，即“防御对策”，对应B项。\nA项错误：“主要作战模式”属于前文已论述的内容。\nC项错误：“对未来防空作战的影响”属于前文已论述的内容。\nD项错误：“对战略要害防御地区的威胁”属于前文已论述的内容。',
              t: '结尾说“迫切需要反制无人机蜂群的新手段”，下文自然要讲有哪些反制手段。' });

        quizzes: (function(){

              t: '作者不认同知识分子的行为，所以选贬义词：推波助澜、鼓吹、背叛。' });
            qs.push({ q: "“诗是不可译的，中国古典诗歌更是不可译的。”爱好古典诗歌的中国人，包括不少作家、学者、翻译家常常如是说，语气中带着七分______三分______。然而，话说回来，如果没有翻译，中国古典诗歌如何走出国门、走向世界呢？依次填入划横线部分最恰当的一项是：", opts: ['A. 自豪 遗憾','B. 无奈 悲伤','C. 感伤 埋怨','D. 骄傲 惭愧'], correct: 0, type: 'single', quizIndex: 3,
              d: 'A项正确：文段表达的是对中国古典诗歌独特性的自豪感，同时因为不可译而无法走出国门感到遗憾。七分自豪、三分遗憾最能体现这种矛盾心理。\nB项错误：“无奈”“悲伤”都偏消极，无法体现对诗歌的自豪感。\nC项错误：“感伤”“埋怨”与文段语气不符，说话人是带着对诗歌的骄傲说的。\nD项错误：“惭愧”指因自己有缺点或做错了事而感到不安，这里不存在做错事。',
              t: '中国古典诗歌好啊（自豪），但翻译不了走不出去（遗憾）。' });

              d: 'D项正确：题干讲荒漠化扩张使生存空间不断减少，空缺需填入体现逐渐减少语义的词语。“蚕食”比喻像蚕吃桑叶那样逐步侵占，生动形象地描绘了荒漠化的扩张趋势。\nA项错误：“侵蚀”是逐渐侵害使变坏，不如“蚕食”形象。\nB项错误：“占据”体现不出逐步的过程。\nC项错误：“损害”体现不出逐步的过程。',

              d: 'D项正确：材料表达了对先烈强烈的崇敬和热爱。第一个空应填入有强烈语气的词与“铿锵的足迹”呼应。“刻”语气最强，且“刻下足迹”搭配恰当。第二个空“铸起雕像”强调铸造过程，能更好展现先烈在战火中挥洒血汗的英勇形象。\nA项错误：“留”和“树”语气较平淡。\nB项错误：“写”语气不够强。\nC项错误：“印”语气较弱，“铸”比“刻”更能体现战争场景。',

              d: 'A项正确：第一空“备受推崇”搭配恰当。第二空意为看到颜真卿的字，就联想到他的人品，“联想”最准确。第三空米芾对颜真卿楷书不十分认同但对其人推崇，“微词”指隐含批评和不满的话语，程度恰当。\nB项错误：“追怀”一般用于同时代的人。\nC项错误：“认同”指确认、赞同，与“见其书就联想到人品”的语境不符。\nD项错误：“映照”与“人品”搭配不当。“非议”语意过重。',
              t: '大家推崇颜真卿的气节，看到他的字就联想到他的为人，米芾虽然对他楷书有点小意见（微词），但也承认颜体有气势。' });
            qs.push({ q: "唐朝社会的各色人物在唐朝文人笔下______，活灵活现。世界名著中有著名的四大吝啬鬼形象，即阿巴贡、泼留希金、夏洛克和葛朗台，而唐朝文人笔下的吝啬和贪婪之人亦______，这些生活在社会各阶层的人，被唐代文人刻画得______，读来呼之欲出，令人不禁莞尔。依次填入划横线部分最恰当的一项是：", opts: ['A. 惟妙惟肖 不相上下 绘声绘色','B. 跃然纸上 大相径庭 酣畅淋漓','C. 栩栩如生 毫不逊色 入木三分','D. 引人入胜 风格各异 活灵活现'], correct: 2, type: 'single', quizIndex: 9,
              d: 'C项正确：第一空与“活灵活现”构成近义并列，形容人物生动形象，“栩栩如生”最合适。第二空意为唐朝文人笔下的吝啬鬼与世界名著中的相比也不差，“毫不逊色”符合语境。第三空“入木三分”比喻分析问题很深刻，也形容刻画人物非常深刻到位，与“刻画”搭配恰当。\nA项错误：“绘声绘色”形容叙述描写生动逼真，多搭配“叙述”而非“刻画”。“不相上下”虽可体现对比，但“入木三分”与“刻画”搭配更佳。\nB项错误：“大相径庭”表示相差很远，与文意相反。\nD项错误：“引人入胜”多指风景或文艺作品吸引人，与“人物”搭配不如“栩栩如生”。“风格各异”与文意无关。',
              t: '唐朝文人笔下的人物活灵活现（栩栩如生），比起世界名著也一点不差（毫不逊色），刻画得非常深刻（入木三分）。' });
            qs.push({ q: "实际上雾霾形成的原因是多方面的，识别污染源是有效治理大气污染至关重要的环节。对京津冀区域而言，认清区域内污染源的共性及差别，有助于区域内地区______地对污染源进行综合治理。填入划线部分最恰当的一项是：", opts: ['A. 因地制宜','B. 正本清源','C. 齐心协力','D. 有的放矢'], correct: 3, type: 'single', quizIndex: 10,
              d: 'D项正确：根据“认清区域内污染源的共性及差别”可知，横线处表达要抓住共性问题集中治理，对于有差别的问题分别处理，即强调要有针对性地解决问题。“有的放矢”比喻说话做事有针对性，符合文意。\nA项错误：“因地制宜”指根据各地具体情况制定适宜办法，仅对应“差别”，表述片面。\nB项错误：“正本清源”指从根源上加以整顿清理，与“污染源”语义重复。\nC项错误：“齐心协力”仅能表达“共性”问题的态度，表述片面。',
              t: '"有的放矢"就是看准了再放箭，认清了污染源是什么，再有针对性地去治理。' });
            qs.push({ q: "名校办分校是近年来冒出来的新生事物，这项举措受到各方意见的______：“名校连锁”是否______，是否与义务教育均衡发展______。依次填入划横线部分最恰当的一项是：", opts: ['A. 质疑 有名无实 背道而驰','B. 质询 名不副实 南辕北辙','C. 质疑 名存实亡 分道扬镳','D. 质询 名实不符 不谋而合'], correct: 0, type: 'single', quizIndex: 11,
              d: 'A项正确：第一空“质疑”指提出疑问以求解答，适用于各方对名校办分校这一举措的态度。第二空“有名无实”指光有空名，实际上并不是那样，符合质疑分校是否真有本校水平的语境。第三空“背道而驰”比喻彼此的方向和目的完全相反，与“义务教育均衡发展”的期望相悖。\nB项错误：“质询”多用于国家行政活动，不适用于此语境。\nC项错误：“名存实亡”意思是实际上学校已经消亡，不合文意。“分道扬镳”不如“背道而驰”准确。\nD项错误：“质询”用法不当。“不谋而合”表示意见一致，与质疑的语境相反。',
              t: '大家质疑名校办分校：这些分校是不是有名无实？是不是和义务教育均衡发展的方向背道而驰？' });
            return qs;
        })()

    {
        id: 'mod_ch3_s2', iconClass: 'icon-blue', iconEmoji: '📖',
        title: '第三章·第二节 语境分析（15道）',
        subtitle: '转折关系 · 并列关系 · 递进关系 · 解释关系 · 比喻关系',
        quizzes: (function(){
            var qs = [];
            qs.push({ q: "很多大学生希望毕业后找到一份工作，稳步发展，可是也有许多人不愿______，他们有相对稳定的家庭背景，有工作能力，却在寻找生活的另一种可能性。填入划横线部分最恰当的一项是：", opts: ['A. 按部就班','B. 墨守成规','C. 人云亦云','D. 步入后尘'], correct: 0, type: 'single', quizIndex: 12,
              d: 'A项正确：“按部就班”指按照一定的步骤、顺序进行，与“毕业后找到一份工作，稳步发展”形成对应。“可是”后面是转折，意思是有些人不愿意按这种常规模式生活。\nB项错误：“墨守成规”指思想固执保守，不思改革进取，贬义过重，与“稳步发展”的感情色彩不符。\nC项错误：“人云亦云”指没有主见，随声附和，与文意不符。\nD项错误：“步入后尘”指追随、模仿别人，与文意不符。',
              t: '“按部就班”对应“稳步发展”，是说有些人不想走这条常规的安稳路。' });
            qs.push({ q: "昆曲走向没落，在于其在大众市场中找不到一席之地而渐失群众基础。现代昆曲开始引入歌剧、交响乐等流行元素，打造通俗版昆曲，而不再______。没有一种文化可以将自己封闭起来，没有一种文化有资格______受众群体，多一份包容，才能换来更长久的生命和更精彩的未来。填入画横线部分最恰当的一项是：", opts: ['A. 曲高和寡 筛选','B. 故步自封 舍弃','C. 特立独行 筛除','D. 一成不变 苛求'], correct: 0, type: 'single', quizIndex: 13,
              d: 'A项正确：第一空需要填入与“通俗”语意相反的词语。“曲高和寡”指言论或作品不通俗，能了解的人很少，与“通俗”语意相反，对应准确。第二空“筛选”指选取特定受众，与现在的“通俗昆曲”对应准确。\nB项错误：“故步自封”指安于现状不求进步，虽能与后文对应，但与“通俗”的反义对应不如“曲高和寡”直接。\nC项错误：“特立独行”多用于形容人。\nD项错误：“一成不变”与“不再”合用表示有了变化，不能与前文构成反义。',
              t: '以前的昆曲“曲高和寡”（小众、不通俗），现在不再那样了，开始走向大众。' });
            qs.push({ q: "荀子认为，人的知识、智慧、品德等，都是由后天学习、积累而来的，他专门写了《劝学》篇，论述学习的重要性，肯定人是教育和环境的产物，倡导______、日积月累、不断求知的学习精神。填入画横线部分最恰当的一项是：", opts: ['A. 孜孜不倦','B. 坚忍不拔','C. 按部就班','D. 一丝不苟'], correct: 0, type: 'single', quizIndex: 14,
              d: 'A项正确：空白处与“日积月累、不断求知”构成近义并列，共同修饰“学习精神”。“孜孜不倦”意为勤奋不懈，不知疲倦，与“不断求知”对应得当，且常用以搭配“学习”。\nB项错误：“坚忍不拔”强调在困境中保持意志坚定，与“不断求知”的连续性对应不足。\nC项错误：“按部就班”现多指按老规矩办事，缺乏创新精神，与“不断求知”的积极进取意味不符。\nD项错误：“一丝不苟”指做事认真细致，但无连续性、持续性的语义。',
              t: '“孜孜不倦”和“日积月累”是并列关系，都是在说学习要勤奋、要坚持不懈。' });
            qs.push({ q: "许多人善意地对某人建言，内容值得一提，但时机不对，反而造成当事人的______与羞愤。有的人讲话内容______，时机也对，但对象不够成熟，讲得再多也______。对不同的对象，要能讲出适合他听的话。依次填入画横线部分最恰当的一项是：", opts: ['A. 尴尬 精辟 徒劳无益','B. 不齿 丰富 白费口舌','C. 误解 透彻 无济于事','D. 苦恼 鲜明 枉费心机'], correct: 0, type: 'single', quizIndex: 15,
              d: 'A项正确：第一空与“羞愤”并列，感情色彩一致，“尴尬”最合适。第二空“精辟”形容讲话内容有深度有价值。第三空“徒劳无益”指付出了劳动但得不到任何益处，对应“讲得再多也没用”。\nB项错误：“不齿”指鄙视、不愿提及，与“羞愤”不构成并列关系。\nC项错误：“误解”是当事人对建言的理解偏差，不是建言直接造成的。\nD项错误：“苦恼”与“羞愤”并列不够准确。',
              t: '时机不对让人尴尬，内容再精辟，对象不对也是白费口舌。' });
            qs.push({ q: "看过许多名人访谈，他们无不谈到过去某段时期的迷茫与困惑、低调与失败。彼时，如果他们向命运低头，他们就是失败者。只有冷静下来，摆正心态，才有______赢取辉煌的可能。可见，平日的积累与锻炼固然重要，但关键时刻的______与爆发力却能成就一个真正的王者。填入划横线部分最恰当的一项是：", opts: ['A. 背水一战 表现','B. 反败为胜 勇气','C. 逆水行舟 速度','D. 反戈一击 突破'], correct: 1, type: 'single', quizIndex: 16,
              d: 'B项正确：第一空与“赢取辉煌”语义相近，“反败为胜”指扭转战局赢得胜利，符合语境。第二空“勇气”与“爆发力”并列，与前文“向命运低头”构成反义关系。\nA项错误：“背水一战”比喻决一死战，没有“赢”的意思。\nC项错误：“逆水行舟”一般与“不进则退”连用，没有“赢”的意思。\nD项错误：“反戈一击”指调转武器攻击自己所属阵营，比喻恩将仇报，不符合语境。',
              t: '关键时刻要“反败为胜”，靠的是“勇气”和爆发力。' });
            qs.push({ q: "徐渭透露了一个文化事实：茶与酒的轮值制度，是中国饮品文化的最大机密。文人交替饮用这两种饮品，在______与癫狂之间摆动和涨落。这是耗散式的结构，它从对立的两极出发，机巧地______着中国人的心灵。填入画横线部分最恰当的一项是：", opts: ['A. 清醒 调节','B. 沉醉 整合','C. 恍惚 磨砺','D. 理智 叩击'], correct: 0, type: 'single', quizIndex: 17,
              d: 'A项正确：第一空要与“癫狂”形成反义并列，“癫狂”代表酒，“清醒”代表茶，两者对立。“调节心灵”搭配恰当。\nB项错误：“沉醉”与“癫狂”语义相近，不能形成反义并列。\nC项错误：“恍惚”与“癫狂”不构成反义。\nD项错误：“理智”虽与“癫狂”对立，但“叩击心灵”不如“调节心灵”更能体现茶酒交替的平衡作用。',
              t: '茶让人清醒，酒让人癫狂，两者交替“调节”中国人的心灵。' });
            qs.push({ q: "在人类历史上，科技发明和人工工程曾导致不少“出人意料”、“始料不及”甚至“______”的结果。如果少出一些这样的事，我们就应该对大自然保持一份______，在推广新技术、上马新工程之前，多一些研究评估，少一些独断专行。填入画横线部分最恰当的一项是：", opts: ['A. 事与愿违 敬畏','B. 事半功倍 谨慎','C. 针锋相对 尊重','D. 南辕北辙 克制'], correct: 0, type: 'single', quizIndex: 18,
              d: 'A项正确：第一空由“甚至”提示，应填入与“出人意料”“始料不及”语义相近、程度更深的词。“事与愿违”形容事实与主观愿望相反，符合要求。第二空“敬畏”表示既敬重又害怕，是对大自然应有的态度。\nB项错误：“事半功倍”形容效率高，与文意不符。\nC项错误：“针锋相对”形容观点尖锐对立，与文意不符。\nD项错误：“南辕北辙”形容行动和目的相反，虽可与“事与愿违”并列，但“克制”不如“敬畏”恰当。',
              t: '科技发明有时事与愿违，所以我们面对大自然要保持敬畏，多做评估少拍脑袋。' });
            qs.push({ q: "做学问首先是有一说一，实事求是，尊重原始数据的真实性。在诚实做研究的前提下，对具体实验结果的分析、理解有______甚至错误是很常见的，这是科学发展的正常过程。可以说，许多学术论文的分析、结论和讨论都存在不同程度的______，越是______的科学研究，越容易出现错误理解和错误结论。填入画横线部分最恰当的一项是：", opts: ['A. 争论 错误 严谨','B. 异议 弱点 复杂','C. 偏差 瑕疵 前沿','D. 意见 局限 真实'], correct: 2, type: 'single', quizIndex: 19,
              d: 'C项正确：第一空由递进关联词“甚至”可知，应填入与“错误”词义相近但程度较轻的词语。“偏差”指工作上产生的过分或不及的差错，符合语境。第二空“瑕疵”与“错误”语义相近且程度较轻。第三空“前沿”的科学研究搭配合理。\nA项错误：“争论”不能体现“错误”之意。\nB项错误：“异议”不能体现“错误”之意。\nD项错误：“意见”不能体现“错误”之意。',
              t: '实验结果有“偏差”甚至“错误”很正常，论文都有“瑕疵”，越是“前沿”研究越容易出错。' });
            qs.push({ q: "消极完美主义者总是非常仔细地检查任何事情的细枝末节，有时竟达到______的地步。他们缺少一种适时放弃的智慧，他们所追求的“完美”，不是美学意义上的“完美”，而是一种非常刻板而教条式的“完美”。填入画横线部分最恰当的一项是：", opts: ['A. 抱残守缺','B. 宁缺毋滥','C. 吹毛求疵','D. 冥顽不灵'], correct: 2, type: 'single', quizIndex: 20,
              d: 'C项正确：以“竟”为递进标志，空格处需填入比“非常仔细地检查任何事情的细枝末节”更进一步的词语。“吹毛求疵”比喻故意挑剔别人的缺点，寻找差错，也指细致到繁琐、挑剔的地步，符合语境。\nA项错误：“抱残守缺”比喻思想保守，不求上进，与“检查细枝末节”无关。\nB项错误：“宁缺毋滥”为褒义词，与消极完美主义色彩不符。\nD项错误：“冥顽不灵”形容愚昧无知，与文意无关。',
              t: '消极完美主义者细到令人发指，简直是“吹毛求疵”——连皮毛上的小瑕疵都要挑剔。' });
            qs.push({ q: "持之以恒的精神固然可贵，但如果我们所坚持、所固守的是______甚至错误的，那坚持到底的结果只能是一错再错。人生允许______，敢于放弃不切实际的理想，也是一种生存的智慧。填入画横线部分最恰当的一项是：", opts: ['A. 消极 无功而返','B. 盲目 知错就改','C. 反面 偃旗息鼓','D. 偏颇 改弦易辙'], correct: 3, type: 'single', quizIndex: 21,
              d: 'D项正确：第一空由“甚至”可知应填入一个跟“错误”意思相近但程度较轻的词。“偏颇”形容偏向一方、不公正，比“错误”程度轻。第二空“改弦易辙”比喻改变原来的方向、计划、办法等，与“敢于放弃不切实际的理想”对应。\nA项错误：“消极”与“错误”无关。\nB项错误：“盲目”形容坚持的状态，不是坚持的内容。\nC项错误：“反面”与“错误”无关。',
              t: '坚持的东西是“偏颇”甚至错误的，人生允许“改弦易辙”——换个方向重新出发。' });
            qs.push({ q: "心理学家根据临床观察发现，我们生活中的许多“抑郁症”是属于假性抑郁症，一般人的情绪变化有一定______，通常是短期的，人们通过自我调适，充分发挥自我心理防卫功能，就能恢复心绪平稳。填入画横线部分最恰当的一项是：", opts: ['A. 突发性','B. 周期性','C. 时限性','D. 反复性'], correct: 2, type: 'single', quizIndex: 22,
              d: 'C项正确：根据后文“短期的”“通过自我调适……就能恢复心绪平稳”可知，横线处表达情绪变化是有时间限度的，不是一直持续的。“时限性”指有时间限度的，符合文意。\nA项错误：“突发性”侧重强调突然发生，与时间长短无关。\nB项错误：“周期性”与“反复性”均强调重复、循环，文段强调在一段时间之内就能恢复，而非循环。',
              t: '情绪低落是暂时的，有时间限制（时限性），过一阵自己就好了。' });
            qs.push({ q: "国际电信世界大会上，审议具有24年历史的《国际电信规则》是一个巨大的挑战，因为要确保它能______，适应新一代信息通信技术用户的需求和全球化、激烈竞争和创新不断加深的技术环境。填入画横线部分最恰当的一项是：", opts: ['A. 推陈出新','B. 与时俱进','C. 精益求精','D. 破旧立新'], correct: 1, type: 'single', quizIndex: 23,
              d: 'B项正确：根据空格后面“适应新一代信息通信技术用户的需求和……技术环境”可知，空格处强调《国际电信规则》要跟上时代步伐。“与时俱进”最符合语境。\nA项错误：“推陈出新”指去掉旧事物的糟粕，取其精华，并使它向新的方向发展，多指继承文化遗产，与规则修订语境不完全对应。\nC项错误：“精益求精”意为已经很好了还要求更好，与后文无法对应。\nD项错误：“破旧立新”虽有创新，但文段并未提及破除旧的。',
              t: '24年前的规则要“与时俱进”，才能适应现在的需求。' });
            qs.push({ q: "从历史的角度看，生态问题只有通过不断重建天人之间的统一才能解决，仅仅赞美自然的原初形态，一味讴歌、缅怀天人之间的原始统一，只能得到某种抽象、空泛的满足，而无法真正解决生态的问题。生态的危机因人而起，也只有通过人自己的合理活动来克服。单纯地由于人的作用导致生态困境而拒斥人的活动，无异于______。填入划横线部分最恰当的一项是：", opts: ['A. 因小失大','B. 因噎废食','C. 等因奉此','D. 因循守旧'], correct: 1, type: 'single', quizIndex: 24,
              d: 'B项正确：“无异于”为解释类对应标志词，横线前“单纯地由于人的作用导致生态困境而拒斥人的活动”意为因为人的活动导致了问题就干脆拒绝一切人的活动。“因噎废食”比喻要做的事情由于出了点小毛病或怕出问题就索性不去干，符合文意。\nA项错误：“因小失大”出现大、小两个方面，文段没有体现。\nC项错误：“等因奉此”是官样文章中的固定格式，与语境不符。\nD项错误：“因循守旧”指死守老一套，缺乏创新，文段强调放弃本应做的事情。',
              t: '不能因为人类活动造成了生态问题，就干脆不活动了——那叫“因噎废食”（因为怕噎着就不吃饭了）。' });
            qs.push({ q: "深圳的40年是中国经济特区建设的一个缩影，也是无数党员与人民群众努力的结果，______，每个人的一小步都是建设成功的关键。填入横线部分最恰当的一项是：", opts: ['A. 厚积薄发','B. 积羽沉舟','C. 万众一心','D. 聚沙成塔'], correct: 3, type: 'single', quizIndex: 25,
              d: 'D项正确：根据空格前后“无数党员与人民群众努力的成果”“每个人的一小步都是建设成功的关键”可知，横线处需体现个体力量可以积少成多、对于成功有重要作用之意。“聚沙成塔”比喻积少成多，符合文意。\nA项错误：“厚积薄发”指多多积蓄慢慢放出，侧重提前准备的重要性。\nB项错误：“积羽沉舟”指小小的坏事积累起来会造成严重后果，感情色彩消极。\nC项错误：“万众一心”指千万人一条心，形容团结一致，无法体现“个体”的力量。',
              t: '每个人的一小步，汇聚起来就是巨大的成就——“聚沙成塔”。' });
            qs.push({ q: "在网络空间中消费信息______，成为新的“信息污染”，流量造假、夸大宣传等大量存在，______商业规则，______电商平台的良性发展。填入画横线部分最恰当的一项是：", opts: ['A. 林林总总 冲击 约束','B. 纷繁芜杂 挑战 制约','C. 琳琅满目 动摇 掣肘','D. 五花八门 打破 限制'], correct: 1, type: 'single', quizIndex: 26,
              d: 'B项正确：第一空根据“成为新的信息污染”可知，横线处需体现消费信息的不良之处，感情色彩消极。“纷繁芜杂”指多而杂乱，没有条理，为贬义词，符合语境。第二空“挑战规则”常见搭配。第三空“制约发展”常见搭配。\nA项错误：“林林总总”为中性词，不能体现不良之处。\nC项错误：“琳琅满目”为褒义词，与文段感情色彩不符。\nD项错误：“五花八门”为中性词，不能体现不良之处。',
              t: '网上消费信息“纷繁芜杂”（又乱又多），成了信息污染，挑战商业规则，制约平台发展。' });
            return qs;
        })()
    }
];

<script>
function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}
function renderQuiz(q,qid){var qTypeLabel=q.multi?'【多选题】':'【单选题】';var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div><ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div><div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.d){var detailHtml=q.d;
detailHtml=detailHtml.replace(/\n/g,'<br>');
detailHtml=detailHtml.replace(/([A-E])项正确：/g,'<span style="color:#145a32;">✅ $1项正确：</span>');
detailHtml=detailHtml.replace(/([A-E])项错误：/g,'<span style="color:#b22222;">❌ $1项错误：</span>');
detailHtml=detailHtml.replace(/([A-E])项相符：/g,'<span style="color:#145a32;">✅ $1项相符：</span>');
detailHtml=detailHtml.replace(/([A-E])项不符：/g,'<span style="color:#b22222;">❌ $1项不符：</span>');
h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.t+'</div></div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 阅读理解 · 题目导航</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
</body>
</html>
