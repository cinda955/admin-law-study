        .explain-card.correct-ex { background:#eafaf1; border:1px solid #a3e4bc; color:#145a32; }

<script>
const knowledgeData = [
    // ==================== 单选题40道 ====================
    {
        id: 'mod_single', iconClass: 'icon-red', iconEmoji: '📝',
        title: '综合练习 · 单选题（40道）',
        subtitle: '公安基础知识 · 人民警察法 · 警械武器条例',
        quizzes: [
            { q: '公安机关的根本属性是什么？', opts: ['A. 武装性质', 'B. 治安行政力量', 'C. 人民民主专政的重要工具', 'D. 刑事司法力量'], correct: 2, type: 'single', quizIndex: 1,
              d: '<b>A</b>：错误。武装性质是公安机关的组织属性，不是根本属性。组织属性指的是公安机关配备了警械武器、实行军事化管理等特征，但这不是它的阶级本质。<br><b>B</b>：错误。治安行政力量是公安机关的职能属性之一，指的是它承担维护社会治安的行政职能，但也不能说明它的阶级本质。<br><b>C</b>：正确。人民民主专政的重要工具是公安机关的阶级属性，也是其根本属性。这句话表明了公安机关的阶级本质——它是服务于人民民主专政国家政权的工具，是公安机关性质的核心内容。<br><b>D</b>：错误。刑事司法力量同样是职能属性，指的是公安机关参与刑事侦查、执行刑罚等司法职能。',
              t: '问"根本属性"就选"人民民主专政的重要工具"——这是公安机关的"灵魂"，说明了它属于谁、为谁服务。' },
            { q: '公安工作的根本原则是什么？', opts: ['A. 群众路线', 'B. 专群结合', 'C. 坚持党对公安工作的绝对领导', 'D. 全心全意为人民服务'], correct: 2, type: 'single', quizIndex: 2,
              d: '<b>A</b>：错误。群众路线是公安工作的根本路线（"一切为了群众，一切依靠群众，从群众中来，到群众中去"），不是根本原则。<br><b>B</b>：错误。专群结合（专门机关与广大群众相结合）是公安工作的基本方针，不是根本原则。<br><b>C</b>：正确。坚持党对公安工作的绝对领导是公安工作的根本原则。这个原则要求公安机关必须无条件、全面、直接地服从党的领导。<br><b>D</b>：错误。全心全意为人民服务是公安工作的宗旨，不是根本原则。',
              t: '原则=党领导；路线=群众路线；方针=专群结合；宗旨=为人民服务。四个概念不能混淆。' },
            { q: '"一切为了群众"是公安工作的什么？', opts: ['A. 根本态度', 'B. 基本方法', 'C. 宗旨和出发点', 'D. 根本原则'], correct: 2, type: 'single', quizIndex: 3,
              d: '<b>A</b>：错误。"一切依靠群众"才是公安工作的根本态度（回答"靠谁做"的问题）。<br><b>B</b>：错误。"从群众中来，到群众中去"才是公安工作的基本方法（回答"怎么做"的问题）。<br><b>C</b>：正确。"一切为了群众"是公安工作的宗旨和出发点，回答了"为什么做"的问题。<br><b>D</b>：错误。根本原则是党对公安工作的绝对领导。',
              t: '出发点=为谁做（一切为了群众）；态度=靠谁做（一切依靠群众）；方法=怎么做（从群众中来，到群众中去）。' },
            { q: '公安机关的专政职能针对的对象是？', opts: ['A. 全体公民', 'B. 敌对势力和严重刑事犯罪分子', 'C. 违反治安管理的行为人', 'D. 所有违法犯罪人员'], correct: 1, type: 'single', quizIndex: 4,
              d: '<b>A</b>：错误。专政对象是少数人，不是全体公民。全体公民是民主职能的服务对象。<br><b>B</b>：正确。专政职能专门针对危害国家安全的敌对势力、敌对分子以及严重刑事犯罪分子。<br><b>C</b>：错误。违反治安管理的行为人属于行政管理对象，不是专政对象。比如小偷小摸、轻微打架，这些属于治安管理范畴。<br><b>D</b>：错误。"所有违法犯罪人员"范围过大，轻微的治安违法行为人不是专政对象。',
              t: '专政打的是"敌人"——危害国家安全和犯严重刑事罪的人。普通违法（如小偷小摸）不够格当"敌人"。' },
            { q: '公安机关的管理体制是？', opts: ['A. 统一领导，分级管理，条块结合，以条为主', 'B. 统一领导，分级管理，条块结合，以块为主', 'C. 分级领导，统一管理，条块结合，以块为主', 'D. 统一领导，分级管理，条块分离，以块为主'], correct: 1, type: 'single', quizIndex: 5,
              d: '<b>A</b>：错误。是"以块为主"不是"以条为主"。"以块为主"意味着同级党委政府的领导为主，上级公安机关的领导为辅。<br><b>B</b>：正确。统一领导、分级管理、条块结合、以块为主，这是公安机关的管理体制。<br><b>C</b>：错误。"统一领导"是正确表述，不是"分级领导"。<br><b>D</b>：错误。"条块结合"是正确的，不是"条块分离"。',
              t: '"条"=上级公安，"块"=同级党委政府。"以块为主"就是同级党委政府说了算，上级公安是辅助。' },
            { q: '人民警察核心价值观中"根本要求"和"政治本色"指的是？', opts: ['A. 为民', 'B. 公正', 'C. 忠诚', 'D. 廉洁'], correct: 2, type: 'single', quizIndex: 6,
              d: '<b>A</b>：错误。为民是宗旨、出发点、落脚点。<br><b>B</b>：错误。公正是法律精神、价值追求。<br><b>C</b>：正确。忠诚是根本要求、政治本色。警察的第一位要求就是对党、对国家、对人民、对法律忠诚。<br><b>D</b>：错误。廉洁是内在要求、道德底线。',
              t: '忠诚是"忠"字当头，是警察的第一要求。没有忠诚，其他都无从谈起。' },
            { q: '新时代公安工作十六字方针是？', opts: ['A. 对党忠诚、服务人民、执法公正、纪律严明', 'B. 政治建警、改革强警、科技兴警、从严治警', 'C. 革命化、正规化、专业化、职业化', 'D. 铁一般的理想信念、责任担当、过硬本领、纪律作风'], correct: 1, type: 'single', quizIndex: 7,
              d: '<b>A</b>：错误。这是新时代治警建警的总要求，不是十六字方针。<br><b>B</b>：正确。政治建警、改革强警、科技兴警、从严治警是公安工作的十六字方针。<br><b>C</b>：错误。革命化、正规化、专业化、职业化是公安队伍正规化建设的目标。<br><b>D</b>：错误。这是"四个铁一般"的内容，是队伍建设的具体要求。',
              t: '十六字方针="政改科严"。总要求="对服执法"。四个铁一般="信担本纪"。三个概念别搞混。' },
            { q: '民警违反三项纪律的，应如何处理？', opts: ['A. 警告', 'B. 记过', 'C. 一律先予禁闭', 'D. 罚款'], correct: 2, type: 'single', quizIndex: 8,
              d: '<b>A</b>：错误。警告是行政处分的一种，但三项纪律的初始处理不是警告，而是禁闭。<br><b>B</b>：错误。记过同样是行政处分，不是初始处理方式。<br><b>C</b>：正确。违反三项纪律（面对群众危难不勇为、酗酒滋事、进夜总会娱乐）的，一律先予禁闭，再视情给予纪律处分；造成严重后果或恶劣影响的，一律给予开除处分。<br><b>D</b>：错误。罚款不是纪律处分方式，是针对老百姓的行政处罚。',
              t: '三项纪律是高压线！碰了先关起来（禁闭），严重的直接开除。' },
            { q: '我国最早的一支比较正规的人民警察队伍是？', opts: ['A. 湖南保卫局', 'B. 中央特科', 'C. 延安市警察队', 'D. 国家政治保卫局'], correct: 2, type: 'single', quizIndex: 9,
              d: '<b>A</b>：错误。湖南保卫局是1898年陈宝箴创办的，是最早的专职警察机构，但属于清政府时期。<br><b>B</b>：错误。中央特科是1927年周恩来在上海建立的，是党在中央机关设立的最早保卫机构。<br><b>C</b>：正确。延安市警察队（1938年），简称"边警"，是第一支比较正规的人民警察队伍。<br><b>D</b>：错误。国家政治保卫局是1931年在瑞金成立的，是我国最早的人民政权的公安保卫机关。',
              t: '"最早"各有不同：湖南=最早专职；特科=党最早保卫；保卫局=最早人民政权；延安市警察队=第一支正规人民警察队伍。' },
            { q: '群体性事件处置中，以下哪项不属于"三个慎用"？', opts: ['A. 慎用警力', 'B. 慎用武器警械', 'C. 慎用强制措施', 'D. 慎用行政处罚'], correct: 3, type: 'single', quizIndex: 10,
              d: '<b>A</b>：属于三个慎用之一。处置群体性事件时，动用警力要慎重，避免激化矛盾。<br><b>B</b>：属于三个慎用之一。武器警械的威慑力强，使用不当容易引发冲突升级。<br><b>C</b>：属于三个慎用之一。强制措施（如强行驱散、拘留）要慎重使用。<br><b>D</b>：不属于。三个慎用是"警力、武器警械、强制措施"，行政处罚是事后处理手段，不在三个慎用之列。',
              t: '"三慎用"口诀：人（警力）、枪（武器警械）、措施（强制措施）。行政处罚是事后处理，不属于现场处置的慎用对象。' },
            { q: '督察机构对人民警察采取禁闭措施的期限是？', opts: ['A. 1日以上3日以下', 'B. 1日以上7日以下', 'C. 3日以上7日以下', 'D. 7日以上15日以下'], correct: 1, type: 'single', quizIndex: 11,
              d: '<b>A</b>：错误。期限太短，不符合规定。<br><b>B</b>：正确。禁闭期限为1日以上7日以下。<br><b>C</b>：错误。起点是1日而不是3日。<br><b>D</b>：错误。禁闭最多7日，不会超过。',
              t: '禁闭1~7天，停止执行职务10~60天。禁闭更短但更严厉——关起来反省。' },
            { q: '下列哪项属于公安执法外部监督？', opts: ['A. 督察监督', 'B. 法制部门监督', 'C. 国家权力机关的监督', 'D. 行政复议'], correct: 2, type: 'single', quizIndex: 12,
              d: '<b>A</b>：错误。督察监督是公安机关内部的监督机制，属于内部监督。<br><b>B</b>：错误。法制部门是公安机关的内设机构，其监督属于内部监督。<br><b>C</b>：正确。国家权力机关（人民代表大会）的监督是来自公安机关外部的监督，属于外部监督。<br><b>D</b>：错误。行政复议是指上级公安机关或同级政府对下级公安机关行为的审查，属于内部监督。',
              t: '外部监督=来自公安系统之外的监督（人大、检察院、法院、社会舆论）。内部监督=公安系统自己监督自己。' },
            { q: '县级以上公安机关正职领导职务的提名，应当？', opts: ['A. 由同级政府直接任命', 'B. 事先征得上一级公安机关同意', 'C. 征求上一级公安机关意见', 'D. 由上级公安机关直接任命'], correct: 1, type: 'single', quizIndex: 13,
              d: '<b>A</b>：错误。正职领导提名需要征得上级公安同意，不能由同级政府直接任命。<br><b>B</b>：正确。根据《公安机关组织管理条例》，正职领导职务的提名应事先征得上一级公安机关同意。<br><b>C</b>：错误。"征求意见"是针对副职领导的，正职是"征得同意"，力度更强。<br><b>D</b>：错误。不是上级公安机关直接任命，而是提名时需征得同意。',
              t: '正职=征得同意（更强硬，必须上级点头）；副职=征求意见（较温和，问问就行）。' },
            { q: '治安案件简易程序中，对违反治安管理行为人处多少元以下罚款可以当场处罚？', opts: ['A. 50元', 'B. 100元', 'C. 200元', 'D. 500元'], correct: 2, type: 'single', quizIndex: 14,
              d: '<b>A</b>：错误。50元是当场收缴罚款的上限（收现金的情形），不是当场处罚的上限。<br><b>B</b>：错误。100元不是简易程序的法定标准。<br><b>C</b>：正确。治安/交通简易程序：对违反治安管理行为人处200元以下罚款或警告的，可以适用简易程序当场处罚。<br><b>D</b>：错误。500元是出入境边防检查机关适用简易程序的标准。',
              t: '当场罚（简易程序）=200元以下；当场收（当场收缴现金）=50元以下。两个"当场"数字不同！' },
            { q: '快速办理行政案件，应在违法嫌疑人到案后多久内处理完毕？', opts: ['A. 24小时', 'B. 36小时', 'C. 48小时', 'D. 72小时'], correct: 2, type: 'single', quizIndex: 15,
              d: '<b>A</b>：错误。24小时是询问查证一般时限的延长标准，不是快速办理的处理时限。<br><b>B</b>：错误。无此规定。<br><b>C</b>：正确。快速办理行政案件，应在违法嫌疑人到案后48小时内作出处理决定。<br><b>D</b>：错误。无此规定。',
              t: '快速办理=48小时搞定。普通程序=30天。快速通道快得多！' },
            { q: '行政拘留处罚合并执行的，最长不超过多少日？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 1, type: 'single', quizIndex: 16,
              d: '<b>A</b>：错误。15日是单个行政拘留的常见期限，不是合并执行的上限。<br><b>B</b>：正确。一人有两种以上违法行为均被处行政拘留的，合并执行最长不超过20日。<br><b>C</b>：错误。30日是治安案件的一般办案期限。<br><b>D</b>：错误。60日是治安案件含延期的总办案期限（30+30）。',
              t: '犯多件事，拘留"打包价"最多20天。这是法律规定的上限。' },
            { q: '治安案件办案期限一般不超过多少日？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 2, type: 'single', quizIndex: 17,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。公安机关办理治安案件的期限，自受理之日起不得超过30日；案情重大复杂的，经上一级公安机关批准可以延长30日。<br><b>D</b>：错误。60日是含延期的总时限（30+30），不是一般期限。',
              t: '30天是基础期，搞不完可以再延30天，封顶60天。鉴定期间不算在内。' },
            { q: '人民警察职业道德中"事实为据，秉持公正，惩恶扬善"属于哪项？', opts: ['A. 忠诚可靠', 'B. 秉公执法', 'C. 英勇善战', 'D. 严守纪律'], correct: 1, type: 'single', quizIndex: 18,
              d: '<b>A</b>：错误。忠诚可靠的内容是"听党指挥，热爱人民，忠于法律"。<br><b>B</b>：正确。秉公执法就是"事实为据，秉持公正，惩恶扬善"。<br><b>C</b>：错误。英勇善战的内容是"坚韧不拔，机智果敢，崇尚荣誉"。<br><b>D</b>：错误。严守纪律的内容是"遵章守纪，保守秘密，令行禁止"。',
              t: '看到"事实为据""公正""惩恶扬善"这些词，直接对应"秉公执法"。' },
            { q: '"枫桥经验"中的"四防齐抓"指的是？', opts: ['A. 人防、物防、技防、消防', 'B. 人防、物防、技防、心防', 'C. 人防、物防、消防、心防', 'D. 人防、消防、技防、心防'], correct: 1, type: 'single', quizIndex: 19,
              d: '<b>A</b>：错误。"消防"不在四防之中，"心防"才是四防之一。<br><b>B</b>：正确。四防齐抓=人防（人员巡逻守护）、物防（防盗门窗设施）、技防（监控报警技术）、心防（心理疏导和防范意识教育）。<br><b>C</b>：错误。没有"消防"。<br><b>D</b>：错误。没有"消防"。',
              t: '四防="人物技心"——人防=巡逻，物防=防盗门，技防=监控，心防=心理疏导。' },
            { q: '下列哪项不适用行政拘留处罚？', opts: ['A. 已满14周岁不满16周岁的人', 'B. 已满18周岁的人', 'C. 已满16周岁不满18周岁且非初次违反', 'D. 孕妇'], correct: 0, type: 'single', quizIndex: 20,
              d: '<b>A</b>：正确。已满14周岁不满16周岁的人，依法应当给予行政拘留处罚的，不执行行政拘留处罚。<br><b>B</b>：错误。成年人正常执行行政拘留。<br><b>C</b>：错误。16-18周岁且非初次的，不适用不执行的规定，可以执行。<br><b>D</b>：同样属于不执行情形（孕妇），但题目最佳选项为A。',
              t: '四类人不执行拘留：14-16岁、16-18岁初次、70岁以上、孕妇哺乳期妇女。注意16-18岁必须是"初次"。' },
            { q: '行政拘留的暂缓执行，担保方式是什么？', opts: ['A. 必须提供保证人', 'B. 必须缴纳保证金', 'C. 保证人或保证金二选一', 'D. 必须同时提供保证人和保证金'], correct: 2, type: 'single', quizIndex: 21,
              d: '<b>A</b>：错误。不是必须提供保证人，也可以选择缴纳保证金。<br><b>B</b>：错误。不是必须缴纳保证金，也可以选择提供保证人。<br><b>C</b>：正确。保证人或保证金二选一即可，不需要同时提供。<br><b>D</b>：错误。二选一，不是同时。',
              t: '担保方式二选一：找人保（有本地户口且靠谱的保证人）或交钱保（按日200元标准缴纳保证金）。' },
            { q: '当场收缴的罚款，人民警察应自收缴之日起几日内交至所属公安机关？', opts: ['A. 当日', 'B. 2日', 'C. 3日', 'D. 5日'], correct: 1, type: 'single', quizIndex: 22,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。人民警察应当自收缴罚款之日起2日内，将当场收缴的罚款交至其所属公安机关。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '收钱后2天内上交警局。水上从抵岸起算2天，列车上从返回起算2天。' },
            { q: '人民警察不得辞退的情形不包括？', opts: ['A. 因公致残丧失工作能力', 'B. 患病在规定医疗期内', 'C. 连续两年考核不称职', 'D. 女性在哺乳期内'], correct: 2, type: 'single', quizIndex: 23,
              d: '<b>A</b>：属于不得辞退的情形（因公致残）。<br><b>B</b>：属于不得辞退的情形（在医疗期内）。<br><b>C</b>：不属于。连续两年考核不称职恰恰是"应当辞退"的情形，不是"不得辞退"。<br><b>D</b>：属于不得辞退的情形（在哺乳期内）。',
              t: '"残、病、孕"三类人受保护不能辞退。而"两年考核不称职"是应该辞退的！' },
            { q: '关于严肃与谨慎相结合政策，总精神是什么？', opts: ['A. 执法必严', 'B. 重证据重调查研究', 'C. 不枉不纵', 'D. 宽严相济'], correct: 2, type: 'single', quizIndex: 24,
              d: '<b>A</b>：错误。"执法必严"是"严肃"的内涵，是总精神的一个方面。<br><b>B</b>：错误。"重证据、重调查研究"是"谨慎"的内涵，也是总精神的一个方面。<br><b>C</b>：正确。严肃与谨慎相结合的总精神就是"不枉不纵"——不冤枉一个好人，也不放过一个坏人。<br><b>D</b>：错误。"宽严相济"是一项独立的刑事政策，不是严肃与谨慎相结合的总精神。',
              t: '严肃=该抓就抓，谨慎=别抓错。合起来=不枉不纵，刚好。' },
            { q: '公安机关的两大基本职能是什么？', opts: ['A. 管理职能和服务职能', 'B. 专政职能和民主职能', 'C. 治安职能和刑事职能', 'D. 预防职能和打击职能'], correct: 1, type: 'single', quizIndex: 25,
              d: '<b>A</b>：错误。管理和服务是从不同角度划分的职能，不是"基本职能"的官方表述。<br><b>B</b>：正确。专政职能（对敌人实行专政）和民主职能（对人民实行民主）是公安机关的两大基本职能。<br><b>C</b>：错误。治安和刑事是公安专业工作的分类，不是基本职能。<br><b>D</b>：错误。预防和打击是公安工作的具体手段，不是基本职能。',
              t: '基本职能就两个：对敌人专政 + 对人民民主。其他都是衍生出来的。' },
            { q: '下列哪项属于"警械"而非"武器"？', opts: ['A. 弹药', 'B. 特种防暴枪', 'C. 枪支', 'D. 步枪'], correct: 1, type: 'single', quizIndex: 26,
              d: '<b>A</b>：错误。弹药与枪支配套使用，属于致命性武器。<br><b>B</b>：正确。特种防暴枪虽名字带"枪"，但根据条例第3条，它属于驱逐性、制服性警械，是非致命性的。<br><b>C</b>：错误。枪支是典型的致命性武器。<br><b>D</b>：错误。步枪是枪支的一种，属于武器。',
              t: '带"枪"字的不一定都是武器！特种防暴枪发射的是催泪弹、爆震弹，不致命，是警械。' },
            { q: '人民警察使用警械和武器的根本原则是什么？', opts: ['A. 从严打击犯罪', 'B. 以制止违法犯罪为原则，尽量减少人员伤亡和财产损失', 'C. 先警告后使用', 'D. 经上级批准方可使用'], correct: 1, type: 'single', quizIndex: 27,
              d: '<b>A</b>：错误。警械武器的使用目的是"制止"而非"打击"，更不是"从严"。<br><b>B</b>：正确。条例第4条：以制止违法犯罪行为为原则，尽量减少人员伤亡和财产损失。<br><b>C</b>：错误。警告是程序性要求，不是根本原则。<br><b>D</b>：错误。紧急情况下可先使用后报告，并非一律需上级批准。',
              t: '原则就两条：①目的是制止；②尽量别伤人毁东西。记住第4条！' },
            { q: '下列哪种情形，经警告无效后可以使用武器？', opts: ['A. 非法集会游行', 'B. 结伙斗殴', 'C. 劫持航空器危害公共安全', 'D. 侮辱妇女'], correct: 2, type: 'single', quizIndex: 28,
              d: '<b>A</b>：错误。非法集会游行属于第7条使用驱逐性、制服性警械的情形。<br><b>B</b>：错误。结伙斗殴同样适用警械，不适用武器。<br><b>C</b>：正确。劫持航空器是第9条第(二)项明确的严重暴力犯罪，经警告无效可使用武器。<br><b>D</b>：错误。侮辱妇女属于流氓活动，适用警械。',
              t: '武器针对"要命"的暴力犯罪。劫机、杀人、爆炸这些才行。打架、游行用警械就够了。' },
            { q: '人民警察使用武器造成无辜人员伤亡的，善后处理正确的是？', opts: ['A. 由警察个人负责赔偿', 'B. 依法使用的，由所属机关参照国家赔偿法补偿', 'C. 不需要任何处理', 'D. 只需口头向上级报告'], correct: 1, type: 'single', quizIndex: 29,
              d: '<b>A</b>：错误。警察依法履职，赔偿责任由所属机关承担，不是个人。<br><b>B</b>：正确。第15条：依法使用武器造成无辜伤亡的，由所属机关参照《国家赔偿法》给予补偿（注意是"补偿"不是"赔偿"）。<br><b>C</b>：错误。必须及时抢救、保护现场、报告。<br><b>D</b>：错误。使用武器须书面报告，口头无效。',
              t: '依法开枪误伤好人→找公安局申请补偿。违法开枪→才叫赔偿。' },
            { q: '发现犯罪分子是怀孕妇女，能否使用武器？', opts: ['A. 一律不能', 'B. 若其使用枪支实施暴力犯罪，可以', 'C. 需要上级批准', 'D. 警告无效即可'], correct: 1, type: 'single', quizIndex: 30,
              d: '<b>A</b>：错误。第10条有例外——使用枪支、爆炸、剧毒等危险物品实施暴力犯罪的除外。<br><b>B</b>：正确。怀孕妇女使用枪支实施暴力犯罪，属于例外情形，可以使用武器。<br><b>C</b>：错误。法条无此规定。<br><b>D</b>：错误。一般情形下怀孕妇女不得使用武器。',
              t: '孕妇一般不打，但她端枪扫射时——必须打！保护更多人的生命比保护她一个人更重要。' },
            { q: '应当立即停止使用武器的情形是？', opts: ['A. 犯罪分子停止犯罪但拒不服从命令', 'B. 犯罪分子停止犯罪并服从命令', 'C. 犯罪分子逃跑', 'D. 犯罪分子口头求饶'], correct: 1, type: 'single', quizIndex: 31,
              d: '<b>A</b>：错误。第11条要求"停止犯罪"和"服从命令"两个条件同时满足。<br><b>B</b>：正确。"停止犯罪+服从命令"是法定的立即停止条件。<br><b>C</b>：错误。逃跑属于继续或拒不服从，不能停止。<br><b>D</b>：错误。口头求饶不等于服从命令。',
              t: '歹徒停下来说"我不砍了"但刀还不放下——不能停！必须"停了+听话"才行。' },
            { q: '根据《人民警察法》，继续盘问的留置时间从何时起算？', opts: ['A. 从抓获时起算', 'B. 从带至公安机关之时起算', 'C. 从批准继续盘问时起算', 'D. 从进入候问室时起算'], correct: 1, type: 'single', quizIndex: 32,
              d: '<b>A</b>：错误。抓获可能在外面，起算点是"带至公安机关"。<br><b>B</b>：正确。第9条："自带至公安机关之时起"计算留置时间。<br><b>C</b>：错误。批准是后续程序，不是起算点。<br><b>D</b>：错误。进入候问室时间晚于带至公安机关时间。',
              t: '从踏进公安局大门那一刻开始计时，不是从批准盘问开始！' },
            { q: '人民警察法规定，对被盘问人的留置时间一般不超过多少小时？', opts: ['A. 8小时', 'B. 12小时', 'C. 24小时', 'D. 48小时'], correct: 2, type: 'single', quizIndex: 33,
              d: '<b>A</b>：错误。8小时是行政案件询问查证的一般时限。<br><b>B</b>：错误。12小时不是留置标准。<br><b>C</b>：正确。一般不超过24小时。<br><b>D</b>：错误。48小时是经县级以上公安机关批准延长后的最长时限。',
              t: '一般24小时，搞不完经县级公安批准可延至48小时。封顶48小时。' },
            { q: '人民警察在非工作时间遇到职责范围内的紧急情况，应如何处理？', opts: ['A. 可以不处理', 'B. 应当履行职责', 'C. 等上班后再处理', 'D. 通知同事处理'], correct: 1, type: 'single', quizIndex: 34,
              d: '<b>A</b>：错误。第19条规定非工作时间遇紧急情况"应当履行职责"。<br><b>B</b>：正确。不管上不上班，遇到职责范围内的紧急事都得管。<br><b>C</b>：错误。紧急情况不能等。<br><b>D</b>：错误。通知同事不等于自己可以不履职。',
              t: '下班了也是警察！路上看到抢劫，不能装没看见，必须上。' },
            { q: '实行交通管制的条件是？', opts: ['A. 任何扰乱秩序的行为', 'B. 严重危害社会治安秩序的行为', 'C. 日常交通拥堵', 'D. 上级领导视察'], correct: 1, type: 'single', quizIndex: 35,
              d: '<b>A</b>：错误。必须是"严重"危害社会治安秩序。<br><b>B</b>：正确。第15条：为预防和制止严重危害社会治安秩序的行为，可实行交通管制。<br><b>C</b>：错误。日常拥堵属交通管理。<br><b>D</b>：错误。领导视察不是法定事由。',
              t: '"严重"二字是关键！一般堵车不能管制交通。' },
            { q: '根据五条禁令，民警酒后驾驶机动车的，应如何处理？', opts: ['A. 警告', 'B. 纪律处分', 'C. 辞退', 'D. 记过'], correct: 2, type: 'single', quizIndex: 36,
              d: '<b>A</b>：错误。酒后驾车在五条禁令中是直接辞退。<br><b>B</b>：错误。只有①和④初始是纪律处分。<br><b>C</b>：正确。第③条：酒后驾驶机动车，违者予以辞退。<br><b>D</b>：错误。记过是行政处分的一种，不是五条禁令的直接处理。',
              t: '②③⑤=直接辞退！酒后驾车，一票否决。' },
            { q: '使用驱逐性、制服性警械的前提是什么？', opts: ['A. 上级批准', 'B. 经警告无效', 'C. 任何时候都可以', 'D. 群众同意'], correct: 1, type: 'single', quizIndex: 37,
              d: '<b>A</b>：错误。法条无此规定。<br><b>B</b>：正确。第7条明确规定"经警告无效"后方可使用。<br><b>C</b>：错误。必须符合法定情形且警告无效。<br><b>D</b>：错误。不需要群众同意。',
              t: '先喊"警察！别动！"喊了不听，才能用警棍、辣椒水。' },
            { q: '行政处分的种类不包括？', opts: ['A. 警告', 'B. 记过', 'C. 降级', 'D. 罚款'], correct: 3, type: 'single', quizIndex: 38,
              d: '<b>A</b>：包括。行政处分6种：警告、记过、记大过、降级、撤职、开除。<br><b>B</b>：包括。<br><b>C</b>：包括。<br><b>D</b>：不包括。罚款是行政处罚（针对老百姓），不是行政处分（针对警察）。',
              t: '处分给警察（警告、记过、降级、撤职、开除），罚款给违法老百姓，两码事。' },
            { q: '人民警察法规定，奖励的种类不包括？', opts: ['A. 嘉奖', 'B. 三等功', 'C. 晋升警衔', 'D. 授予荣誉称号'], correct: 2, type: 'single', quizIndex: 39,
              d: '<b>A</b>：包括。嘉奖是最低一级奖励。<br><b>B</b>：包括。三等功是第二级。<br><b>C</b>：不包括。晋升警衔属于正常职务管理，不是奖励。奖励5级：嘉奖→三等功→二等功→一等功→荣誉称号。<br><b>D</b>：包括。授予荣誉称号是最高级。',
              t: '升警衔不是奖，是正常晋升。奖励5级：嘉奖→三等→二等→一等→荣誉称号。' },
            { q: '公安机关的性质是什么？', opts: ['A. 国家行政机关', 'B. 人民民主专政的重要工具，武装性质的国家治安行政和刑事司法力量', 'C. 国家武装力量', 'D. 司法机关'], correct: 1, type: 'single', quizIndex: 40,
              d: '<b>A</b>：不完整。公安机关兼有行政和刑事司法双重属性。<br><b>B</b>：正确。公安机关性质的完整表述。<br><b>C</b>：错误。公安机关是"武装性质"但不是"武装力量"。<br><b>D</b>：错误。公安机关是"刑事司法力量"但不是"司法机关"。',
              t: '三个要点：专政工具+武装性质+治安行政&刑事司法。不是军队，不是法院检察院。' }
        ]
    },
    // ==================== 判断题30道 ====================
    {

        subtitle: '公安基础知识 · 人民警察法 · 警械武器条例',
        quizzes: [
            { q: '公安机关的根本属性是武装性质。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf1',
              d: '<b>A"正确"</b>：错误。武装性质是组织属性，不是根本属性。根本属性（阶级属性）是人民民主专政的重要工具。<br><b>B"错误"</b>：正确。题干将组织属性误说成根本属性。',
              t: '根本属性=专政工具（灵魂），组织属性=武装性质（身体）。' },
            { q: '公安工作的根本原则是坚持党对公安工作的绝对领导。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf2',
              d: '<b>A"正确"</b>：正确。坚持党对公安工作的绝对领导是公安机关安身立命的根本所在。<br><b>B"错误"</b>：错误。',
              t: '绝对领导=无条件、全面、直接。这是公安工作的最高原则。' },
            { q: '"一切依靠群众"是公安工作的宗旨和出发点。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf3',
              d: '<b>A"正确"</b>：错误。"一切为了群众"才是宗旨和出发点。"一切依靠群众"是根本态度。<br><b>B"错误"</b>：正确。',
              t: '出发点=为了群众；态度=依靠群众；方法=从群众中来到群众中去。' },
            { q: '公安机关的专政职能针对的对象包括敌对势力和严重刑事犯罪分子。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf4',
              d: '<b>A"正确"</b>：正确。专政对象就是危害国家安全的敌对势力、敌对分子和严重刑事犯罪分子。<br><b>B"错误"</b>：错误。',
              t: '专政打"敌人"——危害国家安全和严重刑事犯罪的人。' },
            { q: '公安机关是国家的武装力量。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf5',
              d: '<b>A"正确"</b>：错误。公安机关是"武装性质"的国家治安行政和刑事司法力量，但不是"武装力量"。<br><b>B"错误"</b>：正确。武装力量指解放军、武警部队和民兵。',
              t: '"武装性质"≠"武装力量"。公安有枪但不是军队。' },
            { q: '群体性事件处置中，"三个慎用"包括慎用警力、慎用武器警械、慎用强制措施。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf6',
              d: '<b>A"正确"</b>：正确。三个慎用即慎用警力、慎用武器警械、慎用强制措施。<br><b>B"错误"</b>：错误。',
              t: '三慎用口诀："人、枪、措施"都要慎用。' },
            { q: '督察机构对民警采取禁闭措施的期限为1日以上7日以下。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf7',
              d: '<b>A"正确"</b>：正确。禁闭1~7日，停止执行职务10~60日。<br><b>B"错误"</b>：错误。',
              t: '禁闭更短但更严厉——关起来反省最多7天。' },
            { q: '社会监督属于直接监督，能直接产生法律效力。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf8',
              d: '<b>A"正确"</b>：错误。社会监督是间接监督，需要转有关部门处理才能产生法律效力。<br><b>B"错误"</b>：正确。',
              t: '老百姓提意见不能直接处理警察，要转给有关部门。所以是"间接"的。' },
            { q: '县级以上公安机关正职领导职务的提名，应当事先征得上一级公安机关同意。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf9',
              d: '<b>A"正确"</b>：正确。正职=征得同意（更强硬），副职=征求意见（较温和）。<br><b>B"错误"</b>：错误。',
              t: '正职必须上级点头，副职只需问问上级。' },
            { q: '简易程序中，对违反治安管理行为人处100元以下罚款可以当场处罚。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf10',
              d: '<b>A"正确"</b>：错误。是200元以下，不是100元。<br><b>B"错误"</b>：正确。当场罚200元以下，当场收50元以下。',
              t: '当场罚和当场收是两个不同数字！罚200、收50。' },
            { q: '行政拘留处罚合并执行的，最长不超过30日。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf11',
              d: '<b>A"正确"</b>：错误。最长不超过20日，不是30日。<br><b>B"错误"</b>：正确。30日是治安案件办案期限。',
              t: '拘留"打包价"最多20天。30天是办案期限。' },
            { q: '询问查证的时间一般不超过8小时，可延长至24小时。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf12',
              d: '<b>A"正确"</b>：正确。询问查证一般8小时，案情复杂可能适用拘留的可延长至24小时。<br><b>B"错误"</b>：错误。',
              t: '询问查证8+16=24h封顶。注意区分：继续盘问是24+24=48h。' },
            { q: '行政案件转刑事案件，原行政案件中的证人证言可以直接使用。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf13',
              d: '<b>A"正确"</b>：错误。行政诉讼转刑事诉讼，证人证言、被侵害人陈述、违法行为人供述不可直接使用，需重新收集。<br><b>B"错误"</b>：正确。',
              t: '"行转刑要重来，刑转行直接用"。刑事证据标准更高。' },
            { q: '人民警察的核心价值观中，公正是法律精神、价值追求。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf14',
              d: '<b>A"正确"</b>：正确。忠诚=政治本色，为民=宗旨，公正=价值追求，廉洁=道德底线。<br><b>B"错误"</b>：错误。',
              t: '四个词各有定位：忠诚是根，为民是本，公正是魂，廉洁是基。' },
            { q: '治安案件办案期限自受理之日起一般不超过30日，可延长30日。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf15',
              d: '<b>A"正确"</b>：正确。30天基础期+30天延长期=60天封顶，鉴定期间不计入。<br><b>B"错误"</b>：错误。',
              t: '30+30=60天封顶。鉴定时间在外。' },
            { q: '特种防暴枪属于武器。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf16',
              d: '<b>A"正确"</b>：错误。特种防暴枪属于驱逐性、制服性警械，不是致命性武器。<br><b>B"错误"</b>：正确。',
              t: '带"枪"字的不一定都是武器！特种防暴枪是警械。' },
            { q: '人民警察使用警械和武器，应当以制止违法犯罪行为为原则，尽量减少人员伤亡和财产损失。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf17',
              d: '<b>A"正确"</b>：正确。条例第4条原文，是贯穿整个条例的核心原则。<br><b>B"错误"</b>：错误。',
              t: '第4条是"灵魂条款"：目的是制止，过程中要尽量少伤人。' },
            { q: '人民警察使用武器前必须鸣枪示警。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf18',
              d: '<b>A"正确"</b>：错误。法条只规定"经警告无效"，未规定警告的具体方式，不一定是鸣枪示警。<br><b>B"错误"</b>：正确。口头警告也是警告。',
              t: '警告可以是口头喊话，不一定非要朝天开枪。' },
            { q: '发现实施犯罪的人为怀孕妇女，人民警察在任何情况下都不得对其使用武器。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf19',
              d: '<b>A"正确"</b>：错误。使用枪支、爆炸、剧毒等危险物品实施暴力犯罪的除外。<br><b>B"错误"</b>：正确。"任何情况"太绝对。',
              t: '孕妇一般不打，但拿枪扫射时可以打。' },
            { q: '犯罪分子停止实施犯罪并服从人民警察命令的，应当立即停止使用武器。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf20',

            { q: '人民警察使用武器后，应当将使用武器的情况口头向所属机关报告即可。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf21',

              t: '开枪了必须写书面报告，口头说一声不算数。' },
            { q: '人民警察依法使用警械、武器造成无辜人员伤亡的，由该人民警察所属机关依照《国家赔偿法》给予赔偿。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf22',
              d: '<b>A"正确"</b>：错误。依法使用是"参照"和"补偿"，不是"依照"和"赔偿"。<br><b>B"错误"</b>：正确。',

            { q: '根据五条禁令，民警携带枪支饮酒的，予以纪律处分。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf23',
              d: '<b>A"正确"</b>：错误。五条禁令第②条：携带枪支饮酒，予以辞退，不是纪律处分。<br><b>B"错误"</b>：正确。',
              t: '枪+酒=直接辞退！②③⑤都是直接辞退。' },
            { q: '人民警察在非工作时间遇其职责范围内的紧急情况，可以不履行职责。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf24',
              d: '<b>A"正确"</b>：错误。第19条：非工作时间遇紧急情况应当履行职责。<br><b>B"错误"</b>：正确。',
              t: '下班了也是警察！路上看到抢劫不能装没看见。' },
            { q: '人民警察依法使用武器的行为受法律保护。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf25',
              d: '<b>A"正确"</b>：正确。第5条：依法使用警械武器的行为受法律保护。<br><b>B"错误"</b>：错误。注意：必须有"依法"二字，去掉"依法"就错。',
              t: '"依法"二字是前提。没"依法"就不受保护。' },
            { q: '严肃与谨慎相结合政策的总精神是"不枉不纵"。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf26',
              d: '<b>A"正确"</b>：正确。不冤枉一个好人，不放过一个坏人。<br><b>B"错误"</b>：错误。',
              t: '严肃=该抓就抓，谨慎=别抓错，合起来=不枉不纵。' },
            { q: '晋升警衔属于人民警察奖励的一种。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf27',
              d: '<b>A"正确"</b>：错误。晋升警衔是正常职务管理，不属于奖励。奖励5级：嘉奖→三等功→二等功→一等功→荣誉称号。<br><b>B"错误"</b>：正确。',
              t: '升警衔不是奖，是正常晋升。' },
            { q: '人民警察使用警械和武器前，应当命令在场无关人员躲避。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf28',
              d: '<b>A"正确"</b>：正确。第6条：使用前应当命令在场无关人员躲避。<br><b>B"错误"</b>：错误。',
              t: '开枪前先喊"无关人员躲开"，怕误伤。' },
            { q: '公安机关的民主职能的实质是保障人民享有国家主人翁地位。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf29',
              d: '<b>A"正确"</b>：正确。民主职能就是保障人民当家作主的权利。<br><b>B"错误"</b>：错误。',
              t: '专政=打敌人，民主=让人民当家作主。' },
            { q: '公安工作的基本方针是党委领导下的专门机关与广大群众相结合。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf30',
              d: '<b>A"正确"</b>：正确。专群结合是公安工作的基本方针。<br><b>B"错误"</b>：错误。',

            { q: '公安机关的基本任务包括？', opts: ['A. 维护国家安全', 'B. 维护社会治安秩序', 'C. 保护公民人身安全', 'D. 保护公共财产', 'E. 预防、制止和惩治违法犯罪'], correct: [0,1,2,3,4], type: 'multi', multi: true, quizIndex: '多3',
              d: '<b>A</b>：正确。维护国家安全是首要任务。<br><b>B</b>：正确。<br><b>C</b>：正确。保护公民人身安全和人身自由。<br><b>D</b>：正确。保护公共财产和公民合法财产。<br><b>E</b>：正确。事前预防→事中制止→事后惩治。',
              t: '五大任务全选！国家安全是首要，其他四项并列重要。' },
            { q: '公安工作的基本政策包括？', opts: ['A. 严肃与谨慎相结合', 'B. 惩办与宽大相结合（宽严相济）', 'C. 依法从重从快惩处严重刑事犯罪分子', 'D. 重证据重调查研究严禁刑讯逼供', 'E. 教育与惩罚相结合'], correct: [0,1,2,3,4], type: 'multi', multi: true, quizIndex: '多4',
              d: '<b>A</b>：正确。适用于刑事领域，总精神=不枉不纵。<br><b>B</b>：正确。宽严相济，认罪认罚从宽。<br><b>C</b>：正确。针对严重刑事犯罪。<br><b>D</b>：正确。所有执法机关必须遵守。<br><b>E</b>：正确。适用于治安管理，教育是基本手段。',

            { q: '人民警察职业道德规范包括？', opts: ['A. 忠诚可靠', 'B. 秉公执法', 'C. 热诚服务', 'D. 文明理性', 'E. 清正廉洁'], correct: [0,1,2,3,4], type: 'multi', multi: true, quizIndex: '多5',
              d: '<b>A</b>：正确。“听党指挥，热爱人民，忠于法律”。<br><b>B</b>：正确。“事实为据，秉持公正，惩恶扬善”。<br><b>C</b>：正确。“情系民生，服务社会，热情周到”。<br><b>D</b>：正确。“理性平和，文明礼貌，诚信友善”。<br><b>E</b>：正确。“艰苦朴素，情趣健康，克己奉公”。',

            { q: '根据五条禁令，下列哪些行为直接予以辞退？', opts: ['A. 携带枪支饮酒', 'B. 酒后驾驶机动车', 'C. 参与赌博', 'D. 违反枪支管理使用规定', 'E. 工作时间饮酒'], correct: [0,1,2], type: 'multi', multi: true, quizIndex: '多6',
              d: '<b>A</b>：正确。②携带枪支饮酒=直接辞退。<br><b>B</b>：正确。③酒后驾驶机动车=直接辞退。<br><b>C</b>：正确。⑤参与赌博=直接辞退。<br><b>D</b>：错误。①初始是纪律处分，造成严重后果才辞退或开除。<br><b>E</b>：错误。④初始是纪律处分，造成严重后果才辞退或开除。',
              t: '②③⑤=直接辞退（枪酒、车酒、赌博）。①④=先处分再升级。' },
            { q: '下列哪些属于“警械”？', opts: ['A. 警棍', 'B. 催泪弹', 'C. 枪支', 'D. 手铐', 'E. 弹药'], correct: [0,1,3], type: 'multi', multi: true, quizIndex: '多7',
              d: '<b>A</b>：正确。警棍是典型的驱逐性警械。<br><b>B</b>：正确。催泪弹属于驱逐性、制服性警械。<br><b>C</b>：错误。枪支是致命性武器。<br><b>D</b>：正确。手铐是约束性警械。<br><b>E</b>：错误。弹药属于武器。',
              t: '警械=非致命（警棍、辣椒水、手铐）；武器=致命（枪支、弹药）。' },
            { q: '根据条例第7条，经警告无效可以使用驱逐性、制服性警械的情形包括？', opts: ['A. 结伙斗殴', 'B. 非法举行集会游行示威', 'C. 劫持航空器', 'D. 袭击人民警察', 'E. 聚众扰乱车站秩序'], correct: [0,1,3,4], type: 'multi', multi: true, quizIndex: '多8',
              d: '<b>A</b>：正确。第7条第(一)项。<br><b>B</b>：正确。第7条第(三)项。<br><b>C</b>：错误。劫持航空器属于第9条使用武器的情形。<br><b>D</b>：正确。第7条第(六)项。<br><b>E</b>：正确。第7条第(二)项。',
              t: '注意C劫机是武器情形，不要混到警械里。' },
            { q: '根据条例第9条，经警告无效可以使用武器的情形包括？', opts: ['A. 放火严重危害公共安全', 'B. 劫持航空器', 'C. 非法集会游行示威', 'D. 实施凶杀危及公民生命安全', 'E. 结伙抢劫公私财物'], correct: [0,1,3,4], type: 'multi', multi: true, quizIndex: '多9',
              d: '<b>A</b>：正确。第9条第(一)项。<br><b>B</b>：正确。第9条第(二)项。<br><b>C</b>：错误。非法集会游行适用警械，不适用武器。<br><b>D</b>：正确。第9条第(六)项。<br><b>E</b>：正确。第9条第(八)项。',
              t: '武器针对“要命”的暴力犯罪：放火、劫机、杀人、抢劫等。' },
            { q: '人民警察使用武器后，应当做哪些处理？', opts: ['A. 及时抢救受伤人员', 'B. 保护现场', 'C. 立即向当地公安机关或所属机关报告', 'D. 将使用武器情况书面报告所属机关', 'E. 等待上级指示再行动'], correct: [0,1,2,3], type: 'multi', multi: true, quizIndex: '多10',
              d: '<b>A</b>：正确。包括犯罪分子和无辜人员。<br><b>B</b>：正确。<br><b>C</b>：正确。是“立即”报告。<br><b>D</b>：正确。必须书面报告，口头无效。<br><b>E</b>：错误。不能等，应当立即采取行动。',

              d: '<b>A</b>：错误。需“停止+服从”两个条件同时满足。<br><b>B</b>：正确。第11条第(一)项。<br><b>C</b>：正确。第11条第(二)项。<br><b>D</b>：错误。不放下武器=不服从命令。<br><b>E</b>：错误。逃跑=不服从命令。',

            { q: '根据条例不得使用武器的情形包括？', opts: ['A. 犯罪分子在人群密集的广场', 'B. 怀孕妇女使用枪支实施暴力犯罪', 'C. 犯罪分子在存放大量易燃易爆物品的仓库', 'D. 儿童持刀威胁他人（非枪支爆炸剧毒）', 'E. 犯罪分子处于群众聚集场所且不使用武器将发生更严重后果'], correct: [0,2,3], type: 'multi', multi: true, quizIndex: '多12',
              d: '<b>A</b>：正确。群众聚集场所不得使用武器（除非有例外）。<br><b>B</b>：错误。怀孕妇女使用枪支暴力犯罪属于例外，可以使用武器。<br><b>C</b>：正确。存放易燃易爆场所不得使用武器。<br><b>D</b>：正确。儿童使用非危险物品犯罪，不得使用武器。<br><b>E</b>：错误。“不使用武器将发生更严重后果”是例外，此种情况下可以使用武器。',
              t: '人多、危险品多的地方一般不能开枪，除非不开枪更惨。孕妇、儿童一般不打，除非拿枪扫射。' },
            { q: '关于继续盘问，下列说法正确的有？', opts: ['A. 留置时间一般不超过24小时', 'B. 经县级以上公安机关批准可延长至48小时', 'C. 批准延长后应当立即通知家属', 'D. 从批准继续盘问时起算留置时间', 'E. 不批准继续盘问的应当立即释放'], correct: [0,1,2,4], type: 'multi', multi: true, quizIndex: '多13',
              d: '<b>A</b>：正确。<br><b>B</b>：正确。注意是“延长至”，不是“延长”。<br><b>C</b>：正确。“立即”不是“及时”。<br><b>D</b>：错误。从“带至公安机关之时”起算，不是从批准时。<br><b>E</b>：正确。',

              d: '<b>A</b>：正确。第32条：必须执行。<br><b>B</b>：正确。<br><b>C</b>：正确。<br><b>D</b>：错误。执行后果由作出决定的上级负责，执行民警不承担责任。<br><b>E</b>：正确。第33条。',
              t: '必须服从命令，责任上级担。违法命令（刑讯逼供等）有权拒绝。' },
            { q: '下列哪些属于公安机关的职责？', opts: ['A. 侦查刑事案件', 'B. 维护交通安全处理交通事故', 'C. 组织实施消防工作', 'D. 管理外国人在中国境内居留事务', 'E. 执行拘役刑罚'], correct: [0,1,3,4], type: 'multi', multi: true, quizIndex: '多15',
              d: '<b>A</b>：正确。<br><b>B</b>：正确。交警职责。<br><b>C</b>：错误。2018年消防工作已划归应急管理部门。<br><b>D</b>：正确。管理外国人居留事务。<br><b>E</b>：正确。公安机关负责执行拘役。',

              d: '<b>A</b>：正确。第22条明确禁止。<br><b>B</b>：正确。<br><b>C</b>：正确。注意：合法的集会游行示威是权利，但“旨在反对国家”的非法集会不得参加。<br><b>D</b>：正确。<br><b>E</b>：正确。',
              t: '五项全选。第22条列举了12类禁止行为，这些都是其中典型。' },
            { q: '关于警械的使用，下列说法正确的有？', opts: ['A. 使用驱逐性警械需经警告无效', 'B. 约束性警械不得故意造成人身伤害', 'C. 违法犯罪行为得到制止后应立即停止使用警械', 'D. 警械可以随意使用', 'E. 警械使用以制止违法犯罪为限度'], correct: [0,1,2,4], type: 'multi', multi: true, quizIndex: '多17',
              d: '<b>A</b>：正确。第7条明文规定。<br><b>B</b>：正确。第8条规定不得故意造成人身伤害。<br><b>C</b>：正确。达到目的就停。<br><b>D</b>：错误。必须符合法定情形且警告无效。<br><b>E</b>：正确。使用限度。',
              t: '警械不是随便用的，要符合情形、警告无效、达到目的就停。' },

              d: '<b>A</b>：正确。奖励5级。<br><b>B</b>：错误。晋升警衔是正常职务管理，不是奖励。<br><b>C</b>：正确。<br><b>D</b>：正确。协助的公民也可获得奖励。<br><b>E</b>：正确。可给予一定的物质奖励。',
              t: '升警衔不等于奖励。老百姓帮了警察也可以被奖励。' },
            { q: '人民警察使用武器造成伤亡后，接到报告的机关应如何处理？', opts: ['A. 及时勘验调查', 'B. 及时通知当地人民检察院', 'C. 及时通知伤亡人员家属', 'D. 立即开除使用武器的民警', 'E. 等待上级指示再处理'], correct: [0,1,2], type: 'multi', multi: true, quizIndex: '多19',
              d: '<b>A</b>：正确。第12条：接到报告后及时勘验调查。<br><b>B</b>：正确。检察院是法律监督机关，必须通知。<br><b>C</b>：正确。及时通知家属或单位。<br><b>D</b>：错误。依法使用不会开除。<br><b>E</b>：错误。应及时处理，不能等。',

<script>

function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}
function renderQuiz(q,qid){var qTypeLabel=q.multi?'【多选题】':'【单选题】';var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else if(q.tfId){h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div><ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div><div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.d){var detailHtml=q.d;detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(正确)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(错误)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.t+'</div></div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 综合练习90题 · 目录</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
