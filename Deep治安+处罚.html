                    { type: 'single', q: '当场收缴罚款的，执法人员应当自收缴罚款之日起几日内交至行政机关？', opts: ['A. 当日', 'B. 2日', 'C. 5日', 'D. 7日'], correct: 1, explain: '正确答案是<b>B</b>。', tip: '2日内上缴。水上当场收缴的，自抵岸之日起2日内。行政机关收到后也要在2日内缴付银行。钱不能在自己口袋里放太久！' },
                    { type: 'single', q: '对治安管理处罚决定不服的，被处罚人可以向哪个机关申请行政复议？', opts: ['A. 作出决定的公安机关', 'B. 上一级公安机关或本级政府', 'C. 人民法院', 'D. 人民检察院'], correct: 1, explain: '正确答案是<b>B</b>。', tip: '行政复议找上级机关或本级政府，行政诉讼找法院。复议和诉讼是两条不同的救济途径，当事人二选一或在复议后再诉讼。' },
                    { type: 'single', q: '行政处罚中"不予处罚"和"免予处罚"的区别是？', opts: ['A. 没有区别', 'B. 不予处罚是违法事实不成立，免予处罚是成立但不罚', 'C. 不予处罚适用于未成年人，免予处罚适用于精神病人', 'D. 免予处罚比不予处罚更严重'], correct: 1, explain: '正确答案是<b>B</b>。', tip: '不予处罚=你根本就没违法或违法事实不成立。免予处罚=你确实违法了，但因为特殊情况（如轻微+悔改）放你一马。一个是不该罚，一个是该罚但不罚了。' },
                    { type: 'single', q: '在边远、交通不便地区，当事人缴纳罚款确有困难的，可以？', opts: ['A. 拒绝缴纳', 'B. 经当事人提出，当场收缴', 'C. 由执法人员自行决定当场收缴', 'D. 必须到银行缴纳'], correct: 1, explain: '正确答案是<b>B</b>。', tip: '特殊地区+确有困难+当事人主动提出=可以当场收缴。注意必须当事人自己提出来，执法人员不能主动要求。体现了便民原则。' },
                    { type: 'single', q: '间歇性精神病人在精神正常时违反治安管理的，应如何处理？', opts: ['A. 不予处罚', 'B. 可以从轻处罚', 'C. 应当给予处罚', 'D. 由监护人承担全部责任'], correct: 2, explain: '正确答案是<b>C</b>。', tip: '犯病时不罚，正常时罚。判断标准是行为时的精神状态，不是平时的状态。所以间歇性精神病人正常时违法，跟普通人一样处理。' },
                    { type: 'single', q: '行政处罚的听证程序中，主持人由谁担任？', opts: ['A. 本案调查人员', 'B. 行政机关负责人', 'C. 与本案无关的非调查人员', 'D. 当事人推荐的人选'], correct: 2, explain: '正确答案是<b>C</b>。', tip: '听证主持人必须是案外人。调查人员已经形成判断了，让他主持听证等于"既当运动员又当裁判"。所以必须由与案件无关的人主持。' },
                    { type: 'single', q: '醉酒的人违反治安管理的，应如何处理？', opts: ['A. 不予处罚', 'B. 从轻处罚', 'C. 应当给予处罚', 'D. 等酒醒后再说'], correct: 2, explain: '正确答案是<b>C</b>。', tip: '醉酒不是免责金牌！喝多了闹事照样罚。醉酒状态有危险的，可以先约束至酒醒，但酒醒后该罚还是要罚。酒后无德，自己负责。' },
                    { type: 'single', q: '行政拘留的暂缓执行，担保方式包括？', opts: ['A. 只能提供担保人', 'B. 只能缴纳保证金', 'C. 提供担保人或按每日200元标准缴纳保证金，二选一', 'D. 同时提供担保人和缴纳保证金'], correct: 2, explain: '正确答案是<b>C</b>。', tip: '二选一即可。要么找人担保，要么交钱（每天200元）。比如拘留10天，交2000元保证金即可暂缓执行。等复议或诉讼完了再决定是否真正执行。' },
                    { type: 'single', q: '行政处罚决定书未送达当事人的，该处罚决定效力如何？', opts: ['A. 自动生效', 'B. 经公告后生效', 'C. 不成立', 'D. 在复议期限届满后生效'], correct: 2, explain: '正确答案是<b>C</b>。', tip: '没送达=不成立。当事人连自己被罚了都不知道，这个处罚怎么能算有效？送达是行政程序的重要环节，不能省略。' }
                ];

                const multiQuizzes = [
                    { type: 'multi', q: '以下哪些属于行政处罚的法定种类？（多选）', opts: ['A. 警告', 'B. 通报批评', 'C. 罚款', 'D. 罚金', 'E. 拘役'], correct: [0,1,2], multi: true, explain: '正确答案是<b>A、B、C</b>。', tip: 'D罚金和E拘役是刑罚，不是行政处罚。虽然名字里都有"罚"，但性质完全不同。行政处罚是行政机关给的，刑罚是法院判的。' },
                    { type: 'multi', q: '关于行政处罚的设定权，以下说法正确的有？（多选）', opts: ['A. 法律可以设定所有种类的行政处罚', 'B. 行政法规可以设定行政拘留', 'C. 地方性法规可以设定吊销企业营业执照', 'D. 规章可以设定警告和通报批评', 'E. 限制人身自由的行政处罚只能由法律设定'], correct: [0,3,4], multi: true, explain: '正确答案是<b>A、D、E</b>。', tip: 'B错，行政法规不能设定行政拘留（限制人身自由只能法律设定）。C错，地方性法规不能设定吊销企业营业执照（只能暂扣）。A、D、E都是正确的。' },
                    { type: 'multi', q: '简易程序的适用条件包括哪些？（多选）', opts: ['A. 违法事实确凿', 'B. 对公民处以200元以下罚款', 'C. 对法人处以3000元以下罚款', 'D. 当事人同意', 'E. 有法定依据'], correct: [0,1,2,4], multi: true, explain: '正确答案是<b>A、B、C、E</b>。', tip: 'D不需要当事人同意——简易程序是行政机关依职权决定的，不以当事人同意为前提。其他四项都是法定的适用条件。' },
                    { type: 'multi', q: '行政拘留不执行的情形包括？（多选）', opts: ['A. 已满14不满16周岁', 'B. 已满16不满18周岁初次违反', 'C. 70周岁以上', 'D. 正在哺乳自己不满2周岁婴儿的妇女', 'E. 怀孕的妇女'], correct: [0,1,2,4], multi: true, explain: '正确答案是<b>A、B、C、E</b>。', tip: 'D错误——哺乳期限制为"不满1周岁"，不是2周岁。口诀："太小（14-16）、太初（16-18+初次）、太老（70+）、孕妇+哺乳（1岁内）"。' },
                    { type: 'multi', q: '以下哪些属于应告知听证权利的情形？（多选）', opts: ['A. 较大数额罚款', 'B. 降低资质等级', 'C. 行政拘留', 'D. 吊销许可证件', 'E. 责令停产停业'], correct: [0,1,3,4], multi: true, explain: '正确答案是<b>A、B、D、E</b>。', tip: 'C行政拘留不适用听证（防逃跑）。其他都是"重罚"，必须告知当事人有申请听证的权利。记住：听证针对的是"重罚"，但拘留虽重却不听证。' },
                    { type: 'multi', q: '行政处罚证据的种类包括？（多选）', opts: ['A. 书证', 'B. 物证', 'C. 视听资料', 'D. 证人证言', 'E. 当事人的陈述'], correct: [0,1,2,3,4], multi: true, explain: '正确答案是<b>全部</b>。', tip: '行政处罚证据种类与刑事诉讼基本一致，包括书证、物证、视听资料、电子数据、证人证言、当事人陈述、鉴定意见、勘验笔录、现场笔录。注意："犯罪嫌疑人供述"是刑事诉讼的说法，行政处罚中用"当事人的陈述"。' },
                    { type: 'multi', q: '以下哪些属于不予处罚的情形？（多选）', opts: ['A. 不满14周岁', 'B. 精神病人不能辨认或控制行为', 'C. 违法行为轻微及时纠正无危害后果', 'D. 已满14不满18周岁', 'E. 受他人胁迫'], correct: [0,1,2], multi: true, explain: '正确答案是<b>A、B、C</b>。', tip: 'D是从轻减轻情形，不是不予处罚。E也是从轻减轻情形。只有A、B、C是真的不罚。14岁以上就要负责，被胁迫只是减轻，不是免责。' },
                    { type: 'multi', q: '以下关于当场收缴罚款，说法正确的有？（多选）', opts: ['A. 当场收缴必须出具省级以上财政部门统一制发的票据', 'B. 县级财政部门制发的票据也可以', 'C. 不出具合法票据的，当事人有权拒绝缴纳', 'D. 所有罚款都可以当场收缴', 'E. 100元以下罚款可以当场收缴'], correct: [0,2,4], multi: true, explain: '正确答案是<b>A、C、E</b>。', tip: 'B错，县级票据不行，必须是省级以上。D错，不是所有罚款都能当场收缴，有严格条件限制。A、C、E正确——票据要合规，不合规可拒缴，100元以下可当场收。' },
                    { type: 'multi', q: '行政处罚的管辖规则包括？（多选）', opts: ['A. 级别管辖', 'B. 地域管辖', 'C. 指定管辖', 'D. 专属管辖', 'E. 协议管辖'], correct: [0,1,2], multi: true, explain: '正确答案是<b>A、B、C</b>。', tip: '行政处罚只有三种管辖：级别管辖（县级还是市级）、地域管辖（哪个地方的机关）、指定管辖（有争议时上级指定）。专属管辖和协议管辖是民事诉讼的概念，行政法里没有。' },
                    { type: 'multi', q: '根据《治安管理处罚法》，以下哪些行为属于妨害社会管理？（多选）', opts: ['A. 吸毒', 'B. 容留他人吸毒', 'C. 盗窃窨井盖', 'D. 将房屋出租给无身份证件的人', 'E. 在公共场所起哄闹事'], correct: [0,3], multi: true, explain: '正确答案是<b>A、D</b>。', tip: 'B容留他人吸毒是犯罪（刑事），不是治安行为。C盗窃窨井盖是侵犯财产权利。E是扰乱公共秩序。A吸毒和D出租屋不登记都属于妨害社会管理。' }
                ];

                // 将判断题转换为统一格式
                const tfConverted = tfQuizzes.map((q, i) => ({
                    ...q,
                    type: 'single', // 判断也用单选UI
                    opts: ['✅ 正确', '❌ 错误'],
                    correct: q.correct ? 0 : 1,
                    explain: q.explain,
                    tip: q.tip,
                    isTF: true,
                    tfId: 'tf' + (i + 1)
                }));

                return [...tfConverted, ...singleQuizzes, ...multiQuizzes];
            })()
        });

        // ==================== 渲染引擎 ====================
        function renderAll() {
            const main = document.getElementById('mainContent');
            let html = '';
            knowledgeData.forEach(mod => {
                html +=
                    `<div class="card" id="${mod.id}"><div class="section-title"><div class="icon ${mod.iconClass}">${mod.iconEmoji}</div>${mod.title}</div>`;
                if (mod.subtitle) html += `<div class="subtitle">${mod.subtitle}</div>`;
                if (mod.items && mod.items.length > 0) {
                    html += '<div class="ki-grid">';
                    mod.items.forEach(item => {
                        if (item.type === 'table') html += item.html;
                        else if (item.type === 'ki') html += renderKI(item);
                    });
                    html += '</div>';
                }
                if (mod.quizzes && mod.quizzes.length > 0) {
                    mod.quizzes.forEach((q, qi) => {
                        html += renderQuiz(q, mod.id + '-q' + qi);
                    });
                }
                html += '</div>';
            });
            main.innerHTML = html;
        }

        function renderKI(item) {
            let h = '<div class="ki-item">';
            h +=
                `<div class="ki-title-row">${item.badge?`<span class="badge ${item.badgeClass}">${item.badge}</span>`:''}${item.title}</div>`;
            h += `<div class="ki-content">${item.content}</div>`;
            if (item.extra) h += `<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">${item.extra}</div>`;
            if (item.example) {
                h +=
                    `<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">${item.example.q}</div><div class="ex-a">${item.example.a}</div></div>`;
            }
            h += '</div>';
            return h;
        }

        function renderQuiz(q, qid) {
            const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
            const qTypeLabel = q.multi ? '【多选题】' : '【单选题】';
            let h = `<div class="quiz-wrap" data-qid="${qid}">`;
            h += `<div class="q-type">📝 ${qTypeLabel}</div>`;
            h += `<div class="q-text">${q.q}</div>`;
            h += '<ul class="opt-list">';
            q.opts.forEach((opt, i) => {
                h +=
                    `<li data-idx="${i}" onclick="selectOpt(this,'${qid}',${i},${q.multi||false})">${opt}</li>`;
            });
            h += '</ul>';
            h +=
                `<div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz('${qid}',${JSON.stringify(q.correct)},${q.multi||false})">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz('${qid}')">🔄 重做</button></div>`;
            h +=
                `<div class="explain-card" id="ex-${qid}"><div class="ex-head"></div><div class="ex-body"></div><div class="ex-tip">💡 <b>大白话理解：</b>${q.tip}</div></div>`;
            h += '</div>';
            return h;
        }

        // ==================== 答题交互 ====================
        const selections = {};

        function selectOpt(el, qid, idx, multi) {
            const wrap = el.closest('.quiz-wrap');
            if (wrap.classList.contains('submitted')) return;
            const allOpts = wrap.querySelectorAll('.opt-list li');
            if (multi) {
                el.classList.toggle('selected');
            } else {
                allOpts.forEach(o => o.classList.remove('selected'));
                el.classList.add('selected');
            }
        }

        function submitQuiz(qid, correct, multi) {
            const wrap = document.querySelector(`[data-qid="${qid}"]`);
            if (wrap.classList.contains('submitted')) return;
            wrap.classList.add('submitted');
            const allOpts = wrap.querySelectorAll('.opt-list li');
            const correctArr = Array.isArray(correct) ? correct : [correct];
            let selectedIdxs = [];
            allOpts.forEach((o, i) => { if (o.classList.contains('selected')) selectedIdxs.push(i); });
            const isCorrect = multi ?
                (selectedIdxs.length === correctArr.length && selectedIdxs.every(s => correctArr.includes(s))) :
                (selectedIdxs.length === 1 && selectedIdxs[0] === correctArr[0]);

            allOpts.forEach((o, i) => {
                o.classList.add('disabled');
                if (correctArr.includes(i)) o.classList.add('correct');
            });
            if (!isCorrect) {
                selectedIdxs.forEach(i => { if (!correctArr.includes(i)) allOpts[i].classList.add(
                        'wrong'); });
            }

            const exEl = document.getElementById('ex-' + qid);
            exEl.classList.add('show');
            if (isCorrect) {
                exEl.classList.add('correct-ex');
                exEl.classList.remove('wrong-ex');
                exEl.querySelector('.ex-head').textContent = '🎉 回答正确！';
                exEl.querySelector('.ex-body').textContent = '';
            } else {
                exEl.classList.add('wrong-ex');
                exEl.classList.remove('correct-ex');
                exEl.querySelector('.ex-head').textContent = '😞 回答错误';
                const correctLetters = correctArr.map(c => ['A', 'B', 'C', 'D', 'E', 'F'][c]).join('、');
                exEl.querySelector('.ex-body').innerHTML = `正确答案是：<b>${correctLetters}</b>`;
            }
        }

        function resetQuiz(qid) {
            const wrap = document.querySelector(`[data-qid="${qid}"]`);
            wrap.classList.remove('submitted');
            wrap.querySelectorAll('.opt-list li').forEach(o => {
                o.classList.remove('selected', 'correct', 'wrong', 'disabled');
            });
            const exEl = document.getElementById('ex-' + qid);
            exEl.classList.remove('show', 'correct-ex', 'wrong-ex');
        }

        // ==================== 启动 ====================
        document.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
</html>
