                  detail: '<b>A选项</b>：违法。禁止指定购买。<br><b>B选项</b>：违法。格式文本免费。<br><b>C选项</b>：违法。全部上缴国库。<br><b>D选项</b>：违法。不得要求无关材料。<br><b>E选项</b>：合法。一次性告知是义务。',
                  tip: 'E是唯一合法的。其他都是常见的违法行为：要人买东西、收格式费、截留钱、要无关材料——统统不行。' },
                { type: 'multi', q: '关于行政许可的变更与延续，以下说法正确的有？', opts: ['A. 变更应向原许可机关申请', 'B. 延续应在有效期届满30日前申请', 'C. 逾期未作决定视为不准予延续', 'D. 变更需符合法定条件', 'E. 期满未申请延续应注销'], correct: [0,1,3,4], multi: true,
                  detail: '<b>A选项</b>：正确。变更找原机关。<br><b>B选项</b>：正确。30日前申请。<br><b>C选项</b>：错误。逾期未决定视为<b>准予</b>延续。<br><b>D选项</b>：正确。变更也需符合条件。<br><b>E选项</b>：正确。到期不续→注销。',
                  tip: 'C说反了！行政机关逾期没回复=默认同意延续，不是默认拒绝。这是保护被许可人的制度。' },
                { type: 'multi', q: '地方性法规和省级政府规章在设定行政许可时，不得？', opts: ['A. 设定国家统一确定的资格许可', 'B. 设定企业设立登记', 'C. 限制外地商品进入本地市场', 'D. 对行政法规设定的许可作具体规定', 'E. 限制外地企业来本地经营'], correct: [0,1,2,4], multi: true,
                  detail: '<b>A选项</b>：不得。国家统一资格。<br><b>B选项</b>：不得。企业设立登记。<br><b>C选项</b>：不得。禁止地方保护。<br><b>D选项</b>：可以做具体规定。<br><b>E选项</b>：不得。限制外来经营。',
                  tip: 'D是唯一可以的——地方可以对上级的许可做细化规定，但不能增设。其他四个都是禁止事项：统一资格、企业登记、地方保护。' }
            ];

            // 转换判断题为统一格式
            const tfConverted = tfQuizzes.map((q, i) => ({
                ...q,
                type: 'single',
                opts: ['✅ 正确', '❌ 错误'],
                correct: q.correct ? 0 : 1,
                isTF: true,
                tfId: 'tf' + (i + 1)
            }));

            return [...tfConverted, ...singleQuizzes, ...multiQuizzes];
        })()
    }
];



// ==================== 渲染引擎 ====================
function renderAll() {
    var main = document.getElementById('mainContent');
    var html = '';
    knowledgeData.forEach(function(mod) {
        html += '<div class="card" id="' + mod.id + '"><div class="section-title"><div class="icon ' + mod.iconClass + '">' + mod.iconEmoji + '</div>' + mod.title + '</div>';
        if (mod.subtitle) html += '<div class="subtitle">' + mod.subtitle + '</div>';
        if (mod.items && mod.items.length > 0) {
            html += '<div class="ki-grid">';
            mod.items.forEach(function(item) {
                if (item.type === 'table') html += item.html;
                else if (item.type === 'ki') html += renderKI(item);
            });
            html += '</div>';
        }
        if (mod.quizzes && mod.quizzes.length > 0) {
            mod.quizzes.forEach(function(q, qi) {
                html += renderQuiz(q, mod.id + '-q' + qi);
            });
        }
        html += '</div>';
    });
    main.innerHTML = html;
    generateTOC();
}

function renderKI(item) {
    var h = '<div class="ki-item">';
    h += '<div class="ki-title-row">' + (item.badge ? '<span class="badge ' + (item.badgeClass || 'badge-num') + '">' + item.badge + '</span>' : '') + item.title + '</div>';
    h += '<div class="ki-content">' + item.content + '</div>';
    if (item.extra) h += '<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">' + item.extra + '</div>';
    if (item.example) {
        h += '<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">' + item.example.q + '</div><div class="ex-a">' + item.example.a + '</div></div>';
    }
    h += '</div>';
    return h;
}

function renderQuiz(q, qid) {
    var qTypeLabel = q.isTF ? '【判断题】' : (q.multi ? '【多选题】' : '【单选题】');
    var h = '<div class="quiz-wrap" data-qid="' + qid + '">';
    h += '<div class="q-type">📝 ' + qTypeLabel + '</div>';
    if (q.quizIndex) {
        h += '<div style="font-size:0.78rem;color:#b7950b;">第' + q.quizIndex + '题</div>';
    } else if (q.tfId) {
        h += '<div style="font-size:0.78rem;color:#b7950b;">' + q.tfId + '</div>';
    }
    h += '<div class="q-text">' + q.q + '</div>';
    h += '<ul class="opt-list">';
    for (var i = 0; i < q.opts.length; i++) {
        h += '<li data-idx="' + i + '" onclick="selectOpt(this,\'' + qid + '\',' + i + ',' + (q.multi || false) + ')">' + q.opts[i] + '</li>';
    }
    h += '</ul>';
    h += '<div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\'' + qid + '\',' + JSON.stringify(q.correct) + ',' + (q.multi || false) + ')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\'' + qid + '\')">🔄 重做</button></div>';
    h += '<div class="explain-card" id="ex-' + qid + '">';
    h += '<div class="ex-head"></div>';
    h += '<div class="ex-body"></div>';
    if (q.detail) {
        var detailHtml = q.detail
            // === 判断题特殊格式 ===
            .replace(/([A-B])选项"正确"<\/b>：正确/g, '$1选项</b>：<span style="color:#145a32;">✅ 正确</span>')
            .replace(/([A-B])选项"错误"<\/b>：错误/g, '$1选项</b>：<span style="color:#b22222;">❌ 错误</span>')
            .replace(/([A-B])选项"正确"<\/b>：错误/g, '$1选项</b>：<span style="color:#b22222;">❌ 错误</span>')
            .replace(/([A-B])选项"错误"<\/b>：正确/g, '$1选项</b>：<span style="color:#145a32;">✅ 正确</span>')
            // === 通用正确类 ===
            .replace(/([A-E])选项<\/b>：正确/g, '<span style="color:#145a32;">✅ $1选项</b>：正确</span>')
            .replace(/([A-E])选项<\/b>：属于/g, '<span style="color:#145a32;">✅ $1选项</b>：属于</span>')
            .replace(/([A-E])选项<\/b>：应选/g, '<span style="color:#145a32;">✅ $1选项</b>：应选</span>')
            .replace(/([A-E])选项<\/b>：是/g, '<span style="color:#145a32;">✅ $1选项</b>：是</span>')
            .replace(/([A-E])选项<\/b>：可/g, '<span style="color:#145a32;">✅ $1选项</b>：可</span>')
            // === 通用错误类 ===
            .replace(/([A-E])选项<\/b>：错误/g, '<span style="color:#b22222;">❌ $1选项</b>：错误</span>')
            .replace(/([A-E])选项<\/b>：不属于/g, '<span style="color:#b22222;">❌ $1选项</b>：不属于</span>')
            .replace(/([A-E])选项<\/b>：不选/g, '<span style="color:#b22222;">❌ $1选项</b>：不选</span>')
            .replace(/([A-E])选项<\/b>：不是/g, '<span style="color:#b22222;">❌ $1选项</b>：不是</span>')
            .replace(/([A-E])选项<\/b>：不可/g, '<span style="color:#b22222;">❌ $1选项</b>：不可</span>');
        h += '<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>' + detailHtml + '</div>';
    }
    h += '<div class="ex-tip">💡 <b>大白话理解：</b>' + q.tip + '</div>';
    h += '</div></div>';
    return h;
}
// ==================== 答题交互 ====================
function selectOpt(el, qid, idx, multi) {
    var wrap = el.closest('.quiz-wrap');
    if (wrap.classList.contains('submitted')) return;
    var allOpts = wrap.querySelectorAll('.opt-list li');
    if (multi) { el.classList.toggle('selected'); }
    else { allOpts.forEach(function(o) { o.classList.remove('selected'); }); el.classList.add('selected'); }
}

function submitQuiz(qid, correct, multi) {
    var wrap = document.querySelector('[data-qid="' + qid + '"]');
    if (wrap.classList.contains('submitted')) return;
    wrap.classList.add('submitted');
    var allOpts = wrap.querySelectorAll('.opt-list li');
    var correctArr = Array.isArray(correct) ? correct : [correct];
    var selectedIdxs = [];
    for (var i = 0; i < allOpts.length; i++) { if (allOpts[i].classList.contains('selected')) selectedIdxs.push(i); }
    var isCorrect;
    if (multi) {
        isCorrect = selectedIdxs.length === correctArr.length;
        for (var j = 0; j < selectedIdxs.length; j++) { if (correctArr.indexOf(selectedIdxs[j]) === -1) { isCorrect = false; break; } }
    } else { isCorrect = selectedIdxs.length === 1 && selectedIdxs[0] === correctArr[0]; }

    for (var k = 0; k < allOpts.length; k++) {
        allOpts[k].classList.add('disabled');
        if (correctArr.indexOf(k) !== -1) allOpts[k].classList.add('correct');
    }
    if (!isCorrect) {
        for (var m = 0; m < selectedIdxs.length; m++) { if (correctArr.indexOf(selectedIdxs[m]) === -1) allOpts[selectedIdxs[m]].classList.add('wrong'); }
    }

    var exEl = document.getElementById('ex-' + qid);
    exEl.classList.add('show');
    if (isCorrect) {
        exEl.classList.add('correct-ex'); exEl.classList.remove('wrong-ex');
        exEl.querySelector('.ex-head').textContent = '🎉 回答正确！';
        exEl.querySelector('.ex-body').textContent = '';
        var exDetail = exEl.querySelector('.ex-detail');
        if (exDetail) exDetail.style.display = 'block';
    } else {
        exEl.classList.add('wrong-ex'); exEl.classList.remove('correct-ex');
        exEl.querySelector('.ex-head').textContent = '😞 回答错误';
        var letters = ['A','B','C','D','E'];
        var correctLetters = correctArr.map(function(c) { return letters[c]; }).join('、');
        exEl.querySelector('.ex-body').innerHTML = '正确答案是：<b>' + correctLetters + '</b>';
        var exDetail2 = exEl.querySelector('.ex-detail');
        if (exDetail2) exDetail2.style.display = 'block';
    }
}

function resetQuiz(qid) {
    var wrap = document.querySelector('[data-qid="' + qid + '"]');
    wrap.classList.remove('submitted');
    wrap.querySelectorAll('.opt-list li').forEach(function(o) { o.classList.remove('selected','correct','wrong','disabled'); });
    var exEl = document.getElementById('ex-' + qid);
    exEl.classList.remove('show','correct-ex','wrong-ex');
}

function generateTOC() {
    var toc = document.getElementById('toc');
    if (!toc) return;
    var titleHtml = '<div class="toc-title">📑 行政许可法目录</div>';
    var links = '';
    knowledgeData.forEach(function(mod) { links += '<a href="#' + mod.id + '">' + mod.title + '</a>'; });
    toc.innerHTML = titleHtml + links;
    document.querySelectorAll('.toc a').forEach(function(link) {
        link.addEventListener('click', function() { if (window.innerWidth <= 768) closeToc(); });
    });
}

function toggleToc() { document.getElementById('toc').classList.toggle('show'); document.getElementById('tocOverlay').classList.toggle('show'); }
function closeToc() { document.getElementById('toc').classList.remove('show'); document.getElementById('tocOverlay').classList.remove('show'); }

document.addEventListener('DOMContentLoaded', renderAll);
</script>
