              d: '<b>A</b>：正确。14-16岁不执行行政拘留。注意：是"不执行"不是"不适用"，但选项问不适用时可理解为不执行。<br><b>B</b>：错误。成年人正常执行。<br><b>C</b>：错误。70岁以上才不执行。<br><b>D</b>：错误。孕妇才不执行。',
              t: '注意题干问法。14-16岁、16-18岁初次、70岁以上、孕妇——四类人不执行拘留。' },
            { q: '行政拘留处罚合并执行的，最长不超过多少日？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 1, type: 'single', quizIndex:24,
              d: '<b>A</b>：错误。15日是单个拘留的常见期限。<br><b>B</b>：正确。合并执行最长不超过20日。<br><b>C</b>：错误。30日是治安办案一般期限。<br><b>D</b>：错误。60日是治安办案最长延长期限。',
              t: '犯了多件事，拘留"打包价"最多20天。' },
            { q: '治安案件的办案期限，自受理之日起一般不超过多少日？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 2, type: 'single', quizIndex:25,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。治安案件一般30日内办结，可延长30日。<br><b>D</b>：错误。60日是含延期的总时限。',
              t: '30+30=60天封顶。鉴定时间不算在内。' },
            { q: '关于行政拘留的暂缓执行，以下说法正确的是？', opts: ['A. 必须提供保证人', 'B. 必须缴纳保证金', 'C. 保证人或保证金二选一', 'D. 暂缓执行不需要申请'], correct: 2, type: 'single', quizIndex:26,
              d: '<b>A</b>：错误。不一定，也可以交保证金。<br><b>B</b>：错误。不一定，也可以找保证人。<br><b>C</b>：正确。保证人或保证金二选一即可。<br><b>D</b>：错误。需要被处罚人提出申请。',
              t: '担保方式二选一：找人保（保证人）或交钱保（每天200元）。' },
            { q: '当场收缴的罚款，人民警察应当自收缴之日起几日内交至所属公安机关？', opts: ['A. 当日', 'B. 2日', 'C. 3日', 'D. 5日'], correct: 1, type: 'single', quizIndex:27,
              d: '<b>A</b>：错误。非当日。<br><b>B</b>：正确。2日内交至所属公安机关。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '收了钱2天内上交警局，水上从抵岸起算，列车上从返回起算。' }
        ]
    },

,
    // ==================== 模块五：综合练习 ====================
    {
        id: 'mod_final', iconClass: 'icon-red', iconEmoji: '🏆',
        title: '综合练习 ',
        subtitle: '覆盖：公安基础 | 职业素养 | 队伍建设 | 行政执法',
        quizzes: [
            // ===== 单选题25道 =====
            { q: '公安机关的根本属性是什么？', opts: ['A. 武装性质', 'B. 治安行政力量', 'C. 人民民主专政的重要工具', 'D. 刑事司法力量'], correct: 2, type: 'single', quizIndex: 1,
              d: '<b>A</b>：错误。武装性质是组织属性，不是根本属性。<br><b>B</b>：错误。治安行政力量是职能属性之一。<br><b>C</b>：正确。人民民主专政的重要工具是阶级属性，也是根本属性。<br><b>D</b>：错误。刑事司法力量是职能属性之一。',
              t: '问根本属性就选"人民民主专政的重要工具"，这是公安机关的"灵魂"。' },
            { q: '公安工作的根本原则是？', opts: ['A. 群众路线', 'B. 专群结合', 'C. 坚持党对公安工作的绝对领导', 'D. 全心全意为人民服务'], correct: 2, type: 'single', quizIndex: 2,
              d: '<b>A</b>：错误。群众路线是根本路线。<br><b>B</b>：错误。专群结合是基本方针。<br><b>C</b>：正确。党对公安工作的绝对领导是根本原则。<br><b>D</b>：错误。这是宗旨。',
              t: '原则=党领导；路线=群众路线；方针=专群结合。三概念不能混。' },
            { q: '"一切为了群众"是公安工作的什么？', opts: ['A. 根本态度', 'B. 基本方法', 'C. 宗旨和出发点', 'D. 根本原则'], correct: 2, type: 'single', quizIndex: 3,
              d: '<b>A</b>：错误。"一切依靠群众"才是根本态度。<br><b>B</b>：错误。"从群众中来，到群众中去"才是基本方法。<br><b>C</b>：正确。"一切为了群众"是宗旨和出发点。<br><b>D</b>：错误。根本原则是党的领导。',
              t: '出发点=为谁做；态度=靠谁做；方法=怎么做。' },
            { q: '公安机关的专政职能的对象是？', opts: ['A. 全体公民', 'B. 敌对势力和严重刑事犯罪分子', 'C. 违反治安管理的行为人', 'D. 所有违法犯罪人员'], correct: 1, type: 'single', quizIndex: 4,
              d: '<b>A</b>：错误。专政对象是少数敌人，不是全体公民。<br><b>B</b>：正确。专政职能的对象是危害国家安全的敌对势力和严重刑事犯罪分子。<br><b>C</b>：错误。违反治安管理行为人是管理职能对象。<br><b>D</b>：错误。专政只针对严重犯罪分子。',
              t: '专政打敌人，民主护人民，管理管社会。"敌人"是指危害国家安全和严重刑事犯罪的。' },
            { q: '公安机关的管理体制是？', opts: ['A. 统一领导，分级管理，条块结合，以条为主', 'B. 统一领导，分级管理，条块结合，以块为主', 'C. 分级领导，统一管理，条块结合，以块为主', 'D. 统一领导，分级管理，条块分离，以块为主'], correct: 1, type: 'single', quizIndex: 5,
              d: '<b>A</b>：错误。是"以块为主"不是"以条为主"。<br><b>B</b>：正确。统一领导、分级管理、条块结合、以块为主。<br><b>C</b>：错误。"统一领导"不是"分级领导"。<br><b>D</b>：错误。"条块结合"不是"条块分离"。',
              t: '"以块为主"就是同级党委政府说了算，上级公安是辅助。' },
            { q: '人民警察核心价值观中"根本要求"和"政治本色"指的是？', opts: ['A. 为民', 'B. 公正', 'C. 忠诚', 'D. 廉洁'], correct: 2, type: 'single', quizIndex: 6,
              d: '<b>A</b>：错误。为民是宗旨、出发点、落脚点。<br><b>B</b>：错误。公正是法律精神、价值追求。<br><b>C</b>：正确。忠诚是根本要求、政治本色。<br><b>D</b>：错误。廉洁是内在要求、道德底线。',
              t: '忠诚是"忠"字当头，警察第一要求。' },
            { q: '新时代公安工作十六字方针是？', opts: ['A. 对党忠诚、服务人民、执法公正、纪律严明', 'B. 政治建警、改革强警、科技兴警、从严治警', 'C. 革命化、正规化、专业化、职业化', 'D. 铁一般的理想信念、责任担当、过硬本领、纪律作风'], correct: 1, type: 'single', quizIndex: 7,
              d: '<b>A</b>：错误。这是治警建警总要求。<br><b>B</b>：正确。十六字方针=政治建警、改革强警、科技兴警、从严治警。<br><b>C</b>：错误。这是正规化建设目标。<br><b>D</b>：错误。这是"四个铁一般"。',
              t: '十六字方针="政改科严"；总要求="对服执法"；四铁="信担本纪"。' },
            { q: '民警违反三项纪律的（酗酒闹市、夜总会，见死不救不作为），应如何处理？', opts: ['A. 警告', 'B. 记过', 'C. 一律先予禁闭', 'D. 罚款'], correct: 2, type: 'single', quizIndex: 8,
              d: '<b>A</b>：错误。警告是行政处分，不是初始处理。<br><b>B</b>：错误。记过也不是初始处理。<br><b>C</b>：正确。违反三项纪律一律先禁闭，再视情处分。<br><b>D</b>：错误。罚款不是纪律处分。',
              t: '三项纪律是高压线，碰了先关起来（禁闭），严重直接开除。' },
            { q: '我国最早的一支比较正规的人民警察队伍是？', opts: ['A. 湖南保卫局', 'B. 中央特科', 'C. 延安市警察队', 'D. 国家政治保卫局'], correct: 2, type: 'single', quizIndex: 9,
              d: '<b>A</b>：错误。湖南保卫局是1898年最早专职警察机构。<br><b>B</b>：错误。中央特科是党最早保卫机构。<br><b>C</b>：正确。延安市警察队（1938年）是第一支正规人民警察队伍。<br><b>D</b>：错误。国家政治保卫局是最早人民政权公安保卫机关。',
              t: '"最早"各有不同：湖南=专职；特科=党保卫；保卫局=人民政权；边警=正规队伍。' },
            { q: '群体性事件处置中，以下哪项不属于"三个慎用"？', opts: ['A. 慎用警力', 'B. 慎用武器警械', 'C. 慎用强制措施', 'D. 慎用行政处罚'], correct: 3, type: 'single', quizIndex: 10,
              d: '<b>A</b>：属于三个慎用之一。<br><b>B</b>：属于三个慎用之一。<br><b>C</b>：属于三个慎用之一。<br><b>D</b>：不属于。三慎用是"警力、武器警械、强制措施"。',
              t: '三慎用口诀："人、枪、措施"都要慎。行政处罚是事后处理。' },
            { q: '督察机构对人民警察采取禁闭措施的期限是？', opts: ['A. 1日以上3日以下', 'B. 1日以上7日以下', 'C. 3日以上7日以下', 'D. 7日以上15日以下'], correct: 1, type: 'single', quizIndex: 11,
              d: '<b>A</b>：错误。期限太短。<br><b>B</b>：正确。禁闭1日以上7日以下。<br><b>C</b>：错误。起点是1日不是3日。<br><b>D</b>：错误。最多7日。',
              t: '禁闭1~7天，停止职务10~60天。禁闭更短但更严厉。' },
            { q: '下列哪项属于公安执法外部监督？', opts: ['A. 督察监督', 'B. 法制部门监督', 'C. 国家权力机关的监督', 'D. 行政复议'], correct: 2, type: 'single', quizIndex: 12,
              d: '<b>A</b>：错误。督察是内部监督。<br><b>B</b>：错误。法制部门是内部监督。<br><b>C</b>：正确。人大监督是外部监督。<br><b>D</b>：错误。行政复议是内部监督。',
              t: '外部=人大、检察院、法院、社会。内部=督察、法制、复议。' },
            { q: '县级以上公安机关正职领导职务的提名，应当？', opts: ['A. 由同级政府直接任命', 'B. 事先征得上一级公安机关同意', 'C. 征求上一级公安机关意见', 'D. 由上级公安机关直接任命'], correct: 1, type: 'single', quizIndex: 13,
              d: '<b>A</b>：错误。正职需征得上级公安同意。<br><b>B</b>：正确。正职=征得同意。<br><b>C</b>：错误。副职才是征求意见。<br><b>D</b>：错误。不是直接任命。',
              t: '正职=征得同意（更强硬）；副职=征求意见（较温和）。' },
            { q: '治安案件简易程序中，对违反治安管理行为人处多少元以下罚款可以当场处罚？', opts: ['A. 50元', 'B. 100元', 'C. 200元', 'D. 500元'], correct: 2, type: 'single', quizIndex: 14,
              d: '<b>A</b>：错误。50元是当场收缴上限。<br><b>B</b>：错误。<br><b>C</b>：正确。治安简易程序：200元以下罚款或警告。<br><b>D</b>：错误。500元是出入境简易标准。',
              t: '当场罚200元以下，当场收50元以下。两个"当场"数字不同。' },
            { q: '快速办理行政案件，应在违法嫌疑人到案后多久内处理完毕？', opts: ['A. 24小时', 'B. 36小时', 'C. 48小时', 'D. 72小时'], correct: 2, type: 'single', quizIndex: 15,
              d: '<b>A</b>：错误。24小时是询问查证延长时间。<br><b>B</b>：错误。<br><b>C</b>：正确。快速办理48小时内处理完毕。<br><b>D</b>：错误。',
              t: '快速办理=48小时搞定。普通程序30天。' },
            { q: '行政拘留处罚合并执行的，最长不超过多少日？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 1, type: 'single', quizIndex: 16,
              d: '<b>A</b>：错误。15日是单个拘留常见期限。<br><b>B</b>：正确。合并执行最长20日。<br><b>C</b>：错误。30日是治安办案一般期限。<br><b>D</b>：错误。60日是含延期总时限。',
              t: '犯多件事，拘留"打包价"最多20天。' },
            { q: '治安案件办案期限一般不超过多少日？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 2, type: 'single', quizIndex: 17,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。30日内办结，可延长30日。<br><b>D</b>：错误。60日是含延期总时限。',
              t: '30+30=60天封顶。鉴定时间不算。' },
            { q: '人民警察职业道德中"事实为据，秉持公正，惩恶扬善"属于哪项？', opts: ['A. 忠诚可靠', 'B. 秉公执法', 'C. 英勇善战', 'D. 严守纪律'], correct: 1, type: 'single', quizIndex: 18,
              d: '<b>A</b>：错误。忠诚可靠="听党指挥，热爱人民，忠于法律"。<br><b>B</b>：正确。秉公执法="事实为据，秉持公正，惩恶扬善"。<br><b>C</b>：错误。英勇善战="坚韧不拔，机智果敢，崇尚荣誉"。<br><b>D</b>：错误。严守纪律="遵章守纪，保守秘密，令行禁止"。',
              t: '看到"事实为据""公正"就知道是"秉公执法"。' },
            { q: '"枫桥经验"中的"四防齐抓"指的是？', opts: ['A. 人防、物防、技防、消防', 'B. 人防、物防、技防、心防', 'C. 人防、物防、消防、心防', 'D. 人防、消防、技防、心防'], correct: 1, type: 'single', quizIndex: 19,
              d: '<b>A</b>：错误。不是"消防"，是"心防"。<br><b>B</b>：正确。四防齐抓=人防、物防、技防、心防。<br><b>C</b>：错误。没有"消防"。<br><b>D</b>：错误。没有"消防"。',
              t: '四防="人物技心"——人防（巡逻）、物防（防盗门）、技防（监控）、心防（心理疏导）。' },
            { q: '下列哪项不适用行政拘留处罚？', opts: ['A. 已满14周岁不满16周岁的人', 'B. 已满18周岁的人', 'C. 已满16周岁不满18周岁且非初次违反', 'D. 70周岁以上的人'], correct: 0, type: 'single', quizIndex: 20,
              d: '<b>A</b>：正确。14-16岁不执行行政拘留。<br><b>B</b>：错误。成年人正常执行。<br><b>C</b>：错误。16-18岁非初次可以执行。<br><b>D</b>：正确。70岁以上不执行。但A是唯一完全正确选项，C有条件限制。',
              t: '四类人不执行：14-16岁、16-18岁初次、70岁以上、孕妇。注意16-18岁必须是"初次"。' },
            { q: '行政拘留的暂缓执行，担保方式是什么？', opts: ['A. 必须提供保证人', 'B. 必须缴纳保证金', 'C. 保证人或保证金二选一', 'D. 必须同时提供保证人和保证金'], correct: 2, type: 'single', quizIndex: 21,
              d: '<b>A</b>：错误。不必须，可以交保证金。<br><b>B</b>：错误。不必须，可以找保证人。<br><b>C</b>：正确。二选一即可。<br><b>D</b>：错误。不是同时。',
              t: '担保方式二选一：找人保（保证人）或交钱保（每天200元）。' },
            { q: '当场收缴的罚款，人民警察应自收缴之日起几日内交至所属公安机关？', opts: ['A. 当日', 'B. 2日', 'C. 3日', 'D. 5日'], correct: 1, type: 'single', quizIndex: 22,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。2日内交至所属公安机关。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '收钱2天内上交警局。水上从抵岸起算，列车上从返回起算。' },
            { q: '人民警察不得辞退的情形不包括？', opts: ['A. 因公致残丧失工作能力', 'B. 患病在规定医疗期内', 'C. 连续两年考核不称职', 'D. 女性在哺乳期内'], correct: 2, type: 'single', quizIndex: 23,
              d: '<b>A</b>：属于不得辞退。<br><b>B</b>：属于不得辞退。<br><b>C</b>：不属于。连续两年考核不称职是应当辞退的。<br><b>D</b>：属于不得辞退。',
              t: '"残、病、孕"受保护不辞退。"两年不称职"是应该辞退的。' },
            { q: '关于严肃与谨慎相结合政策，总精神是什么？', opts: ['A. 执法必严', 'B. 重证据重调查研究', 'C. 不枉不纵', 'D. 宽严相济'], correct: 2, type: 'single', quizIndex: 24,

<script>
// ==================== 渲染引擎 ====================
function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.items&&mod.items.length>0){h+='<div class="ki-grid">';mod.items.forEach(function(item){if(item.type==='table')h+=item.html;else if(item.type==='ki')h+=renderKI(item);});h+='</div>';}if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}
function renderKI(item){var h='<div class="ki-item">';h+='<div class="ki-title-row">'+(item.badge?'<span class="badge '+(item.badgeClass||'badge-num')+'">'+item.badge+'</span> ':'')+item.title+'</div>';h+='<div class="ki-content">'+item.content+'</div>';if(item.extra)h+='<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">'+item.extra+'</div>';if(item.example){h+='<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">'+item.example.q+'</div><div class="ex-a">'+item.example.a+'</div></div>';}h+='</div>';return h;}
function renderQuiz(q,qid){var qTypeLabel='【单选题】';var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else if(q.tfId){h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div><ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div><div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.d){var detailHtml=q.d;detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(正确)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(错误)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.t+'</div></div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 公安基础 · 知识目录</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
</body>
</html>
