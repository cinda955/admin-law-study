// ============ 渲染引擎（纯ES5，完全兼容） ============
function renderAll(){
    var m = document.getElementById('mainContent');
    var h = '';
    knowledgeData.forEach(function(mod){
        h += '<div class="card" id="' + mod.id + '"><div class="section-title"><div class="icon ' + mod.iconClass + '">' + mod.iconEmoji + '</div>' + mod.title + '</div>';
        if(mod.subtitle) h += '<div class="subtitle">' + mod.subtitle + '</div>';
        if(mod.items && mod.items.length > 0){
            h += '<div class="ki-grid">';
            mod.items.forEach(function(item){
                if(item.type === 'table'){ h += item.html; }
                else if(item.type === 'ki'){ h += renderKI(item); }
            });
            h += '</div>';
        }
        if(mod.quizzes && mod.quizzes.length > 0){
            mod.quizzes.forEach(function(q, qi){
                h += renderQuiz(q, mod.id + '-q' + qi);
            });
        }
        h += '</div>';
    });
    m.innerHTML = h;
    generateTOC();
}

function renderKI(item){
    var h = '<div class="ki-item">';
    h += '<div class="ki-title-row">' + (item.badge ? '<span class="badge ' + (item.badgeClass || 'badge-num') + '">' + item.badge + '</span> ' : '') + item.title + '</div>';
    h += '<div class="ki-content">' + item.content + '</div>';
    if(item.extra) h += '<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">📌 ' + item.extra + '</div>';
    if(item.example){
        h += '<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">' + item.example.q + '</div><div class="ex-a">' + item.example.a + '</div></div>';
    }
    h += '</div>';
    return h;
}

function renderQuiz(q, qid){
    var qTypeLabel = q.multi ? '【多选题】' : '【单选题】';
    var h = '<div class="quiz-wrap" data-qid="' + qid + '">';
    if(q.quizIndex){ h += '<div class="q-type">📝 ' + qTypeLabel + ' · 第' + q.quizIndex + '题</div>'; }
    else if(q.tfId){ h += '<div class="q-type">📝 ' + qTypeLabel + ' · ' + q.tfId + '</div>'; }
    else { h += '<div class="q-type">📝 ' + qTypeLabel + '</div>'; }
    h += '<div class="q-text">' + q.q + '</div><ul class="opt-list">';
    for(var i = 0; i < q.opts.length; i++){
        h += '<li data-idx="' + i + '" onclick="selectOpt(this,\'' + qid + '\',' + i + ',' + (q.multi || false) + ')">' + q.opts[i] + '</li>';
    }
    h += '</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\'' + qid + '\',' + JSON.stringify(q.correct) + ',' + (q.multi || false) + ')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\'' + qid + '\')">🔄 重做</button></div>';
    h += '<div class="explain-card" id="ex-' + qid + '"><div class="ex-head"></div><div class="ex-body"></div>';
    if(q.d){
        var detailHtml = q.d;
        detailHtml = detailHtml.replace(/\n/g,'<br>');
        // 兼容两种格式：A项正确/错误 和 <b>A</b>：正确/错误
        detailHtml = detailHtml.replace(/([A-E])项正确：/g,'<span style="color:#145a32;">✅ $1项正确：</span>');
        detailHtml = detailHtml.replace(/([A-E])项错误：/g,'<span style="color:#b22222;">❌ $1项错误：</span>');
        detailHtml = detailHtml.replace(/([A-E])项可诉：/g,'<span style="color:#145a32;">✅ $1项可诉：</span>');
        detailHtml = detailHtml.replace(/([A-E])项不可诉：/g,'<span style="color:#b22222;">❌ $1项不可诉：</span>');
        detailHtml = detailHtml.replace(/<b>([A-E])<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');
        detailHtml = detailHtml.replace(/<b>([A-E])<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');
        h += '<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>' + detailHtml + '</div>';
    }
    h += '<div class="ex-tip">💡 <b>大白话理解：</b>' + q.t + '</div></div></div>';
    return h;
}

function selectOpt(el, qid, idx, multi){
    var w = el.closest('.quiz-wrap');
    if(w.classList.contains('submitted')) return;
    var o = w.querySelectorAll('.opt-list li');
    if(multi){ el.classList.toggle('selected'); }
    else { o.forEach(function(x){ x.classList.remove('selected'); }); el.classList.add('selected'); }
}

function submitQuiz(qid, correct, multi){
    var w = document.querySelector('[data-qid="' + qid + '"]');
    if(w.classList.contains('submitted')) return;
    w.classList.add('submitted');
    var o = w.querySelectorAll('.opt-list li');
    var ca = Array.isArray(correct) ? correct : [correct];
    var si = [];
    for(var i = 0; i < o.length; i++){ if(o[i].classList.contains('selected')) si.push(i); }
    var ic;
    if(multi){ ic = si.length === ca.length; for(var j = 0; j < si.length; j++){ if(ca.indexOf(si[j]) === -1){ ic = false; break; } } }
    else { ic = si.length === 1 && si[0] === ca[0]; }
    for(var k = 0; k < o.length; k++){ o[k].classList.add('disabled'); if(ca.indexOf(k) !== -1) o[k].classList.add('correct'); }
    if(!ic){ for(var m = 0; m < si.length; m++){ if(ca.indexOf(si[m]) === -1) o[si[m]].classList.add('wrong'); } }
    var ex = document.getElementById('ex-' + qid);
    ex.classList.add('show');
    if(ic){ ex.classList.add('correct-ex'); ex.classList.remove('wrong-ex'); ex.querySelector('.ex-head').textContent = '🎉 回答正确！'; ex.querySelector('.ex-body').textContent = ''; var ed = ex.querySelector('.ex-detail'); if(ed) ed.style.display = 'block'; }
    else { ex.classList.add('wrong-ex'); ex.classList.remove('correct-ex'); ex.querySelector('.ex-head').textContent = '😞 回答错误'; var lt = ['A','B','C','D','E']; var cl = ca.map(function(c){ return lt[c]; }).join('、'); ex.querySelector('.ex-body').innerHTML = '正确答案是：<b>' + cl + '</b>'; var ed2 = ex.querySelector('.ex-detail'); if(ed2) ed2.style.display = 'block'; }
}

function resetQuiz(qid){
    var w = document.querySelector('[data-qid="' + qid + '"]');
    w.classList.remove('submitted');
    w.querySelectorAll('.opt-list li').forEach(function(o){ o.classList.remove('selected','correct','wrong','disabled'); });
    var ex = document.getElementById('ex-' + qid);
    ex.classList.remove('show','correct-ex','wrong-ex');
}

function generateTOC(){
    var toc = document.getElementById('toc');
    if(!toc) return;
    var th = '<div class="toc-title">📑 行政诉讼法 · 知识目录</div>';
    var links = '';
    knowledgeData.forEach(function(mod){ links += '<a href="#' + mod.id + '">' + mod.title + '</a>'; });
    toc.innerHTML = th + links;
    document.querySelectorAll('.toc a').forEach(function(link){
        link.addEventListener('click', function(){ if(window.innerWidth <= 768) closeToc(); });
    });
}

function toggleToc(){ document.getElementById('toc').classList.toggle('show'); document.getElementById('tocOverlay').classList.toggle('show'); }
function closeToc(){ document.getElementById('toc').classList.remove('show'); document.getElementById('tocOverlay').classList.remove('show'); }
document.addEventListener('DOMContentLoaded', renderAll);
</script>
