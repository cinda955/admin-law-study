        }
        a {
            color: var(--accent);
            text-decoration: none;
        }

            display: none;
            position: fixed;
            top: 0;
            left: 0;

            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 98;
        }
        .toc-overlay.show {

        }
        .toc {

            left: 16px;

            border-radius: var(--radius);

            margin-bottom: 10px;
            color: var(--accent);
            font-size: 1rem;

            align-items: center;
            gap: 6px;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            padding-bottom: 8px;
            border-bottom: 1px solid #f0ebe0;
        }

            display: block;
            padding: 7px 10px;

            color: var(--accent);

        }
        .toc-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;

            cursor: pointer;
            z-index: 101;
            display: none;
            box-shadow: 0 4px 14px rgba(178, 34, 34, 0.3);

            gap: 20px;
            padding-bottom: 40px;

            box-shadow: var(--shadow-md);

        }

            background: #eafaf1;

        }
        .ki-item {
            border: 1px solid #f0ebe0;

            background: #fdedec;
            color: #b22222;
        }
        .badge-num {
            background: #eaf2f8;
            color: #1a5276;
        }
        .badge-case {

            background: #fdedec;

            color: #922b21;
        }

            color: #1a5276;

        .kh-green {

            font-size: 0.98rem;

            cursor: pointer;
            border: 2px solid #e9e4db;

            background: #eaf2f8;

        }
        .opt-list li.wrong {
            border-color: #b22222 !important;

            color: #922b21 !important;
        }

        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;

        .btn {

            font-weight: 600;

            border: none;
            font-size: 0.88rem;
            transition: all 0.2s;
            letter-spacing: 0.3px;

        .btn-primary:hover {
            background: var(--btn-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(178, 34, 34, 0.3);
        }
        .btn-outline {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-outline:hover {
            background: #fdedec;
        }

            margin-top: 12px;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            display: none;
            font-size: 0.9rem;
            line-height: 1.7;
        }
        .explain-card.show {

        }

            background: #eafaf1;
            border: 1px solid #a3e4bc;
            color: #145a32;
        }
        .explain-card.wrong-ex {
            background: #fdedec;
            border: 1px solid #f5b7b1;
            color: #922b21;

            margin-bottom: 6px;
            font-size: 0.95rem;
        }

            margin-top: 8px;
            padding: 8px 12px;
            background: #fff;
            border-radius: 6px;
            font-style: italic;
            color: #555;
            font-size: 0.85rem;
        }
    </style>
</head>

            overlay.classList.remove('show');

                    { type: 'tf', q: '提起行政诉讼后，当事人还可以再申请行政复议。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。根据程序衔接规则，提起行政诉讼后<b>不得再申请行政复议</b>。<br><b>B选项"错误"</b>：正确。司法判决具有终局性，如果允许诉讼后再复议，复议机关改变法院判决就相当于"行政权干涉司法权"，违反独立审判原则。', tip: '诉讼和复议是"单行道"——复议完还可以诉讼（15天内），但诉讼完不能回头复议。就像考试：可以先找老师复核（复议），不服再找校长（法院）；但校长判了就不能再回去找老师改。' },
                    { type: 'tf', q: '对当场作出的行政处罚决定不服，必须先申请行政复议才能提起行政诉讼。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政复议法》第二十三条，对当场作出的行政处罚决定不服属于<b>复议前置</b>情形，必须先复议再诉讼。<br><b>B选项"错误"</b>：错误。当场处罚（如交警现场开罚单）事实清楚、金额小，先让上级机关内部解决，节约司法资源。', tip: '当场处罚就是"小案子"——金额小、事实清楚，不用直接闹到法院。先找处罚机关的上级"评评理"（复议），不服再告。就像班里的小纠纷先找班主任，别直接找校长。' },
                    { type: 'tf', q: '抽象行政行为不能直接提起行政诉讼，但可以在告具体行政行为时附带请求审查。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政诉讼法》第五十三条，对行政行为提起诉讼时，可一并请求对规范性文件进行附带审查。<br><b>B选项"错误"</b>：错误。抽象行政行为（如政府文件）单独不可诉，但附带审查是合法的救济途径。', tip: '政府发布的文件像"菜谱"——你不能单独告菜谱，但厨师按菜谱做了一道难吃的菜（具体行为），你可以告这道菜，同时说"菜谱本身就有问题"。' },
                    { type: 'tf', q: '行政机关对公务员的任免决定属于行政诉讼受案范围。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。对公务员的奖惩任免属于<b>内部行政行为</b>，根据《行政诉讼法》第十三条，不在受案范围内。<br><b>B选项"错误"</b>：正确。公务员不服任免决定应向人事部门申诉或申请复核，不能走行政诉讼。', tip: '机关内部的事就像"家事"——局长提拔谁、处分谁，是单位内部管理，法院不管。你在公司被老板降职了，能去法院告老板吗？不能，这是公司内部的事。' },
                    { type: 'tf', q: '国务院可以作为行政诉讼的被告。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。国务院<b>不能成为行政诉讼被告</b>，对国务院部门或省级政府的复议决定不服，可向国务院申请最终裁决。<br><b>B选项"错误"</b>：正确。国务院是最高行政机关，其裁决为最终裁决，不能再诉讼。', tip: '国务院是行政体系的"天花板"——告到国务院就到头了，国务院的裁决就是"最终判决"。就像游戏里的终极BOSS，打完就通关了，没有下一关。' },
                    { type: 'tf', q: '对海关处理的案件不服，应由中级人民法院管辖。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政诉讼法》第十五条，海关处理的案件<b>不论级别</b>均由中级法院一审管辖。<br><b>B选项"错误"</b>：错误。海关案件涉及进出口、关税等专业领域，中级法院审理更合适。', tip: '海关案件是"特殊VIP"——不管是大海关还是小海关，统统去中院，基层法院没资格审。因为海关案件涉及国际贸易，比较复杂。' },
                    { type: 'tf', q: '因不动产提起的行政诉讼，由被告所在地人民法院管辖。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。根据《行政诉讼法》第二十条，因不动产提起的诉讼，由<b>不动产所在地</b>法院专属管辖。<br><b>B选项"错误"</b>：正确。不动产案件不适用被告所在地管辖，这是专属管辖规则。', tip: '房子在哪儿，官司就在哪儿打。就像房产证登记——房子在深圳，不可能去北京办过户。不动产是"跑不掉的证据"，就地解决最方便。' },
                    { type: 'tf', q: '限制人身自由的行政案件，原告所在地法院也有管辖权。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政诉讼法》第十九条，对限制人身自由的行政强制措施不服，<b>被告所在地和原告所在地</b>法院都有管辖权。<br><b>B选项"错误"</b>：错误。原告所在地包括户籍地、经常居住地、被限制人身自由地，这是保护弱者的特殊规定。', tip: '被关起来的人最可怜——让他跑到被告所在地打官司不现实。所以法律允许他在"家门口"告（户籍地、常住地、被关地），这是他作为弱者的"特权"。' },
                    { type: 'tf', q: '经复议的案件，复议机关改变原行政行为的，原行政机关和复议机关为共同被告。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。复议改变后，<b>仅复议机关为被告</b>（《行政诉讼法》第二十六条第二款）。<br><b>B选项"错误"</b>：正确。复议改变了原行为，原行为已被新决定替代，所以告复议机关即可。', tip: '口诀："维持共同告，改变单独告"。复议机关改变了原处罚，相当于"你做的决定你负责"，原机关就解脱了。就像二审改判了，责任在二审法院。' },
                    { type: 'tf', q: '行政诉讼中，派出所只要以自己名义作出行政行为，就以派出所为被告。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。在行政诉讼中，派出所只要以自己名义作出行为，<b>不管幅度越权还是种类越权</b>，都以派出所为被告。<br><b>B选项"错误"</b>：错误。这与行政复议不同——复议中种类越权告公安局，幅度越权告派出所。', tip: '行政诉讼和行政复议的派出所被告规则<b>不一样</b>！诉讼：以自己名义→告派出所。复议：罚款告派出所，拘留告公安局。这个点经常考，记死它！' },
                    { type: 'tf', q: '行政诉讼的举证责任全部由被告承担。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。被告承担<b>主要</b>举证责任，但不是全部。<br><b>B选项"错误"</b>：正确。原告也需提供符合起诉条件的材料，行政赔偿中还需证明损害与行为的因果关系。', tip: '"全部"二字是陷阱！被告扛大头（证明自己合法），但原告也得干点活——至少证明"我是谁、我告谁、我要告什么"。就像打官司，被告得自证清白，但原告得先证明自己有理有据。' },
                    { type: 'tf', q: '被告在诉讼期间可以自行向原告和证人收集证据。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。根据《行政诉讼法》第三十五条，诉讼期间被告及其代理人<b>不得自行</b>向原告、第三人和证人收集证据。<br><b>B选项"错误"</b>：正确。处罚时就应该证据齐全，事后补证属于非法证据。', tip: '你罚人家的时候证据呢？罚完了被告了才去找证据=心虚+程序违法。就像老师先给分再找扣分理由——这不是胡闹吗？处罚时必须证据确凿，事后补的一律不算。' },
                    { type: 'tf', q: '直接提起行政诉讼的期限是自知道行政行为之日起3个月内。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。直接起诉期限是<b>6个月</b>（《行政诉讼法》第四十六条），不是3个月。<br><b>B选项"错误"</b>：正确。复议后诉讼才是15天，直接诉讼有6个月。', tip: '直接告=6个月（半年），复议后再告=15天（半个月）。6个月是主路，15天是辅路。别把时间记短了，否则过了期法院就不理你了。' },
                    { type: 'tf', q: '书写起诉状确有困难的，可以口头起诉。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政诉讼法》第五十条，书写困难的可口头起诉，由法院记录笔录。<br><b>B选项"错误"</b>：错误。口头起诉是便民原则的体现，保障不会写字的人也能打官司。', tip: '法律不能因为你不识字就把你挡在门外。不会写？法院帮你记！这就是便民——老百姓打官司的门槛不能太高。' },
                    { type: 'tf', q: '人民法院对符合起诉条件的案件应当登记立案。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。现在实行<b>立案登记制</b>，符合条件就登记，不用等审批。<br><b>B选项"错误"</b>：错误。以前是立案审查制，法院可以拖着不立；现在是登记制，保障了当事人的诉权。', tip: '以前法院可以"挑案子"——觉得麻烦就不立。改革后变成"登记制"：符合条件必须立，像去银行取号一样，拿到号就必须办。这是保护老百姓的诉权。' },
                    { type: 'tf', q: '合议庭的成员人数应当为3人以上的双数。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。合议庭人数须为<b>3人以上的单数</b>（《行政诉讼法》第六十八条）。<br><b>B选项"错误"</b>：正确。双数可能导致投票平局，单数才能确保有明确结论。', tip: '单数是为了投票不出现平局。3个人审，2:1能出结果；4个人审，2:2就僵住了。所以必须单数，不能双数。' },
                    { type: 'tf', q: '一审普通程序的审理期限是立案之日起6个月内。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政诉讼法》第八十一条，一审普通程序应在立案后<b>6个月</b>内审结。<br><b>B选项"错误"</b>：错误。需要延长的须报高级法院批准。', tip: '一审6个月=半年。相比简易程序45天、二审3个月，一审时间最长——因为所有事实要从头查清楚。' },
                    { type: 'tf', q: '简易程序可以由一名审判员独任审理。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。简易程序可独任审理（《行政诉讼法》第八十三条），不组成合议庭。<br><b>B选项"错误"</b>：错误。普通程序必须合议庭，简易追求效率，一人即可。', tip: '简易程序=一人审，普通程序=三人以上组团审。简易就像"快餐"，一人在窗口搞定；普通就像"大餐"，需要多个厨师。' },
                    { type: 'tf', q: '简易程序的审理期限为30日，不得延长。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。行政诉讼简易程序审限是<b>45日</b>（《行政诉讼法》第八十三条），30日是行政复议简易的审限。<br><b>B选项"错误"</b>：正确。诉讼简易45天、复议简易30天，两个数字容易混。', tip: '诉讼45天，复议30天。复议更快，因为复议机关的效率本就应更高。简易程序没有延长机制，审不完就转普通程序。' },
                    { type: 'tf', q: '当事人不服一审判决的上诉期限为10日。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。不服判决的上诉期是<b>15日</b>，不服裁定的上诉期才是<b>10日</b>（《行政诉讼法》第八十五条）。<br><b>B选项"错误"</b>：正确。判决影响实体权利，给更长考虑时间。', tip: '判决=15天，裁定=10天。判决是"大事情"（判你输了），多给5天考虑；裁定是"小事情"（程序问题），10天够了。' },
                    { type: 'tf', q: '二审判决为终审判决，当事人不得再上诉。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。我国实行<b>两审终审制</b>，二审判决即终审，不得上诉。<br><b>B选项"错误"</b>：错误。不服只能通过再审（审判监督程序）寻求救济，但再审不是必然启动的。', tip: '一审打完不服→二审，二审打完就结束。两审终审，没有三审。不服只能"申诉"启动再审，但那不是常规程序。' },
                    { type: 'tf', q: '行政诉讼一律不适用调解。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。并非一律不适用调解，<b>行政赔偿、补偿、自由裁量权</b>案件可调解（《行政诉讼法》第六十条）。<br><b>B选项"错误"</b>：正确。涉及行政行为合法性的案件不能调解——合法就是合法，违法就是违法。', tip: '合法性不能商量——你违法了就是违法了，不能"调解一下少罚点"。但赔多少钱可以商量（赔偿案件），给多少补偿可以谈（补偿案件）。就像交通肇事了，事故责任不能商量，但赔偿金额可以谈。' },
                    { type: 'tf', q: '被诉行政机关负责人应当出庭应诉。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政诉讼法》第三条，被诉行政机关<b>负责人应当出庭</b>（正职或副职）。<br><b>B选项"错误"</b>：错误。不能出庭需说明理由并委托工作人员。', tip: '"告官要见官"——以前告政府只能见到律师，现在局长副局长必须亲自来。这是为了让他们"当面听听老百姓的苦"。来不了得请假说明理由。' },
                    { type: 'tf', q: '人民法院判决变更时，可以加重原告的义务。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。变更判决<b>一般不得加重原告义务</b>（禁止不利变更原则）。<br><b>B选项"错误"</b>：正确。除非利害关系人同为原告且诉讼请求相反（如受害人也起诉要求加重）。', tip: '类似"上诉不加刑"——你去告官，法院不能让你"越告越惨"。否则谁还敢告？但有一个例外：如果被害人也告了要求加重处罚，法院可以加重。' },
                    { type: 'tf', q: '行政行为有实施主体不具有行政主体资格等重大且明显违法情形的，应判决撤销。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。这种最严重违法应判决<b>确认无效</b>（《行政诉讼法》第七十五条），不是撤销。<br><b>B选项"错误"</b>：正确。无效=从根上就错了，自始无效；撤销=处理有问题，纠正即可。', tip: '无效▶撤销▶确认违法，严重程度递减。无资格=假警察罚你，这个处罚从根上就是废纸（无效）。一般违法=真警察但程序错了，纠正就行（撤销）。别搞混！' },
                    { type: 'tf', q: '人民法院公开审理行政案件，但一律不公开宣判。', correct: false, explain: '❌ 错误。', detail: '<b>A选项"正确"</b>：错误。宣判<b>一律公开</b>，审理才可能有例外（涉密涉私不公开）。<br><b>B选项"错误"</b>：正确。不管审理是否公开，宣判必须公开。', tip: '审理可以不公开（涉密案件关起门审），但判决结果必须公开宣布。就像高考阅卷可以秘密进行，但成绩必须公布。' },
                    { type: 'tf', q: '行政机关拒绝履行判决的，法院可对该机关负责人按日处50至100元罚款。', correct: true, explain: '✅ 正确。', detail: '<b>A选项"正确"</b>：正确。根据《行政诉讼法》第九十六条，对拒绝履行判决的行政机关负责人按日处50~100元罚款。<br><b>B选项"错误"</b>：错误。这是司法罚款，不是行政处罚，目的是督促尽快履行。', tip: '每天50~100元，不算多，但架不住天天扣。一个月就是1500~3000元，两个月就是3000~6000元。这是"温柔的压力"，逼着负责人赶紧执行判决。' }
                ];

                // ==================== 单选题20道 ====================
                const singleQuizzes = [
                    { type: 'single', q: '行政复议机关在法定期限内未作出复议决定，当事人起诉原行政行为的，被告是？', opts: ['A. 复议机关', 'B. 原行政机关', 'C. 原行政机关和复议机关为共同被告', 'D. 原告可选择原行政机关或复议机关'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。告原行为时复议机关不是被告，复议机关只有在告"不作为"时才可能成为被告。<br><b>B选项</b>：正确。复议不作为时，告原行为→原机关为被告（《行政诉讼法》第二十六条）。<br><b>C选项</b>：错误。共同被告仅适用于复议维持，不适用于复议不作为。<br><b>D选项</b>：错误。这是对规则的误解——选择是针对"告什么行为"，不是随意选被告。告原行为则被告为原机关，告不作为则被告为复议机关。', tip: '复议机关"装死"不答复？你有两个选择：①告原来的处罚→被告是原机关；②告复议机关"不作为"→被告是复议机关。告哪个行为，对应的机关就是被告。选好了就不能改。' },
                    { type: 'single', q: '市建设委员会印发通告，责令特定50家住户限期拆迁。该通告属于？', opts: ['A. 抽象行政行为', 'B. 具体行政行为', 'C. 内部行政行为', 'D. 行政指导'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。虽然形式是"通告"（通常针对不特定对象），但本案对象是<b>特定的50家住户</b>，不是全市人民。<br><b>B选项</b>：正确。对象特定+直接影响权利义务=具体行政行为，可诉。<br><b>C选项</b>：错误。该通告对外发布，非机关内部事务。<br><b>D选项</b>：错误。行政指导是建议性的，不具强制力；该通告责令拆迁具有强制性。', tip: '别被"通告"这个名字骗了！看实质不要看形式——针对特定50家、不拆就强拆，这就是具体行政行为。就像老师点名让第一排5个同学站起来，虽然用喊的（通告形式），但对象是特定的。' },
                    { type: 'single', q: '因不动产提起的行政诉讼，最长起诉期限是？', opts: ['A. 2年', 'B. 5年', 'C. 10年', 'D. 20年'], correct: 3, explain: '正确答案是<b>D</b>。', detail: '<b>A选项</b>：错误。2年是一般行政处罚的追究时效，不是起诉期限。<br><b>B选项</b>：错误。5年是其他案件（非不动产）的最长起诉期限（从行政行为作出之日起算）。<br><b>C选项</b>：错误。没有这个期限规定。<br><b>D选项</b>：正确。不动产最长20年（《行政诉讼法》第四十六条），从行政行为作出之日起算，不论当事人是否知道。', tip: '不动产20年，其他5年。为什么不动产特别长？因为房子是"一辈子的事"，可能当事人出国20年回来发现房子被拆了，总得给个告的机会。20年=一代人，足够你发现了。' },
                    { type: 'single', q: '被告应当在收到起诉状副本后多少日内提交证据？', opts: ['A. 5日', 'B. 10日', 'C. 15日', 'D. 30日'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：错误。5日是法院发送起诉状副本的期限，不是被告提交证据的期限。<br><b>B选项</b>：错误。没有这个期限规定。<br><b>C选项</b>：正确。被告收到起诉状副本后15日内提交证据和答辩状（《行政诉讼法》第六十七条）。<br><b>D选项</b>：错误。30日是其他程序中的期限（如复议申请期限）。', tip: '被告有15天准备证据，过期不交=没证据=等着输。这15天是硬杠杠，行政机关必须重视。法院发诉状5天，被告交证据15天，别记反了。' },
                    { type: 'single', q: '关于行政诉讼证据，以下说法正确的是？', opts: ['A. 原告承担全部举证责任', 'B. 被告承担主要举证责任', 'C. 法院承担举证责任', 'D. 谁主张谁举证'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。被告承担主要举证责任，原告也需提供起诉条件材料。<br><b>B选项</b>：正确。行政诉讼举证责任"主要由被告承担"（《行政诉讼法》第三十四条）。<br><b>C选项</b>：错误。法院不承担举证责任，法院是裁判者。<br><b>D选项</b>：错误。"谁主张谁举证"是民事诉讼原则，行政诉讼适用"被告举证为主"。', tip: '行政诉讼和民事诉讼不一样！民事诉讼是"谁告谁举证"，行政诉讼是"官举证"。因为官有权有势，老百姓举不出那么多证据，所以法律把举证责任甩给官。' },
                    { type: 'single', q: '14岁的刘某因违法经营被罚款，不服欲起诉。应由谁代为提起？', opts: ['A. 刘某本人', 'B. 刘某的父母', 'C. 刘某可任意委托成年人', 'D. 法院指定的人'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。14岁是限制行为能力人，不能独立进行诉讼。<br><b>B选项</b>：正确。父母是法定代理人，代为诉讼（与复议规则一致）。<br><b>C选项</b>：错误。不是任意委托，必须由法定代理人代理。<br><b>D选项</b>：错误。父母互相推诿时法院才指定，正常情况下由父母代理。', tip: '14岁=未成年人，打官司需要家长（父母）代理。就像小孩看病需要家长签字一样，法律上小孩不能独立"签字画押"。如果爸妈互相推，法院指定一个。' },
                    { type: 'single', q: '人民法院在开庭前几日应用传票传唤当事人？', opts: ['A. 3日', 'B. 5日', 'C. 7日', 'D. 10日'], correct: 0, explain: '正确答案是<b>A</b>。', detail: '<b>A选项</b>：正确。开庭前3日用传票传唤当事人（原告、被告、第三人）。<br><b>B选项</b>：错误。5日是法院发送诉状副本的期限。<br><b>C选项</b>：错误。7日是交换证据等其他事项的期限。<br><b>D选项</b>：错误。没有这个开庭通知期限。', tip: '提前3天通知，给足准备时间。当事人用传票（正式），证人等非当事人用通知书（相对随意）。传票比通知书正式。' },
                    { type: 'single', q: '二审法院经审理认为原判决遗漏当事人的，应如何处理？', opts: ['A. 驳回上诉', 'B. 直接追加当事人后改判', 'C. 撤销原判，发回重审', 'D. 裁定补正'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：错误。遗漏当事人是严重程序违法，不能简单驳回。<br><b>B选项</b>：错误。二审不能自己追加当事人继续审，这会剥夺被追加人的上诉权。<br><b>C选项</b>：正确。严重违反法定程序（遗漏当事人）→撤销原判、发回重审（《行政诉讼法》第八十九条）。<br><b>D选项</b>：错误。遗漏当事人不是小瑕疵，不能用裁定补正。', tip: '一审漏了人=程序出错。二审不能说"我帮你加上去继续审"——这样被加进来的人就少了一级审理（没经历一审直接二审），不公平。所以退回一审重来。' },
                    { type: 'single', q: '行政赔偿诉讼与其他行政诉讼的最大区别在于？', opts: ['A. 复议前置', 'B. 可以调解', 'C. 合议制', 'D. 审限不同'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。行政赔偿不是复议前置案件，可直接诉讼。<br><b>B选项</b>：正确。一般行政诉讼不适用调解，但行政赔偿案件可以调解（《行政诉讼法》第六十条）。<br><b>C选项</b>：错误。合议制是审判组织形式，赔偿诉讼和其他行政诉讼都用。<br><b>D选项</b>：错误。审限与其他行政诉讼相同。', tip: '赔多少钱可以商量（调解），但行政行为合不合法不能商量。就像撞车了：责任认定不能商量（红灯就是你全责），但赔多少钱可以谈（协商赔偿金额）。' },
                    { type: 'single', q: '当事人不服不予立案裁定的，可在几日内向上一级法院上诉？', opts: ['A. 5日', 'B. 10日', 'C. 15日', 'D. 30日'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。5日是法院发送诉状副本的期限。<br><b>B选项</b>：正确。对程序性裁定（不予立案）的上诉期是10日（《行政诉讼法》第八十五条）。<br><b>C选项</b>：错误。15日是对实体判决的上诉期。<br><b>D选项</b>：错误。没有这个期限。', tip: '裁定=程序问题，上诉10天；判决=实体问题，上诉15天。程序简单时间短，实体复杂时间长。' },
                    { type: 'single', q: '以下哪项不属于行政诉讼受案范围？', opts: ['A. 对吊销营业执照不服', 'B. 对行政拘留不服', 'C. 对刑事拘留不服', 'D. 对征收补偿决定不服'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：属于。吊销执照是行政处罚，可诉。<br><b>B选项</b>：属于。行政拘留是行政处罚，可诉。<br><b>C选项</b>：不属于。刑事拘留是依据刑事诉讼法的刑事司法行为，不可诉（《行政诉讼法解释》第一条）。<br><b>D选项</b>：属于。征收补偿决定是具体行政行为，可诉。', tip: '同样都是公安机关干的，看依据什么法！依据行政法（如治安处罚法）→可诉；依据刑事诉讼法（如刑拘）→不可诉。区分标准是"戴什么帽子"——行政的帽子可告，刑事的帽子不可告。' },
                    { type: 'single', q: '中级人民法院管辖的第一审行政案件不包括？', opts: ['A. 海关处理的案件', 'B. 被告为国务院部门的案件', 'C. 被告为县级政府工作部门的案件', 'D. 本辖区内重大复杂案件'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：属于。海关案件由中院管辖（《行政诉讼法》第十五条）。<br><b>B选项</b>：属于。被告是国务院部门→中院管辖。<br><b>C选项</b>：不属于。县级政府工作部门（如县公安局）→基层法院管辖。只有县级以上政府本身才去中院。<br><b>D选项</b>：属于。本辖区重大复杂案件归中院。', tip: '"政府"和"政府部门"不一样！告县政府→中院，告县公安局→基层法院。政府部门级别再高（如公安厅）也去基层，除非是国务院部门（公安部）才去中院。' },
                    { type: 'single', q: '根据《行政诉讼法》，人民法院判决变更不得？', opts: ['A. 确认行政行为违法', 'B. 加重原告的义务或减损原告的权益', 'C. 维持原行政行为', 'D. 责令被告履行'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：可以。确认违法是独立的判决类型。<br><b>B选项</b>：正确。变更判决一般不得加重原告义务（禁止不利变更），除非利害关系人同为原告且请求相反。<br><b>C选项</b>：可以。驳回诉讼请求相当于"维持"效果。<br><b>D选项</b>：可以。责令履行是另一种判决类型。', tip: '"上诉不加刑"的行政版——法院改判不能让你更惨。否则谁还敢告？但如果受害人也告了要求加重处罚，法院可以加重。这是唯一的例外。' },
                    { type: 'single', q: '关于行政诉讼简易程序，以下说法错误的是？', opts: ['A. 仅适用于第一审案件', 'B. 审理期限为45日', 'C. 可延长15天', 'D. 可由一名审判员独任审理'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：正确。简易程序仅适用于一审（二审、再审、发回重审不适用）。<br><b>B选项</b>：正确。简易审限45天。<br><b>C选项</b>：错误。简易程序<b>无延长机制</b>，审不完转普通程序。<br><b>D选项</b>：正确。简易程序独任审理。', tip: '简易程序45天必须搞定，搞不定就转普通程序（6个月重新算）。没有"延期"一说，因为简易就是追求快，延期就违背本意了。' },
                    { type: 'single', q: '行政机关拒绝履行判决，法院可采取的措施不包括？', opts: ['A. 通知银行划拨款项', 'B. 对负责人按日处罚款', 'C. 冻结行政机关账户', 'D. 公告拒绝履行情况'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：包括。法院可通知银行划拨款项（《行政诉讼法》第九十六条）。<br><b>B选项</b>：包括。对负责人按日处50~100元罚款。<br><b>C选项</b>：不包括。执行措施是<b>划拨</b>而非<b>冻结</b>。冻结是强制措施，划拨是执行措施，直接划走即可。<br><b>D选项</b>：包括。可将拒绝履行情况予以公告。', tip: '划拨=直接拿钱走，冻结=暂时不准动。执行阶段直接划拨，不需要先冻着。就像讨债：法院直接扣工资，不需要先冻结你的卡再扣。一步到位。' },
                    { type: 'single', q: '行政复议与行政诉讼在审查范围上的核心区别是？', opts: ['A. 复议审查合法性，诉讼审查合理性', 'B. 复议审查合法性和合理性，诉讼仅审查合法性', 'C. 两者审查范围完全相同', 'D. 复议仅审查合理性，诉讼仅审查合法性'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。说反了——复议才管合理性。<br><b>B选项</b>：正确。复议=合法+合理（双审），诉讼=仅合法（单审）。<br><b>C选项</b>：错误。两者审查范围不同。<br><b>D选项</b>：错误。复议也审查合法性，不是仅审查合理性。', tip: '复议是"全科医生"（合法+合理都看），法院是"专科医生"（只看合法）。复议管得更宽，因为复议机关是上级，更懂行政事务。' },
                    { type: 'single', q: '第一审普通程序的审理期限，需延长时应由谁批准？', opts: ['A. 本院院长', 'B. 上一级法院', 'C. 高级人民法院', 'D. 最高人民法院'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：错误。本院院长无权批准延长审限。<br><b>B选项</b>：错误。上一级法院（中级）只能备案，无权批准。<br><b>C选项</b>：正确。基层和中级法院审理的案件延长审限须报高级法院批准（《行政诉讼法》第八十一条）。<br><b>D选项</b>：错误。高级法院自己审理的案件延长才需最高法院批准。', tip: '基层和中级法院没资格自己延长——必须找"省里"（高级法院）批。中级法院只有"知情权"（备案），没有"决定权"。四级法院只有高级和最高级有权批延长。' },
                    { type: 'single', q: '原告向两个以上有管辖权的法院起诉的，由哪个法院管辖？', opts: ['A. 原告选择', 'B. 被告选择', 'C. 最先立案的法院', 'D. 最先收到起诉状的法院'], correct: 2, explain: '正确答案是<b>C</b>。', detail: '<b>A选项</b>：错误。原告可以选择一个法院起诉，但如果向多个法院起诉，由最先立案的管辖。<br><b>B选项</b>：错误。被告无权选择管辖法院。<br><b>C选项</b>：正确。最先立案的法院管辖（《行政诉讼法》第二十一条）。<br><b>D选项</b>：错误。"立案"不等于"收到起诉状"，立案才是正式受理。', tip: '谁先立案谁管辖，不是谁先收到起诉状。立案=正式受理，收到起诉状只是初步接触。就像排队：谁先取号（立案）谁先办，不是谁先进门（递状子）谁先办。' },
                    { type: 'single', q: '诉讼期间，行政行为的执行原则是？', opts: ['A. 停止执行', 'B. 不停止执行', 'C. 由法院决定', 'D. 由当事人协商'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。停止执行是例外，不是原则。<br><b>B选项</b>：正确。诉讼期间不停止行政行为的执行（《行政诉讼法》第五十六条）。<br><b>C选项</b>：错误。法院裁定停止执行需要满足特定条件。<br><b>D选项</b>：错误。当事人不能协商决定是否停止执行。', tip: '原则上不停止——不能因为告了官就暂停执法。否则人人都去告，行政机关还怎么干活？但有例外：被告自己觉得该停、法院裁定该停、法律规定该停。' },
                    { type: 'single', q: '行政复议决定的类型与行政诉讼判决类型相比？', opts: ['A. 完全不同', 'B. 两者基本相似', 'C. 复议类型更多', 'D. 诉讼类型更多'], correct: 1, explain: '正确答案是<b>B</b>。', detail: '<b>A选项</b>：错误。两者高度相似，并非完全不同。<br><b>B选项</b>：正确。复议决定和诉讼判决基本相似——都有维持/驳回、撤销、变更、确认违法等。<br><b>C选项</b>：错误。类型数量大致相当。<br><b>D选项</b>：错误。类型数量大致相当。', tip: '复议和诉讼的判决类型"长得像双胞胎"——都有维持（诉讼叫"驳回诉讼请求"）、撤销、变更、确认违法。最大的区别：复议可以直接"变更"的范围更广，诉讼变更仅限于"明显不当"和"款额认定错误"。' }
                ];

                // ==================== 多选题10道 ====================
                const multiQuizzes = [
                    { type: 'multi', q: '以下哪些属于行政诉讼的基本原则？（多选）', opts: ['A. 合法性审查原则', 'B. 合理性审查原则', 'C. 独立审判原则', 'D. 辩论原则', 'E. 当事人法律地位平等原则'], correct: [0, 2, 3, 4], multi: true, explain: '正确答案是<b>A、C、D、E</b>。', detail: '<b>A选项</b>：正确。合法性审查是行政诉讼最核心的原则（《行政诉讼法》第六条）。<br><b>B选项</b>：错误。合理性审查是行政复议的原则，行政诉讼仅审查合法性。<br><b>C选项</b>：正确。法院独立行使审判权（《行政诉讼法》第四条）。<br><b>D选项</b>：正确。当事人有辩论权（《行政诉讼法》第十条）。<br><b>E选项</b>：正确。诉讼中双方地位平等（《行政诉讼法》第八条）。', tip: '记住B是"卧底"——合理性审查是复议的事，不是诉讼的。法院只管"合不合法"，合不合理找复议。其他四个都是诉讼的基本原则。' },
                    { type: 'multi', q: '以下哪些属于不可提起行政诉讼的范围？（多选）', opts: ['A. 国防外交等国家行为', 'B. 行政法规、规章', 'C. 行政机关对工作人员的奖惩决定', 'D. 公安机关的刑事拘留', 'E. 行政机关不履行法定职责'], correct: [0, 1, 2, 3], multi: true, explain: '正确答案是<b>A、B、C、D</b>。', detail: '<b>A选项</b>：不可诉。国家行为（国防、外交）不可诉（《行政诉讼法》第十三条）。<br><b>B选项</b>：不可诉。抽象行政行为不可直接诉，只能附带审查。<br><b>C选项</b>：不可诉。内部行政行为不可诉。<br><b>D选项</b>：不可诉。刑事司法行为不可诉。<br><b>E选项</b>：可诉。不履行法定职责属于行政不作为，是可诉的。', tip: 'E是"卧底"——不作为是可诉的！如果你申请保护但公安不出警，这属于不履责，可以告。其他四个都是不可诉的"禁区"。' },
                    { type: 'multi', q: '中级人民法院管辖的第一审行政案件包括？（多选）', opts: ['A. 对国务院部门提起诉讼', 'B. 对县级以上地方政府提起诉讼', 'C. 海关处理的案件', 'D. 本辖区内重大复杂案件', 'E. 对公安厅提起诉讼'], correct: [0, 1, 2, 3], multi: true, explain: '正确答案是<b>A、B、C、D</b>。', detail: '<b>A选项</b>：正确。被告为国务院部门→中院（《行政诉讼法》第十五条）。<br><b>B选项</b>：正确。被告为县级以上政府→中院。<br><b>C选项</b>：正确。海关案件不论级别→中院。<br><b>D选项</b>：正确。本辖区重大复杂案件→中院。<br><b>E选项</b>：错误。公安厅是"省级部门"而非"国务院部门"，去基层法院。', tip: 'E公安厅是陷阱！省级部门≠国务院部门。只有"公安部"这种国务院的部门才去中院，省里的部门（公安厅）去基层。' },
                    { type: 'multi', q: '关于行政诉讼被告的确定，以下说法正确的有？（多选）', opts: ['A. 复议维持的，原机关和复议机关为共同被告', 'B. 复议改变的，复议机关为被告', 'C. 复议不作为的，原告可选择原机关或复议机关', 'D. 行政机关委托的组织作出行为的，受委托组织为被告', 'E. 行政机关被撤销的，继续行使其职权的机关为被告'], correct: [0, 1, 2, 4], multi: true, explain: '正确答案是<b>A、B、C、E</b>。', detail: '<b>A选项</b>：正确。复议维持→共同被告（《行政诉讼法》第二十六条）。<br><b>B选项</b>：正确。复议改变→复议机关单独为被告。<br><b>C选项</b>：正确。复议不作为→选择告（看告什么行为）。<br><b>D选项</b>：错误。委托的被告是<b>委托机关</b>，受托组织不具备行政主体资格。<br><b>E选项</b>：正确。机关被撤销→继续行使职权的机关为被告。', tip: 'D是陷阱！受委托组织不能当被告，因为委托=借名办事，责任由委托机关担。就像你帮朋友跑腿买东西，东西有问题，商家找的是你朋友（委托方）不是你（受托方）。' },
                    { type: 'multi', q: '行政诉讼中，被告及其诉讼代理人不得自行向哪些人收集证据？（多选）', opts: ['A. 原告', 'B. 第三人', 'C. 证人', 'D. 下级机关', 'E. 人民法院'], correct: [0, 1, 2], multi: true, explain: '正确答案是<b>A、B、C</b>。', detail: '<b>A选项</b>：正确。禁止向原告收集证据（《行政诉讼法》第三十五条）。<br><b>B选项</b>：正确。禁止向第三人收集证据。<br><b>C选项</b>：正确。禁止向证人收集证据。<br><b>D选项</b>：错误。下级机关不在禁止范围内。<br><b>E选项</b>：错误。法院不在禁止范围内。', tip: '禁止向"诉讼参与人"收集——原告、第三人、证人都是诉讼当事人或参与人，事后找他们补证据=程序违法。但找自己下级机关或法院是可以的，因为不是针对案件当事人。' },
                    { type: 'multi', q: '以下哪些情形下，行政行为应判决确认无效？（多选）', opts: ['A. 实施主体不具有行政主体资格', 'B. 行政行为没有依据', 'C. 行政行为程序轻微违法', 'D. 行政行为重大且明显违法', 'E. 行政处罚明显不当'], correct: [0, 1, 3], multi: true, explain: '正确答案是<b>A、B、D</b>。', detail: '<b>A选项</b>：正确。无主体资格→确认无效（《行政诉讼法》第七十五条）。<br><b>B选项</b>：正确。无依据→确认无效。<br><b>C选项</b>：错误。程序轻微违法→确认违法但不撤销。<br><b>D选项</b>：正确。重大且明显违法→确认无效。<br><b>E选项</b>：错误。明显不当→可撤销或变更，不是确认无效。', tip: '无效是最严重的——"假警察"罚你、"没有法条依据"就罚你，这些都是"从根上烂了"的处罚，直接无效。一般违法（程序错了、证据不足）用撤销，不够无效的级别。' },
                    { type: 'multi', q: '关于行政诉讼简易程序，以下说法正确的有？（多选）', opts: ['A. 仅适用于第一审案件', 'B. 可由一名审判员独任审理', 'C. 审理期限为45日', 'D. 可适用于发回重审案件', 'E. 当事人各方同意可适用'], correct: [0, 1, 2, 4], multi: true, explain: '正确答案是<b>A、B、C、E</b>。', detail: '<b>A选项</b>：正确。简易程序仅适用于一审。<br><b>B选项</b>：正确。简易独任审理（《行政诉讼法》第八十三条）。<br><b>C选项</b>：正确。审限45天。<br><b>D选项</b>：错误。发回重审一律不适用简易。<br><b>E选项</b>：正确。当事人各方同意可适用简易（意定简易）。', tip: 'D发回重审是"翻案重审"，本来就复杂，不能用简易。其他都是简易程序的正确特征。记住：简易=一审专用、一人审、45天、可协商适用。' },
                    { type: 'multi', q: '二审法院在哪些情形下可以撤销原判、发回重审？（多选）', opts: ['A. 原判决遗漏当事人', 'B. 违法缺席判决', 'C. 原判决认定事实错误', 'D. 严重违反法定程序', 'E. 原判决适用法律错误'], correct: [0, 1, 3], multi: true, explain: '正确答案是<b>A、B、D</b>。', detail: '<b>A选项</b>：正确。遗漏当事人是严重程序违法→发回重审（《行政诉讼法》第八十九条）。<br><b>B选项</b>：正确。违法缺席判决→发回重审。<br><b>C选项</b>：错误。事实错误→二审可查清后改判，不一定发回。<br><b>D选项</b>：正确。严重违反法定程序→发回重审。<br><b>E选项</b>：错误。法律适用错误→二审直接改判即可，不需要发回。', tip: '发回重审只针对"程序问题"（漏人、违法缺席等），"事实和法律问题"二审自己改就行。逻辑：程序错了必须重来，事实法律错了二审纠正即可。' },
                    { type: 'multi', q: '行政机关拒绝履行裁判时，法院可采取的措施有？（多选）', opts: ['A. 通知银行划拨款项', 'B. 对负责人按日处罚款', 'C. 公告拒绝履行情况', 'D. 向监察机关提出司法建议', 'E. 冻结行政机关账户'], correct: [0, 1, 2, 3], multi: true, explain: '正确答案是<b>A、B、C、D</b>。', detail: '<b>A选项</b>：正确。划拨款项是执行措施（《行政诉讼法》第九十六条）。<br><b>B选项</b>：正确。对负责人按日处罚款50~100元。<br><b>C选项</b>：正确。公告是舆论压力。<br><b>D选项</b>：正确。司法建议是正式监督。<br><b>E选项</b>：错误。执行措施是<b>划拨</b>不是冻结，冻结是强制措施不是执行措施。', tip: 'E是"冻"不是"拨"——一个字之差天壤之别。冻结只是"先冻住"，划拨才是"直接拿走"。执行阶段直接划拨干净利落，不需要先冻着。' },
                    { type: 'multi', q: '以下属于复议前置（必须先复议才能诉讼）的情形有？（多选）', opts: ['A. 对当场作出的行政处罚决定不服', 'B. 对自然资源所有权或使用权决定不服', 'C. 认为行政机关未履行法定职责', 'D. 政府信息公开申请被拒绝', 'E. 对行政拘留不服'], correct: [0, 1, 2, 3], multi: true, explain: '正确答案是<b>A、B、C、D</b>。', detail: '<b>A选项</b>：属于。当场处罚→复议前置（《行政复议法》第二十三条）。<br><b>B选项</b>：属于。自然资源权属→复议前置。<br><b>C选项</b>：属于。认为未履责→复议前置。<br><b>D选项</b>：属于。信息公开被拒→复议前置。<br><b>E选项</b>：不属于。行政拘留不是复议前置，可直接诉讼。', tip: 'E行政拘留虽然严重，但不是复议前置，可以直接告。为什么？因为拘留涉及人身自由，需要最快获得司法救济。口诀："当场处罚、自然资源、不履责、信息不公开"这四个必须先复议。' }
                ];

        }];







        // ==================== 渲染引擎 ====================
        function renderAll() {
            const main = document.getElementById('mainContent');
            let html = '';
            knowledgeData.forEach(mod => {
                html +=
                    `<div class="card" id="${mod.id}"><div class="section-title"><div class="icon ${mod.iconClass}">${mod.iconEmoji}</div>${mod.title}</div>`;
                if (mod.subtitle) html += `<div class="subtitle">${mod.subtitle}</div>`;
                if (mod.items && mod.items.length > 0) {
                    html += '<div class="ki-grid">';
                    mod.items.forEach(item => {
                        if (item.type === 'table') html += item.html;
                        else if (item.type === 'ki') html += renderKI(item);
                    });
                    html += '</div>';
                }
                if (mod.quizzes && mod.quizzes.length > 0) {
                    mod.quizzes.forEach((q, qi) => {
                        html += renderQuiz(q, mod.id + '-q' + qi);
                    });
                }
                html += '</div>';
            });
            main.innerHTML = html;
            generateTOC();
        }

        function generateTOC() {
            var toc = document.getElementById('toc');
            if (!toc) return;
            // 保留标题栏
            var titleHtml = '<div class="toc-title">📑 行政诉讼法目录</div>';
            var links = '';
            knowledgeData.forEach(function(mod) {
                links += '<a href="#' + mod.id + '">' + mod.title + '</a>';
            });
            toc.innerHTML = titleHtml + links;
            // 重新绑定点击事件（移动端点击目录项后自动关闭侧栏）
            var tocLinks = document.querySelectorAll('.toc a');
            for (var i = 0; i < tocLinks.length; i++) {
                tocLinks[i].addEventListener('click', function() {
                    if (window.innerWidth <= 768) closeToc();
                });
            }
        }

        function renderKI(item) {
            let h = '<div class="ki-item">';
            h +=
                `<div class="ki-title-row">${item.badge ? `<span class="badge ${item.badgeClass}">${item.badge}</span>` : ''}${item.title}</div>`;
            h += `<div class="ki-content">${item.content}</div>`;
            if (item.extra) h +=
                `<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">${item.extra}</div>`;
            if (item.example) {
                h +=
                    `<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">${item.example.q}</div><div class="ex-a">${item.example.a}</div></div>`;
            }
            h += '</div>';
            return h;
        }

                  function renderQuiz(q, qid) {
            const qTypeLabel = q.isTF ? '【判断题】' : (q.multi ? '【多选题】' : '【单选题】');
            let h = '<div class="quiz-wrap" data-qid="' + qid + '">';
            h += '<div class="q-type">📝 ' + qTypeLabel + '</div>';
            if (q.isTF) {
                h += '<div style="font-size:0.78rem;color:#b7950b;margin-bottom:2px;">第' + q.tfId + '题</div>';
            }
            h += '<div class="q-text">' + q.q + '</div>';
            h += '<ul class="opt-list">';
            for (var i = 0; i < q.opts.length; i++) {
                h += '<li data-idx="' + i + '" onclick="selectOpt(this,\'' + qid + '\',' + i + ',' + (q.multi || false) + ')">' + q.opts[i] + '</li>';
            }
            h += '</ul>';
            h += '<div class="btn-row">';
            h += '<button class="btn btn-primary" onclick="submitQuiz(\'' + qid + '\',' + JSON.stringify(q.correct) + ',' + (q.multi || false) + ')">✅ 提交答案</button>';
            h += '<button class="btn btn-outline" onclick="resetQuiz(\'' + qid + '\')">🔄 重做</button>';
            h += '</div>';
            h += '<div class="explain-card" id="ex-' + qid + '">';
            h += '<div class="ex-head"></div>';
            h += '<div class="ex-body"></div>';
            if (q.detail) {
                var detailHtml = q.detail
    .replace(/([A-E])选项<\/b>：(正确|属于|可诉)/g, '<span style="color:#145a32;">✅ $1选项</b>：$2</span>')
    .replace(/([A-E])选项<\/b>：(错误|不属于|不可诉)/g, '<span style="color:#b22222;">❌ $1选项</b>：$2</span>');
h += '<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>' + detailHtml + '</div>';
            }
            h += '<div class="ex-tip">💡 <b>大白话理解：</b>' + q.tip + '</div>';
            h += '</div>';
            h += '</div>';
            return h;
        }

        // ==================== 答题交互 ====================
        function selectOpt(el, qid, idx, multi) {
            const wrap = el.closest('.quiz-wrap');
            if (wrap.classList.contains('submitted')) return;
            const allOpts = wrap.querySelectorAll('.opt-list li');
            if (multi) {
                el.classList.toggle('selected');
            } else {
                allOpts.forEach(o => o.classList.remove('selected'));
                el.classList.add('selected');
            }
        }

                      function submitQuiz(qid, correct, multi) {
            var wrap = document.querySelector('[data-qid="' + qid + '"]');
            if (wrap.classList.contains('submitted')) return;
            wrap.classList.add('submitted');
            var allOpts = wrap.querySelectorAll('.opt-list li');
            var correctArr = Array.isArray(correct) ? correct : [correct];
            var selectedIdxs = [];
            for (var i = 0; i < allOpts.length; i++) {
                if (allOpts[i].classList.contains('selected')) {
                    selectedIdxs.push(i);
                }
            }
            var isCorrect;
            if (multi) {
                isCorrect = selectedIdxs.length === correctArr.length;
                for (var j = 0; j < selectedIdxs.length; j++) {
                    if (correctArr.indexOf(selectedIdxs[j]) === -1) {
                        isCorrect = false;
                        break;
                    }
                }
            } else {
                isCorrect = selectedIdxs.length === 1 && selectedIdxs[0] === correctArr[0];
            }

            for (var k = 0; k < allOpts.length; k++) {
                allOpts[k].classList.add('disabled');
                if (correctArr.indexOf(k) !== -1) {
                    allOpts[k].classList.add('correct');
                }
            }
            if (!isCorrect) {
                for (var m = 0; m < selectedIdxs.length; m++) {
                    if (correctArr.indexOf(selectedIdxs[m]) === -1) {
                        allOpts[selectedIdxs[m]].classList.add('wrong');
                    }
                }
            }

            var exEl = document.getElementById('ex-' + qid);
            exEl.classList.add('show');
            if (isCorrect) {
                exEl.classList.add('correct-ex');
                exEl.classList.remove('wrong-ex');
                exEl.querySelector('.ex-head').textContent = '🎉 回答正确！';
                exEl.querySelector('.ex-body').textContent = '';
                var exDetail = exEl.querySelector('.ex-detail');
                if (exDetail) {
                    exDetail.style.display = 'block';
                }
            } else {
                exEl.classList.add('wrong-ex');
                exEl.classList.remove('correct-ex');
                exEl.querySelector('.ex-head').textContent = '😞 回答错误';
                var letters = ['A', 'B', 'C', 'D', 'E'];
                var correctLetters = correctArr.map(function(c) { return letters[c]; }).join('、');
                exEl.querySelector('.ex-body').innerHTML = '正确答案是：<b>' + correctLetters + '</b>';
                var exDetail2 = exEl.querySelector('.ex-detail');
                if (exDetail2) {
                    exDetail2.style.display = 'block';
                }
            }
            updateProgress();
        }



        function resetQuiz(qid) {
            const wrap = document.querySelector(`[data-qid="${qid}"]`);
            wrap.classList.remove('submitted');
            wrap.querySelectorAll('.opt-list li').forEach(o => {
                o.classList.remove('selected', 'correct', 'wrong', 'disabled');
            });
            const exEl = document.getElementById('ex-' + qid);
            exEl.classList.remove('show', 'correct-ex', 'wrong-ex');
        }

        document.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
</html>
