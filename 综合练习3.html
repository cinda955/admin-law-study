<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合练习3 - 辅警备考</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%); min-height: 100vh; color: #333; }
        .progress-bar { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 1000; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #34495e, #27ae60); width: 0%; transition: width 0.3s ease; }
        .top-nav { position: fixed; top: 4px; left: 0; right: 0; background: rgba(52, 73, 94, 0.95); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 999; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .logo { color: #fff; font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .score-display { background: rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .sidebar { position: fixed; left: 0; top: 50px; width: 260px; height: calc(100vh - 50px); background: rgba(255,255,255,0.95); overflow-y: auto; padding: 20px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 998; }
        .sidebar-title { color: #2c3e50; padding: 0 20px 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .nav-item { padding: 12px 20px; color: #666; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; font-size: 14px; border-left: 3px solid transparent; text-decoration: none; }
        .nav-item:hover { background: rgba(52, 73, 94, 0.1); color: #34495e; }
        .nav-item.active { background: rgba(52, 73, 94, 0.15); color: #34495e; border-left-color: #34495e; font-weight: bold; }
        .main-content { margin-left: 260px; padding: 70px 30px 30px; max-width: 900px; }
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-header h1 { font-size: 42px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 30px rgba(0,0,0,0.2); }
        .section-header p { color: rgba(255,255,255,0.8); font-size: 16px; }
        .highlight-red { color: #e74c3c; font-weight: bold; background: rgba(231, 76, 60, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-blue { color: #3498db; font-weight: bold; background: rgba(52, 152, 219, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-green { color: #27ae60; font-weight: bold; background: rgba(39, 174, 96, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-orange { color: #e67e22; font-weight: bold; background: rgba(230, 126, 34, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-purple { color: #9b59b6; font-weight: bold; background: rgba(155, 89, 182, 0.1); padding: 2px 6px; border-radius: 4px; }
        .quiz-container { margin-top: 30px; }
        .quiz-card { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .question { font-size: 16px; color: #333; margin-bottom: 15px; font-weight: 500; line-height: 1.6; }
        .question-num { display: inline-block; background: #34495e; color: #fff; width: 28px; height: 28px; border-radius: 50%; text-align: center; line-height: 28px; margin-right: 10px; font-size: 14px; }
        .module-tag { display: inline-block; background: #e74c3c; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 10px; }
        .module-tag.multi { background: #9b59b6; }
        .module-tag.judge { background: #e67e22; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 12px 20px; background: #fff; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; color: #555; transition: all 0.3s ease; }
        .option-btn:hover { border-color: #34495e; background: rgba(52, 73, 94, 0.05); }
        .option-letter { display: inline-block; width: 26px; height: 26px; background: #e9ecef; border-radius: 50%; text-align: center; line-height: 26px; margin-right: 10px; font-weight: bold; color: #34495e; }
        .option-btn.correct { background: #d4edda; border-color: #28a745; }
        .option-btn.correct .option-letter { background: #28a745; color: #fff; }
        .option-btn.wrong { background: #f8d7da; border-color: #dc3545; }
        .option-btn.wrong .option-letter { background: #dc3545; color: #fff; }
        .option-btn.disabled { cursor: not-allowed; opacity: 0.7; }
        .explanation { background: linear-gradient(135deg, #fff8e1, #ffecb3); border-radius: 10px; padding: 15px 20px; margin-top: 15px; display: none; line-height: 1.8; border: 1px solid #ffc107; }
        .explanation .result { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .explanation .result.correct { color: #28a745; }
        .explanation .result.wrong { color: #dc3545; }
        .practice-section { background: #fff; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); scroll-margin-top: 100px; }
        .practice-section h2 { font-size: 28px; color: #333; margin-bottom: 25px; text-align: center; border-bottom: 2px solid #34495e; padding-bottom: 15px; }
        .practice-section h2 .badge { background: #34495e; color: #fff; padding: 3px 12px; border-radius: 12px; font-size: 14px; margin-left: 10px; }
        .practice-section h2 .multi-badge { background: #9b59b6; }
        .practice-section h2 .judge-badge { background: #e67e22; }
        .intro-card { background: linear-gradient(135deg, #34495e, #2c3e50); color: #fff; padding: 40px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .intro-card h2 { font-size: 32px; margin-bottom: 20px; }
        .intro-card p { font-size: 16px; line-height: 1.8; opacity: 0.9; }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .module-item { background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; font-size: 14px; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; margin-top: 50px; } .main-content { margin-left: 0; padding-top: 80px; } }
        .close-nav-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 18px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .close-nav-btn:hover { background: rgba(255,255,255,0.3); }
        
        /* 多选题样式 */
        .multi-options { display: flex; flex-direction: column; gap: 10px; }
        .multi-option { padding: 12px 20px; background: #fff; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; color: #555; transition: all 0.3s ease; display: flex; align-items: flex-start; gap: 12px; }
        .multi-option:hover { border-color: #9b59b6; background: rgba(155, 89, 182, 0.05); }
        .multi-option.selected { border-color: #9b59b6; background: rgba(155, 89, 182, 0.1); }
        .multi-option.selected .option-letter { background: #9b59b6; color: #fff; }
        .multi-option.correct { background: #d4edda; border-color: #28a745; }
        .multi-option.correct .option-letter { background: #28a745; color: #fff; }
        .multi-option.wrong { background: #f8d7da; border-color: #dc3545; }
        .multi-option.wrong .option-letter { background: #dc3545; color: #fff; }
        .multi-option.disabled { cursor: not-allowed; opacity: 0.7; }
        .multi-option.missed { background: #fff3cd; border-color: #ffc107; }
        .multi-option.missed .option-letter { background: #ffc107; color: #fff; }
        .checkbox { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all 0.2s; }
        .multi-option.selected .checkbox { background: #9b59b6; border-color: #9b59b6; }
        .multi-option.selected .checkbox::after { content: "✓"; color: #fff; font-weight: bold; }
        .submit-btn { display: block; width: 100%; padding: 14px 24px; background: linear-gradient(135deg, #9b59b6, #8e44ad); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 15px; }
        .submit-btn:hover { background: linear-gradient(135deg, #8e44ad, #7d3c98); transform: translateY(-2px); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .multi-hint { font-size: 12px; color: #9b59b6; margin-bottom: 15px; padding: 8px 12px; background: rgba(155, 89, 182, 0.1); border-radius: 6px; }
        
        /* 判断题样式 */
        .judge-options { display: flex; gap: 15px; margin-top: 15px; }
        .judge-btn { flex: 1; padding: 15px; border: 2px solid #e9ecef; border-radius: 10px; background: #fff; cursor: pointer; font-size: 16px; font-weight: bold; text-align: center; transition: all 0.3s; }
        .judge-btn:hover { border-color: #e67e22; background: rgba(230, 126, 34, 0.05); }
        .judge-btn.correct { background: #d4edda; border-color: #28a745; color: #28a745; }
        .judge-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #dc3545; }
        .judge-btn.disabled { cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="mainProgress"></div></div>
    <nav class="top-nav" id="topNav">
        <div class="logo">📚 综合练习3</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="score-display" id="totalScore">已答: 0/0</div>
            <button class="close-nav-btn" onclick="closeTopNav()">✕</button>
        </div>
    </nav>
    <aside class="sidebar">
        <div class="sidebar-title">📖 目录导航</div>
        <a href="#intro" class="nav-item active" onclick="scrollToSection(this, event)">📝 练习说明</a>
        <a href="#single" class="nav-item" onclick="scrollToSection(this, event)">✅ 单选题 (50题)</a>
        <a href="#judge" class="nav-item" onclick="scrollToSection(this, event)">❓ 判断题 (20题)</a>
        <a href="#multi" class="nav-item" onclick="scrollToSection(this, event)">☑️ 多选题 (30题)</a>
    </aside>
    <main class="main-content">
        <div class="section-header">
            <h1>📚 综合练习3</h1>
            <p>检验所有模块学习成果 · 100道原创题目</p>
        </div>
        
        <section id="intro" class="intro-card">
            <h2>🎯 综合练习3说明</h2>
            <p>本练习是辅警备考的综合性练习，涵盖所有核心法律模块：</p>
            <div class="module-grid">
                <div class="module-item">刑法</div>
                <div class="module-item">刑事诉讼法</div>
                <div class="module-item">行政处罚法</div>
                <div class="module-item">行政强制法</div>
                <div class="module-item">行政复议法</div>
                <div class="module-item">行政诉讼法</div>
                <div class="module-item">行政许可法</div>
                <div class="module-item">治安管理处罚法</div>
                <div class="module-item">国家赔偿法</div>
                <div class="module-item">警械武器条例</div>
                <div class="module-item">公安基础知识</div>
            </div>
            <p style="margin-top: 20px;">💡 <strong>答题技巧：</strong>每道题都有详细的逐项解析和小白记忆口诀，仔细阅读能帮助你快速掌握考点！</p>
        </section>
        
        <section id="single" class="practice-section">
            <h2>✅ 单选题专区 <span class="badge">50题</span></h2>
            <div id="quiz-single" class="quiz-container"></div>
        </section>

        <section id="judge" class="practice-section">
            <h2>❓ 判断题专区 <span class="judge-badge">20题</span></h2>
            <div id="quiz-judge" class="quiz-container"></div>
        </section>

        <section id="multi" class="practice-section">
            <h2>☑️ 多选题专区 <span class="multi-badge">30题</span></h2>
            <div id="quiz-multi" class="quiz-container"></div>
        </section>
    </main>

    <script>
        let answeredSingleCount = 0;
        let correctSingleCount = 0;
        let answeredJudgeCount = 0;
        let correctJudgeCount = 0;
        let answeredMultiCount = 0;
        let correctMultiCount = 0;
        let selectedOptions = {};
        
        function closeTopNav() {
            document.getElementById('topNav').style.display = 'none';
        }
        
        function scrollToSection(element, event) {
            event.preventDefault();
            const href = element.getAttribute('href');
            const target = document.querySelector(href);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');
            }
        }
        
        function renderQuiz(containerId, quizData, type) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '';
            quizData.forEach((item, index) => {
                html += `<div class="quiz-card" id="${containerId}-q${index}">
                    <span class="module-tag">${item.module}</span>
                    <p class="question"><span class="question-num">${index + 1}</span>${item.question}</p>
                    <div class="options">`;
                
                item.options.forEach((opt, optIndex) => {
                    html += `<button class="option-btn" onclick="checkAnswer('${containerId}', ${index}, ${optIndex}, this)">
                        <span class="option-letter">${String.fromCharCode(65 + optIndex)}</span>${opt}
                    </button>`;
                });
                
                html += `</div>
                    <div class="explanation" id="${containerId}-exp${index}"></div>
                </div>`;
            });
            
            container.innerHTML = html;
            updateProgress();
        }
        
        function renderJudgeQuiz(containerId, quizData) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '';
            quizData.forEach((item, index) => {
                html += `<div class="quiz-card" id="${containerId}-q${index}">
                    <span class="module-tag judge">${item.module}</span>
                    <p class="question"><span class="question-num">${index + 1}</span>${item.question}</p>
                    <div class="judge-options">
                        <button class="judge-btn" onclick="checkJudge('${containerId}', ${index}, true, this)">正确</button>
                        <button class="judge-btn" onclick="checkJudge('${containerId}', ${index}, false, this)">错误</button>
                    </div>
                    <div class="explanation" id="${containerId}-exp${index}"></div>
                </div>`;
            });
            
            container.innerHTML = html;
            updateProgress();
        }

        function renderMultiQuiz(containerId, quizData) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '';
            quizData.forEach((item, index) => {
                selectedOptions[`${containerId}-${index}`] = [];
                html += `<div class="quiz-card" id="${containerId}-q${index}">
                    <span class="module-tag multi">多选</span><span class="module-tag" style="margin-left:5px;">${item.module}</span>
                    <p class="question"><span class="question-num">${index + 1}</span>${item.question}</p>
                    <p class="multi-hint">提示：本题为多选题，请选择所有正确答案</p>
                    <div class="multi-options">`;
                
                item.options.forEach((opt, optIndex) => {
                    html += `<div class="multi-option" onclick="toggleMultiOption('${containerId}', ${index}, ${optIndex}, this)">
                        <div class="checkbox"></div>
                        <span class="option-letter">${String.fromCharCode(65 + optIndex)}</span>
                        <span>${opt}</span>
                    </div>`;
                });
                
                html += `</div>
                    <button class="submit-btn" onclick="checkMultiAnswer('${containerId}', ${index})">提交答案</button>
                    <div class="explanation" id="${containerId}-exp${index}"></div>
                </div>`;
            });
            
            container.innerHTML = html;
            updateProgress();
        }
        
        function toggleMultiOption(containerId, questionIndex, selectedIndex, element) {
            const key = `${containerId}-${questionIndex}`;
            const idx = selectedOptions[key].indexOf(selectedIndex);
            if (idx > -1) {
                selectedOptions[key].splice(idx, 1);
                element.classList.remove('selected');
            } else {
                selectedOptions[key].push(selectedIndex);
                element.classList.add('selected');
            }
        }
        
        function checkMultiAnswer(containerId, questionIndex) {
            let quizData;
            if (containerId === 'quiz-multi') {
                quizData = multiPracticeData;
            }
            
            const question = quizData[questionIndex];
            const card = document.getElementById(`${containerId}-q${questionIndex}`);
            const options = card.querySelectorAll('.multi-option');
            const submitBtn = card.querySelector('.submit-btn');
            const explanationDiv = document.getElementById(`${containerId}-exp${questionIndex}`);
            
            if (submitBtn.disabled) return;
            submitBtn.disabled = true;
            
            options.forEach(opt => opt.classList.add('disabled'));
            
            const correctSet = new Set(question.answer);
            const selectedSet = new Set(selectedOptions[`${containerId}-${questionIndex}`]);
            
            let isCorrect = correctSet.size === selectedSet.size && 
                           [...correctSet].every(x => selectedSet.has(x));
            
            options.forEach((opt, optIndex) => {
                if (correctSet.has(optIndex)) {
                    opt.classList.add('correct');
                } else if (selectedSet.has(optIndex)) {
                    opt.classList.add('wrong');
                }
            });
            
            if (!isCorrect) {
                options.forEach((opt, optIndex) => {
                    if (correctSet.has(optIndex) && !selectedSet.has(optIndex)) {
                        opt.classList.add('missed');
                    }
                });
            }
            
            answeredMultiCount++;
            if (isCorrect) correctMultiCount++;
            updateProgress();
            
            const correctLetters = [...correctSet].map(i => String.fromCharCode(65 + i)).sort().join('、');
            
            explanationDiv.innerHTML = `
                <div class="result ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '<span class="highlight-green">✓ 回答正确！</span>' : `<span class="highlight-red">✗ 回答错误</span> <span style="font-size:14px;color:#666;">正确答案：${correctLetters}</span>`}
                </div>
                <p><strong>【逐项解析】</strong></p>
                ${question.explanation}
            `;
            explanationDiv.style.display = 'block';
        }
        
        function checkAnswer(containerId, questionIndex, selectedIndex, btnElement) {
            let quizData;
            if (containerId === 'quiz-single') {
                quizData = singlePracticeData;
            }
            
            const question = quizData[questionIndex];
            const card = document.getElementById(`${containerId}-q${questionIndex}`);
            const buttons = card.querySelectorAll('.option-btn');
            const explanationDiv = document.getElementById(`${containerId}-exp${questionIndex}`);
            
            if (buttons[0].classList.contains('disabled')) return;
            
            buttons.forEach(btn => btn.classList.add('disabled'));
            
            const correctIndex = question.answer;
            const isCorrect = selectedIndex === correctIndex;
            
            const clickedBtn = buttons[selectedIndex];
            if (isCorrect) {
                clickedBtn.classList.add('correct');
                correctSingleCount++;
            } else {
                clickedBtn.classList.add('wrong');
                buttons[correctIndex].classList.add('correct');
            }
            
            answeredSingleCount++;
            updateProgress();
            
            explanationDiv.innerHTML = `
                <div class="result ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '<span class="highlight-green">✓ 回答正确！</span>' : '<span class="highlight-red">✗ 回答错误</span>'}
                </div>
                <p><strong>【逐项解析】</strong></p>
                ${question.explanation}
            `;
            explanationDiv.style.display = 'block';
        }
        
        function checkJudge(containerId, questionIndex, userAnswer, btnElement) {
            let quizData;
            if (containerId === 'quiz-judge') {
                quizData = judgePracticeData;
            }
            
            const question = quizData[questionIndex];
            const card = document.getElementById(`${containerId}-q${questionIndex}`);
            const buttons = card.querySelectorAll('.judge-btn');
            const explanationDiv = document.getElementById(`${containerId}-exp${questionIndex}`);
            
            if (buttons[0].classList.contains('disabled')) return;
            
            buttons.forEach(btn => btn.classList.add('disabled'));
            
            const correctAnswer = question.answer;
            const isCorrect = userAnswer === correctAnswer;
            
            if (isCorrect) {
                btnElement.classList.add('correct');
                correctJudgeCount++;
            } else {
                btnElement.classList.add('wrong');
                buttons[correctAnswer ? 0 : 1].classList.add('correct');
            }
            
            answeredJudgeCount++;
            updateProgress();
            
            explanationDiv.innerHTML = `
                <div class="result ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '<span class="highlight-green">✓ 判断正确！</span>' : `<span class="highlight-red">✗ 判断错误</span> <span style="font-size:14px;color:#666;">正确答案：${correctAnswer ? '正确' : '错误'}</span>`}
                </div>
                <p><strong>【逐项解析】</strong></p>
                ${question.explanation}
            `;
            explanationDiv.style.display = 'block';
        }
        
        function updateProgress() {
            const singleTotal = singlePracticeData.length;
            const judgeTotal = judgePracticeData.length;
            const multiTotal = multiPracticeData.length;
            const totalAnswered = answeredSingleCount + answeredJudgeCount + answeredMultiCount;
            const totalQuestions = singleTotal + judgeTotal + multiTotal;
            const percentage = totalQuestions > 0 ? (totalAnswered / totalQuestions) * 100 : 0;
            document.getElementById('mainProgress').style.width = percentage + '%';
            document.getElementById('totalScore').textContent = `单选:${answeredSingleCount}/${singleTotal}(对:${correctSingleCount}) | 判断:${answeredJudgeCount}/${judgeTotal}(对:${correctJudgeCount}) | 多选:${answeredMultiCount}/${multiTotal}(对:${correctMultiCount})`;
        }
        
        const singlePracticeData = [{"module": "刑法", "question": "甲明知自己患有艾滋病，仍然与多名女性发生性关系，导致其中一名女性感染艾滋病。甲的行为构成？", "options": ["故意伤害罪", "传播性病罪", "过失致人重伤罪", "无罪"], "answer": 0, "explanation": "<p><span class=\"highlight-green\">✓ A正确：</span>甲明知自己患有艾滋病，仍然与多人发生性关系，主观上明知会传播病毒，客观上导致他人感染，构成<span class=\"highlight-blue\">故意伤害罪</span>。艾滋病病毒侵袭人体造成重伤后果。</p><p><span class=\"highlight-red\">✗ B错误：</span>传播性病罪要求行为人明知自己患有梅毒、淋病等严重性病而卖淫、嫖娼，甲的行为不属于卖淫嫖娼。</p><p><span class=\"highlight-red\">✗ C错误：</span>甲是明知，不是过失。</p><p><span class=\"highlight-red\">✗ D错误：</span>甲的行为造成他人感染艾滋病病毒，构成犯罪。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>明知传播病毒伤害人，特殊方法传染也构成故意伤害！</p>"}, {"module": "刑法", "question": "关于刑法分则各类犯罪的分类，下列说法正确的是？", "options": ["危害公共安全罪侵犯的是不特定多数人的安全", "破坏社会主义市场经济秩序罪的主体都是特殊主体", "侵犯财产罪的对象必须是动产", "妨害社会管理秩序罪都是自然人犯罪"], "answer": 0, "explanation": "<p><span class=\"highlight-green\">✓ A正确：</span>危害公共安全罪的核心特征是<span class=\"highlight-blue\">危害不特定多数人的生命健康和重大公私财产安全</span>。</p><p><span class=\"highlight-red\">✗ B错误：</span>破坏市场经济秩序罪有一般主体也有特殊主体。</p><p><span class=\"highlight-red\">✗ C错误：</span>侵犯财产罪的对象包括<span class=\"highlight-blue\">动产和不动产</span>（如盗窃房屋）。</p><p><span class=\"highlight-red\">✗ D错误：</span>妨害社会管理秩序罪中有些可以是<span class=\"highlight-blue\">单位犯罪</span>。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>危害公共安全罪=不特定多数人安全！</p>"}, {"module": "刑法", "question": "甲因盗窃被判处有期徒刑3年，刑满释放后第2年又因故意伤害致人重伤。甲是否构成累犯？", "options": ["构成累犯", "不构成累犯，因为前罪是盗窃", "不构成累犯，因为间隔超过2年", "需要进一步判断"], "answer": 3, "explanation": "<p><span class=\"highlight-green\">✓ D正确：</span>需要进一步判断。累犯的成立条件：<span class=\"highlight-blue\">(1)被判处有期徒刑以上刑罚；(2)刑满释放后5年内</span>再犯应当判处有期徒刑以上刑罚之罪。</p><p><span class=\"highlight-red\">✗ A错误：</span>甲前罪刑满释放后第2年再犯罪，距离5年期限还有时间，但需要判断后罪是否应当判处有期徒刑以上刑罚。</p><p><span class=\"highlight-red\">✗ B错误：</span>累犯与前罪罪名无关，只与<span class=\"highlight-blue\">刑罚种类和5年内再犯</span>有关。</p><p><span class=\"highlight-red\">✗ C错误：</span>5年内再犯才构成累犯，第2年再犯仍在5年内。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>累犯=5年内+有期徒刑以上+故意犯罪！</p>"}, {"module": "刑法", "question": "甲盗窃了乙的笔记本电脑（价值5000元），后发现该电脑是乙捡到的失物，甲的行为应如何认定？", "options": ["无罪", "侵占罪", "盗窃罪", "侵占遗忘物"], "answer": 2, "explanation": "<p><span class=\"highlight-green\">✓ C正确：</span>甲以非法占有为目的，采用秘密窃取的方式取得他人财物，构成<span class=\"highlight-blue\">盗窃罪</span>。电脑虽是乙捡到的，但仍然是他人占有的财物。</p><p><span class=\"highlight-red\">✗ A错误：</span>甲的行为具有社会危害性，构成犯罪。</p><p><span class=\"highlight-red\">✗ B错误：</span>侵占罪是将<span class=\"highlight-blue\">代为保管的他人财物或遗忘物、埋藏物</span>非法占为己有。甲是采用秘密窃取方式，不是侵占。</p><p><span class=\"highlight-red\">✗ D错误：</span>甲采用盗窃方式，不是侵占。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>秘密窃取是盗窃，侵占必须先合法占有！</p>"}, {"module": "刑法", "question": "甲在深山老林中狩猎，误将路过的村民乙当成野兽而射杀。甲的行为属于？", "options": ["意外事件", "疏忽大意的过失致人死亡", "过于自信的过失致人死亡", "故意杀人罪"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>甲应当预见自己的行为可能造成他人死亡的结果，因<span class=\"highlight-blue\">疏忽大意</span>没有预见，导致误杀。属于<span class=\"highlight-blue\">疏忽大意的过失致人死亡</span>。</p><p><span class=\"highlight-red\">✗ A错误：</span>意外事件是行为人不能预见且无法避免的。甲在深山狩猎应当预见可能有人经过。</p><p><span class=\"highlight-red\">✗ C错误：</span>过于自信的过失是已经预见但轻信能避免，甲是根本没有预见。</p><p><span class=\"highlight-red\">✗ D错误：</span>甲没有杀人故意，误以为是人。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>应当预见而没预见=疏忽大意；已经预见但轻信避免=过于自信！</p>"}, {"module": "刑法", "question": "关于自首与立功的说法，正确的是？", "options": ["自首后又逃跑的不认定为自首", "立功必须是犯罪分子本人实施的行为", "坦白是从轻处罚的情节，自首是减轻或免除处罚的情节", "共同犯罪中一人自首效力不及于其他共犯人"], "answer": 3, "explanation": "<p><span class=\"highlight-green\">✓ D正确：</span><span class=\"highlight-blue\">共同犯罪中</span>，一人自首仅对<span class=\"highlight-blue\">本人</span>发生效力，不及于其他共犯人。</p><p><span class=\"highlight-red\">✗ A错误：</span>自首后又逃跑的，<span class=\"highlight-blue\">自动投案</span>的认定可能受影响，但关键是如实供述。</p><p><span class=\"highlight-red\">✗ B错误：</span>立功包括<span class=\"highlight-blue\">检举揭发、协助抓捕</span>等，不限于本人实施。</p><p><span class=\"highlight-red\">✗ C错误：</span>自首和坦白都是<span class=\"highlight-blue\">可以从轻或减轻</span>处罚的情节。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>自首=自动投案+如实供述；立功=揭发犯罪+协助抓捕！</p>"}, {"module": "刑法", "question": "甲明知乙（15周岁）贩卖毒品，仍向乙提供资金用于购买毒品。甲的行为构成？", "options": ["非法持有毒品罪", "贩卖毒品罪的共犯", "洗钱罪", "无罪"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>甲明知乙贩卖毒品而提供资金帮助，构成<span class=\"highlight-blue\">贩卖毒品罪的共犯</span>。乙虽然不满16周岁，但贩卖毒品罪没有刑事责任年龄限制。</p><p><span class=\"highlight-red\">✗ A错误：</span>甲的行为是帮助贩卖，不是单纯持有。</p><p><span class=\"highlight-red\">✗ C错误：</span>洗钱罪是针对<span class=\"highlight-blue\">毒品犯罪、黑社会性质组织犯罪</span>等收益的洗白。</p><p><span class=\"highlight-red\">✗ D错误：</span>甲的行为构成犯罪。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>毒品犯罪14岁以下也有责任年龄！</p>"}, {"module": "刑法", "question": "甲入户盗窃，被房主发现后为抗拒抓捕而当场使用暴力，致房主轻伤。甲的行为应如何定性？", "options": ["只构成盗窃罪", "只构成抢劫罪", "转化为抢劫罪", "盗窃罪和故意伤害罪数罪并罚"], "answer": 2, "explanation": "<p><span class=\"highlight-green\">✓ C正确：</span>根据《刑法》，<span class=\"highlight-blue\">犯盗窃罪，为抗拒抓捕而当场使用暴力或者以暴力相威胁的，以抢劫罪定罪处罚</span>。入户盗窃转化为抢劫。</p><p><span class=\"highlight-red\">✗ A错误：</span>已经发生转化，不能定盗窃罪。</p><p><span class=\"highlight-red\">✗ B错误：</span>不是普通抢劫，是转化型抢劫。</p><p><span class=\"highlight-red\">✗ D错误：</span>转化犯按一罪处理，不数罪并罚。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>盗抢转化三条件：盗窃+当场+暴力或威胁！</p>"}, {"module": "刑事诉讼法", "question": "公安机关对涉嫌故意杀人的犯罪嫌疑人甲执行拘留后，发现甲是人大代表。下列说法正确的是？", "options": ["应当立即释放甲", "应当立即报告同级人民代表大会主席团", "执行拘留后应当立即向甲所属机关报告", "应当立即报告上一级公安机关"], "answer": 2, "explanation": "<p><span class=\"highlight-green\">✓ C正确：</span>根据《刑事诉讼法》，公安机关<span class=\"highlight-blue\">拘留人大代表后，应当立即向该级人民代表大会主席团或常务委员会报告</span>。</p><p><span class=\"highlight-red\">✗ A错误：</span>不是立即释放，需要履行报告程序。</p><p><span class=\"highlight-red\">✗ B错误：</span>报告是向所属机关，不是主席团。</p><p><span class=\"highlight-red\">✗ D错误：</span>不是报告上一级公安机关。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>拘留人大代表，立即报告所属机关！</p>"}, {"module": "刑事诉讼法", "question": "在刑事诉讼中，关于证明责任的说法，正确的是？", "options": ["被告人对自己无罪承担证明责任", "公诉案件中检察院承担证明被告人有罪的责任", "自诉案件中自诉人承担证明责任", "法院对案件事实负主要证明责任"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>公诉案件中，<span class=\"highlight-blue\">人民检察院</span>承担证明被告人有罪的责任，这是<span class=\"highlight-blue\">控诉方举证</span>原则的体现。</p><p><span class=\"highlight-red\">✗ A错误：</span>被告人不承担证明自己无罪的责任。</p><p><span class=\"highlight-red\">✗ C错误：</span>自诉案件中自诉人确有证明责任，但B更准确。</p><p><span class=\"highlight-red\">✗ D错误：</span>法院是审判机关，不承担证明责任。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>控诉方举证是原则，被告人不自证其罪！</p>"}, {"module": "刑事诉讼法", "question": "公安机关在侦查过程中，需要扣押犯罪嫌疑人的邮件。下列说法正确的是？", "options": ["公安机关可以直接决定扣押", "需要经县级以上公安机关负责人批准", "需要经人民检察院批准", "需要经人民法院批准"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>根据《刑事诉讼法》，侦查过程中需要扣押邮件、电报，应当经<span class=\"highlight-blue\">县级以上公安机关负责人批准</span>。</p><p><span class=\"highlight-red\">✗ A错误：</span>不能直接决定，需要批准程序。</p><p><span class=\"highlight-red\">✗ C错误：</span>不需要检察院批准。</p><p><span class=\"highlight-red\">✗ D错误：</span>不需要法院批准。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>扣押邮件需批准，县级以上负责人！</p>"}, {"module": "刑事诉讼法", "question": "甲因涉嫌盗窃被监视居住，在监视居住期间，甲未经执行机关批准离开了所居住的县。甲的行为属于？", "options": ["违反监视居住规定，应当予以逮捕", "违反监视居住规定，可以予以逮捕", "情节较轻，给予警告", "不违反规定"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>被监视居住的人未经批准离开所居住的<span class=\"highlight-blue\">县、市</span>，属于违反监视居住规定的情形，<span class=\"highlight-blue\">可以予以逮捕</span>。</p><p><span class=\"highlight-red\">✗ A错误：</span>是\"可以\"逮捕，不是\"应当\"逮捕。</p><p><span class=\"highlight-red\">✗ C错误：</span>情节较轻不是警告就能了结的。</p><p><span class=\"highlight-red\">✗ D错误：</span>这明显违反了监视居住规定。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>监视居住违反规定，可以逮捕！</p>"}, {"module": "刑事诉讼法", "question": "人民检察院审查起诉时，认为需要补充侦查。下列说法正确的是？", "options": ["可以退回公安机关补充侦查，也可以自行侦查", "只能退回公安机关补充侦查", "只能自行补充侦查", "应当要求公安机关补充侦查"], "answer": 0, "explanation": "<p><span class=\"highlight-green\">✓ A正确：</span>根据《刑事诉讼法》，人民检察院审查起诉时，需要补充侦查的，可以<span class=\"highlight-blue\">退回公安机关补充侦查</span>，也可以<span class=\"highlight-blue\">自行侦查</span>。</p><p><span class=\"highlight-red\">✗ B错误：</span>不是只能退回公安。</p><p><span class=\"highlight-red\">✗ C错误：</span>不是只能自行侦查。</p><p><span class=\"highlight-red\">✗ D错误：</span>不是\"应当\"，是\"可以\"。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>退查可以回公安，也可以自己查！</p>"}, {"module": "刑事诉讼法", "question": "在刑事附带民事诉讼中，关于赔偿范围的说法，正确的是？", "options": ["包括精神损害赔偿", "包括死亡赔偿金", "不包括因犯罪行为遭受的直接损失", "不包括误工费"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>刑事附带民事诉讼的赔偿范围包括<span class=\"highlight-blue\">因犯罪行为遭受的直接经济损失</span>，如医疗费、误工费、死亡赔偿金等。</p><p><span class=\"highlight-red\">✗ A错误：</span>一般<span class=\"highlight-blue\">不包括</span>精神损害赔偿。</p><p><span class=\"highlight-red\">✗ C错误：</span>包括直接损失，不包括间接损失。</p><p><span class=\"highlight-red\">✗ D错误：</span>包括误工费。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>刑附民赔直接损失，不赔精神不赔间接！</p>"}, {"module": "行政处罚法", "question": "某市城管局在执法中发现商贩甲无照经营，决定对其处以罚款。甲申请听证，城管局应当在告知后几日内组织听证？", "options": ["3日内", "5日内", "7日内", "10日内"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>根据《行政处罚法》，当事人要求听证的，行政机关应当在听证的<span class=\"highlight-blue\">7日前</span>通知当事人举行听证的时间、地点。</p><p><span class=\"highlight-red\">✗ A错误：</span>3日不符合规定。</p><p><span class=\"highlight-red\">✗ C错误：</span>7日前是告知举行听证的时间。</p><p><span class=\"highlight-red\">✗ D错误：</span>10日不符合规定。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>听证通知7日前！</p>"}, {"module": "行政处罚法", "question": "某区市场监管局在检查中发现某超市销售过期食品，决定没收违法所得并罚款。下列说法正确的是？", "options": ["没收违法所得属于行政处罚，罚款属于行政强制", "没收违法所得属于行政强制措施", "两者都属于行政处罚", "罚款属于行政处罚，没收属于行政强制措施"], "answer": 2, "explanation": "<p><span class=\"highlight-green\">✓ C正确：</span><span class=\"highlight-blue\">没收违法所得</span>和<span class=\"highlight-blue\">罚款</span>都属于<span class=\"highlight-blue\">行政处罚</span>的种类。没收违法所得是财产罚的一种。</p><p><span class=\"highlight-red\">✗ A错误：</span>两者都是行政处罚，不是行政强制。</p><p><span class=\"highlight-red\">✗ B错误：</span>没收违法所得是行政处罚，不是强制措施。</p><p><span class=\"highlight-red\">✗ D错误：</span>两者都是行政处罚。</p>< 及第三人利益。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>执行协议可分期！</p>"}, {"module": "行政强制法", "question": "某区市场监管局查封了甲企业的生产设备。查封期间，市场监管局下列做法正确的是？", "options": ["可以使用被查封的设备生产", "可以委托第三人保管被查封的设备", "应当妥善保管被查封的设备", "可以拍卖被查封的设备"], "answer": 2, "explanation": "<p><span class=\"highlight-green\">✓ C正确：</span>根据《行政强制法》，行政机关应当<span class=\"highlight-blue\">妥善保管查封的设施</span>，不得使用或者损毁。</p><p><span class=\"highlight-red\">✗ A错误：</span>不得使用被查封的设备。</p><p><span class=\"highlight-red\">✗ B错误：</span>查封是行政机关保管，不是委托第三人。</p><p><span class=\"highlight-red\">✗ D错误：</span>拍卖是执行阶段的行为，查封期间不能拍卖。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>查封期间不能使用，必须妥善保管！</p>"}, {"module": "行政强制法", "question": "某市公安局依法对甲作出行政拘留15日的处罚，执行完毕后，发现甲刚满15周岁。下列说法正确的是？", "options": ["处罚有效，因为当时无法核实年龄", "处罚无效，应当撤销", "可以退还罚款但不退还拘留", "应当对甲进行国家赔偿"], "answer": 3, "explanation": "<p><span class=\"highlight-green\">✓ D正确：</span><span class=\"highlight-blue\">不满16周岁的人不执行行政拘留</span>。已执行的拘留属于违法执行，应当撤销并<span class=\"highlight-blue\">进行国家赔偿</span>。</p><p><span class=\"highlight-red\">✗ A错误：</span>年龄是可以核实的，执法时应当查明。</p><p><span class=\"highlight-red\">✗ B错误：</span>应当撤销，但还需赔偿。</p><p><span class=\"highlight-red\">✗ C错误：</span>撤销后应当全部赔偿。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>不执行拘留：不满16、70以上、怀孕！</p>"}, {"module": "行政复议法", "question": "某县市场监管局对某公司作出罚款5000元的处罚决定。该公司不服，应当向哪个机关申请行政复议？", "options": ["该县市场监管局", "该县人民政府或上一级市场监管局", "该县人民法院", "该省市场监管局"], "answer": 1, "explanation": "<p><span class=\"highlight-green\">✓ B正确：</span>根据《行政复议法》，对<span class=\"highlight-blue\">县级以上地方各级人民政府工作部门</span>的具体行政行为不服，可以向<span class=\"highlight-blue\">本级人民政府或上一级主管部门</span>申请行政复议。</p><p><span class=\"highlight-red\">✗ A错误：</span>不能向作出机关申请复议。</p><p><span class=\"highlight-red\">✗ C错误：</span>不能向法院申请复议。</p><p><span class=\"highlight-red\">✗ D错误：</span>省市场监管局是上级，但不是唯一选择。</p><p><span class=\"highlight-purple\">💡 小白记忆口诀：</span>部门行为告本府或上级！</p>"}, {"module": "行政复议法", "question": "甲对某市公安局的行政处罚决定不服，申请行政复议。在复议期间，甲死亡。下列可以作为复议申请人的是？", "options
