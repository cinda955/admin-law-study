<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合练习 - 辅警备考</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%); min-height: 100vh; color: #333; }
        .progress-bar { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 1000; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #34495e, #27ae60); width: 0%; transition: width 0.3s ease; }
        .top-nav { position: fixed; top: 4px; left: 0; right: 0; background: rgba(52, 73, 94, 0.95); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 999; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .logo { color: #fff; font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .score-display { background: rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .sidebar { position: fixed; left: 0; top: 50px; width: 260px; height: calc(100vh - 50px); background: rgba(255,255,255,0.95); overflow-y: auto; padding: 20px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 998; }
        .sidebar-title { color: #2c3e50; padding: 0 20px 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .nav-item { padding: 12px 20px; color: #666; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; font-size: 14px; border-left: 3px solid transparent; text-decoration: none; }
        .nav-item:hover { background: rgba(52, 73, 94, 0.1); color: #34495e; }
        .nav-item.active { background: rgba(52, 73, 94, 0.15); color: #34495e; border-left-color: #34495e; font-weight: bold; }
        .main-content { margin-left: 260px; padding: 70px 30px 30px; max-width: 900px; }
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-header h1 { font-size: 42px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 30px rgba(0,0,0,0.2); }
        .section-header p { color: rgba(255,255,255,0.8); font-size: 16px; }
        .highlight-red { color: #e74c3c; font-weight: bold; background: rgba(231, 76, 60, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-blue { color: #3498db; font-weight: bold; background: rgba(52, 152, 219, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-green { color: #27ae60; font-weight: bold; background: rgba(39, 174, 96, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-orange { color: #e67e22; font-weight: bold; background: rgba(230, 126, 34, 0.1); padding: 2px 6px; border-radius: 4px; }
        .highlight-purple { color: #9b59b6; font-weight: bold; background: rgba(155, 89, 182, 0.1); padding: 2px 6px; border-radius: 4px; }
        .quiz-container { margin-top: 30px; }
        .quiz-card { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .question { font-size: 16px; color: #333; margin-bottom: 15px; font-weight: 500; line-height: 1.6; }
        .question-num { display: inline-block; background: #34495e; color: #fff; width: 28px; height: 28px; border-radius: 50%; text-align: center; line-height: 28px; margin-right: 10px; font-size: 14px; }
        .module-tag { display: inline-block; background: #e74c3c; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 10px; }
        .module-tag.multi { background: #9b59b6; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 12px 20px; background: #fff; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; color: #555; transition: all 0.3s ease; }
        .option-btn:hover { border-color: #34495e; background: rgba(52, 73, 94, 0.05); }
        .option-letter { display: inline-block; width: 26px; height: 26px; background: #e9ecef; border-radius: 50%; text-align: center; line-height: 26px; margin-right: 10px; font-weight: bold; color: #34495e; }
        .option-btn.correct { background: #d4edda; border-color: #28a745; }
        .option-btn.correct .option-letter { background: #28a745; color: #fff; }
        .option-btn.wrong { background: #f8d7da; border-color: #dc3545; }
        .option-btn.wrong .option-letter { background: #dc3545; color: #fff; }
        .option-btn.disabled { cursor: not-allowed; opacity: 0.7; }
        .explanation { background: linear-gradient(135deg, #fff8e1, #ffecb3); border-radius: 10px; padding: 15px 20px; margin-top: 15px; display: none; line-height: 1.8; border: 1px solid #ffc107; }
        .explanation .result { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .explanation .result.correct { color: #28a745; }
        .explanation .result.wrong { color: #dc3545; }
        .practice-section { background: #fff; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); scroll-margin-top: 100px; }
        .practice-section h2 { font-size: 28px; color: #333; margin-bottom: 25px; text-align: center; border-bottom: 2px solid #34495e; padding-bottom: 15px; }
        .practice-section h2 .multi-badge { background: #9b59b6; color: #fff; padding: 3px 12px; border-radius: 12px; font-size: 14px; margin-left: 10px; }
        .intro-card { background: linear-gradient(135deg, #34495e, #2c3e50); color: #fff; padding: 40px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .intro-card h2 { font-size: 32px; margin-bottom: 20px; }
        .intro-card p { font-size: 16px; line-height: 1.8; opacity: 0.9; }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .module-item { background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; font-size: 14px; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; margin-top: 50px; } .main-content { margin-left: 0; padding-top: 80px; } }
        .close-nav-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 18px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .close-nav-btn:hover { background: rgba(255,255,255,0.3); }
        
        /* 多选题样式 */
        .multi-options { display: flex; flex-direction: column; gap: 10px; }
        .multi-option { padding: 12px 20px; background: #fff; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; color: #555; transition: all 0.3s ease; display: flex; align-items: flex-start; gap: 12px; }
        .multi-option:hover { border-color: #9b59b6; background: rgba(155, 89, 182, 0.05); }
        .multi-option.selected { border-color: #9b59b6; background: rgba(155, 89, 182, 0.1); }
        .multi-option.selected .option-letter { background: #9b59b6; color: #fff; }
        .multi-option.correct { background: #d4edda; border-color: #28a745; }
        .multi-option.correct .option-letter { background: #28a745; color: #fff; }
        .multi-option.wrong { background: #f8d7da; border-color: #dc3545; }
        .multi-option.wrong .option-letter { background: #dc3545; color: #fff; }
        .multi-option.disabled { cursor: not-allowed; opacity: 0.7; }
        .multi-option.missed { background: #fff3cd; border-color: #ffc107; }
        .multi-option.missed .option-letter { background: #ffc107; color: #fff; }
        .checkbox { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all 0.2s; }
        .multi-option.selected .checkbox { background: #9b59b6; border-color: #9b59b6; }
        .multi-option.selected .checkbox::after { content: "✓"; color: #fff; font-weight: bold; }
        .submit-btn { display: block; width: 100%; padding: 14px 24px; background: linear-gradient(135deg, #9b59b6, #8e44ad); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 15px; }
        .submit-btn:hover { background: linear-gradient(135deg, #8e44ad, #7d3c98); transform: translateY(-2px); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .multi-hint { font-size: 12px; color: #9b59b6; margin-bottom: 15px; padding: 8px 12px; background: rgba(155, 89, 182, 0.1); border-radius: 6px; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="mainProgress"></div></div>
    <nav class="top-nav" id="topNav">
        <div class="logo">📚 综合练习</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="score-display" id="totalScore">已答: 0/0</div>
            <button class="close-nav-btn" onclick="closeTopNav()">✕</button>
        </div>
    </nav>
    <aside class="sidebar">
        <div class="sidebar-title">📖 目录导航</div>
        <a href="#intro" class="nav-item active" onclick="scrollToSection(this, event)">📝 练习说明</a>
        <a href="#practice" class="nav-item" onclick="scrollToSection(this, event)">✍️ 单选题专区</a>
        <a href="#multi-practice" class="nav-item" onclick="scrollToSection(this, event)">☑️ 多选题专区</a>
    </aside>
    <main class="main-content">
        <div class="section-header">
            <h1>📚 综合练习</h1>
            <p>检验所有模块学习成果，考前冲刺必备！</p>
        </div>
        
        <section id="intro" class="intro-card">
            <h2>🎯 综合练习说明</h2>
            <p>本练习涵盖所有已学模块的核心考点，包括：</p>
            <div class="module-grid">
                <div class="module-item">1. 刑法</div>
                <div class="module-item">2. 刑事诉讼法</div>
                <div class="module-item">3. 行政处罚法</div>
                <div class="module-item">4. 行政强制法</div>
                <div class="module-item">5. 行政复议法</div>
                <div class="module-item">6. 行政诉讼法</div>
                <div class="module-item">7. 行政许可法</div>
                <div class="module-item">8. 治安管理处罚法</div>
                <div class="module-item">9. 国家赔偿法</div>
                <div class="module-item">10. 警械武器条例</div>
                <div class="module-item">11. 公安基础知识</div>
                <div class="module-item">12. 人民警察法</div>
            </div>
            <p style="margin-top: 20px;">💡 <strong>答题技巧：</strong>仔细阅读每道题的解析，标注了考查模块，可以回顾对应模块加深理解！</p>
        </section>
        
        <section id="practice" class="practice-section">
            <h2>✍️ 单选题专区</h2>
            <div id="quiz-practice" class="quiz-container"></div>
        </section>

        <section id="multi-practice" class="practice-section">
            <h2>☑️ 多选题专区 <span class="multi-badge">30题</span></h2>
            <div id="quiz-multi" class="quiz-container"></div>
        </section>
    </main>

    <script>
        let answeredCount = 0;
        let correctCount = 0;
        let multiAnsweredCount = 0;
        let multiCorrectCount = 0;
        let selectedOptions = {};
        
        function closeTopNav() {
            document.getElementById('topNav').style.display = 'none';
        }
        
        function scrollToSection(element, event) {
            event.preventDefault();
            const href = element.getAttribute('href');
            const target = document.querySelector(href);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');
            }
        }
        
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        
        function renderQuiz(containerId, quizData) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '';
            quizData.forEach((item, index) => {
                const shuffledOptions = item.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                const displayOptions = shuffleArray(shuffledOptions);
                
                html += `<div class="quiz-card" id="${containerId}-q${index}">
                    <span class="module-tag">${item.module}</span>
                    <p class="question"><span class="question-num">${index + 1}</span>${item.question}</p>
                    <div class="options">`;
                
                displayOptions.forEach((opt, optIndex) => {
                    html += `<button class="option-btn" onclick="checkAnswer('${containerId}', ${index}, ${opt.originalIndex}, this)">
                        <span class="option-letter">${String.fromCharCode(65 + optIndex)}</span>${opt.text}
                    </button>`;
                });
                
                html += `</div>
                    <div class="explanation" id="${containerId}-exp${index}"></div>
                </div>`;
            });
            
            container.innerHTML = html;
            updateProgress();
        }

        function renderMultiQuiz(containerId, quizData) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '';
            quizData.forEach((item, index) => {
                selectedOptions[`${containerId}-${index}`] = [];
                const shuffledOptions = item.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                const displayOptions = shuffleArray(shuffledOptions);
                
                html += `<div class="quiz-card" id="${containerId}-q${index}">
                    <span class="module-tag multi">多选</span><span class="module-tag" style="margin-left:5px;">${item.module}</span>
                    <p class="question"><span class="question-num">${index + 1}</span>${item.question}</p>
                    <p class="multi-hint">提示：本题为多选题，请选择所有正确答案</p>
                    <div class="multi-options">`;
                
                displayOptions.forEach((opt, optIndex) => {
                    html += `<div class="multi-option" onclick="toggleMultiOption('${containerId}', ${index}, ${opt.originalIndex}, this)">
                        <div class="checkbox"></div>
                        <span class="option-letter">${String.fromCharCode(65 + optIndex)}</span>
                        <span>${opt.text}</span>
                    </div>`;
                });
                
                html += `</div>
                    <button class="submit-btn" onclick="checkMultiAnswer('${containerId}', ${index})">提交答案</button>
                    <div class="explanation" id="${containerId}-exp${index}"></div>
                </div>`;
            });
            
            container.innerHTML = html;
            updateMultiProgress();
        }
        
        function toggleMultiOption(containerId, questionIndex, originalIndex, element) {
            const key = `${containerId}-${questionIndex}`;
            const idx = selectedOptions[key].indexOf(originalIndex);
            if (idx > -1) {
                selectedOptions[key].splice(idx, 1);
                element.classList.remove('selected');
            } else {
                selectedOptions[key].push(originalIndex);
                element.classList.add('selected');
            }
        }
        
        function checkMultiAnswer(containerId, questionIndex) {
            let quizData;
            if (containerId === 'quiz-multi') {
                quizData = multiPracticeData;
            }
            
            const question = quizData[questionIndex];
            const card = document.getElementById(`${containerId}-q${questionIndex}`);
            const options = card.querySelectorAll('.multi-option');
            const submitBtn = card.querySelector('.submit-btn');
            const explanationDiv = document.getElementById(`${containerId}-exp${questionIndex}`);
            
            if (submitBtn.disabled) return;
            submitBtn.disabled = true;
            
            options.forEach(opt => opt.classList.add('disabled'));
            
            const correctSet = new Set(question.correct);
            const selectedSet = new Set(selectedOptions[`${containerId}-${questionIndex}`]);
            
            let isCorrect = correctSet.size === selectedSet.size && 
                           [...correctSet].every(x => selectedSet.has(x));
            
            // 标记选对的
            options.forEach((opt, i) => {
                const origIdx = parseInt(opt.querySelector('.option-letter').textContent.charCodeAt(0) - 65);
                // 需要通过遍历找到originalIndex
                const optionTexts = question.options;
                let origIndex = -1;
                for (let j = 0; j < optionTexts.length; j++) {
                    if (opt.textContent.includes(optionTexts[j].substring(1))) {
                        origIndex = j;
                        break;
                    }
                }
            });
            
            // 重新标记：基于实际显示的选项文字匹配正确答案
            options.forEach(opt => {
                const letter = opt.querySelector('.option-letter').textContent;
                const text = opt.querySelector('span:last-child').textContent;
                let matchedIndex = -1;
                // 找到这个选项对应的originalIndex
                const shuffledOptions = question.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                const displayOptions = shuffleArray(shuffledOptions);
                for (let i = 0; i < displayOptions.length; i++) {
                    if (displayOptions[i].text === text) {
                        matchedIndex = displayOptions[i].originalIndex;
                        break;
                    }
                }
                
                if (correctSet.has(matchedIndex)) {
                    opt.classList.add('correct');
                } else if (selectedSet.has(matchedIndex)) {
                    opt.classList.add('wrong');
                }
            });
            
            // 标记漏选的正确答案
            if (!isCorrect) {
                options.forEach(opt => {
                    const text = opt.querySelector('span:last-child').textContent;
                    let matchedIndex = -1;
                    const shuffledOptions = question.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                    const displayOptions = shuffleArray(shuffledOptions);
                    for (let i = 0; i < displayOptions.length; i++) {
                        if (displayOptions[i].text === text) {
                            matchedIndex = displayOptions[i].originalIndex;
                            break;
                        }
                    }
                    
                    if (correctSet.has(matchedIndex) && !selectedSet.has(matchedIndex)) {
                        opt.classList.add('missed');
                    }
                });
            }
            
            multiAnsweredCount++;
            if (isCorrect) multiCorrectCount++;
            updateMultiProgress();
            
            // 构建答案字母
            const correctLetters = [...correctSet].map(i => String.fromCharCode(65 + i)).sort().join('、');
            
            explanationDiv.innerHTML = `
                <div class="result ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '<span class="highlight-green">✓ 回答正确！</span>' : `<span class="highlight-red">✗ 回答错误</span> <span style="font-size:14px;color:#666;">正确答案：${correctLetters}</span>`}
                </div>
                <p><strong>【逐项解析】</strong></p>
                ${question.explanation}
            `;
            explanationDiv.style.display = 'block';
        }
        
        function checkAnswer(containerId, questionIndex, selectedIndex, btnElement) {
            let quizData;
            if (containerId === 'quiz-practice') {
                quizData = practiceData;
            }
            
            const question = quizData[questionIndex];
            const card = document.getElementById(`${containerId}-q${questionIndex}`);
            const buttons = card.querySelectorAll('.option-btn');
            const explanationDiv = document.getElementById(`${containerId}-exp${questionIndex}`);
            
            if (buttons[0].classList.contains('disabled')) return;
            
            buttons.forEach(btn => btn.classList.add('disabled'));
            
            const correctIndex = question.correct;
            const isCorrect = selectedIndex === correctIndex;
            
            const clickedBtn = buttons[selectedIndex];
            if (isCorrect) {
                clickedBtn.classList.add('correct');
                correctCount++;
            } else {
                clickedBtn.classList.add('wrong');
                buttons[correctIndex].classList.add('correct');
            }
            
            answeredCount++;
            updateProgress();
            
            explanationDiv.innerHTML = `
                <div class="result ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '<span class="highlight-green">✓ 回答正确！</span>' : '<span class="highlight-red">✗ 回答错误</span>'}
                </div>
                <p><strong>【逐项解析】</strong></p>
                ${question.explanation}
            `;
            explanationDiv.style.display = 'block';
        }
        
        function updateProgress() {
            const total = practiceData.length;
            const percentage = total > 0 ? (answeredCount / total) * 100 : 0;
            document.getElementById('mainProgress').style.width = percentage + '%';
            const multiTotal = multiPracticeData.length;
            document.getElementById('totalScore').textContent = `单选: ${answeredCount}/${total}(正确:${correctCount}) | 多选: ${multiAnsweredCount}/${multiTotal}(正确:${multiCorrectCount})`;
        }

        function updateMultiProgress() {
            const singleTotal = practiceData.length;
            const multiTotal = multiPracticeData.length;
            const totalAnswered = answeredCount + multiAnsweredCount;
            const totalQuestions = singleTotal + multiTotal;
            const percentage = totalQuestions > 0 ? (totalAnswered / totalQuestions) * 100 : 0;
            document.getElementById('mainProgress').style.width = percentage + '%';
            document.getElementById('totalScore').textContent = `单选: ${answeredCount}/${singleTotal}(正确:${correctCount}) | 多选: ${multiAnsweredCount}/${multiTotal}(正确:${multiCorrectCount})`;
        }

        const practiceData = [
            {
                module: "【本题考察刑法】",
                question: "甲投保人身保险，故意杀害被保险人乙骗取保险金，甲的行为构成什么罪？",
                options: ["故意杀人罪", "保险诈骗罪", "只构成故意杀人罪", "故意杀人罪和保险诈骗罪，数罪并罚"],
                correct: 3,
                explanation: `<p><span class="highlight-green">正确答案是D：故意杀人罪和保险诈骗罪，数罪并罚。</span></p>
                <p><strong>【逐项解析】</strong></p>
                <p>A错误❌：虽然甲构成故意杀人罪，但仅说故意杀人罪不完整。</p>
                <p>B错误❌：保险诈骗罪确实构成，但甲还有杀人行为，不能只定一罪。</p>
                <p>C错误❌：保险诈骗罪的构成要件包括"故意造成被保险人死亡"，这是一个加重情节，不能只定一罪。</p>
                <p>D正确✓：根据《刑法》第198条第1款第5项，投保人、受益人故意造成被保险人死亡、伤残或者疾病，骗取保险金的，同时构成其他犯罪的，依照数罪并罚的规定处罚。</p>
                <p><span class="highlight-purple">💡小白记忆口诀：</span>投保人杀被保险人，一个行为触两罪，数罪并罚跑不掉！</p>`
            },
