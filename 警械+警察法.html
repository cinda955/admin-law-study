        // ==================== 模块六：综合练习（单选20道） ====================
    {
        id: 'mod_final', iconClass: 'icon-red', iconEmoji: '🏆',
        title: '综合练习 · 单选题20道',
        subtitle: '覆盖：警械武器条例 · 人民警察法 · 公安基础知识',
        quizzes: [
            { q: '下列哪项属于"警械"而非"武器"？', opts: ['A. 弹药', 'B. 特种防暴枪', 'C. 枪支', 'D. 步枪'], correct: 1, type: 'single', quizIndex: 21,
              d: '<b>A</b>：错误。弹药与枪支配套，属于致命性武器，直接归为"武器"范畴。<br><b>B</b>：正确。特种防暴枪虽然名字里带"枪"，但根据条例属于驱逐性、制服性警械，是非致命性的。<br><b>C</b>：错误。枪支是典型的致命性武器。<br><b>D</b>：错误。步枪属于枪支的一种，是武器。',
              t: '带"枪"字的不一定都是武器！特种防暴枪其实是警械，用来发射催泪弹、爆震弹的，不致命。' },
            { q: '人民警察使用警械和武器的根本原则是什么？', opts: ['A. 从严打击犯罪', 'B. 以制止违法犯罪为原则，尽量减少人员伤亡和财产损失', 'C. 先警告后使用', 'D. 经上级批准方可使用'], correct: 1, type: 'single', quizIndex: 22,
              d: '<b>A</b>：错误。警械武器的使用目的是"制止"而非"打击"，更不是"从严"。<br><b>B</b>：正确。这是条例第4条的原文，是整个条例的"灵魂条款"。<br><b>C</b>：错误。警告是程序性要求，不是根本原则。<br><b>D</b>：错误。紧急情况下可先使用后报告，并非一律需上级批准。',
              t: '根本原则就两条：①目的是制止犯罪；②过程中尽量别伤人、别毁东西。记住第4条！' },
            { q: '下列哪种情形，经警告无效后可以使用武器？', opts: ['A. 非法集会游行', 'B. 结伙斗殴', 'C. 劫持航空器危害公共安全', 'D. 侮辱妇女'], correct: 2, type: 'single', quizIndex: 23,
              d: '<b>A</b>：错误。非法集会游行属于第7条使用驱逐性、制服性警械的情形，不适用武器。<br><b>B</b>：错误。结伙斗殴同样适用警械（警棍、催泪弹等），不适用武器。<br><b>C</b>：正确。劫持航空器是第9条第(二)项明确规定的严重暴力犯罪，经警告无效可使用武器。<br><b>D</b>：错误。侮辱妇女属于流氓活动，适用警械。',
              t: '武器针对的是"要命"的暴力犯罪。劫机、杀人、爆炸这些才行。打架、骂人、游行用警械就够了。' },
            { q: '人民警察使用武器造成无辜人员伤亡的，善后处理正确的是？', opts: ['A. 由警察个人负责赔偿', 'B. 依法使用的，由所属机关参照国家赔偿法补偿', 'C. 不需要任何处理', 'D. 只需口头向上级报告'], correct: 1, type: 'single', quizIndex: 24,
              d: '<b>A</b>：错误。警察依法履职，赔偿责任由所属机关承担，不是个人。<br><b>B</b>：正确。依法使用武器造成无辜伤亡的，由所属机关参照《国家赔偿法》给予补偿（注意是"补偿"不是"赔偿"）。<br><b>C</b>：错误。必须及时抢救、保护现场、报告。<br><b>D</b>：错误。使用武器须书面报告，口头无效。',
              t: '依法开枪误伤好人→找公安局申请补偿（参照国家赔偿法程序）。违法开枪→才叫赔偿。' },
            { q: '发现犯罪分子是怀孕妇女，能否使用武器？', opts: ['A. 一律不能', 'B. 若其使用枪支实施暴力犯罪，可以', 'C. 需要上级批准', 'D. 警告无效即可'], correct: 1, type: 'single', quizIndex: 25,
              d: '<b>A</b>：错误。条例第10条规定了例外——使用枪支、爆炸、剧毒等危险物品实施暴力犯罪的除外。<br><b>B</b>：正确。怀孕妇女使用枪支实施暴力犯罪，属于"但书"情形，可以使用武器。<br><b>C</b>：错误。法条未规定需上级批准。<br><b>D</b>：错误。一般情形下怀孕妇女不得使用武器，不能简单以"警告无效"为由开枪。',
              t: '孕妇一般不打，但她端枪扫射时——必须打！保护更多人的生命比保护她一个人更重要。' },
            { q: '应当立即停止使用武器的情形是？', opts: ['A. 犯罪分子停止犯罪但拒不服从命令', 'B. 犯罪分子停止犯罪并服从命令', 'C. 犯罪分子逃跑', 'D. 犯罪分子口头求饶'], correct: 1, type: 'single', quizIndex: 26,
              d: '<b>A</b>：错误。第11条要求"停止犯罪"和"服从命令"两个条件同时满足，缺一不可。<br><b>B</b>：正确。"停止犯罪+服从命令"是法定的立即停止条件。<br><b>C</b>：错误。逃跑属于继续实施犯罪或拒不服从，不能停止。<br><b>D</b>：错误。口头求饶不等于服从命令，可能是在拖延或欺骗。',
              t: '歹徒停下来说"我不砍了"但刀还不放下——不能停火！必须"停了+听话"才行。' },
            { q: '根据《人民警察法》，继续盘问的留置时间从何时起算？', opts: ['A. 从抓获时起算', 'B. 从带至公安机关之时起算', 'C. 从批准继续盘问时起算', 'D. 从进入候问室时起算'], correct: 1, type: 'single', quizIndex: 27,
              d: '<b>A</b>：错误。抓获可能在外面，起算点是"带至公安机关"。<br><b>B</b>：正确。人民警察法第9条规定"自带至公安机关之时起"计算留置时间。<br><b>C</b>：错误。批准是后续程序，不是起算点。<br><b>D</b>：错误。进入候问室的时间可能晚于带至公安机关的时间，不准确。',
              t: '从踏进公安局大门那一刻开始计时，不是从批准盘问开始！' },
            { q: '人民警察法规定，对被盘问人的留置时间一般不超过多少小时？', opts: ['A. 8小时', 'B. 12小时', 'C. 24小时', 'D. 48小时'], correct: 2, type: 'single', quizIndex: 28,
              d: '<b>A</b>：错误。8小时是行政案件询问查证的一般时限。<br><b>B</b>：错误。12小时是继续盘问初始时限（已废止的老规定），现行法为24小时。<br><b>C</b>：正确。一般不超过24小时。<br><b>D</b>：错误。48小时是经县级以上公安机关批准延长后的最长时限。',
              t: '一般24小时，搞不完经县级公安批准可以再延24小时，封顶48小时。' },
            { q: '人民警察在非工作时间遇到职责范围内的紧急情况，应如何处理？', opts: ['A. 可以不处理', 'B. 应当履行职责', 'C. 等上班后再处理', 'D. 通知同事处理'], correct: 1, type: 'single', quizIndex: 29,
              d: '<b>A</b>：错误。人民警察法第19条规定非工作时间遇紧急情况"应当履行职责"。<br><b>B</b>：正确。不管上不上班，遇到职责范围内的紧急事都得管。<br><b>C</b>：错误。紧急情况不能等。<br><b>D</b>：错误。通知同事不等于自己可以不履职。',
              t: '下班了也是警察！路上看到有人抢劫，不能装没看见，必须上。' },
            { q: '公安机关的性质是什么？', opts: ['A. 国家行政机关', 'B. 人民民主专政的重要工具，武装性质的国家治安行政和刑事司法力量', 'C. 国家武装力量', 'D. 司法机关'], correct: 1, type: 'single', quizIndex: 30,
              d: '<b>A</b>：不完整。公安机关兼有行政和刑事司法双重属性。<br><b>B</b>：正确。这是公安机关性质的完整表述。<br><b>C</b>：错误。公安机关是"武装性质"但不是"武装力量"（武装力量指解放军、武警、民兵）。<br><b>D</b>：错误。公安机关是"刑事司法力量"但不是"司法机关"（司法机关指法院、检察院）。',
              t: '三个关键词：专政工具（灵魂）+ 武装性质（身体）+ 治安行政&刑事司法（两只手）。' },
            { q: '公安工作的根本路线是什么？', opts: ['A. 坚持党的领导', 'B. 群众路线', 'C. 专群结合', 'D. 全心全意为人民服务'], correct: 1, type: 'single', quizIndex: 31,
              d: '<b>A</b>：错误。坚持党的领导是"根本原则"，不是"根本路线"。<br><b>B</b>：正确。群众路线是公安工作的根本路线。<br><b>C</b>：错误。专群结合是"基本方针"。<br><b>D</b>：错误。全心全意为人民服务是"宗旨"。',
              t: '原则=党领导，路线=群众路，方针=专群结合，宗旨=为人民服务。四个概念别搞混。' },
            { q: '公安机关的两大基本职能是什么？', opts: ['A. 管理职能和服务职能', 'B. 专政职能和民主职能', 'C. 治安职能和刑事职能', 'D. 预防职能和打击职能'], correct: 1, type: 'single', quizIndex: 32,
              d: '<b>A</b>：错误。管理、服务是具体工作方式，不是"基本职能"的官方表述。<br><b>B</b>：正确。专政职能（对敌人）和民主职能（对人民）是公安机关的两大基本职能。<br><b>C</b>：错误。治安、刑事是公安专业工作的分类。<br><b>D</b>：错误。预防、打击是工作手段，不是基本职能。',
              t: '基本职能就两个：对敌人专政，对人民民主。其他都是衍生出来的。' },
            { q: '严肃与谨慎相结合政策的总精神是什么？', opts: ['A. 执法必严', 'B. 重证据重调查', 'C. 不枉不纵', 'D. 宽严相济'], correct: 2, type: 'single', quizIndex: 33,
              d: '<b>A</b>：错误。"执法必严"是"严肃"的内涵，不是总精神。<br><b>B</b>：错误。"重证据、重调查研究"是"谨慎"的内涵。<br><b>C</b>：正确。"严肃"+"谨慎"合起来的总精神就是"不枉不纵"——不冤枉一个好人，不放过一个坏人。<br><b>D</b>：错误。宽严相济是另一项独立的刑事政策。',
              t: '严肃=该抓就抓；谨慎=别抓错人。合起来=不枉不纵，刚刚好。' },
            { q: '人民警察职业道德中，"事实为据，秉持公正，惩恶扬善"属于哪一项？', opts: ['A. 忠诚可靠', 'B. 秉公执法', 'C. 英勇善战', 'D. 严守纪律'], correct: 1, type: 'single', quizIndex: 34,
              d: '<b>A</b>：错误。忠诚可靠的内容是"听党指挥，热爱人民，忠于法律"。<br><b>B</b>：正确。秉公执法的原文就是"事实为据，秉持公正，惩恶扬善"。<br><b>C</b>：错误。英勇善战的内容是"坚韧不拔，机智果敢，崇尚荣誉"。<br><b>D</b>：错误。严守纪律的内容是"遵章守纪，保守秘密，令行禁止"。',
              t: '看到"事实为依据""公正""惩恶扬善"这些词，直接对应"秉公执法"。' },
            { q: '根据五条禁令，民警酒后驾驶机动车的，应如何处理？', opts: ['A. 警告', 'B. 纪律处分', 'C. 辞退', 'D. 记过'], correct: 2, type: 'single', quizIndex: 35,
              d: '<b>A</b>：错误。五条禁令中酒后驾车是直接辞退，比警告严厉得多。<br><b>B</b>：错误。只有第①条（违反枪支管理规定）和第④条（工作时间饮酒）初始是纪律处分。<br><b>C</b>：正确。第③条规定"严禁酒后驾驶机动车，违者予以辞退"。<br><b>D</b>：错误。记过属于行政处分的一种，不是五条禁令的直接处理结果。',
              t: '②③⑤=直接辞退！酒后驾车，一票否决，没得商量。' },
            { q: '使用驱逐性、制服性警械的前提是什么？', opts: ['A. 上级批准', 'B. 经警告无效', 'C. 任何时候都可以', 'D. 群众同意'], correct: 1, type: 'single', quizIndex: 36,
              d: '<b>A</b>：错误。法条没有规定需要上级批准。<br><b>B</b>：正确。条例第7条明确规定"经警告无效"后方可使用警棍、催泪弹等驱逐性、制服性警械。<br><b>C</b>：错误。必须符合法定情形且经警告无效。<br><b>D</b>：错误。不需要群众同意，但应命令群众躲避。',
              t: '先喊"警察！别动！"喊了不听，才能用警棍、辣椒水。' },
            { q: '行政处分的种类不包括？', opts: ['A. 警告', 'B. 记过', 'C. 降级', 'D. 罚款'], correct: 3, type: 'single', quizIndex: 37,
              d: '<b>A</b>：包括。行政处分6种：警告、记过、记大过、降级、撤职、开除。<br><b>B</b>：包括。<br><b>C</b>：包括。<br><b>D</b>：不包括。罚款是行政处罚（针对老百姓），不是行政处分（针对警察）。',
              t: '处分是给警察的（警告、记过、降级、撤职、开除），罚款是给违法老百姓的，两码事。' },
            { q: '人民警察法规定，奖励的种类不包括？', opts: ['A. 嘉奖', 'B. 三等功', 'C. 晋升警衔', 'D. 授予荣誉称号'], correct: 2, type: 'single', quizIndex: 38,
              d: '<b>A</b>：包括。嘉奖是最低一级奖励。<br><b>B</b>：包括。三等功是第二级奖励。<br><b>C</b>：不包括。晋升警衔属于正常的职务管理，不是奖励。奖励种类：嘉奖、三等功、二等功、一等功、授予荣誉称号。<br><b>D</b>：包括。授予荣誉称号是最高级奖励。',
              t: '奖励5级：嘉奖→三等功→二等功→一等功→荣誉称号。升警衔不是奖，是正常晋升。' },
            { q: '实行交通管制的条件是？', opts: ['A. 任何扰乱秩序的行为', 'B. 严重危害社会治安秩序的行为', 'C. 日常交通拥堵', 'D. 上级领导视察'], correct: 1, type: 'single', quizIndex: 39,
              d: '<b>A</b>：错误。必须是"严重"危害社会治安秩序，一般扰乱不够格。<br><b>B</b>：正确。人民警察法第15条规定，为预防和制止严重危害社会治安秩序的行为，可实行交通管制。<br><b>C</b>：错误。日常拥堵属于交通管理，不是交通管制。<br><b>D</b>：错误。领导视察不能作为交通管制的法定事由。',
              t: '"严重"二字是关键词！一般的堵车、一般的闹事不能管制交通。' },
            { q: '人民警察依法使用警械武器造成无辜人员伤亡的，应如何处理？', opts: ['A. 不予处理', 'B. 由警察个人赔偿', 'C. 由所属机关参照国家赔偿法补偿', 'D. 由上级机关赔偿'], correct: 2, type: 'single', quizIndex: 40,
              d: '<b>A</b>：错误。必须善后处理，不能不管。<br><b>B</b>：错误。赔偿主体是所属机关，不是警察个人。<br><b>C</b>：正确。条例第15条规定依法使用造成无辜伤亡的，由所属机关参照《国家赔偿法》给予补偿。<br><b>D</b>：错误。补偿主体是"该人民警察所属机关"，不是上级机关。',
              t: '依法开枪误伤好人→找开枪警察的单位申请补偿。违法开枪→找单位申请赔偿。"补偿"和"赔偿"一字之差。' }
        ]
    },

,
    // ==================== 综合练习：判断题10道 ====================
    {
        id: 'mod_tf', iconClass: 'icon-blue', iconEmoji: '✅',
        title: '综合练习 · 判断题10道',
        subtitle: '覆盖：警械武器条例 · 人民警察法 · 公安基础知识',
        quizzes: [
            { q: '特种防暴枪属于武器。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf1',
              d: '<b>A"正确"</b>：错误。特种防暴枪虽然名字里带"枪"，但根据条例第3条，它属于驱逐性、制服性的<span class="kh kh-red">警械</span>，不是致命性武器。<br><b>B"错误"</b>：正确。题干说法错误，特种防暴枪是警械。',
              t: '带"枪"字的不一定都是武器！特种防暴枪发射的是催泪弹、爆震弹，不致命，所以是警械。' },
            { q: '人民警察使用警械和武器，应当以制止违法犯罪行为为原则，尽量减少人员伤亡和财产损失。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf2',
              d: '<b>A"正确"</b>：正确。这是条例第4条的原文，是贯穿整个条例的核心原则。<br><b>B"错误"</b>：错误。',
              t: '第4条是"灵魂条款"：目的是制止，过程中要尽量少伤人、少毁东西。' },
            { q: '人民警察使用武器前必须鸣枪示警。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf3',
              d: '<b>A"正确"</b>：错误。法条只规定"经警告无效"，并没有规定警告的具体方式，不一定是鸣枪示警。<br><b>B"错误"</b>：正确。口头警告也是警告，法条从未规定"必须鸣枪示警"。',
              t: '警告可以是口头喊话，不一定非要朝天开枪。法条没有"必须鸣枪"的要求。' },
            { q: '发现实施犯罪的人为怀孕妇女，人民警察在任何情况下都不得对其使用武器。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf4',
              d: '<b>A"正确"</b>：错误。条例第10条规定了例外——使用枪支、爆炸、剧毒等危险物品实施暴力犯罪的除外。<br><b>B"错误"</b>：正确。"任何情况"太绝对，有例外情形。',
              t: '孕妇一般不打，但她拿着枪扫射时，可以打。' },
            { q: '犯罪分子停止实施犯罪并服从人民警察命令的，应当立即停止使用武器。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf5',
              d: '<b>A"正确"</b>：正确。条例第11条：犯罪分子停止犯罪且服从命令，应当立即停止使用武器。<br><b>B"错误"</b>：错误。',
              t: '停了犯罪+听话=立刻停火。两个条件缺一不可。' },
            { q: '人民警察使用武器后，应当将使用武器的情况口头向所属机关报告即可。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf6',
              d: '<b>A"正确"</b>：错误。条例第13条规定应当<span class="kh kh-red">书面报告</span>，口头无效。<br><b>B"错误"</b>：正确。',
              t: '开枪了必须写书面报告，口头说一声不算数。' },
            { q: '人民警察依法使用警械、武器造成无辜人员伤亡的，由该人民警察所属机关依照《国家赔偿法》给予赔偿。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf7',
              d: '<b>A"正确"</b>：错误。依法使用造成无辜伤亡是"补偿"不是"赔偿"，且是"参照"不是"依照"。<br><b>B"错误"</b>：正确。条例第15条用词是"参照"和"补偿"。',
              t: '违法=依照赔偿；依法=参照补偿。一字之差，天壤之别。' },
            { q: '公安机关的根本属性是武装性质。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf8',
              d: '<b>A"正确"</b>：错误。武装性质是<span class="kh kh-red">组织属性</span>，根本属性（阶级属性）是<span class="kh kh-red">人民民主专政的重要工具</span>。<br><b>B"错误"</b>：正确。',
              t: '根本属性=人民民主专政工具（灵魂）；武装性质=组织属性（身体）。别搞混。' },
            { q: '根据五条禁令，民警携带枪支饮酒的，予以纪律处分。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf9',
              d: '<b>A"正确"</b>：错误。五条禁令第②条：携带枪支饮酒的，予以<span class="kh kh-red">辞退</span>，不是纪律处分。<br><b>B"错误"</b>：正确。',
              t: '枪+酒=直接辞退，不是处分一下就算了。' },
            { q: '人民警察在非工作时间遇其职责范围内的紧急情况，可以不履行职责。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf10',
              d: '<b>A"正确"</b>：错误。人民警察法第19条规定，非工作时间遇职责范围内紧急情况<span class="kh kh-red">应当履行职责</span>。<br><b>B"错误"</b>：正确。',
              t: '下班了也是警察！路上看到抢劫，不能装没看见。' }
        ]
    },
    // ==================== 综合练习：多选题20道 ====================
    {
        id: 'mod_multi', iconClass: 'icon-green', iconEmoji: '📋',
        title: '综合练习 · 多选题20道',
        subtitle: '覆盖：警械武器条例 · 人民警察法 · 公安基础知识',
        quizzes: [
            { q: '下列哪些属于"警械"？', opts: ['A. 警棍', 'B. 催泪弹', 'C. 枪支', 'D. 手铐', 'E. 弹药'], correct: [0,1,3], type: 'multi', multi: true, quizIndex: '多1',
              d: '<b>A</b>：正确。警棍是典型的驱逐性警械。<br><b>B</b>：正确。催泪弹属于驱逐性、制服性警械。<br><b>C</b>：错误。枪支是致命性武器。<br><b>D</b>：正确。手铐是约束性警械。<br><b>E</b>：错误。弹药属于武器。',
              t: '警械=非致命（警棍、辣椒水、手铐）；武器=致命（枪支、弹药）。' },

function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.items&&mod.items.length>0){h+='<div class="ki-grid">';mod.items.forEach(function(item){if(item.type==='table')h+=item.html;else if(item.type==='ki')h+=renderKI(item);});h+='</div>';}if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}
function renderKI(item){var h='<div class="ki-item">';h+='<div class="ki-title-row">'+(item.badge?'<span class="badge '+(item.badgeClass||'badge-num')+'">'+item.badge+'</span> ':'')+item.title+'</div>';h+='<div class="ki-content">'+item.content+'</div>';if(item.extra)h+='<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">'+item.extra+'</div>';if(item.example){h+='<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">'+item.example.q+'</div><div class="ex-a">'+item.example.a+'</div></div>';}h+='</div>';return h;}
function renderQuiz(q,qid){var qTypeLabel=q.multi?'【多选题】':'【单选题】';var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else if(q.tfId){h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div><ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div><div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.d){var detailHtml=q.d;detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(正确)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(错误)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.t+'</div></div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 警械武器+警察法 · 知识目录</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
</body>
</html>
