            { q: '国家赔偿以什么为主要方式？', opts: ['A. 返还财产', 'B. 恢复原状', 'C. 支付赔偿金', 'D. 赔礼道歉'], correct: 2, type: 'single', quizIndex: 13,
              d: '<b>A</b>：错误。返还财产是补充方式。<br><b>B</b>：错误。恢复原状是补充方式。<br><b>C</b>：正确。支付赔偿金是主要方式。<br><b>D</b>：错误。赔礼道歉是精神损害赔偿的方式。',
              t: '国家赔偿=主要是给钱。能还东西就还，能修就修，不行就赔钱。' },
            { q: '造成公民死亡的，死亡赔偿金和丧葬费的总额为国家上年度职工年平均工资的多少倍？', opts: ['A. 5倍', 'B. 10倍', 'C. 15倍', 'D. 20倍'], correct: 3, type: 'single', quizIndex: 14,
              d: '<b>A</b>：错误。5倍是误工费最高额。<br><b>B</b>：错误。<br><b>C</b>：错误。<br><b>D</b>：正确。死亡赔偿金+丧葬费=上年职工年平均工资的20倍，这是固定标准。',

            { q: '责令停产停业期间，赔偿范围包括？', opts: ['A. 停业期间的预期利润', 'B. 必要的经常性费用开支', 'C. 全部经营损失', 'D. 包括利润和费用'], correct: 1, type: 'single', quizIndex: 15,
              d: '<b>A</b>：错误。预期利润不属于直接损失，不赔。<br><b>B</b>：正确。只赔偿必要的经常性费用（租金、水电、工资等）。<br><b>C</b>：错误。<br><b>D</b>：错误。利润不赔。',
              t: '停产停业只赔"活命钱"（房租水电工资），不赔"你本来能赚多少"——那叫预期利润，不赔。' },
            { q: '行政追偿中，国家向工作人员追偿的条件是什么？', opts: ['A. 工作人员有任何过失', 'B. 工作人员有故意或重大过失', 'C. 工作人员拒绝赔偿', 'D. 工作人员辞职'], correct: 1, type: 'single', quizIndex: 16,
              d: '<b>A</b>：错误。一般过失不追偿。<br><b>B</b>：正确。行政追偿条件=故意或重大过失。<br><b>C</b>：错误。<br><b>D</b>：错误。辞职不影响追偿。',

,
    // ==================== 综合练习（单选20+判断15+多选10） ====================
    {
        id: 'mod_final', iconClass: 'icon-red', iconEmoji: '🏆',
        title: '综合练习',
        subtitle: '覆盖国家赔偿法全部核心考点',
        quizzes: [
            // ===== 单选题20道 =====
            { q: '国家赔偿的实质赔偿主体是谁？', opts: ['A. 具体实施侵权的工作人员', 'B. 国家', 'C. 赔偿义务机关', 'D. 财政部门'], correct: 1, type: 'single', quizIndex: 1,
              d: '<b>A</b>：错误。工作人员只是行为实施者，赔偿责任属于国家。<br><b>B</b>：正确。国家赔偿的实质主体是国家，赔偿金来自国家财政（纳税人税款）。<br><b>C</b>：错误。赔偿义务机关是代替国家履行赔偿义务的具体机关。<br><b>D</b>：错误。财政部门只是支付机构。',
              t: '国家赔偿=国家出钱。虽然你找的是具体机关，但最终买单的是国家财政。' },
            { q: '下列哪项不属于国家赔偿的构成要件？', opts: ['A. 主体为国家机关及其工作人员', 'B. 行为必须是职务行为', 'C. 行为人必须有主观故意', 'D. 造成了实际损害'], correct: 2, type: 'single', quizIndex: 2,
              d: '<b>A</b>：属于。主体要件是构成要件之一。<br><b>B</b>：属于。行为必须是职务行为。<br><b>C</b>：不属于。国家赔偿不要求主观故意，违法行使职权即使无故意也可能要赔。<br><b>D</b>：属于。无损害不赔偿。',
              t: '国家赔偿看的是"违法+损害"，不要求一定是故意的。过失违法造成损害也要赔。' },
            { q: '警察下班后与邻居发生纠纷并将其打伤，下列说法正确的是？', opts: ['A. 国家应赔偿，因为行为人是警察', 'B. 国家应赔偿，因为警察全天候履职', 'C. 国家不赔偿，属于个人行为', 'D. 国家赔偿后可向警察追偿'], correct: 2, type: 'single', quizIndex: 3,
              d: '<b>A</b>：错误。不能仅凭身份判断。<br><b>B</b>：错误。警察并非全天候都在执行职务。<br><b>C</b>：正确。下班后与邻居纠纷不属于职务行为，是个人行为，国家不赔。<br><b>D</b>：错误。国家都不赔，谈不上追偿。',
              t: '下班打架=个人行为，自己赔。上班执法时打人=职务行为，国家赔。' },
            { q: '行政机关工作人员与行使职权无关的个人行为造成损害的，国家是否赔偿？', opts: ['A. 应当赔偿', 'B. 不予赔偿', 'C. 可以赔偿', 'D. 视损害程度而定'], correct: 1, type: 'single', quizIndex: 4,
              d: '<b>A</b>：错误。个人行为国家不承担赔偿责任。<br><b>B</b>：正确。与职权无关的个人行为，由个人承担责任。<br><b>C</b>：错误。<br><b>D</b>：错误。与损害程度无关。',
              t: '国家只赔"公事"不赔"私事"。个人行为自己扛。' },
            { q: '在刑事赔偿中，公民被逮捕后检察机关决定不起诉，能否获得赔偿？', opts: ['A. 不能，逮捕是合法的强制措施', 'B. 能，因为最终未被定罪', 'C. 不能，需看逮捕是否违法', 'D. 能，但需证明逮捕违法'], correct: 1, type: 'single', quizIndex: 5,
              d: '<b>A</b>：错误。逮捕后不起诉=没罪关了就要赔。<br><b>B</b>：正确。逮捕赔偿的核心规则是"没罪关了就要赔"。<br><b>C</b>：错误。不看逮捕是否违法，看最终是否无罪。<br><b>D</b>：错误。不需要证明逮捕违法。',
              t: '只要最终没定罪，之前被关的日子就要赔。这就是"没罪关了就要赔"。' },
            { q: '根据国家赔偿法，下列哪种情形国家不予刑事赔偿？', opts: ['A. 再审改判无罪，原判已执行3年', 'B. 刑讯逼供致人轻伤', 'C. 公民故意作虚伪供述被羁押', 'D. 违法使用武器致人死亡'], correct: 2, type: 'single', quizIndex: 6,
              d: '<b>A</b>：属于赔偿范围。再审无罪+已执行=要赔。<br><b>B</b>：属于赔偿范围。刑讯逼供违法。<br><b>C</b>：不属于。自己作虚伪供述导致被羁押，国家不赔。<br><b>D</b>：属于赔偿范围。违法使用武器。',
              t: '自己作死（虚伪供述、伪造证据）导致的羁押，国家不背锅。' },
            { q: '被限制人身自由的人在羁押期间死亡，因果关系的举证责任由谁承担？', opts: ['A. 死者家属', 'B. 赔偿义务机关', 'C. 法院', 'D. 检察院'], correct: 1, type: 'single', quizIndex: 7,
              d: '<b>A</b>：错误。特殊情况下举证责任倒置。<br><b>B</b>：正确。限制人身自由期间死亡或丧失行为能力，由赔偿义务机关举证。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '人关在里面死了，监控和记录都在机关手里，让机关证明自己有没有责任。' },
            { q: '二审法院改判无罪，赔偿义务机关是谁？', opts: ['A. 二审法院', 'B. 一审法院', 'C. 作出逮捕决定的机关', 'D. 作出拘留决定的机关'], correct: 1, type: 'single', quizIndex: 8,
              d: '<b>A</b>：错误。二审改判无罪说明一审有错。<br><b>B</b>：正确。二审改判无罪或发回重审后无罪处理，一审法院为赔偿义务机关。<br><b>C</b>：错误。这是逮捕的赔偿规则。<br><b>D</b>：错误。这是拘留的赔偿规则。',
              t: '二审说一审判错了→一审法院赔。"谁最后做错决定，谁负责"。' },
            { q: '行政赔偿义务机关应在收到赔偿申请之日起多久内作出是否赔偿的决定？', opts: ['A. 1个月', 'B. 2个月', 'C. 3个月', 'D. 6个月'], correct: 1, type: 'single', quizIndex: 9,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。赔偿义务机关应在收到申请之日起2个月内作出决定。<br><b>C</b>：错误。3个月是赔偿委员会的决定期限。<br><b>D</b>：错误。',
              t: '机关2个月内必须给答复——赔还是不赔，给个痛快。' },
            { q: '赔偿请求人请求国家赔偿的时效是多久？', opts: ['A. 6个月', 'B. 1年', 'C. 2年', 'D. 3年'], correct: 2, type: 'single', quizIndex: 10,
              d: '<b>A</b>：错误。6个月是行政诉讼直接起诉期限。<br><b>B</b>：错误。<br><b>C</b>：正确。国家赔偿请求时效为2年，自知道或应当知道权利被侵害之日起算。<br><b>D</b>：错误。',
              t: '国家赔偿时效2年，比复议（60天）和诉讼（6个月）长得多。被关押时间不算在内。' },
            { q: '赔偿义务机关决定不予赔偿的，应在几日内书面通知赔偿请求人？', opts: ['A. 5日', 'B. 7日', 'C. 10日', 'D. 15日'], correct: 2, type: 'single', quizIndex: 11,
              d: '<b>A</b>：错误。5日是补正材料的期限。<br><b>B</b>：错误。7日是向财政部门申请的期限。<br><b>C</b>：正确。决定后10日内送达或通知。<br><b>D</b>：错误。15日是财政部门支付期限。',
              t: '不管赔不赔，决定后10天内必须书面答复。不赔还得说明理由。' },
            { q: '赔偿请求人对赔偿义务机关不予赔偿的决定不服，可在多久内向法院起诉？', opts: ['A. 1个月', 'B. 2个月', 'C. 3个月', 'D. 6个月'], correct: 2, type: 'single', quizIndex: 12,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。2个月是机关决定的期限。<br><b>C</b>：正确。不服决定或逾期不决定，可在3个月内向法院起诉。<br><b>D</b>：错误。',
              t: '机关不理你或不赔→3个月内去法院告他。' },
            { q: '国家赔偿的主要方式是什么？', opts: ['A. 返还财产', 'B. 恢复原状', 'C. 支付赔偿金', 'D. 赔礼道歉'], correct: 2, type: 'single', quizIndex: 13,
              d: '<b>A</b>：错误。返还财产是补充方式。<br><b>B</b>：错误。恢复原状是补充方式。<br><b>C</b>：正确。支付赔偿金是主要方式。<br><b>D</b>：错误。赔礼道歉是精神损害赔偿方式。',
              t: '国家赔偿=主要是给钱。能还东西就还，能修就修，不行就赔钱。' },
            { q: '造成公民死亡的，死亡赔偿金和丧葬费总额为上年职工年平均工资的多少倍？', opts: ['A. 5倍', 'B. 10倍', 'C. 15倍', 'D. 20倍'], correct: 3, type: 'single', quizIndex: 14,
              d: '<b>A</b>：错误。5倍是误工费最高额。<br><b>B</b>：错误。<br><b>C</b>：错误。<br><b>D</b>：正确。死亡赔偿金+丧葬费=上年职工年平均工资的20倍，这是固定标准。',

            { q: '责令停产停业期间，国家赔偿的范围是？', opts: ['A. 停业期间的预期利润', 'B. 必要的经常性费用开支', 'C. 全部经营损失', 'D. 员工的精神损失'], correct: 1, type: 'single', quizIndex: 15,
              d: '<b>A</b>：错误。预期利润不赔。<br><b>B</b>：正确。只赔必要的经常性费用（租金、水电、工资）。<br><b>C</b>：错误。<br><b>D</b>：错误。停产停业不涉及精神损失。',

            { q: '赔偿请求人凭生效文书申请支付赔偿金，赔偿义务机关应在几日内向财政部门提出支付申请？', opts: ['A. 3日', 'B. 5日', 'C. 7日', 'D. 10日'], correct: 2, type: 'single', quizIndex: 16,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。赔偿义务机关应在7日内向财政部门提出支付申请。<br><b>D</b>：错误。10日是送达期限。',
              t: '拿到赔偿决定书后，机关7天内向财政要钱，财政15天内打款。' },
            { q: '关于申请国家赔偿的费用，下列说法正确的是？', opts: ['A. 需缴纳申请费', 'B. 赔偿金需缴纳个人所得税', 'C. 不收费也不征税', 'D. 收费但免税'], correct: 2, type: 'single', quizIndex: 17,

              t: '申请赔偿不要钱，拿到的赔偿金也不用交税。' },
            { q: '人民法院赔偿委员会由几名以上审判员组成？', opts: ['A. 1名', 'B. 2名', 'C. 3名', 'D. 5名'], correct: 2, type: 'single', quizIndex: 18,

              t: '赔偿委员会=3人以上，单数，少数服从多数。' },
            { q: '行政追偿中，赔偿义务机关向工作人员追偿的条件是什么？', opts: ['A. 工作人员有任何过失', 'B. 工作人员有故意或重大过失', 'C. 工作人员拒绝赔偿', 'D. 工作人员经济条件允许'], correct: 1, type: 'single', quizIndex: 19,
              d: '<b>A</b>：错误。一般过失不追偿。<br><b>B</b>：正确。行政追偿条件=故意或重大过失。<br><b>C</b>：错误。<br><b>D</b>：错误。不过经济条件会影响追偿金额。',
              t: '不是所有错都要被追偿，只有"故意"或"重大过失"才追。一般小错不追。' },
            { q: '赔偿请求人不是受害人本人的，应当怎么做？', opts: ['A. 无需说明关系', 'B. 说明与受害人关系并提供证明', 'C. 只需口头说明', 'D. 由法院主动审查'], correct: 1, type: 'single', quizIndex: 20,
              d: '<b>A</b>：错误。必须说明关系。<br><b>B</b>：正确。应说明关系并提供相应证明（如结婚证、户口本等）。<br><b>C</b>：错误。需要书面证明。<br><b>D</b>：错误。',
              t: '替别人要赔偿，得拿出证据证明你是继承人或有抚养关系的亲属。' },

            { q: '国家赔偿的实质主体是赔偿义务机关。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf1',

            { q: '行政机关工作人员与行使职权无关的个人行为造成损害的，国家不予赔偿。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf2',

              t: '取保候审在外面，没有被关，所以不赔。只有拘留和逮捕（关起来的）才可能赔。' },
            { q: '公民故意作虚伪供述导致被羁押的，国家应当给予赔偿。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf4',

            { q: '赔偿请求时效为两年，被羁押期间不计入时效。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf5',
              d: '<b>A"正确"</b>：正确。时效2年，被限制人身自由的时间不计算在内。<br><b>B"错误"</b>：错误。',

            { q: '赔偿义务机关决定赔偿的，应自作出决定之日起15日内送达赔偿决定书。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf6',

            { q: '申请国家赔偿需要缴纳申请费用。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf7',

            { q: '人民法院赔偿委员会实行少数服从多数的原则。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf8',
              d: '<b>A"正确"</b>：正确。赔偿委员会由单数审判员组成，少数服从多数。<br><b>B"错误"</b>：错误。',

            { q: '中级以上人民法院设立赔偿委员会，基层人民法院也设立赔偿委员会。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf10',
              d: '<b>A"正确"</b>：错误。只有中级以上法院才设立赔偿委员会，基层法院没有。<br><b>B"错误"</b>：正确。',

            { q: '赔偿请求人获得的国家赔偿金需要缴纳个人所得税。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf11',
              d: '<b>A"正确"</b>：错误。赔偿金不征税。<br><b>B"错误"</b>：正确。',
              t: '赔偿金免税！' },
            { q: '责令停产停业期间，国家赔偿范围包括必要的经常性费用开支和预期利润。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf12',

            { q: '行政追偿的条件是工作人员有故意或重大过失。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf13',
              d: '<b>A"正确"</b>：正确。行政追偿的条件就是故意或重大过失。<br><b>B"错误"</b>：错误。',

            { q: '经复议的案件，复议机关的复议决定加重损害的，复议机关对全部损害承担赔偿责任。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf14',

            { q: '国家赔偿的构成要件包括哪些？', opts: ['A. 主体为国家机关及其工作人员', 'B. 职务行为', 'C. 造成实际损害', 'D. 行为与损害有因果关系', 'E. 行为人必须有主观故意'], correct: [0,1,2,3], type: 'multi', multi: true, quizIndex: '多1',
              d: '<b>A</b>：正确。主体要件。<br><b>B</b>：正确。行为必须是职务行为。<br><b>C</b>：正确。无损害不赔偿。<br><b>D</b>：正确。因果关系要件。<br><b>E</b>：错误。国家赔偿不以主观故意为要件，违法即可。',

              d: '<b>A</b>：正确。侵犯人身权。<br><b>B</b>：正确。侵犯财产权。<br><b>C</b>：正确。侵犯财产权。<br><b>D</b>：正确。侵犯人身权。<br><b>E</b>：错误。合法征收是补偿不是赔偿。',

              d: '<b>A</b>：正确。自己虚伪供述=不赔。<br><b>B</b>：正确。不负刑事责任=不赔。<br><b>C</b>：正确。不追究刑事责任=不赔。<br><b>D</b>：错误。再审无罪+已执行=要赔。<br><b>E</b>：正确。个人行为=不赔。',
              t: '虚伪供述、不够年龄、情节轻微、个人行为=不赔。再审无罪已执行=要赔。' },

              d: '<b>A</b>：正确。<br><b>B</b>：正确。委托机关赔。<br><b>C</b>：错误。派出所无独立财政，由所属公安局赔。<br><b>D</b>：正确。<br><b>E</b>：正确。',
              t: '派出所不能当赔偿义务机关——没钱赔。其他四项都对。' },

              d: '<b>A</b>：正确。方式可协商。<br><b>B</b>：正确。项目可协商。<br><b>C</b>：正确。数额可协商。<br><b>D</b>：错误。是否赔偿由机关决定，不可协商。<br><b>E</b>：错误。期限法定，不可协商。',
              t: '可协商=方式+项目+数额。是否赔、赔多久=法定，没得商量。' },
            { q: '下列哪些属于国家赔偿的方式？', opts: ['A. 支付赔偿金', 'B. 返还财产', 'C. 恢复原状', 'D. 消除影响恢复名誉', 'E. 吊销许可证'], correct: [0,1,2,3], type: 'multi', multi: true, quizIndex: '多6',
              d: '<b>A</b>：正确。主要方式。<br><b>B</b>：正确。补充方式。<br><b>C</b>：正确。补充方式。<br><b>D</b>：正确。精神损害赔偿方式。<br><b>E</b>：错误。吊销许可证是行政处罚，不是赔偿方式。',
              t: '赔钱、还东西、修东西、道歉——都是赔偿方式。吊销许可证是处罚，不是赔偿。' },
            { q: '关于刑事赔偿义务机关，下列说法正确的有？', opts: ['A. 作出拘留决定的机关为赔偿义务机关', 'B. 作出逮捕决定的机关为赔偿义务机关', 'C. 执行逮捕的机关为赔偿义务机关', 'D. 再审改判无罪，作出原生效判决的法院为赔偿义务机关', 'E. 二审改判无罪，一审法院为赔偿义务机关'], correct: [0,1,3,4], type: 'multi', multi: true, quizIndex: '多7',
              d: '<b>A</b>：正确。<br><b>B</b>：正确。谁决定谁赔。<br><b>C</b>：错误。执行机关不一定是决定机关，由决定机关赔。<br><b>D</b>：正确。<br><b>E</b>：正确。',
              t: '谁决定谁赔，不是谁执行谁赔。逮捕由检察院/法院决定，公安执行，决定机关赔。' },
            { q: '刑事赔偿中，赔偿义务机关为非法院时，程序包括哪些？', opts: ['A. 向赔偿义务机关申请', 'B. 不服可向上一级机关复议', 'C. 对复议不服可向法院赔偿委员会申请', 'D. 赔偿委员会决定为最终决定', 'E. 可直接向法院起诉'], correct: [0,1,2,3], type: 'multi', multi: true, quizIndex: '多8',
              d: '<b>A</b>：正确。第一步。<br><b>B</b>：正确。第二步复议。<br><b>C</b>：正确。第三步赔委会。<br><b>D</b>：正确。最终决定。<br><b>E</b>：错误。不能直接起诉，必须先申请→复议→赔委会。',
              t: '非法院=三步走：申请→复议→赔委会。不能直接起诉。' },
            { q: '造成公民死亡的，赔偿范围包括哪些？', opts: ['A. 死亡赔偿金', 'B. 丧葬费', 'C. 死者生前扶养的无劳动能力人生活费', 'D. 死者生前债务', 'E. 精神抚慰金'], correct: [0,1,2,4], type: 'multi', multi: true, quizIndex: '多9',
              d: '<b>A</b>：正确。+丧葬费总额=20倍。<br><b>B</b>：正确。<br><b>C</b>：正确。按低保标准支付。<br><b>D</b>：错误。死者债务不属于国家赔偿范围。<br><b>E</b>：正确。造成严重后果的应支付。',
              t: '死亡赔四项：死亡赔偿金+丧葬费+被扶养人生活费+精神抚慰金。债务不管。' },
            { q: '行政赔偿义务机关逾期不作出赔偿决定的，赔偿请求人可以采取哪些救济途径？', opts: ['A. 向法院提起行政赔偿诉讼', 'B. 向上一级机关申请复议', 'C. 向检察院申诉', 'D. 向法院赔偿委员会申请', 'E. 继续等待'], correct: [0,1], type: 'multi', multi: true, quizIndex: '多10',
              d: '<b>A</b>：正确。期限内不起诉权利丧失。<br><b>B</b>：正确。可申请复议或直接起诉。<br><b>C</b>：错误。检察院不直接处理行政赔偿。<br><b>D</b>：错误。赔偿委员会是刑事赔偿程序。<br><b>E</b>：错误。',
              t: '行政赔偿=起诉或复议。赔偿委员会是刑事赔偿的，不适用于行政赔偿。' }
        ]

<script>
// ==================== 渲染引擎 ====================
function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.items&&mod.items.length>0){h+='<div class="ki-grid">';mod.items.forEach(function(item){if(item.type==='table')h+=item.html;else if(item.type==='ki')h+=renderKI(item);});h+='</div>';}if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}
function renderKI(item){var h='<div class="ki-item">';h+='<div class="ki-title-row">'+(item.badge?'<span class="badge '+(item.badgeClass||'badge-num')+'">'+item.badge+'</span> ':'')+item.title+'</div>';h+='<div class="ki-content">'+item.content+'</div>';if(item.extra)h+='<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">'+item.extra+'</div>';if(item.example){h+='<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">'+item.example.q+'</div><div class="ex-a">'+item.example.a+'</div></div>';}h+='</div>';return h;}
function renderQuiz(q,qid){var qTypeLabel=q.multi?'【多选题】':'【单选题】';var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else if(q.tfId){h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div><ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div><div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.d){var detailHtml=q.d;detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(正确)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(错误)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.t+'</div></div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 国家赔偿法 · 知识目录</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
