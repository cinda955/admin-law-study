<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>深圳辅警行测模拟考试</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    --bg: #fdf8f3;
    --card-bg: #ffffff;
    --text: #2c2416;
    --text-light: #5c5347;
    --accent: #b22222;
    --highlight: #fff3cd;
    --highlight-border: #f0c040;
    --example-bg: #f0faf5;
    --example-border: #a3e4bc;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --radius: 14px;
    --radius-sm: 10px;
    --opt-border: #e9e4db;
    --opt-hover: #c0b090;
    --correct-bg: #d4edda;
    --correct-border: #28a745;
    --wrong-bg: #f8d7da;
    --wrong-border: #dc3545;
    --selected-bg: #cce5ff;
    --selected-border: #004085;
    --toc-btn-size: 44px;
    --toc-panel-width: 280px;
    font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans SC',system-ui,-apple-system,sans-serif;
    background-color: var(--bg);
    color: var(--text);
    transition: background-color 0.3s;
}
body.theme-blue {
    --bg: #f0f4f8; --card-bg: #ffffff; --text: #1e293b; --text-light: #475569;
    --accent: #2563eb; --highlight: #e0f2fe; --highlight-border: #7dd3fc;
    --example-bg: #eef2ff; --example-border: #a5b4fc;
    --opt-border: #cbd5e1; --opt-hover: #94a3b8;
    --selected-bg: #bfdbfe; --selected-border: #1e40af;
}
body.theme-green {
    --bg: #f0fdf4; --card-bg: #ffffff; --text: #14532d; --text-light: #3f6212;
    --accent: #16a34a; --highlight: #dcfce7; --highlight-border: #86efac;
    --example-bg: #f0fdf4; --example-border: #4ade80;
    --opt-border: #bbf7d0; --opt-hover: #86efac;
    --selected-bg: #bbf7d0; --selected-border: #166534;
}
body.theme-purple {
    --bg: #faf5ff; --card-bg: #ffffff; --text: #3b0764; --text-light: #581c87;
    --accent: #9333ea; --highlight: #f3e8ff; --highlight-border: #d8b4fe;
    --example-bg: #f5f3ff; --example-border: #c4b5fd;
    --opt-border: #e9d5ff; --opt-hover: #c084fc;
    --selected-bg: #e9d5ff; --selected-border: #6b21a8;
}
.container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; padding-left: 50px; }
.header h1 { font-size: 1.6rem; font-weight: 600; }
.timer-box { display: flex; align-items: center; gap: 8px; }
.timer-box .time { font-size: 1.4rem; font-weight: 700; color: var(--accent); min-width: 70px; text-align: right; }
.btn-start { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: opacity 0.2s; }
.btn-start:hover { opacity: 0.85; }
.btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

.module-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 24px 28px; margin-bottom: 30px; border: 1px solid #f0ebe0; }
.module-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 18px; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
.material-card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: var(--radius-sm); padding: 16px; margin-bottom: 20px; }
.material-card h4 { margin-bottom: 10px; color: var(--text); font-size: 0.95rem; }
.chart-wrapper { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin: 12px 0; padding: 8px; }
#echart-md { width: 100%; height: 400px; }

.quiz-wrap { border: 2px solid #f0ebe0; border-radius: var(--radius-sm); padding: 18px 20px; margin-bottom: 16px; transition: opacity 0.3s; }
.quiz-wrap.submitted { pointer-events: none; opacity: 0.75; }
.quiz-question { margin-bottom: 10px; font-weight: 500; line-height: 1.6; }
.opt-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.opt-list li { border: 1.5px solid var(--opt-border); border-radius: 25px; padding: 10px 16px; cursor: pointer; transition: all 0.2s; user-select: none; }
.opt-list li:hover { border-color: var(--opt-hover); background: #f8f8f8; }
.opt-list li.selected { background: var(--selected-bg); border-color: var(--selected-border); font-weight: 500; }
.opt-list li.correct { background: var(--correct-bg); border-color: var(--correct-border); color: #155724; }
.opt-list li.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: #721c24; }

.explain-card { background: var(--example-bg); border: 1px solid var(--example-border); border-radius: var(--radius-sm); padding: 16px; margin-top: 14px; display: none; }
.quiz-wrap.submitted .explain-card { display: block; }
.plain-box { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; margin-top: 10px; font-size: 0.95rem; }

.btn-submit { background: var(--accent); color: #fff; border: none; padding: 10px 28px; border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: 600; margin-top: 10px; transition: opacity 0.2s; }
.btn-submit:hover { opacity: 0.85; }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* 浮动目录 */
.toc-toggle {
    position: fixed; top: 12px; left: 12px; z-index: 1001;
    width: 44px; height: 44px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 1.3rem; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
}
.toc-toggle:hover { opacity: 0.9; }
.toc-panel {
    position: fixed; left: -300px; top: 0; width: var(--toc-panel-width); height: 100%;
    background: var(--card-bg); box-shadow: 2px 0 12px rgba(0,0,0,0.15);
    transition: left 0.3s; z-index: 1000; padding: 24px 16px; overflow-y: auto;
}
.toc-panel.open { left: 0; }
.toc-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; }
.toc-overlay.show { display: block; }
.toc-btn {
    display: inline-block; width: 32px; height: 32px; line-height: 32px;
    text-align: center; margin: 4px; border: 1px solid #ccc; background: #f5f5f5;
    border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s;
    color: var(--text);
}
.toc-btn.submitted { background: #ddd; color: #888; border-color: #ddd; }
.toc-btn:hover { background: #e0e0e0; }
.toc-section-title { font-weight: bold; margin: 12px 0 6px; font-size: 0.9rem; color: var(--accent); }

.result-box { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px 24px; margin-top: 30px; font-size: 1.05rem; font-weight: 500; text-align: center; border: 2px solid var(--accent); line-height: 1.6; }

@media (max-width: 768px) {
    .header { padding-left: 50px; }
    .toc-toggle { width: 40px; height: 40px; font-size: 1.1rem; }
    #echart-md { height: 300px; }
}
.table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 12px 0;
}
/* 表格容器 - 确保响应式 */
.table-responsive {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 1rem 0;
}

/* 基础表格样式 */
.data-table {
  width: 100%;
  min-width: 650px;
  border-collapse: collapse;
  border-spacing: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  color: #333;
  background-color: #fff;
}

.data-table thead th {
  background-color: #f8f9fa;
  border: 1px solid #dee2e6;
  padding: 12px 15px;
  text-align: center;
  font-weight: 600;
  vertical-align: middle;
  white-space: nowrap;
}

.data-table thead th:first-child {
  vertical-align: middle;
}

.data-table tbody td {
  border: 1px solid #dee2e6;
  padding: 10px 15px;
  text-align: center;
  vertical-align: middle;
  white-space: nowrap;
}

.data-table tbody td:first-child {
  text-align: left;
  font-weight: 500;
}

.data-table tbody tr:nth-child(even) {
  background-color: #f8f9fa;
}

.data-table tbody tr:hover {
  background-color: #e9ecef;
  transition: background-color 0.2s ease;
}

</style>
</head>
<body>
<script>
    document.body.className = 'theme-blue';
</script>

<!-- 浮动目录按钮 -->
<button class="toc-toggle" id="tocToggleBtn" onclick="toggleToc()" title="目录">☰</button>
<div class="toc-overlay" id="tocOverlay" onclick="closeToc()"></div>
<div class="toc-panel" id="tocPanel">
    <h3 style="margin-bottom:15px;color:var(--accent);font-size:1rem;">📑 题目目录</h3>
    <div id="tocList"></div>
</div>

<div class="container">
    <div class="header">
        <h1>📝 深圳辅警行测模拟考试</h1>
        <div class="timer-box">
            <span class="time" id="timerDisplay">00:00</span>
            <button class="btn-start" id="startBtn" onclick="startTimer()">▶ 开始考试</button>
        </div>
    </div>

    <!-- 第一部分 公共基础知识 -->
    <div class="module-card" id="module-common">
        <div class="module-title">📘 第一部分：公共基础知识（共 30 题，每题 1 分）</div>
        <div id="moduleCommonQuestions"></div>
        <button class="btn-submit" id="submitCommonBtn" onclick="submitModule('common')">✅ 提交本模块</button>
    </div>

    <!-- 第二部分 判断推理（预留） -->
    <div class="module-card" id="module-judge">
        <div class="module-title">🔍 第二部分：判断推理（共 20 题，内含图形推理、事件排序、演绎推理）</div>
        <div id="moduleJudgeQuestions">⏳ 题目将在第2次输出时加载</div>
        <button class="btn-submit" id="submitJudgeBtn" onclick="submitModule('judge')">✅ 提交本模块</button>
    </div>

    <!-- 第三部分 数量关系（预留） -->
    <div class="module-card" id="module-math">
        <div class="module-title">🧮 第三部分：数量关系（共 10 题）</div>
        <div id="moduleMathQuestions">⏳ 题目将在第3次输出时加载</div>
        <button class="btn-submit" id="submitMathBtn" onclick="submitModule('math')">✅ 提交本模块</button>
    </div>

    <!-- 第四部分 言语理解与表达（预留） -->
    <div class="module-card" id="module-lang">
        <div class="module-title">🗣️ 第四部分：言语理解与表达（共 25 题）</div>
        <div id="moduleLangQuestions">⏳ 题目将在第3次输出时加载</div>
        <button class="btn-submit" id="submitLangBtn" onclick="submitModule('lang')">✅ 提交本模块</button>
    </div>

    <!-- 第五部分 资料分析（预留） -->
    <div class="module-card" id="module-data">
        <div class="module-title">📊 第五部分：资料分析（共 15 题）</div>
        <div id="moduleDataQuestions">⏳ 题目将在第4次输出时加载</div>
        <button class="btn-submit" id="submitDataBtn" onclick="submitModule('data')">✅ 提交本模块</button>
    </div>

    <div class="result-box" id="resultBox"></div>
</div>

<script>
// ===================== 全局状态 =====================
var timerStarted = false;
var startTime = null;
var totalSeconds = 0;
var timerInterval = null;

var scoreModules = { common: 0, judge: 0, math: 0, lang: 0, data: 0 };
var correctModules = { common: 0, judge: 0, math: 0, lang: 0, data: 0 };
var submittedModules = {}; // 记录题目已提交

// ===================== 题目数据 =====================
var modulesData = {
    common: [
        {
            id: 1,
            q: '习近平总书记提出“中国共产党人精神谱系”，下列说法<strong>不正确</strong>的是（）。',
            opts: [
                'A. 特区精神：敢闯敢试、敢为人先、埋头苦干',
                'B. 长征精神：不怕牺牲、血战到底',
                'C. 南泥湾精神：自力更生、艰苦奋斗',
                'D. 女排精神：祖国至上、团结协作、顽强拼搏、永不言败'
            ],
            correct: 1,
            d: 'A项正确：特区精神的核心正是敢闯敢试、敢为人先、埋头苦干，这是深圳等经济特区成功实践的精神概括。\nB项错误：长征精神的核心是“坚定信念、不怕牺牲、独立自主、实事求是、顾全大局、紧密团结”等，“血战到底”并不是长征精神的规范表述，它更多指向抗战精神，因此B项说法不正确。\nC项正确：南泥湾精神诞生于延安时期的大生产运动，其核心就是“自力更生、艰苦奋斗”。\nD项正确：女排精神的官方概括包括祖国至上、团结协作、顽强拼搏、永不言败，与D项完全一致。',
            t: '长征精神官方表述里没有“血战到底”，B项说错了。'
        },
        {
            id: 2,
            q: '毕昇发明活字印刷术的故事反映的哲学原理<strong>不包括</strong>（）。',
            opts: [
                'A. 实践是认识的唯一来源',
                'B. 实践的发展不断给认识提出新课题',
                'C. 认识具有反复性和上升性',
                'D. 科学实验是推进认识发展的唯一动力'
            ],
            correct: 3,
            d: 'A项正确：毕昇通过反复实践获得认识，体现了实践是认识的来源。\nB项正确：雕版缺陷促使毕昇研究活字，体现实践提出新课题。\nC项正确：不断试验改进体现了认识的反复性和上升性。\nD项错误：说“科学实验是唯一动力”是片面的，实践的形式多样，科学实验只是其中一种，不能说是唯一动力。因此该选项不属于故事反映的原理，也就是“不包括”的选项。',
            t: '“唯一动力”说法太绝对，故事体现的只是实践很重要。'
        },
        {
            id: 3,
            q: '党的二十大报告提出中国式现代化的本质要求，括号中应填入（）。',
            opts: [
                'A. 高质量发展',
                'B. 可持续发展',
                'C. 城乡融合和区域协调发展',
                'D. 质的有效提升和量的合理增长'
            ],
            correct: 0,
            d: 'A项正确：二十大报告原文中，中国式现代化的本质要求包括“实现高质量发展”。\nB项错误：“可持续发展”是更宽泛的概念，并非此处原文表述。\nC项错误：“城乡融合和区域协调发展”是推动高质量发展的措施，非本质要求原文。\nD项错误：“质的有效提升和量的合理增长”是高质量发展的内涵，但不是此处填空的规范提法。',
            t: '背过二十大原话才知道，是“高质量发展”。'
        },
        {
            id: 4,
            q: '当代中国马克思主义政治经济学的根本立场是（）。',
            opts: [
                'A. 以人民为中心的发展思想',
                'B. 以经济建设为中心的发展理念',
                'C. 以市场为导向的发展理念',
                'D. 以推动社会进步为纲的发展思想'
            ],
            correct: 0,
            d: 'A项正确：马克思主义政治经济学的根本立场就是“以人民为中心”，这是由社会主义本质决定的。\nB项错误：“以经济建设为中心”是党在社会主义初级阶段的基本路线，并非政治经济学的根本立场。\nC项错误：“以市场为导向”是经济体制层面的提法，不是根本立场。\nD项错误：“以推动社会进步为纲”不是规范表述。',
            t: '根本立场就是“以人民为中心”，教材原话。'
        },
        {
            id: 5,
            q: '《中国共产党章程》规定，党员必须自觉遵守党的纪律，首先是（）。',
            opts: [
                'A. 党的政治纪律和政治规矩',
                'B. 党的保密纪律和保密规定',

            correct: 0,

            t: '党的纪律首先就是政治纪律，这是最核心的。'
        },
        {
            id: 6,
            q: '关于新质生产力，下列说法<strong>不正确</strong>的是（）。',
            opts: [
                'A. 本质是先进生产力',
                'B. 以科技创新为主导',
                'C. 具有高科技、高效能、高质量特征',
                'D. 以资本投入大幅增长为核心标志'

            correct: 3,
            d: 'A项正确：新质生产力本质就是先进生产力。\nB项正确：新质生产力以科技创新为主导。\nC项正确：高科技、高效能、高质量是新质生产力的特征。\nD项错误：新质生产力的核心标志是“创新起主导作用”，不是“资本投入大幅增长”，后者仍是传统粗放型增长的标志。',
            t: '新质生产力靠创新，不靠砸钱，所以D错。'
        },
        {
            id: 7,
            q: '关于“十个明确”的说法<strong>错误</strong>的是（）。',
            opts: [
                'A. 明确中国特色社会主义最本质的特征是解放和发展生产力',
                'B. 明确总体布局是“五位一体”，战略布局是“四个全面”',
                'C. 明确新时代我国社会主要矛盾是人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾',
                'D. 明确全面深化改革总目标是完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化'
            ],
            correct: 0,
            d: 'A项错误：根据“十个明确”，中国特色社会主义最本质的特征是“中国共产党领导”，而非“解放和发展生产力”，解放和发展生产力是社会主义的根本任务。因此A项表述错误。\nB项正确：总体布局“五位一体”、战略布局“四个全面”是明确的。\nC项正确：主要矛盾的表述完全准确。\nD项正确：全面深化改革总目标的表述完全正确。',
            t: '最本质特征是党的领导，不是发展生产力，A混淆了。'
        },
        {
            id: 8,
            q: '大兴调查研究主要体现了（）。',
            opts: [
                'A. 深化对党的自我革命战略思想的规律性认识',
                'B. 坚持在实践中发现真理、发展真理',
                'C. 着力推进党的创新理论体系化学理化',
                'D. 推进党的理论创新要走好群众路线'

// ===================== 工具函数 =====================
function beautifyExplain(text) {
    // 第一步：对原始文本（仍保留 \n 换行）添加图标
    var withIcon = text.replace(/^([A-D]项(正确|错误)[：:])/gm, function(match, p1, p2) {
        return (p2 === '正确' ? '✅ ' : '❌ ') + p1;
    });
    // 第二步：将 \n 转换为 <br>
    return withIcon.replace(/\n/g, '<br>');
}

// ===================== ECharts 动态加载 =====================
var echartsReady = false;
var chartOptionForRender = null;

function loadEcharts(callback) {
    if (window.echarts) {
        callback();
        return;
    }
    var script = document.createElement('script');
    script.src = 'https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js';
    script.onload = callback;
    script.onerror = function() {
        alert('图表组件加载失败，请检查网络后刷新重试');
    };
    document.head.appendChild(script);
}

function renderDataChart(option) {
    var container = document.getElementById('echart-md');
    if (!container) return;
    var chart = echarts.init(container);
    chart.setOption(option);
    window.addEventListener('resize', function() { chart.resize(); });
}

// ===================== 渲染函数 =====================
function renderQuestion(qData) {
    var html = '';
    html += '<div class="quiz-wrap" id="wrap-' + qData.id + '">';
    html += '<div class="quiz-question"><strong>' + qData.id + '.</strong> ' + qData.q + '</div>';
    html += '<ul class="opt-list" id="opt-' + qData.id + '">';
    for (var i = 0; i < qData.opts.length; i++) {
        html += '<li onclick="selectOption(' + qData.id + ', ' + i + ')">' + qData.opts[i] + '</li>';
    }
    html += '</ul>';
    html += '<div class="explain-card" id="explain-' + qData.id + '">';
    html += '<div class="explain-text">' + beautifyExplain(qData.d) + '</div>';
    html += '<div class="plain-box"><strong>💡 白话理解：</strong>' + qData.t + '</div>';
    html += '</div>';
    html += '</div>';
    return html;
}

function renderAllModules() {
    var moduleMap = {
        common: 'moduleCommonQuestions',
        judge: 'moduleJudgeQuestions',
        math: 'moduleMathQuestions',
        lang: 'moduleLangQuestions'
    };

    for (var key in moduleMap) {
        var container = document.getElementById(moduleMap[key]);
        if (!container) continue;
        var qs = modulesData[key] || [];
        var html = '';
        for (var i = 0; i < qs.length; i++) {
            html += renderQuestion(qs[i]);
        }
        if (html) container.innerHTML = html;
    }

    // === 资料分析模块（特殊处理） ===
    var dataContainer = document.getElementById('moduleDataQuestions');
    var dataMod = modulesData.data;
    if (dataContainer && dataMod.questions && dataMod.questions.length) {
        var html = '';
        var chartInserted = false;
        var tableInserted = false;
        for (var i = 0; i < dataMod.questions.length; i++) {
            var q = dataMod.questions[i];
            if (q.id === 91 && !chartInserted && dataMod.chartOption) {
                html += '<div class="material-card"><h4>📊 材料（91~95 题依据下图）</h4><div class="chart-wrapper"><div id="echart-md"></div></div></div>';
                chartInserted = true;
            }
            if (q.id === 96 && !tableInserted && dataMod.tableHTML) {
                html += '<div class="material-card"><h4>📋 材料（96~100 题依据下表）</h4>' + dataMod.tableHTML + '</div>';
                tableInserted = true;
            }
            html += renderQuestion(q);
        }
        dataContainer.innerHTML = html;

        if (dataMod.chartOption) {
            loadEcharts(function() {
                renderDataChart(dataMod.chartOption);
            });
        }
    }

    renderToc();

            }
        }
    }
    document.getElementById('tocList').innerHTML = html;
}

function scrollToQuiz(qid) {
    var el = document.getElementById('wrap-' + qid);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function toggleToc() {
    var panel = document.getElementById('tocPanel');
    var overlay = document.getElementById('tocOverlay');
    if (panel.classList.contains('open')) {
        panel.classList.remove('open');
        overlay.classList.remove('show');
    } else {
        panel.classList.add('open');
        overlay.classList.add('show');
    }
}
function closeToc() {
    document.getElementById('tocPanel').classList.remove('open');
    document.getElementById('tocOverlay').classList.remove('show');
}

// 选项交互
function selectOption(qid, optIdx) {
    var wrap = document.getElementById('wrap-' + qid);
    if (wrap.classList.contains('submitted')) return;
    if (!timerStarted) startTimer();
    var lis = document.querySelectorAll('#opt-' + qid + ' li');
    for (var i = 0; i < lis.length; i++) {
        lis[i].classList.remove('selected');
    }
    lis[optIdx].classList.add('selected');
}

// 提交模块
function submitModule(moduleKey) {
    // 检查模块是否已提交
    if (submittedModules[moduleKey]) return;
    // 获取数据
    var questions;
    if (moduleKey === 'data') {
        questions = modulesData.data.questions;
    } else {
        questions = modulesData[moduleKey];
    }
    // 如果题目尚未加载（数组为空），阻止提交
    if (!questions || questions.length === 0) {
        alert('该模块题目尚未加载，请等待后续更新。');
        return;
    }

    var moduleScore = 0;
    var moduleCorrect = 0;

    for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var wrap = document.getElementById('wrap-' + q.id);
        if (!wrap) continue;
        var lis = document.querySelectorAll('#opt-' + q.id + ' li');
        var selectedIdx = -1;
        for (var j = 0; j < lis.length; j++) {
            if (lis[j].classList.contains('selected')) {
                selectedIdx = j;
                break;
            }
        }
        var isCorrect = (selectedIdx === q.correct);

        // 标色
        for (var j = 0; j < lis.length; j++) {
            if (j === q.correct) lis[j].classList.add('correct');
            else if (j === selectedIdx && j !== q.correct) lis[j].classList.add('wrong');
        }

        // 计分
        if (q.scale !== undefined && q.scale < 1.0) {
            moduleScore += q.scale;
            if (isCorrect) moduleCorrect++;
        } else {
            if (isCorrect) {
                moduleScore += 1.0;
                moduleCorrect++;
            }
        }

        wrap.classList.add('submitted');
        submittedModules[q.id] = true;
    }

    scoreModules[moduleKey] = moduleScore;
    correctModules[moduleKey] = moduleCorrect;
    submittedModules[moduleKey] = true;

    // 禁用提交按钮
    var btnId = '';
    switch (moduleKey) {
        case 'common': btnId = 'submitCommonBtn'; break;
        case 'judge': btnId = 'submitJudgeBtn'; break;
        case 'math': btnId = 'submitMathBtn'; break;
        case 'lang': btnId = 'submitLangBtn'; break;
        case 'data': btnId = 'submitDataBtn'; break;
    }
    if (btnId) document.getElementById(btnId).disabled = true;

    renderToc();
    updateResult();
    checkAllSubmitted();
}

// 成绩汇总
function updateResult() {
    var totalScore = scoreModules.common + scoreModules.judge + scoreModules.math + scoreModules.lang + scoreModules.data;
    var totalCorrect = correctModules.common + correctModules.judge + correctModules.math + correctModules.lang + correctModules.data;
    var totalQ = modulesData.common.length + modulesData.judge.length + modulesData.math.length + modulesData.lang.length + (modulesData.data.questions ? modulesData.data.questions.length : 0);
    var mins = Math.floor(totalSeconds / 60);
    var secs = totalSeconds % 60;
    var timeStr = mins + '分' + (secs < 10 ? '0' : '') + secs + '秒';

    // 理论满分
    var maxScore = 0;
    var allModules = [modulesData.common, modulesData.judge, modulesData.math, modulesData.lang, (modulesData.data.questions || [])];
    for (var m = 0; m < allModules.length; m++) {
        var qs = allModules[m];
        for (var j = 0; j < qs.length; j++) {
            var sc = qs[j].scale !== undefined ? qs[j].scale : 1.0;
            maxScore += sc;
        }
    }

    var text = '📊 总分：' + totalScore.toFixed(1) + ' 分（满分 ' + maxScore.toFixed(1) + '） | 正确题数：' + totalCorrect + ' / ' + totalQ;
    text += ' | 用时：' + timeStr;
    // 图推提示（图形推理在判断推理模块中，scale<1即存在）
    var hasGraphic = false;
    for (var i = 0; i < modulesData.judge.length; i++) {
        if (modulesData.judge[i].scale && modulesData.judge[i].scale < 1) hasGraphic = true;
    }
    if (hasGraphic) {
        text += '<br><small>（注：图形推理题因无法展示图形，每题固定计入 0.6 分，答对/答错不影响该分值）</small>';
    }
    document.getElementById('resultBox').innerHTML = totalQ > 0 ? text : '请完成至少一个模块后查看成绩。';
}

function checkAllSubmitted() {
    var allModules = ['common', 'judge', 'math', 'lang', 'data'];
    var allDone = true;
    for (var i = 0; i < allModules.length; i++) {
        // 如果模块题目为空（未加载），则认为未全部完成
        var qs = (allModules[i] === 'data') ? modulesData.data.questions : modulesData[allModules[i]];
        if (!qs || qs.length === 0 || !submittedModules[allModules[i]]) {
            allDone = false;
            break;
        }
    }
    if (allDone && timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

// 计时器
function startTimer() {
    if (timerStarted) return;
    timerStarted = true;
    startTime = Date.now() - totalSeconds * 1000;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').textContent = '计时中...';
    timerInterval = setInterval(function() {
        totalSeconds = Math.floor((Date.now() - startTime) / 1000);
        var m = Math.floor(totalSeconds / 60);
        var s = totalSeconds % 60;
        document.getElementById('timerDisplay').textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }, 200);
    document.getElementById('timerDisplay').textContent = '00:00';
}

// 页面初始化
renderAllModules();
</script>
</body>
</html>
