<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>公安素质测试 · 单选1-25题</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif; line-height: 1.55; color: #1f2a3a; padding: 1rem; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 20px 35px rgba(0,0,0,0.06); padding: 2rem 1.8rem; position: relative; }
        .nav-float { position: fixed; top: 20px; right: 20px; z-index: 999; background: white; border-radius: 32px; box-shadow: 0 8px 22px rgba(0,0,0,0.12); display: flex; align-items: center; padding: 0.6rem 1.2rem; cursor: pointer; font-weight: 600; color: #1e5fbb; font-size: 0.95rem; }
        .nav-panel { position: fixed; top: 70px; right: 20px; background: white; border-radius: 24px; box-shadow: 0 12px 28px rgba(0,0,0,0.15); padding: 1rem; width: 220px; display: none; z-index: 1000; }
        .nav-panel a { display: block; padding: 0.6rem 1rem; border-radius: 14px; text-decoration: none; color: #1e3b5c; font-weight: 500; margin: 0.2rem 0; }
        .nav-panel a:hover { background: #eaf1fb; }
        h1 { font-size: 2rem; font-weight: 600; color: #0a2c42; border-left: 7px solid #1e5fbb; padding-left: 1.3rem; margin-bottom: 0.2rem; }
        .subtitle { color: #536379; margin-bottom: 1.8rem; padding-left: 1.8rem; font-size: 1rem; }
        .timer-panel { background: #edf3fd; border-radius: 22px; padding: 1rem 1.8rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; margin-bottom: 2rem; }
        .timer-display { font-size: 2rem; font-weight: 650; background: white; padding: 0.3rem 1.8rem; border-radius: 48px; color: #0d2d4e; }
        .btn { border: none; background: #1e5fbb; color: white; font-weight: 600; padding: 0.75rem 2rem; border-radius: 36px; cursor: pointer; font-size: 1rem; transition: 0.2s; box-shadow: 0 6px 14px rgba(30,95,187,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .btn:active { transform: translateY(2px); }
        .btn:disabled { opacity: 0.6; box-shadow: none; transform: none; }
        .module-header { font-size: 1.5rem; font-weight: 600; margin: 1.8rem 0 1.2rem; }
        .question-card { background: #fafcff; border-radius: 20px; padding: 1.4rem 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e2eaf2; }
        .q-title { font-weight: 700; font-size: 1.1rem; display: flex; gap: 0.5rem; align-items: baseline; }
        .q-num { background: #dbe6f5; border-radius: 24px; padding: 0.15rem 0.9rem; font-size: 0.9rem; white-space: nowrap; }
        .option { margin: 0.6rem 0; display: flex; align-items: center; padding: 0.3rem 0.5rem; border-radius: 8px; }
        input[type="radio"] { accent-color: #1e5fbb; width: 1.1rem; height: 1.1rem; margin-right: 0.5rem; flex-shrink: 0; }
        .feedback-area { margin-top: 1rem; background: #fffef5; border-radius: 16px; padding: 0.9rem 1.2rem; border-left: 4px solid #e6b422; font-size: 0.95rem; }
        .exp-line { margin: 0.25rem 0; }
        .correct-text { color: #0a6b2b; font-weight: 500; }
        .wrong-text { color: #b22222; font-weight: 500; }
        .user-wrong-opt { background: #ffcfcf; border-radius: 6px; }
        .correct-answer-highlight { background: #d4edda; border-radius: 8px; font-weight: 500; }
        .t-explanation { margin-top: 0.7rem; font-style: italic; color: #3d4f61; background: #f2f5f8; border-radius: 12px; padding: 0.5rem 1rem; }
        @media (max-width: 600px) { body { padding: 0.5rem; } .container { padding: 1.2rem 1rem; } .timer-display { font-size: 1.5rem; padding: 0.3rem 1rem; } }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 深圳市公安局第十二批辅警考试《公安素质测试》</h1>
    <div class="subtitle">一、单项选择题（1‑50题，每题1分，共50分）</div>
    <div class="timer-panel">
        <div><span style="font-weight:600;">⏱️ 考试用时</span> <span class="timer-display" id="timerDisplay">00:00:00</span></div>
        <button class="btn" id="startTimerBtn">▶ 开始计时</button>
    </div>
    <div class="nav-float" id="navToggle">📋 目录</div>

      <div class="nav-panel" id="navPanel">
        <a href="#module1">📌 一、单项选择题（1‑50）</a>
        <a href="#moduleMulti">📙 二、多项选择题（51‑70）</a>
        <a href="#moduleJudge">📕 三、判断题（71‑90）</a>

    </div>


        <!-- ===== 模块一：单项选择题 ===== -->
    <div class="module-header" id="module1">📌 一、单项选择题（1‑50题，每题1分）</div>
    <div id="singleChoiceContainer"></div>
    <div id="singleChoiceContainer2"></div>
    <div style="text-align:center; margin:2rem 0;" id="submitArea">
        <button class="btn" id="submitModule1Btn" style="font-size:1.1rem; padding:0.8rem 3rem;">✅ 提交单项选择题</button>
    </div>
    <div id="singleStats" style="background:#eaf0f8; border-radius:20px; padding:1.2rem; margin:2rem 0; font-weight:500; text-align:center; display:none;"></div>

    <!-- ===== 模块二：多项选择题 ===== -->
    <div class="module-header" id="moduleMulti">📌 二、多项选择题（51‑70题，每题1.5分）</div>
    <div id="multiChoiceContainer"></div>
    <div style="text-align:center; margin:2rem 0;" id="multiSubmitArea">
        <button class="btn" id="submitMultiBtn" style="font-size:1.1rem; padding:0.8rem 3rem;">✅ 提交多项选择题</button>
    </div>
    <div id="multiStats" style="background:#eaf0f8; border-radius:20px; padding:1.2rem; margin:2rem 0; font-weight:500; text-align:center; display:none;"></div>
  <!-- ===== 模块三：判断题 ===== -->
    <div class="module-header" id="moduleJudge">📌 三、判断题（71‑90题，每题1分）</div>
    <div id="judgeChoiceContainer"></div>
    <div style="text-align:center; margin:2rem 0;" id="judgeSubmitArea">
        <button class="btn" id="submitJudgeBtn" style="font-size:1.1rem; padding:0.8rem 3rem;">✅ 提交判断题</button>
    </div>
    <div id="judgeStats" style="background:#eaf0f8; border-radius:20px; padding:1.2rem; margin:2rem 0; font-weight:500; text-align:center; display:none;"></div>
    <!-- ===== 总分显示 ===== -->
    <div id="totalScoreArea" style="text-align:center; margin:2rem 0; background:#eaf4f6; border-radius:24px; padding:1.2rem; font-size:1.2rem; font-weight:700; display:none;">
        🧮 试卷总分：<span id="totalScoreText">0 分（满分 100 分）</span><br>📈 正确率：<span id="accuracyText">-</span> &nbsp;|&nbsp; <span id="timeUsed">⌛️ -</span>
    </div>

<script>
(function() {
       let singleTotal = null;
    let multiTotal  = null;
    let judgeTotal  = null;
    let singleCorrectCnt = null;
    let multiCorrectCnt  = null;
    let judgeCorrectCnt  = null;

    function updateTotalScore() {
        const totalArea = document.getElementById('totalScoreArea');
        const totalText = document.getElementById('totalScoreText');
        if (!totalArea || !totalText) return;
        let total = 0, count = 0;
        if (singleTotal !== null) { total += singleTotal; count++; }
        if (multiTotal  !== null) { total += multiTotal;  count++; }
        if (judgeTotal  !== null) { total += judgeTotal;  count++; }
        if (count > 0) {
            totalArea.style.display = 'block';
            totalText.textContent = total.toFixed(1) + ' 分（满分 100 分，已提交' + count + '个模块）';
            const timeSpan = document.getElementById('timeUsed');
            if (timeSpan) {
                let elapsedSec = 0;
                const savedStart = sessionStorage.getItem('exam_timer_1');
                if (savedStart) {
                    elapsedSec = Math.floor((Date.now() - parseInt(savedStart)) / 1000);
                }
                const h = Math.floor(elapsedSec / 3600);
                const m = Math.floor((elapsedSec % 3600) / 60);
                timeSpan.textContent = `⌛️：${h}小时${m.toString().padStart(2,'0')}分钟`;
            }
            const accSpan = document.getElementById('accuracyText');
            if (accSpan) {
                let totalCorrect = 0, totalQ = 0;
                if (singleCorrectCnt !== null) { totalCorrect += singleCorrectCnt; totalQ += 50; }
                if (multiCorrectCnt  !== null) { totalCorrect += multiCorrectCnt;  totalQ += 20; }
                if (judgeCorrectCnt  !== null) { totalCorrect += judgeCorrectCnt;  totalQ += 20; }
                if (totalQ > 0) {
                    accSpan.textContent = (totalCorrect / totalQ * 100).toFixed(1) + '%';
                }
            }
        }
    }
    // ---------- 试卷原题数据（单选1-25题，解析均为标准格式）----------
    const questions = [
        {
            id: 1,
            text: "设定和实施行政处罚必须以事实为依据，与违法行为的事实、性质、情节以及（）相当。",
            options: {
                A: "实施主体",
                B: "社会影响",
                C: "处罚成本大小",
                D: "社会危害程度"
            },
            answer: "D",
            exp: "A项错误：实施主体不是与违法行为相当的标准，而是行政责任承担者。\n" +
                 "B项错误：社会影响不是法定处罚相当性要素，处罚应与危害程度相当。\n" +
                 "C项错误：处罚成本大小不属于裁量基准，不得以此决定处罚轻重。\n" +
                 "D项正确：根据《行政处罚法》第五条，设定和实施行政处罚必须以事实为依据，与违法行为的事实、性质、情节以及社会危害程度相当。",
            t: "罚多少要看你干了多坏的事，不是看你是谁，也不是看罚起来贵不贵。"
        },
        {
            id: 2,
            text: "部门规章可以设定警告、通报批评或者一定数额罚款的行政处罚，罚款的限额由（）规定。",
            options: {
                A: "全国人大",
                B: "全国人大常委会",
                C: "国务院",
                D: "国务院部门"
            },
            answer: "C",
            exp: "A项错误：全国人大制定基本法律，但不直接规定部门规章罚款限额。\n" +
                 "B项错误：全国人大常委会制定非基本法律，亦不直接规定该限额。\n" +
                 "C项正确：根据《行政处罚法》第十三条，部门规章设定罚款的限额由国务院规定。\n" +
                 "D项错误：国务院部门无权自行决定自己的罚款限额，须由国务院统一限定。",
            t: "部委自己罚多少钱，得听国务院的。"
        },
        {
            id: 3,
            text: "出租车司机周某在非停靠点停车载客，被警察抓获。根据该市公安局局内印发的《关于整顿停车秩序的紧急通知》，周某被强令参加“学习班”一周，学习期间费用自理，且不得离开指定的学习场所。关于该案件，以下说法错误的是（）。",
            options: {
                A: "该“学习班”本质上是一种限制人身自由的行政处罚",
                B: "《关于整顿停车秩序的紧急通知》不属于行政规范性文件",
                C: "《关于整顿停车秩序的紧急通知》无权作出上述处罚规定",
                D: "强令参加“学习班”是一种教育方法，而非行政处罚"
            },
            answer: "B",
            exp: "A项正确：强制集中学习、不得离开，实质上构成限制人身自由，属于行政处罚。\n" +
                 "B项错误：《紧急通知》属于其他规范性文件（俗称红头文件），但并非行政规范性文件的标准用语；本题要求选错误说法，B的表述易引发混淆，但根据官方答案选B。\n" +
                 "C项正确：限制人身自由的行政处罚只能由法律设定，通知无权设定。\n" +
                 "D项正确：以学习班为名实为变相限制自由，不能仅视为教育方法。",
            t: "这个通知就是红头文件，不能用来关人学习。"
        },
        {
            id: 4,
            text: "苏某为甲地人，常住乙地，于丙地盗得自行车一辆并在丙地售出，买主为丁地人。对苏某的违法行为，由（）具有行政处罚权的行政机关管辖。",
            options: {
                A: "甲地",
                B: "乙地",
                C: "丙地",
                D: "丁地"
            },
            answer: "C",
            exp: "A项错误：甲地为户籍地，但违法行为发生地不在甲地。\n" +
                 "B项错误：乙地为经常居住地，同样不是违法行为地。\n" +
                 "C项正确：根据地域管辖，行政处罚由违法行为发生地的行政机关管辖。盗窃和销赃均在丙地，故丙地管辖。\n" +
                 "D项错误：丁地为买主所在地，但并非管辖连接点。",
            t: "在哪儿干坏事，就归哪儿管。"
        },
        {
            id: 5,
            text: "公民、法人或者其他组织违反行政管理秩序的行为，依法应当给予行政处罚的，行政机关必须查明事实。对于违法事实不清的行为，行政机关（）。",
            options: {
                A: "可以从轻或者减轻行政处罚",
                B: "应当请示上级部门作出是否给予行政处罚的决定",
                C: "可单独就违法事实不清部分听取行政相对人申辩后再作出是否给予行政处罚的决定",
                D: "不得给予行政处罚"
            },
            answer: "D",
            exp: "A项错误：从轻减轻仅适用于已查清事实、符合法定情节的情形。\n" +
                 "B项错误：请示非必要程序，事实不清的核心处理是不得处罚。\n" +
                 "C项错误：听取申辩不能取代查明事实，事实不清不可罚。\n" +
                 "D项正确：根据《行政处罚法》第四十条，违法事实不清的，不得给予行政处罚。",
            t: "没搞清楚就不能罚，这是铁规矩。"
        },
        {
            id: 6,
            text: "X省政府为了整治污染，促进当地经济持续健康发展，对在本行政区域内开展商业活动的企业设定了以下四项行政许可事项，其中合法的是（）。",
            options: {
                A: "企业必须使用本地某太阳能发电厂的供电",
                B: "钢材生产企业须取得X省钢材生产协会的产品质量认证",
                C: "出租车公司须采购X省本土企业自主研发生产的电动车",
                D: "对增量不达标的汽车制造商不予通过相关行政许可"
            },
            answer: "D",
            exp: "A项错误：指定供电企业涉嫌地方保护，违反市场统一和公平竞争。\n" +
                 "B项错误：协会认证不得作为行政许可，认证应自愿。\n" +
                 "C项错误：指定采购本土品牌构成地区封锁，不合法。\n" +
                 "D项正确：对增量不达标（如环保、产业政策要求）不予许可，属于合法设定条件。",
            t: "政府可以设环保门槛，但不能强买强卖本地货。"
        },
        {
            id: 7,
            text: "省、自治区、直辖市人民政府规章设定的临时性的行政许可，（）需要继续实施的，应当提请本级人民代表大会及其常务委员会制定地方性法规。",
            options: {
                A: "设定满一年",
                B: "实施满一年",
                C: "设定满两年",
                D: "实施满两年"
            },
            answer: "B",
            exp: "A项错误：设定满一年不是法定期限条件，起算点为实施。\n" +
                 "B项正确：根据《行政许可法》第十五条，临时性许可实施满一年需要继续实施的，应提请制定地方性法规。\n" +
                 "C项错误：设定满两年无此规定。\n" +
                 "D项错误：实施满两年错误，应为一年。",
            t: "临时许可用了一年如果还要继续，就必须升级成法规。"
        },
        {
            id: 8,
            text: "关于行政机关对行政许可决定的公开，下列说法正确的是（）。",
            options: {
                A: "应当公开准予许可的行政决定",
                B: "应当公开不予许可的行政决定",
                C: "公众不可以申请查阅",
                D: "仅公、检、法部门有权查阅"
            },
            answer: "A",
            exp: "A项正确：根据《行政许可法》第四十条，行政机关作出的准予行政许可决定，应当予以公开，公众有权查阅。\n" +
                 "B项错误：不予许可决定通常不要求主动公开，但需告知申请人理由。\n" +
                 "C项错误：公众可以申请查阅准予许可决定。\n" +
                 "D项错误：查阅权不限于公检法，公众均可查阅。",
            t: "批了的事情要晒太阳，没批的不用公开。"
        },
        {
            id: 9,
            text: "除法律、行政法规另有规定外，有数量限制的行政许可，两个或者两个以上申请人的申请均符合法定条件、标准的，行政机关应当根据（）作出准予行政许可的决定。",
            options: {
                A: "申请人的条件或资质高低顺序",
                B: "申请人提出行政许可申请的先后顺序",
                C: "受理行政许可申请的先后顺序",
                D: "招标、拍卖等公平竞争的方式"
            },
            answer: "C",
            exp: "A项错误：资质高低不是法定排序标准，除非有特殊规定。\n" +
                 "B项错误：以提出申请先后为准不准确，法律明确规定受理先后。\n" +
                 "C项正确：《行政许可法》第五十七条规定，按受理行政许可申请的先后顺序作出准予决定，但法律、行政法规另有规定的除外。\n" +
                 "D项错误：招标拍卖适用于特许事项，并非所有数量限制许可。",
            t: "大家都符合条件时，先受理的先得。"
        },
        {
            id: 10,
            text: "《中华人民共和国行政诉讼法》规定，行政处罚明显不当的，人民法院可以判（）。",
            options: {
                A: "确认违法",
                B: "确认无效",
                C: "变更",
                D: "加重处罚"
            },
            answer: "C",
            exp: "A项错误：确认违法适用于程序轻微违法但不撤销等情形。\n" +
                 "B项错误：确认无效适用于重大且明显违法情形。\n" +
                 "C项正确：《行政诉讼法》第七十七条，行政处罚明显不当的，人民法院可以判决变更。\n" +
                 "D项错误：法院变更不得加重原告义务或减损权益。",
            t: "罚得太离谱，法院可以直接改数字。"
        },
        {
            id: 11,
            text: "公民对行政机关作出的侵犯其已经依法取得的海域使用权的决定不服，下列说法正确的是（）。",
            options: {
                A: "可以直接提起行政诉讼",
                B: "应当先申请行政复议，复议决定为终局裁决",
                C: "只能提起行政诉讼，不能申请行政复议",
                D: "应当先申请行政复议；对复议决定不服的，可以依法提起行政诉讼"
            },
            answer: "D",
            exp: "A项错误：侵犯海域使用权等自然资源权属，通常复议前置。\n" +

// 渲染判断题
(function renderJudge() {
    const judgeContainer = document.getElementById('judgeChoiceContainer');
    if (!judgeContainer) return;
    let html = '';
    judgeQuestions.forEach(q => {
        html += `<div class="question-card" id="jq-${q.id}">
            <div class="q-title"><span class="q-num">${q.id}</span> ${q.question} <span style="font-size:0.9rem;color:#555;">(判断)</span></div>
            <div class="options" id="jopts-${q.id}">
                <div class="option" id="jopt-${q.id}-true"><input type="radio" name="jq${q.id}" value="true" id="jq${q.id}_true"><label for="jq${q.id}_true">✔ 正确</label></div>
                <div class="option" id="jopt-${q.id}-false"><input type="radio" name="jq${q.id}" value="false" id="jq${q.id}_false"><label for="jq${q.id}_false">✘ 错误</label></div>
            </div>
            <div class="feedback-area" id="jfb-${q.id}" style="display:none;">
                <div style="font-weight:700; margin-bottom:0.4rem;">📖 解析</div>
                <div id="jfb-content-${q.id}"></div>
                <div class="t-explanation" id="jt-${q.id}"></div>
            </div>
        </div>`;
    });
    judgeContainer.innerHTML = html;
})();

// 判断题提交
(function setupJudgeSubmit() {
    const btn = document.getElementById('submitJudgeBtn');
    if (!btn) return;
    let judgeSubmitted = false;
    btn.addEventListener('click', () => {
        if (judgeSubmitted) return;
        judgeSubmitted = true;
        let correctCount = 0;
        judgeQuestions.forEach(q => {
            const selected = document.querySelector(`input[name="jq${q.id}"]:checked`);
            const userAns = selected ? selected.value : null;        // "true" 或 "false"
            // 将题库答案 "A"(正确) 或 "B"(错误) 转为布尔值
            const correctBool = (q.answer === 'A');                 // A => true, B => false
            const isCorrect = (userAns === String(correctBool));    // 比较字符串

            if (isCorrect) correctCount++;

            // 解析区
            const fbDiv = document.getElementById(`jfb-${q.id}`);
            if (fbDiv) {
                const fbContent = document.getElementById(`jfb-content-${q.id}`);
                fbContent.innerHTML = `<div class="exp-line ${isCorrect ? 'correct-text' : 'wrong-text'}">${isCorrect ? '✅ 回答正确' : '❌ 回答错误'}。${q.explanation}</div>`;
                document.getElementById(`jt-${q.id}`).textContent = `💬 大白话：${q.t}`;
                fbDiv.style.display = 'block';

                // 高亮正确答案（对应的 true/false 选项）
                const correctOptDiv = document.getElementById(`jopt-${q.id}-${correctBool}`);
                if (correctOptDiv) correctOptDiv.classList.add('correct-answer-highlight');
                // 标红用户错选
                if (!isCorrect && userAns) {
                    const wrongOptDiv = document.getElementById(`jopt-${q.id}-${userAns}`);
                    if (wrongOptDiv) wrongOptDiv.classList.add('user-wrong-opt');
                }
            }
            // 禁用选项
            ['true','false'].forEach(v => {
                const radio = document.getElementById(`jq${q.id}_${v}`);
                if (radio) radio.disabled = true;
            });
        });

        const judgeStats = document.getElementById('judgeStats');
        if (judgeStats) {
            judgeStats.style.display = 'block';
            judgeStats.innerHTML = `📊 判断题：答对 ${correctCount} / 20 题，得分 ${(correctCount * 1).toFixed(0)} 分（满分 20 分）`;
        }
        btn.disabled = true;
        judgeTotal = correctCount;        // 每题 1 分，满分 20 分
        judgeCorrectCnt = correctCount;
        updateTotalScore();
    });
})();
})();
