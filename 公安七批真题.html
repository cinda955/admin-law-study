<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深圳市第七批辅警招聘《公安素质测试》真题演练</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-light: #5c5347;
            --accent: #b22222;
            --highlight: #fff3cd;
            --highlight-border: #f0c040;
            --example-bg: #f0faf5;
            --example-border: #a3e4bc;
            --plain-box-bg: #ffffff;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px;
            --radius-sm: 10px;
            --font: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans SC',system-ui,-apple-system,sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); font-family:var(--font); color:var(--text); line-height:1.7; }
        .main { max-width:900px; margin:0 auto; padding:24px 16px 100px; }
        .float-toc-btn { position:fixed; top:24px; left:24px; width:52px; height:52px; border-radius:50%;
            background:var(--accent); color:white; border:none; font-size:24px; z-index:100; box-shadow:0 4px 14px rgba(0,0,0,0.2); cursor:pointer; }
        .toc-panel { position:fixed; top:0; left:-300px; width:280px; height:100vh; background:white; border-right:2px solid #f0ebe0;
            box-shadow:4px 0 16px rgba(0,0,0,0.1); z-index:99; overflow-y:auto; padding:20px; transition:left 0.3s; }
        .toc-panel.open { left:0; }
        .toc-panel h2 { font-size:18px; margin-bottom:12px; color:var(--accent); }
        .toc-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
        .toc-btn { width:36px; height:36px; border:1px solid #e9e4db; border-radius:8px; background:white; font-size:13px; cursor:pointer; }
        .toc-btn.submitted { background:#f5f0e8; color:#b9b0a0; }
        .toc-section-title { font-weight:bold; margin:12px 0 6px; color:var(--text-light); font-size:14px; }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:98; display:none; }
        .overlay.show { display:block; }
        .timer-box { text-align:right; font-size:18px; margin-bottom:20px; color:var(--accent); font-weight:600; }
        .start-btn { display:inline-block; padding:8px 20px; background:var(--accent); color:white; border:none; border-radius:20px; cursor:pointer; margin-left:12px; }
        .card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow-md); border:1px solid #f0ebe0; padding:28px 30px; margin-bottom:28px; }
        .card h2 { font-size:22px; margin-bottom:16px; border-left:5px solid var(--accent); padding-left:12px; }
        .quiz-wrap { border:2px solid #f0ebe0; border-radius:var(--radius-sm); padding:18px 20px; margin-bottom:18px; background:#fffbf7; }
        .quiz-wrap.submitted { pointer-events:none; opacity:0.95; }
        .q-title { font-weight:700; margin-bottom:10px; font-size:16px; }
        .opt-list { list-style:none; }
        .opt-list li { border:2px solid #e9e4db; border-radius:25px; padding:10px 18px; margin-bottom:8px; cursor:pointer; transition:0.2s; background:white; }
        .opt-list li:hover { border-color:#c0b090; }
        .opt-list li.selected { border-color:#3b7ddd; background:#eaf1fb; }
        .opt-list li.correct { border-color:#34a853; background:#eafaf1; }
        .opt-list li.wrong { border-color:#ea4335; background:#fdedec; }
        .explain-card { margin-top:12px; padding:14px 16px; border-radius:10px; background:var(--example-bg); border:1px solid var(--example-border); display:none; line-height:1.8; }
        .explain-card.show { display:block; }
        .plain-box { background:#ffffff; border:1px solid #e9e4db; border-radius:8px; padding:10px 14px; margin-top:8px; font-size:15px; }
        .btn { display:inline-block; padding:12px 32px; border-radius:25px; font-size:16px; font-weight:600; cursor:pointer; border:none; }
        .btn-primary { background:var(--accent); color:white; }
        .module-footer { margin-top:16px; text-align:right; display:flex; align-items:center; justify-content:flex-end; gap:16px; }
        .module-score { font-weight:bold; color:var(--accent); }
        .result-box { margin-top:20px; padding:20px; background:var(--card-bg); border:2px solid var(--accent); border-radius:var(--radius); box-shadow:var(--shadow-md); text-align:center; font-size:1.2rem; font-weight:600; color:var(--accent); display:none; }
        @media (max-width:768px) { .main { padding:16px 10px; } .card { padding:18px 14px; } }
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeToc()"></div>
<div class="toc-panel" id="tocPanel">
    <h2>📋 题目导航</h2>
    <div class="toc-section-title">单选题（1-50）</div>
    <div class="toc-grid" id="tocSingle"></div>
    <div class="toc-section-title">多选题（51-70）</div>
    <div class="toc-grid" id="tocMulti"></div>
    <div class="toc-section-title">判断题（71-90）</div>
    <div class="toc-grid" id="tocJudge"></div>
</div>
<button class="float-toc-btn" onclick="toggleToc()">☰</button>

<div class="main" id="mainContent">
    <div class="timer-box" id="timerBox">
        ⏱ 00:00
        <button class="start-btn" id="startTimerBtn" onclick="startTimer()">▶ 开始考试</button>
    </div>
    <div id="module1"></div>
    <div id="module2"></div>
    <div id="module3"></div>
    <div class="result-box" id="resultBox"></div>
</div>

<script>
    // ========== 全局状态 ==========
    var timerInterval = null;
    var startTime = null;
    var totalSeconds = 0;
    var timerStarted = false;
    var moduleSubmitted = { single: false, multi: false, judge: false };
    var score = { single: 0, multi: 0, judge: 0 };
    var correctCounts = { single: 0, multi: 0, judge: 0 };

    function toggleToc() { document.getElementById('tocPanel').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
    function closeToc() { document.getElementById('tocPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    function formatTime(sec) { var m=Math.floor(sec/60), s=sec%60; return (m<10?'0'+m:m)+':'+(s<10?'0'+s:s); }
    function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        document.getElementById('startTimerBtn').style.display = 'none';
        startTime = new Date();
        timerInterval = setInterval(function(){
            totalSeconds = Math.floor((new Date() - startTime) / 1000);
            document.getElementById('timerBox').innerHTML = '⏱ ' + formatTime(totalSeconds);
        }, 1000);
    }

    function renderOptions(quizIndex, opts, type) {
        var labels = 'ABCDEF';
        var html = '<ul class="opt-list" id="opt-'+quizIndex+'">';
        for (var i=0; i<opts.length; i++) {
            html += '<li onclick="selectOption(\''+quizIndex+'\','+i+',\''+type+'\')">'+labels[i]+'. '+opts[i]+'</li>';
        }
        html += '</ul>';
        return html;
    }
    function selectOption(quizIndex, optIndex, type) {
        if (document.getElementById('wrap-'+quizIndex).classList.contains('submitted')) return;
        if (!timerStarted) startTimer();
        var lis = document.querySelectorAll('#opt-'+quizIndex+' li');
        if (type === 'single') {
            for (var i=0; i<lis.length; i++) lis[i].classList.remove('selected');
        }
        lis[optIndex].classList.toggle('selected');
    }

    function beautifyExplain(d, t) {
        var lines = d.split('\n');
        var html = '';
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            if (/^[A-F]项正确：/.test(line)) html += '✅ ' + line + '<br>';
            else if (/^[A-F]项错误：/.test(line)) html += '❌ ' + line + '<br>';
            else html += line + '<br>';
        }
        if (t) html += '<div class="plain-box"><strong>💡 大白话：</strong>' + t + '</div>';
        return html;
    }

    function submitModule(type) {
        if (moduleSubmitted[type]) return;
        var questions = [];
        if (type === 'single') questions = singleQuestions;
        else if (type === 'multi') questions = multiQuestions;
        else if (type === 'judge') questions = judgeQuestions;
        else return;

        var totalScorePerModule = 0;
        var correctCount = 0;

        for (var i = 0; i < questions.length; i++) {
            var q = questions[i];
            var wrap = document.getElementById('wrap-' + q.quizIndex);
            if (!wrap) continue;

            var selectedOpts = document.querySelectorAll('#opt-' + q.quizIndex + ' li.selected');
            var userAnswer = [];
            for (var j = 0; j < selectedOpts.length; j++) {
                userAnswer.push(Array.prototype.indexOf.call(selectedOpts[j].parentNode.children, selectedOpts[j]));
            }

            var lis = document.querySelectorAll('#opt-' + q.quizIndex + ' li');
            var correctSet = [];
            if (type === 'judge') {
                correctSet = [q.correct === 'A' ? 0 : 1];
            } else {
                correctSet = Array.isArray(q.correct) ? q.correct : [q.correct];
            }

            for (var k = 0; k < lis.length; k++) {
                if (correctSet.indexOf(k) >= 0) lis[k].classList.add('correct');
                else if (userAnswer.indexOf(k) >= 0 && correctSet.indexOf(k) < 0) lis[k].classList.add('wrong');
            }

            if (type === 'single' || type === 'judge') {
                if (userAnswer.length === 1 && userAnswer[0] === correctSet[0]) {
                    totalScorePerModule += 1;
                    correctCount++;
                }
            } else if (type === 'multi') {
                var hasWrong = false;
                for (var u = 0; u < userAnswer.length; u++) {
                    if (correctSet.indexOf(userAnswer[u]) < 0) { hasWrong = true; break; }
                }
                if (!hasWrong) {
                    if (userAnswer.length === correctSet.length) {
                        totalScorePerModule += 1.5;
                        correctCount++;
                    } else if (userAnswer.length < correctSet.length) {
                        totalScorePerModule += userAnswer.length * 0.3;
                    }
                }
            }

            var exp = document.getElementById('exp-' + q.quizIndex);
            if (exp) {
                exp.innerHTML = beautifyExplain(q.d, q.t);
                exp.classList.add('show');
            }
            wrap.classList.add('submitted');
            var btn = document.getElementById('tocBtn-' + q.quizIndex);
            if (btn) btn.classList.add('submitted');
        }

        moduleSubmitted[type] = true;
        correctCounts[type] = correctCount;
        score[type] = totalScorePerModule;

        var scoreSpan = document.getElementById('score-' + type);
        if (scoreSpan) {
            scoreSpan.style.display = 'inline';
            scoreSpan.innerHTML = '✅ 得分：' + totalScorePerModule.toFixed(1) + '分 | 正确率：' + correctCount + '/' + questions.length;
        }
        updateResult();
    }

    function updateResult() {
        var total = score.single + score.multi + score.judge;
        var totalCorrect = correctCounts.single + correctCounts.multi + correctCounts.judge;
        var totalQuestions = 90;
        var accuracy = totalQuestions > 0 ? (totalCorrect / totalQuestions * 100) : 0;
        var mins = Math.floor(totalSeconds / 60);
        var secs = totalSeconds % 60;
        var timeStr = mins + '分' + (secs < 10 ? '0' : '') + secs + '秒';
        var box = document.getElementById('resultBox');
        if (moduleSubmitted.single || moduleSubmitted.multi || moduleSubmitted.judge) {
            box.style.display = 'block';
            box.innerHTML = '📊 总分：' + total.toFixed(1) + '分 | 整体正确率：' + accuracy.toFixed(1) + '% | 用时：' + timeStr;
        }
    }

    // ========== 单选题数据（1-10） ==========
    var singleQuestions = [
        {
            quizIndex: 1,
            q: '人民警察对于上级命令的执行，以下做法不正确的是（ ）。',
            opts: ['人民警察必须执行上级的命令', '人民警察认为命令有错误的，不得中止或改变命令的执行', '人民警察认为命令有错误，按照规定向上级提出意见，不被采纳的，必须服从该命令', '人民警察有权拒绝执行人民警察职责范围内的指令'],
            correct: 3,
            d: 'A项正确：服从命令是人民警察的义务。\nB项正确：认为命令有误，不可自行中止或改变，但可提出意见。\nC项正确：提出意见不被采纳时，仍须执行命令。\nD项错误：对于职责范围内的合法指令，人民警察必须执行，无权拒绝。题干问“不正确”，故选D。',
            t: '警察对上级指令不能随便说不干，职责内必须服从，有意见可以提，但上级坚持就得执行。'
        },
        {
            quizIndex: 2,
            q: '辅警应当在公安机关及其人民警察的（ ）下开展警务辅助工作。',
            opts: ['指挥和监督', '支持和配合', '指导和支持', '管制和教育'],
            correct: 0,
            d: 'A项正确：根据辅警管理相关规定，辅警在公安机关及人民警察的指挥和监督下开展工作。\nB项错误：辅警是辅助力量，不能是“支持和配合”的主导地位。\nC项错误：非“指导和支持”。\nD项错误：非“管制和教育”。',
            t: '辅警干活要在警察的指挥和监督下，不能单干。'
        },
        {
            quizIndex: 3,
            q: '甲、乙为劫取财物将在河边散步的丙杀死，当场取得丙随身携带的现金2000余元，甲、乙随后从丙携带的名片上得知丙是某公司总经理，两人经谋划后，打电话给丙的妻子丁，声称丙已被绑架，威胁丁必须于次日中午12点将10万元现金放在指定地点，否则杀害丙，丁立即报警，甲、乙被抓获，关于对本案甲、乙二人的处理，下列说法正确的是（ ）。',
            opts: ['以抢劫罪和绑架罪并罚', '以故意杀人罪、盗窃罪和绑架罪并罚', '以抢劫罪和敲诈勒索罪并罚', '以故意杀人罪，侵占罪和敲诈勒索罪并罚'],
            correct: 2,
            d: 'A项错误：丙已死亡，不构成绑架罪。\nB项错误：不构成盗窃罪。\nC项正确：甲、乙先抢劫杀人构成抢劫罪，后虚构绑架事实勒索财物构成敲诈勒索罪，应数罪并罚。\nD项错误：不构成侵占罪。',
            t: '先杀人抢钱是抢劫，人死了再打电话骗家属说是绑架要钱，那是敲诈，两罪都要算。'
        },
        {
            quizIndex: 4,
            q: '黄某因打架被县公安局罚款500元，不服该处理结果而向公安局申请复议，在复议期内，县公安局将罚款500元改为罚款50元，黄某遂申请撤回复议申请，复议机关准许，但后来县公安局并没有返还已缴的罚款450元，黄某只好再次申请复议，复议机关应（ ）。',
            opts: ['不予受理', '转送有关机关处理', '予以受理', '告知黄某向法院申请强制执行'],
            correct: 2,
            d: 'A项错误：县公安局改变原处罚后未履行返还义务，属于新的不作为，可再次复议。\nB项错误：无需转送。\nC项正确：复议机关应受理黄某对县公安局不返还罚款的复议申请。\nD项错误：复议是前置救济途径，非直接申请强制执行。',
            t: '改了罚单却不退多交的钱，可以再告它不作为，复议机关要收。'
        },
        {
            quizIndex: 5,
            q: '在构建和谐警民关系中，公安机关及人民警察应不断提升（ ）和美誉度，做到公正、廉洁、文明，永远做人民群众的贴心人。',
            opts: ['公信力', '执行力', '威慑力', '创新力'],
            correct: 0,
            d: 'A项正确：公信力是公安机关取信于民的基础，与美誉度并列为提升目标。\nB项错误：执行力是内部要求。\nC项错误：威慑力非和谐警民关系的核心。\nD项错误：创新力非本项主旨。',
            t: '警察要让老百姓信得过，公信力和好名声很重要。'
        },
        {
            quizIndex: 6,
            q: '人民法院对于公开审判的案件，应当在开庭（ ）以前先期公布案由、被告人姓名、开庭时间和地点。',
            opts: ['十日', '七日', '五日', '三日'],
            correct: 3,
            d: 'A项错误：十日非规定时限。\nB项错误：七日非规定时限。\nC项错误：五日非规定时限。\nD项正确：《刑事诉讼法》第187条，公开审判的案件，在开庭三日以前先期公布案由、被告人姓名、开庭时间和地点。',
            t: '法院公开审案子，开庭三天前要贴公告。'
        },
        {
            quizIndex: 7,
            q: '关于公安机关技术侦察措施，下列说法正确的是（ ）。',
            opts: ['因侦查犯罪的需要，公安机关可以自由决定是否采取技术侦察措施', '因侦查犯罪的需要，人民警察可以自由决定是否采取技术侦察措施', '因侦查犯罪的需要，办案民警可以决定是否采取技术侦察措施', '因侦查犯罪的需要，公安机关根据国家有关规定，经过严格的批准手续，可以采取技术侦察措施'],
            correct: 3,
            d: 'A项错误：不能“自由决定”，需经批准。\nB项错误：个人无权决定。\nC项错误：民警个人无权。\nD项正确：技术侦察需侦查需要、依法报批后方可实施。',
            t: '监听监控不能随便搞，要按国家规定走审批。'
        },
        {
            quizIndex: 8,
            q: '根据《中华人民共和国行政许可法》，（ ）应当建立健全对行政机关实施行政许可的监督制度，加强对行政机关实施行政许可的监督检查。',
            opts: ['市级以上人民政府', '县级以上人民政府', '市级以上人民检察院', '县级以上人民检察院'],
            correct: 1,
            d: 'A项错误：许可法规定为“县级以上人民政府”。\nB项正确：《行政许可法》第10条，县级以上人民政府应当建立健全监督制度。\nC项错误：检察院不是行政许可的监督主体。\nD项错误：检察院不是行政许可的监督主体。',
            t: '县级以上政府要监督许可的实施，确保不乱来。'
        },
        {
            quizIndex: 9,
            q: '某市黑社会团体聚众扰乱车站、码头、民用航空站、运动场等公共场所秩序，该市公安民警经（ ）无效的，可以使用驱逐性、制服性警械。',
            opts: ['警告', '训诫', '盘问', '劝阻'],
            correct: 0,
            d: 'A项正确：《人民警察使用警械和武器条例》第7条，经警告无效可使用驱逐性、制服性警械。\nB项错误：训诫非前置程序。\nC项错误：盘问是调查措施。\nD项错误：劝阻非法律程序。',
            t: '要先喊话警告，不听才上警棍催泪弹。'
        },
        {
            quizIndex: 10,
            q: '张某为表达对社会的不满，持刀乱砍路人，民警赶到现场后，为制服张某，开枪击伤张某手臂，同时不慎将路人周某打伤。对此，下列说法不正确的是（ ）。',
            opts: ['应当及时抢救受伤人员', '应当优先抢救路人周某', '应当及时保护现场', '应当及时通知受伤人员家属或其所在单位'],
            correct: 1,
            d: 'A项正确：无论嫌疑人还是路人，均应及时抢救。\nB项错误：抢救不分先后，“优先抢救路人”于法无据，应平等及时救治。\nC项正确：应保护现场。\nD项正确：应通知家属或单位。',
            t: '开枪伤了人，不管是谁都要救，不能先挑着救。'
        },
               {
            quizIndex: 11,
            q: '人民警察使用警械和武器，应当以（ ）为原则。',

    // ========== 渲染模块一 ==========
    function renderModule1() {
        var html = '<div class="card"><h2>一、单选题（1-50题，每题1分，共50分）</h2>';
        for (var i = 0; i < singleQuestions.length; i++) {
            var q = singleQuestions[i];
            html += '<div class="quiz-wrap" id="wrap-' + q.quizIndex + '">';
            html += '<div class="q-title">' + q.quizIndex + '. ' + q.q + '</div>';
            html += renderOptions(q.quizIndex, q.opts, 'single');
            html += '<div class="explain-card" id="exp-' + q.quizIndex + '"></div>';
            html += '</div>';
        }
        html += '<div class="module-footer">';
        html += '<span class="module-score" id="score-single" style="display:none;"></span>';
        html += '<button class="btn btn-primary" onclick="submitModule(\'single\')">✅ 提交本模块</button>';
        html += '</div></div>';
        document.getElementById('module1').innerHTML = html;

        var tocHtml = '';
        for (var j = 1; j <= 50; j++) {
            tocHtml += '<button class="toc-btn" onclick="scrollToQuiz(' + j + ');closeToc();" id="tocBtn-' + j + '">' + j + '</button>';
        }
        document.getElementById('tocSingle').innerHTML = tocHtml;
    }

// ========== 渲染多选题模块 ==========
function renderModule2() {
    var html = '<div class="card"><h2>二、多选题（51-70题，每题1.5分，共30分）</h2>';
    html += '<p style="color:var(--text-light);font-size:0.9rem;margin-bottom:12px;">📌 得分规则：全对得1.5分；少选且无错选，每个正确选项得0.3分；错选不得分。</p>';
    for (var i = 0; i < multiQuestions.length; i++) {
        var q = multiQuestions[i];
        html += '<div class="quiz-wrap" id="wrap-' + q.quizIndex + '">';
        html += '<div class="q-title">' + q.quizIndex + '. ' + q.q + ' <span style="color:#b7950b;font-size:0.8rem;">（多选）</span></div>';
        html += renderOptions(q.quizIndex, q.opts, 'multi');
        html += '<div class="explain-card" id="exp-' + q.quizIndex + '"></div>';
        html += '</div>';
    }
    html += '<div class="module-footer">';
    html += '<span class="module-score" id="score-multi" style="display:none;"></span>';
    html += '<button class="btn btn-primary" onclick="submitModule(\'multi\')">✅ 提交本模块</button>';
    html += '</div></div>';
    document.getElementById('module2').innerHTML = html;

    var tocHtml = '';
    for (var j = 51; j <= 70; j++) {
        tocHtml += '<button class="toc-btn" onclick="scrollToQuiz(' + j + ');closeToc();" id="tocBtn-' + j + '">' + j + '</button>';
    }
    document.getElementById('tocMulti').innerHTML = tocHtml;
}

    function scrollToQuiz(idx) {
        var el = document.getElementById('wrap-' + idx);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 初始化
    renderModule1();
    renderModule2();
</script>
