        .btn-outline { background:#fff; color:var(--accent); border:2px solid var(--accent); } .btn-outline:hover { background:#fdedec; }
        .explain-card { margin-top:12px; padding:14px 18px; border-radius:var(--radius-sm); display:none; font-size:0.9rem; line-height:1.7; }
        .explain-card.show { display:block; }

        .explain-card.wrong-ex { background:#fdedec; border:1px solid #f5b7b1; color:#922b21; }

            .toc-toggle { display:flex; } .main { max-width:100%; margin:0 auto; } .card { padding:18px 14px; }
        }
    </style>

    {
        id: 'mod1', iconClass: 'icon-red', iconEmoji: '📌',

              extra:'<b>常见病句类型（7类）：</b>搭配不当、成分残缺、表意不明、语序不当、结构混乱、不合逻辑、成分赘余/用词不当。' },
            { type:'ki', badge:'基础', badgeClass:'badge-num', title:'句子成分速记',
              content:'汉语单句正常语序：<b>定语 + 主语 + 状语 + 谓语 + 补语 + 定语 + 宾语</b><br><b>主语</b>：动作执行者（谁）<br><b>谓语</b>：动作或状态（干什么）<br><b>宾语</b>：动作承受者（什么）<br><b>定语</b>：修饰主语或宾语（什么样的）<br><b>状语</b>：修饰谓语，在谓语<span class="kh">之前</span>（怎么干）<br><b>补语</b>：补充谓语，在谓语<span class="kh">之后</span>（干得怎么样）',
              example:{q:'📝 "一穷二白的我无可救药地喜欢聪明可爱的你。"——这句话的主谓宾定状补分别是什么？',a:'✅ <b>主语</b>：我 | <b>谓语</b>：喜欢 | <b>宾语</b>：你 | <b>定语</b>（修饰主语）：一穷二白 | <b>定语</b>（修饰宾语）：聪明可爱 | <b>状语</b>（修饰谓语）：无可救药 | <b>补语</b>：喜欢得无可救药。'} }
        ],
        quizzes: [
            { type:'single', q:'下列哪项不属于常见的病句类型？', opts:['A. 搭配不当','B. 成分残缺','C. 语序不当','D. 修辞不当'], correct:3,
              detail:'<b>A选项</b>：属于常见病句类型。<br><b>B选项</b>：属于常见病句类型。<br><b>C选项</b>：属于常见病句类型。<br><b>D选项</b>：不属于。病句类型中没有"修辞不当"，而是"不合逻辑"和"表意不明"。',
              tip:'病句七大类型：搭配不当、成分残缺、表意不明、语序不当、结构混乱、不合逻辑、成分赘余。' },
            { type:'single', q:'"我喜欢你喜欢得无可救药"中，"无可救药"是什么句子成分？', opts:['A. 定语','B. 状语','C. 补语','D. 宾语'], correct:2,
              detail:'<b>A选项</b>：错误。定语修饰主语或宾语。<br><b>B选项</b>：错误。状语在谓语之前。<br><b>C选项</b>：正确。补语在谓语之后，补充说明喜欢得怎么样。<br><b>D选项</b>：错误。宾语是动作的承受者。',
              tip:'在谓语之前=状语（无可救药地喜欢），在谓语之后=补语（喜欢得无可救药）。' }

    // ===== 模块2：搭配不当 =====
    {
        id: 'mod2', iconClass: 'icon-blue', iconEmoji: '🔗',
        title: '二、搭配不当（最高频考点）',
        subtitle: '主谓宾不搭、修饰语不搭、两面对一面、关联词不搭',
        items: [
            { type:'ki', badge:'主谓宾', badgeClass:'badge-core', title:'① 主语与谓语搭配不当',
              content:'主语和谓语在语义上不匹配。<br><b>例：</b>"一条好狗的<span class="kh kh-red">毛色</span>必须光亮油润、<span class="kh kh-red">聪明可爱</span>、善解人意。"<br>"毛色"不能"聪明可爱"——这是狗狗的性格，不是毛色的属性。',
              example:{q:'🐶 "这碗汤的味道又白又滑"——问题在哪？',a:'❌ "味道"是尝出来的，不能"白"（颜色）也不能"滑"（触感）。应改为"这碗汤的肉又白又滑"或"这碗汤的味道鲜美"。'} },
            { type:'ki', badge:'主谓宾', badgeClass:'badge-num', title:'② 主语与宾语搭配不当',
              content:'主语和宾语不是同一类概念。<br><b>例：</b>"<span class="kh kh-red">中学生</span>是德智体美劳全面发展的<span class="kh kh-red">重要阶段</span>。"<br>"中学生"是人，"阶段"是抽象概念——人不能是阶段！',
              extra:'<b>快速发现：</b>看到"是"字句，立即检查主语和宾语是否属于同一类别。' },
            { type:'ki', badge:'主谓宾', badgeClass:'badge-num', title:'③ 谓语与宾语搭配不当',
              content:'谓语动词和宾语语义不匹配。<br><b>例：</b>"努力<span class="kh kh-red">开拓</span>教学方式和<span class="kh kh-red">科研成果</span>。"<br>"开拓成果"不对——"开拓"搭配"领域"，"成果"搭配"取得"。' },
            { type:'ki', badge:'修饰', badgeClass:'badge-num', title:'④ 修饰语与中心语搭配不当',
              content:'形容词、副词等修饰成分与被修饰的词语义不协调。<br><b>例：</b>"有一双<span class="kh kh-red">聪明</span>能干的手。"<br>"聪明"形容人的思维，不能修饰"手"。可以说"灵巧的手"。' },
            { type:'ki', badge:'必考', badgeClass:'badge-core', title:'⑤ 一面与两面搭配不当（高频！）',
              content:'句子前面用了"能否""是否""有没有"等两面词，后面却只对应了一面结果。<br><b>例：</b>"<span class="kh kh-red">能否</span>抓住机遇，<span class="kh kh-red">关键在于</span>加速培养人才。"<br>"能否"是两面（能/不能），"关键在于"只对应"能"的一面。去掉"能否"即可。',
              extra:'<b>秒杀技巧：</b>看到"能否/是否/有没有"，立刻检查后面是否有"能否/是否"与之对应。没有的话就是病句！' },
            { type:'ki', badge:'关联词', badgeClass:'badge-num', title:'⑥ 关联词搭配不当',
              content:'关联词固定搭配不能乱换。<br><b>例：</b>"<span class="kh kh-red">只有</span>解决房价问题，<span class="kh kh-red">就能</span>更好地服务人民。"<br>"只有……就……"错了！应改为"只有……才……"或"只要……就……"。' }
        ],
        quizzes: [
            { type:'single', q:'下列句子中，哪一句存在"两面对一面"的语病？', opts:['A. 睡眠对健康很重要','B. 能否坚持锻炼，决定着身体素质的好坏','C. 能否通过考试，关键在于努力学习','D. 他的成功离不开勤奋'], correct:2,
              detail:'<b>A选项</b>：无语病。一面判断。<br><b>B选项</b>：无语病。"能否"对"好坏"——两面对两面，正确。<br><b>C选项</b>：有语病。"能否"是两面，"关键在于努力"只有"能"的一面。应在"努力"前加"是否"。<br><b>D选项</b>：无语病。',
              tip:'口诀："能否"后面要有"能否/是否"，否则就是两面对一面。C中"能否"后面没有对应的两面词。' },
            { type:'single', q:'"江西的瓷器是省份之一"属于什么语病？', opts:['A. 主语与谓语搭配不当','B. 主语与宾语搭配不当','C. 谓语与宾语搭配不当','D. 成分残缺'], correct:1,
              detail:'<b>A选项</b>：错误。<br><b>B选项</b>：正确。"瓷器"（物品）不能是"省份"（行政区域），主宾概念不匹配。<br><b>C选项</b>：错误。<br><b>D选项</b>：错误。',

        ]
    },
    // ===== 模块3：成分残缺与赘余 =====

        id: 'mod3', iconClass: 'icon-green', iconEmoji: '✂️',
        title: '三、成分残缺与成分赘余',
        subtitle: '缺主语最常见，词义重复也常考',
        items: [
            { type:'ki', badge:'残缺', badgeClass:'badge-core', title:'① 滥用介词导致主语缺失（最高频！）',
              content:'当句子以"经过""通过""随着""由于""使""让""对"等介词开头时，很容易把主语"吃掉"。<br><b>例：</b>"<span class="kh kh-red">经过</span>专家的指导，<span class="kh kh-red">让</span>葡萄产量得到改善。"<br>"经过……让……"把主语吞了！去掉"经过"或去掉"让"即可。',
              extra:'<b>秒杀技巧：</b>看到"经过……让……""随着……使得……""由于……让……"这种结构，直接判定为缺少主语！' },
            { type:'ki', badge:'残缺', badgeClass:'badge-num', title:'② 暗中更换主语',
              content:'前半句说A，后半句说B却没把B写出来。<br><b>例：</b>"建立黑名单制度，对老赖是一记重拳，<span class="kh kh-red">主动履行执行义务</span>。"<br>前句主语是"制度"，后句"主动履行"的主语应该是"老赖"——但没写出来！' },
            { type:'ki', badge:'残缺', badgeClass:'badge-num', title:'③ 缺少谓语或宾语',
              content:'<b>缺谓语：</b>"互联网的发展，碎片化阅读逐渐成为主要方式。"——应在"碎片化阅读"前加"使得"。<br><b>缺宾语：</b>"我国航天技术实现了从单舱到三舱。"——"实现了"什么？缺宾语，应加"的突破"。' },
            { type:'ki', badge:'赘余', badgeClass:'badge-core', title:'④ 词义重复（高频考点）',

        ],
        quizzes: [

              detail:'<b>A选项</b>：错误。<br><b>B选项</b>：错误。<br><b>C选项</b>：正确。"随着……使得……"滥用介词，导致主语缺失。<br><b>D选项</b>：错误。',

                  d:'<b>A</b>：正确。宽阔平坦的路才能高速行驶。<br><b>B</b>：错误。改变了原意。<br><b>C</b>：错误。不解决问题。<br><b>D</b>：错误。公路也可以是蜿蜒的。',
                  t:'蜿蜒曲折=弯多，离弦的箭=快直——两者矛盾，改一个就行。' },
                { q:'"我们敢想敢做，又都有一双聪明能干的手"的语病是？', o:['A. 成分残缺','B. 搭配不当','C. 语序不当','D. 结构混乱'], correct:1,
                  d:'<b>A</b>：错误。<br><b>B</b>：正确。"聪明"不能修饰"手"——修饰语与中心语搭配不当。<br><b>C</b>：错误。<br><b>D</b>：错误。',
                  t:'手可以能干、灵巧，但不能聪明——聪明形容脑子。' },
                { q:'"我把教室打扫得干干净净、整整齐齐"的语病是？', o:['A. 成分残缺','B. 搭配不当','C. 表意不明','D. 不合逻辑'], correct:1,
                  d:'<b>A</b>：错误。<br><b>B</b>：正确。"打扫"不能搭配"整整齐齐"——可以说"打扫得干干净净、收拾得整整齐齐"。<br><b>C</b>：错误。<br><b>D</b>：错误。',
                  t:'打扫=去灰去脏，整齐=摆放有序——不能用一个动词统领两个不同性质的动作。' },
                { q:'下列成语中，只能用于否定句的是？', o:['A. 举一反三','B. 耳濡目染','C. 等量齐观','D. 差强人意'], correct:2,
                  d:'<b>A</b>：错误。可用于肯定句。<br><b>B</b>：错误。可用于肯定句。<br><b>C</b>：正确。通常说"不能等量齐观"。<br><b>D</b>：错误。可用于肯定句。',
                  t:'"等量齐观"和"望其项背"都是"否定命"——前面总带"不能/难以"。' },
                { q:'"他虽然是电子专业的高材生，但这次也没看懂电脑屏幕上那条显示错误的命令"为什么表意不明？', o:['A. 多音字歧义','B. 词义多义','C. 词义两可','D. 指代不明'], correct:2,
                  d:'<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。"显示错误的命令"有两种理解——命令内容是错的/屏幕显示是错的。<br><b>D</b>：错误。',
                  t:'到底是命令本身错了，还是屏幕显示出错了？一句话两个意思。' },
                { q:'"天色晚了，自行车没修好，修车的急坏了"产生歧义的原因是？', o:['A. 多音字','B. 指代不明','C. 停顿歧义','D. 承前省略不当'], correct:3,
                  d:'<b>A</b>：错误。<br><b>B</b>：错误。指代问题不大。<br><b>C</b>：错误。<br><b>D</b>：正确。"修车的"省略了对象——是修车师傅还是车主？',
                  t:'"修车的"是省略说法——到底修车的人还是被修车的人？上下文没交代清楚。' },
                { q:'"我看见张原扶着一位老人走下车来，手里提着一个黑色皮包"的歧义在于？', o:['A. 谁提着皮包不清楚','B. 皮包的颜色有歧义','C. 下车的时间不清楚','D. "扶着"一词有歧义'], correct:0,
                  d:'<b>A</b>：正确。"手里提着皮包"的主语不明——是张原还是老人？<br><b>B</b>：错误。颜色明确。<br><b>C</b>：错误。时间明确。<br><b>D</b>：错误。词义明确。',
                  t:'"手里"是谁的手？主语承前省略不当，让人猜。' },
                { q:'"全国各地社区都在逐步开展建立居民健康档案的工作"是否有语病？', o:['A. 无语病','B. 搭配不当','C. 成分残缺','D. 语序不当'], correct:0,
                  d:'<b>A</b>：正确。句子结构完整，语义通顺。<br><b>B</b>：错误。<br><b>C</b>：错误。主语"全国各地社区"明确。<br><b>D</b>：错误。语序没问题。',
                  t:'这句话没毛病，不要看到"逐步开展"就觉得不对。' }
            ];
            // 转换判断题格式
            const tfQ = tf.map(function(q,i){ return { type:'single', q:q.q, opts:['✅ 正确','❌ 错误'], correct:q.c?0:1, isTF:true, tfId:'tf'+(i+1), detail:q.d, tip:q.t }; });
            const sQ = s.map(function(q,i){ return { type:'single', q:q.q, opts:q.o, correct:q.c, detail:q.d, tip:q.t, quizIndex:i+1 }; });
            return [...tfQ, ...sQ];
        })()
    }

];
</script>
<script>
// ==================== 渲染引擎（含完善的✅❌标识规则） ====================
function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.items&&mod.items.length>0){h+='<div class="ki-grid">';mod.items.forEach(function(item){if(item.type==='table')h+=item.html;else if(item.type==='ki')h+=renderKI(item);});h+='</div>';}if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}
function renderKI(item){var h='<div class="ki-item">';h+='<div class="ki-title-row">'+(item.badge?'<span class="badge '+(item.badgeClass||'badge-num')+'">'+item.badge+'</span>':'')+item.title+'</div>';h+='<div class="ki-content">'+item.content+'</div>';if(item.extra)h+='<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">'+item.extra+'</div>';if(item.example){h+='<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">'+item.example.q+'</div><div class="ex-a">'+item.example.a+'</div></div>';}h+='</div>';return h;}
function renderQuiz(q,qid){var qTypeLabel=q.multi?'【多选题】':'【单选题】';var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else if(q.tfId){h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div>';h+='<ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul>';h+='<div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div>';h+='<div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.detail){var detailHtml=q.detail
    .replace(/"([^"]*)"/g,'$1')
    .replace(/([A-E])正确<\/b>：正确/g,'$1选项</b>：<span style="color:#145a32;">✅ 正确</span>')
    .replace(/([A-E])错误<\/b>：错误/g,'$1选项</b>：<span style="color:#b22222;">❌ 错误</span>')
    .replace(/([A-E])正确<\/b>：错误/g,'$1选项</b>：<span style="color:#b22222;">❌ 错误</span>')
    .replace(/([A-E])错误<\/b>：正确/g,'$1选项</b>：<span style="color:#145a32;">✅ 正确</span>')
    .replace(/([A-E])选项<\/b>：(正确|属于|应选|是|可|无语病)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>')
    .replace(/([A-E])选项<\/b>：(错误|不属于|不选|不是|不可|有语病)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>')
    .replace(/([A-E])<\/b>：(正确|属于|应选|是|可|无语病)/g,'<span style="color:#145a32;">✅ $1</b>：$2</span>')
    .replace(/([A-E])<\/b>：(错误|不属于|不选|不是|不可|有语病)/g,'<span style="color:#b22222;">❌ $1</b>：$2</span>')
    .replace(/([A-E])选项<\/b>：有语病/g,'<span style="color:#b22222;">❌ $1选项</b>：有语病</span>')
    .replace(/([A-E])<\/b>：有语病/g,'<span style="color:#b22222;">❌ $1</b>：有语病</span>');
h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.tip+'</div>';h+='</div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 病句辨析目录</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
</body>
</html>
