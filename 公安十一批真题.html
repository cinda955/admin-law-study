<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024辅警《公安素质测试》真题演练（前10题）</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-light: #5c5347;
            --accent: #b22222;
            --highlight: #fff3cd;
            --highlight-border: #f0c040;
            --example-bg: #f0faf5;
            --example-border: #a3e4bc;
            --plain-box-bg: #ffffff;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 14px;
            --radius-sm: 10px;
            --font: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); font-family:var(--font); color:var(--text); line-height:1.7; }
        .main { max-width:900px; margin:0 auto; padding:24px 16px 100px; }

        /* 浮动目录按钮 - 左上角 */
        .float-toc-btn { position:fixed; top:24px; left:24px; width:52px; height:52px; border-radius:50%;
            background:var(--accent); color:white; border:none; font-size:24px; z-index:100; box-shadow:0 4px 14px rgba(0,0,0,0.2); cursor:pointer; }
        /* 目录面板 - 从左侧滑出 */
        .toc-panel { position:fixed; top:0; left:-300px; width:280px; height:100vh; background:white; border-right:2px solid #f0ebe0;
            box-shadow:4px 0 16px rgba(0,0,0,0.1); z-index:99; overflow-y:auto; padding:20px; transition:left 0.3s; }
        .toc-panel.open { left:0; }
        .toc-panel h2 { font-size:18px; margin-bottom:12px; color:var(--accent); }
        .toc-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
        .toc-btn { width:36px; height:36px; border:1px solid #e9e4db; border-radius:8px; background:white; font-size:13px; cursor:pointer; }
        .toc-btn.submitted { background:#f5f0e8; color:#b9b0a0; } /* 已提交但可点击 */
        .toc-section-title { font-weight:bold; margin:12px 0 6px; color:var(--text-light); font-size:14px; }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:98; display:none; }
        .overlay.show { display:block; }

        /* 计时器 */
        .timer-box { text-align:right; font-size:18px; margin-bottom:20px; color:var(--accent); font-weight:600; }
        .start-btn { display:inline-block; padding:8px 20px; background:var(--accent); color:white; border:none; border-radius:20px; cursor:pointer; margin-left:12px; }

        .card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow-md); border:1px solid #f0ebe0; padding:28px 30px; margin-bottom:28px; }
        .card h2 { font-size:22px; margin-bottom:16px; border-left:5px solid var(--accent); padding-left:12px; }
        .quiz-wrap { border:2px solid #f0ebe0; border-radius:var(--radius-sm); padding:18px 20px; margin-bottom:18px; background:#fffbf7; }
        .quiz-wrap.submitted { pointer-events:none; opacity:0.95; }
        .q-title { font-weight:700; margin-bottom:10px; font-size:16px; }
        .opt-list { list-style:none; }
        .opt-list li { border:2px solid #e9e4db; border-radius:25px; padding:10px 18px; margin-bottom:8px; cursor:pointer; transition:0.2s; background:white; }
        .opt-list li:hover { border-color:#c0b090; }
        .opt-list li.selected { border-color:#3b7ddd; background:#eaf1fb; }
        .opt-list li.correct { border-color:#34a853; background:#eafaf1; }
        .opt-list li.wrong { border-color:#ea4335; background:#fdedec; }
        .explain-card { margin-top:12px; padding:14px 16px; border-radius:10px; background:var(--example-bg); border:1px solid var(--example-border); display:none; line-height:1.8; }
        .explain-card.show { display:block; }
        /* 大白话独立白底 */
        .plain-box { background: #ffffff; border: 1px solid #e9e4db; border-radius: 8px; padding: 10px 14px; margin-top: 8px; font-size: 15px; }
        .btn { display:inline-block; padding:12px 32px; border-radius:25px; font-size:16px; font-weight:600; cursor:pointer; border:none; }
        .btn-primary { background:var(--accent); color:white; }
        .module-footer { margin-top:16px; text-align:right; display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
        .module-score { font-weight: bold; color: var(--accent); }
        .result-box { margin-top:20px; padding:20px; background:var(--highlight); border:1px solid var(--highlight-border); border-radius:12px; display:none; }
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeToc()"></div>
<div class="toc-panel" id="tocPanel">
    <h2>📋 题目导航</h2>
    <div class="toc-section-title">单选题（1-50）</div>
    <div class="toc-grid" id="tocSingle"></div>
    <div class="toc-section-title">多选题（51-70）</div>
    <div class="toc-grid" id="tocMulti"></div>
    <div class="toc-section-title">判断题（71-90）</div>
    <div class="toc-grid" id="tocJudge"></div>
</div>
<button class="float-toc-btn" onclick="toggleToc()">☰</button>

<div class="main" id="mainContent">
    <div class="timer-box" id="timerBox">
        ⏱ 00:00
        <button class="start-btn" id="startTimerBtn" onclick="startTimer()">▶ 开始考试</button>
    </div>
    <div id="module1"></div>
    <div id="module2"></div>
    <div id="module3"></div>
    <div class="result-box" id="resultBox"></div>
</div>

<script>
    // 全局状态
    var timerInterval = null;
    var startTime = null;
    var totalSeconds = 0;
    var timerStarted = false;
    var moduleSubmitted = { single: false, multi: false, judge: false };
    var score = { single: 0, multi: 0, judge: 0 };
    var correctCounts = { single: 0, multi: 0, judge: 0 }; // 已提交模块答对数量

    // 目录切换
    function toggleToc() { document.getElementById('tocPanel').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
    function closeToc() { document.getElementById('tocPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    // 计时器
    function formatTime(sec) { var m=Math.floor(sec/60), s=sec%60; return (m<10?'0'+m:m)+':'+(s<10?'0'+s:s); }
    function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        document.getElementById('startTimerBtn').style.display = 'none';
        startTime = new Date();
        timerInterval = setInterval(function(){
            totalSeconds = Math.floor((new Date() - startTime) / 1000);
            document.getElementById('timerBox').innerHTML = '⏱ ' + formatTime(totalSeconds);
        }, 1000);
    }

    // 选项渲染
    function renderOptions(quizIndex, opts, type) {
        var labels = 'ABCDEF';
        var html = '<ul class="opt-list" id="opt-'+quizIndex+'">';
        for (var i=0; i<opts.length; i++) {
            html += '<li onclick="selectOption(\''+quizIndex+'\','+i+',\''+type+'\')">'+labels[i]+'. '+opts[i]+'</li>';
        }
        html += '</ul>';
        return html;
    }
    function selectOption(quizIndex, optIndex, type) {
        if (document.getElementById('wrap-'+quizIndex).classList.contains('submitted')) return;
        if (!timerStarted) startTimer();
        var lis = document.querySelectorAll('#opt-'+quizIndex+' li');
        if (type === 'single') {
            for (var i=0; i<lis.length; i++) lis[i].classList.remove('selected');
        }
        lis[optIndex].classList.toggle('selected');
    }

    // 解析美化（大白话独立白底）
    function beautifyExplain(d, t) {
        var lines = d.split('\n');
        var html = '';
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            if (/^[A-F]项正确：/.test(line)) {
                html += '✅ ' + line + '<br>';
            } else if (/^[A-F]项错误：/.test(line)) {
                html += '❌ ' + line + '<br>';
            } else {
                html += line + '<br>';
            }
        }
        if (t) html += '<div class="plain-box"><strong>💡 大白话：</strong>' + t + '</div>';
        return html;
    }

    // ============ 前10道单选题数据 ============
    var singleQuestions = [
        { quizIndex:1, q:'公安工作的基本方针是（）。',
          opts:['坚持党的绝对领导','坚决做到“两个维护”','执法必严，违法必究，宽严相济','党委领导下的专门机关与广大群众相结合'],
          correct:3,
          d:'A项错误：坚持党的绝对领导是公安工作的根本原则，而非基本方针。\nB项错误：“两个维护”是政治要求，不属于公安工作方针范畴。\nC项错误：该表述是执法原则，不是基本方针。\nD项正确：公安工作的基本方针是党委领导下的专门机关与广大群众相结合。',
          t:'公安工作既要靠党的领导，也要发动群众，两条腿走路才是基本路子。' },
        { quizIndex:2, q:'符合《行政处罚法》规定的地方政府规章所设定的罚款，由（）规定。',
          opts:['全国人民代表大会','省、自治区、直辖市人民代表大会','省、自治区、直辖市人民政府','省、自治区、直辖市人民代表大会常务委员会'],
          correct:3,
          d:'A项错误：全国人大制定法律，不直接规定规章罚款限额。\nB项错误：省级人大及其常委会制定地方性法规，但限额须由省级人大常委会规定，不是人大本身。\nC项错误：省级政府是规章制定主体，但罚款限额设定权属于省级人大常委会。\nD项正确：根据《行政处罚法》第14条，地方政府规章设定罚款的限额由省、自治区、直辖市人民代表大会常务委员会规定。',
          t:'省级规章能罚多少钱，省人大常委会说了算，不是政府自己拍板。' },
        { quizIndex:3, q:'下列各类登记中，属于行政许可的是（）。',
          opts:['婚姻登记','产权登记','社团登记','抵押登记'],
          correct:2,
          d:'A项错误：婚姻登记是行政确认，不是许可。\nB项错误：产权登记是对既有权利的确认，不属于行政许可。\nC项正确：社团登记是行政机关赋予申请人成立社会团体的资格，属于行政许可。\nD项错误：抵押登记是民事担保行为的公示，不是行政许可。',
          t:'许可是“批准你干”，社团登记就是批准你成立组织，所以是许可。' },
        { quizIndex:4, q:'关于人民警察使用警械和武器应当遵循的原则，下列说法错误的是（）。',
          opts:['尽量减少人员伤亡','尽量减少财产损失','尽量团队协作','制止违法犯罪行为'],
          correct:2,
          d:'A项正确：使用警械武器必须尽量减少人员伤亡，这是法定原则。\nB项正确：同样应尽量减少财产损失。\nC项错误：团队协作并非法定原则，《人民警察使用警械和武器条例》规定的原则是制止违法犯罪、尽量减少人员伤亡和财产损失。\nD项正确：制止违法犯罪是使用警械武器的核心目的。',
          t:'法律只要求少伤人、少损失，没要求必须团队协作。' },
        { quizIndex:5, q:'某市群众非法举行集会与游行，以暴力方法抗拒或者阻碍人民警察依法履行职责，人民警察经（）无效的，可以使用警棍、催泪弹、高压水枪、特种防暴枪等驱逐性、制服性警械。',
          opts:['警告','训诫','盘问','劝阻'],
          correct:0,
          d:'A项正确：《人民警察使用警械和武器条例》第7条规定，经警告无效的，可以使用驱逐性、制服性警械。\nB项错误：训诫不是法定前置程序。\nC项错误：盘问是调查措施，与是否使用警械无关。\nD项错误：劝阻并非法律术语。',
          t:'警察先喊话警告，不听才上警棍催泪弹。' },
        { quizIndex:6, q:'根据《人民警察法》，人民警察对于人民的意见和建议，必须（）。',
          opts:['接受','倾听','作为决策参考','作出书面记录'],
          correct:0,
          d:'A项正确：《人民警察法》第3条明确规定，人民警察对于人民的意见和建议，必须接受。\nB项错误：倾听是态度，但法条要求的是必须“接受”。\nC项错误：不是仅仅作为参考。\nD项错误：未要求书面记录。',
          t:'群众提意见，警察必须接着，不能当耳旁风。' },
        { quizIndex:7, q:'在行政强制执行程序中止执行后，中止执行的情形消失，行政机关应当恢复执行，对没有明显社会危害，当事人确无能力履行，中止执行（）未恢复执行的，行政机关不再执行。',
          opts:['满二年','满三年','满四年','满五年'],
          correct:1,
          d:'A项错误：二年不是法定时限。\nB项正确：《行政强制法》第39条规定，对无社会危害且确无能力履行的，中止执行满三年未恢复执行的，行政机关不再执行。\nC项错误：四年不是规定期限。\nD项错误：五年亦不适用。',
          t:'确实没钱又没危害，拖满三年就彻底不追了。' },
        { quizIndex:8, q:'公安机关的人民警察对（）的个人或者组织，依法可以实施行政强制措施、行政处罚。',
          opts:['危害社会治安秩序','违背社会一般道德','扰乱商事交易秩序','有悖职业行为规范'],
          correct:0,
          d:'A项正确：《人民警察法》第7条规定，对危害社会治安秩序的行为，公安机关的人民警察可以依法实施行政强制措施、行政处罚。\nB项错误：违背道德不属于公安管辖核心。\nC项错误：商事秩序由市场监管等部门负责。\nD项错误：职业规范非警察职权。',
          t:'警察只管社会治安，不管道德和市场交易。' },
        { quizIndex:9, q:'下列行为，构成刑事诉讼中的妨害作证罪的是（）。',
          opts:['辩护人帮助当事人伪造证据','证人故意做虚假证明意图陷害他人','当事人以金钱收买他人让其故意做虚假证明意图逃避法律追究','鉴定人故意作虚假鉴定意图陷害他人'],
          correct:2,
          d:'A项错误：辩护人帮助伪造证据可能构成辩护人伪造证据罪。\nB项错误：证人故意作虚假证明构成伪证罪，而非妨害作证罪。\nC项正确：当事人以金钱收买他人作伪证，妨害作证罪。\nD项错误：鉴定人故意作虚假鉴定构成伪证罪。',
          t:'当事人花钱让人作伪证就是妨害作证，证人和鉴定人自己说谎是伪证罪。' },
        { quizIndex:10, q:'被许可人在作出行政许可决定的行政机关管辖区域外违法从事行政许可事项活动的，违法行为发生地的行政机关应（）。',
          opts:['无权作出任何处理','应当依法将被许可人的违法事实、处理结果抄告作出行政许可决定的行政机关','应当依法将被许可人移送作出行政许可决定的行政机关处理','应当在得到作出行政许可决定的行政机关委托后依法对被许可人作出处理'],
          correct:1,
          d:'A项错误：违法行为发生地行政机关有权依法处理。\nB项正确：《行政许可法》第64条规定，违法行为发生地的行政机关应当依法将被许可人的违法事实、处理结果抄告作出行政许可决定的行政机关。\nC项错误：不是必须移送，而是抄告。\nD项错误：无需委托即可处理。',
          t:'外地违法照样管，但要把处理结果告诉老家发证的机关。' }
,
// ============ 11-50题 begin ============
{ quizIndex:11, q:'某刑事诉讼中，一审法院认为检察院公诉成立，判处李某有期徒刑10年；李某上诉，二审法院发回一审法院重审，一审法院又改判李某无罪，李某提出赔偿请求。本案的赔偿义务机关应为（）。', opts:['公安机关','检察机关','一审法院','一审法院和检察机关'], correct:2, d:'A项错误：公安机关仅侦查，不是本案赔偿义务机关。\nB项错误：检察机关公诉成立但改判无罪，重审后改判无罪的，由作出一审有罪判决的法院作为赔偿义务机关。\nC项正确：一审法院作出有罪判决，重审改判无罪后，由该一审法院赔偿。\nD项错误：检察机关不承担赔偿义务。', t:'改判无罪后，当初判你有罪的那个法院赔钱。' },
{ quizIndex:12, q:'根据《人民警察法》，下列关于现场管制的说法不正确的是（）。', opts:['现场管制的执行机关为县级以上人民政府公安机关','实行现场管制须经上级公安机关和同级人民政府批准','发生突发事件时，应当立即实行现场管制','实行现场管制时，人民警察可以对拒不服从的人员强行带离现场或者立即予以拘留'], correct:2, d:'A项正确：现场管制由县级以上公安机关执行。\nB项正确：需要上级公安机关和同级政府批准。\nC项错误：现场管制并非自动立即实行，须经批准。\nD项正确：可强行带离或立即拘留。', t:'发生突发事件不是立即管制，要先批准。' },
{ quizIndex:13, q:'公民甲系聋哑人，十五周岁，因在公共汽车上偷窃被公安便衣警察抓获。下列说法错误的是（）。', opts:['可以从轻、减轻处罚','可以不予处罚','询问时应当有通晓手语的人提供帮助','可以执行行政拘留处罚'], correct:3, d:'A项正确：已满14不满16周岁，且聋哑人，可以从轻或减轻处罚。\nB项正确：情节轻微可不予处罚。\nC项正确：询问聋哑人应当提供翻译。\nD项错误：已满14不满16周岁的，不执行行政拘留处罚。', t:'15岁偷东西，不送拘留所。' },
{ quizIndex:14, q:'申请人认为行政机关不履行法定职责申请行政复议，行政复议机关受理后发现该行政机关在受理前已经履行法定职责的，行政复议机关应决定（）。', opts:['维持原具体行政行为','变更原具体行政行为','驳回行政复议请求','按照自愿、合法的原则进行调解'], correct:2, d:'A项错误：行政行为已履行，无法维持。\nB项错误：不存在未履行职责，无需变更。\nC项正确：行政机关已履行，复议请求不成立，应驳回。\nD项错误：调解不适用于此情形。', t:'人家已经干了，你再告不履行就驳回了。' },
{ quizIndex:15, q:'林某是一家出版社的负责人，为牟取暴利向出版淫秽书刊的外甥刘某提供书号，对林某的行为应定性为（）。', opts:['为他人提供书号出版淫秽书刊罪','为亲友非法牟利罪','出版淫秽物品牟利罪','非法经营罪'], correct:0, d:'A项正确：林某提供书号，他人用于出版淫秽书刊，构成此罪。\nB项错误：不属此罪要件。\nC项错误：林某未直接出版。\nD项错误：非法经营罪不适用。', t:'给书号让人出黄书，就是这罪名。' },
{ quizIndex:16, q:'某食品生产企业生产的食品卫生不达标，导致多人食用该食品后中毒就医，经举报，该市市场监管部门对该食品企业进行调查，确认事实清楚，依法应作出吊销其食品生产许可证和罚款的行政处罚，但鉴于该企业主动配合市场监管部门调查工作，主动对食物中毒者进行赔偿，态度良好，所以对其只作出罚款处罚。对上述案件，理解正确的是（）。', opts:['该企业有法定从轻或减轻处罚情节，该市市场监管部门仅作出罚款处罚决定是正确的','该企业主动配合查处的行为不影响行政机关的处罚，该市市场监管部门应当依法处罚','市场监管部门应当将案件移交公安机关，追究刑事责任','该企业主动认罪，作出处罚前可不举行听证'], correct:1, d:'A项错误：将“从轻减轻处罚”扩大解释为可免除法律强制规定的资格罚，混淆了裁量权的法定边界。\nB项正确：企业主动配合调查、赔偿等行为仅构成从轻情节，可减轻罚款金额，但不能免除吊销许可证的法定强制处罚。\nC项错误：未构成犯罪。\nD项错误：吊销许可证应告知听证。', t:'态度好赔偿积极，可以从轻处理。' },
{ quizIndex:17, q:'赵某经过多年努力，最终获得生效的国家赔偿判决书。依照《国家赔偿法》的规定，赵某可以向（）申请支付赔偿金。', opts:['人民法院','赔偿义务机关','财政部门','县级以上人民政府'], correct:1, d:'A项错误：法院作出判决，但支付应向义务机关申请。\nB项正确：向赔偿义务机关申请支付。\nC项错误：财政部门不直接受理。\nD项错误：政府不直接受理。', t:'判了赔，找当年做错事的机关要钱。' },

{ quizIndex:19, q:'某行政机关对某私营企业的财产作出扣押的决定。依照规定，扣押的期限不得超过（）；情况复杂的，经行政机关负责人批准，可以延长，但是延长期限不得超过（）。法律、行政法规另有规定的除外。', opts:['三十日，十日','二十日，二十日','三十日，三十日','二十日，六十日'], correct:2, d:'A项错误：延长期限不是十日。\nB项错误：二十日、二十日均错。\nC项正确：扣押期限三十日，延长期限三十日。\nD项错误：首次期限非二十日。', t:'扣押最多30天，延也最多再延30天。' },
{ quizIndex:20, q:'人民警察当场收缴的罚款，应当自收缴罚款之日起二日内，交至所属的公安机关，公安机关应当（）将罚款缴付指定的银行。', opts:['自作出罚款决定之日起七日内','自作出罚款决定之日起五日内','自收到罚款之日起五日内','自收到罚款之日起二日内'], correct:3, d:'A项错误：作出决定日起算不对。\nB项错误：同样错误。\nC项错误：收到后五日内也不对。\nD项正确：公安机关自收到罚款之日起二日内缴付银行。', t:'警察收了钱，两天内交给银行。' },
{ quizIndex:21, q:'某市某区人民政府决定将区国资局管理的国有砖厂出售，砖厂的承包人以侵犯其经营自主权为由提出行政复议申请，本案的行政复议机关应当是（）。', opts:['市国资委','市财政局','市人民政府','区人民政府'], correct:2, d:'A项错误：国资委非复议机关。\nB项错误：财政局不是。\nC项正确：对区政府的行为不服，向市政府申请复议。\nD项错误：不能向原机关复议。', t:'对区政府不服，找它的上级市政府。' },

    // 提交模块（含得分显示）
   function submitModule(type) {
    if (moduleSubmitted[type]) return;
    var questions = [];
    if (type === 'single') questions = singleQuestions;
    else if (type === 'multi') questions = multiQuestions;
    else if (type === 'judge') questions = judgeQuestions;
    else return;

    var totalScorePerModule = 0;
    var correctCount = 0;

    for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var wrap = document.getElementById('wrap-' + q.quizIndex);
        if (!wrap) continue;

        var selectedOpts = document.querySelectorAll('#opt-' + q.quizIndex + ' li.selected');
        var userAnswer = [];
        for (var j = 0; j < selectedOpts.length; j++) {
            userAnswer.push(Array.prototype.indexOf.call(selectedOpts[j].parentNode.children, selectedOpts[j]));
        }

        var lis = document.querySelectorAll('#opt-' + q.quizIndex + ' li');
        var correctSet = [];

        // 判断正确答案索引
        if (type === 'judge') {
            // 判断题：correct 为 'A' 则索引0，'B' 则索引1
            var correctIdx = (q.correct === 'A') ? 0 : 1;
            correctSet = [correctIdx];
        } else {
            correctSet = Array.isArray(q.correct) ? q.correct : [q.correct];
        }

        // 高亮
        for (var k = 0; k < lis.length; k++) {
            if (correctSet.indexOf(k) >= 0) lis[k].classList.add('correct');
            else if (userAnswer.indexOf(k) >= 0) lis[k].classList.add('wrong');
        }

        // 计分
        if (type === 'single' || type === 'judge') {
            if (userAnswer.length === 1 && userAnswer[0] === correctSet[0]) {
                totalScorePerModule += 1;
                correctCount++;
            }
        } else if (type === 'multi') {
            var hasWrong = false;
            for (var u = 0; u < userAnswer.length; u++) {
                if (correctSet.indexOf(userAnswer[u]) < 0) { hasWrong = true; break; }
            }
            if (!hasWrong) {
                if (userAnswer.length === correctSet.length) {
                    totalScorePerModule += 1.5;
                    correctCount++;
                } else if (userAnswer.length < correctSet.length) {
                    totalScorePerModule += userAnswer.length * 0.3;
                }
            }
        }

        // 显示解析
        var exp = document.getElementById('exp-' + q.quizIndex);
        if (exp) {
            exp.innerHTML = beautifyExplain(q.d, q.t);
            exp.classList.add('show');
        }
        wrap.classList.add('submitted');
        var btn = document.getElementById('tocBtn-' + q.quizIndex);
        if (btn) btn.classList.add('submitted');
    }

    moduleSubmitted[type] = true;
    correctCounts[type] = correctCount;
    score[type] = totalScorePerModule;

    var scoreSpan = document.getElementById('score-' + type);
    if (scoreSpan) {
        scoreSpan.style.display = 'inline';
        scoreSpan.innerHTML = '✅ 得分：' + totalScorePerModule.toFixed(1) + '分 | 正确率：' + correctCount + '/' + questions.length;
    }
    updateResult();
}
    function updateResult() {
    var total = score.single + score.multi + score.judge;
    var totalCorrect = correctCounts.single + correctCounts.multi + correctCounts.judge;
    var totalQuestions = 50 + 20 + 20; // 单选50 多选20 判断20
    var accuracy = totalQuestions > 0 ? (totalCorrect / totalQuestions * 100) : 0;

    // 用时格式化
    var mins = Math.floor(totalSeconds / 60);
    var secs = totalSeconds % 60;
    var timeStr = mins + '分' + (secs < 10 ? '0' : '') + secs + '秒';

    var box = document.getElementById('resultBox');
    if (moduleSubmitted.single || moduleSubmitted.multi || moduleSubmitted.judge) {
        box.style.display = 'block';
        box.innerHTML = '📊 总分：' + total.toFixed(1) + '分 | 整体正确率：' + accuracy.toFixed(1) + '% | 用时：' + timeStr;
    }
}
