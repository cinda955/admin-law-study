            { q: '根据行政处罚法，对公民处以多少元以下罚款可以适用简易程序？', opts: ['A. 50元', 'B. 100元', 'C. 200元', 'D. 500元'], correct: 2, type: 'single', quizIndex: 3,
              d: '<b>A</b>：错误。50元是治安管理当场收缴罚款的标准。<br><b>B</b>：错误。100元是行政处罚当场收缴罚款的上限。<br><b>C</b>：正确。对公民200元以下罚款或警告可适用简易程序当场处罚。<br><b>D</b>：错误。500元是派出所罚款权限的上限。',
              t: '当场罚（简易程序）=200元以下；当场收（当场收缴）=100元以下。两个概念别搞混！' },
            { q: '关于“一事不再罚”原则，下列说法正确的是？', opts: ['A. 对同一违法行为不得给予两次以上行政处罚', 'B. 对同一违法行为不得给予两次以上罚款', 'C. 不同机关绝对不能对同一行为进行处罚', 'D. 该原则适用于所有行政处罚种类'], correct: 1, type: 'single', quizIndex: 4,
              d: '<b>A</b>：错误。一事不再罚仅针对“罚款”，不限制警告、拘留等其他处罚种类。<br><b>B</b>：正确。这是《行政处罚法》第二十九条的原文规定。<br><b>C</b>：错误。不同机关可以对同一行为给予不同类型的处罚（如A机关罚款+B机关吊销执照）。<br><b>D</b>：错误。只限制罚款这一种处罚。',
              t: '一事不再罚=一件事只能罚一次钱。但可以同时给警告+罚款，或者罚款+吊销执照。' },
            { q: '行政处罚案件应当自立案之日起多少日内作出决定？', opts: ['A. 30日', 'B. 60日', 'C. 90日', 'D. 180日'], correct: 2, type: 'single', quizIndex: 5,
              d: '<b>A</b>：错误。30日是治安案件的办案期限。<br><b>B</b>：错误。60日是行政复议申请期限。<br><b>C</b>：正确。行政处罚案件自立案之日起90日内作出决定。<br><b>D</b>：错误。无此规定。',
              t: '行政处罚案90天办结，治安案件30天（可延30天），复议申请60天。三个数字分清。' },
            { q: '行政机关在证据可能灭失的情况下，经负责人批准，可以先行登记保存，并应在几日内作出处理决定？', opts: ['A. 3日', 'B. 5日', 'C. 7日', 'D. 15日'], correct: 2, type: 'single', quizIndex: 6,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。5日是听证申请期限。<br><b>C</b>：正确。先行登记保存后应在7日内作出处理决定。<br><b>D</b>：错误。15日是缴纳罚款的期限。',
              t: '证据要没了先登记保存，一周内决定是转查封扣押还是解除。7天=一周好记。' },
            { q: '当事人对行政处罚不服的，下列哪项权利不是当事人依法享有的？', opts: ['A. 陈述权', 'B. 申辩权', 'C. 拒绝执行权', 'D. 申请行政复议权'], correct: 2, type: 'single', quizIndex: 7,
              d: '<b>A</b>：属于。当事人有权说明情况和意见。<br><b>B</b>：属于。当事人有权为自己辩解。<br><b>C</b>：不属于。当事人不能直接拒绝执行已生效的处罚决定，只能通过复议或诉讼等救济途径。<br><b>D</b>：属于。当事人有权申请行政复议。',
              t: '对处罚不服可以申辩、可以告，但不能直接说“我不执行”。要按程序来。' },
            { q: '行政处罚的听证费用由谁承担？', opts: ['A. 当事人', 'B. 行政机关', 'C. 双方各半', 'D. 利害关系人'], correct: 1, type: 'single', quizIndex: 8,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。听证费用由行政机关承担，当事人不花钱。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '听证不要钱！不管谁申请的，费用都是行政机关出。' },
            { q: '根据治安管理处罚法，行政拘留处罚合并执行的，最长不超过多少日？', opts: ['A. 15日', 'B. 20日', 'C. 30日', 'D. 60日'], correct: 1, type: 'single', quizIndex: 9,
              d: '<b>A</b>：错误。15日是单个拘留的常见期限。<br><b>B</b>：正确。两种以上违法行为均处拘留的，合并执行最长不超过20日。<br><b>C</b>：错误。30日是治安案件办案期限。<br><b>D</b>：错误。60日是含延期的总办案期限。',
              t: '犯多件事，拘留“打包价”最多20天。这是法律规定的上限。' },
            { q: '违反治安管理行为在几个月内未被发现的，不再处罚？', opts: ['A. 3个月', 'B. 6个月', 'C. 12个月', 'D. 24个月'], correct: 1, type: 'single', quizIndex: 10,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。治安管理处罚的追究时效为6个月。<br><b>C</b>：错误。<br><b>D</b>：错误。24个月（2年）是行政处罚法的一般时效。',
              t: '治安案件6个月内没发现就不罚了，比一般行政处罚的2年短得多。' },
            { q: '下列哪项不属于治安管理处罚的种类？', opts: ['A. 警告', 'B. 罚款', 'C. 责令停产停业', 'D. 行政拘留'], correct: 2, type: 'single', quizIndex: 11,
              d: '<b>A</b>：属于。警告是治安管理处罚的种类。<br><b>B</b>：属于。罚款是治安管理处罚的种类。<br><b>C</b>：不属于。责令停产停业是行政处罚法的种类，但不属于治安管理处罚，治安管理处罚只有四种。<br><b>D</b>：属于。行政拘留是治安管理处罚最严厉的一种。',
              t: '治安管理处罚只有四种：警告、罚款、拘留、吊销公安发的许可证。责令停产停业不在其中。' },
            { q: '根据治安管理处罚法，下列哪类人不执行行政拘留处罚？', opts: ['A. 已满14周岁不满16周岁', 'B. 已满18周岁', 'C. 65周岁以上', 'D. 盲人'], correct: 0, type: 'single', quizIndex: 12,
              d: '<b>A</b>：正确。14-16岁不执行行政拘留。<br><b>B</b>：错误。成年人正常执行。<br><b>C</b>：错误。需要70周岁以上才不执行。<br><b>D</b>：错误。盲人可以从轻减轻，但不是不执行的法定情形。',
              t: '四类人不执行拘留：小（14-16）、初（16-18初犯）、老（70+）、孕。' },
            { q: '公安机关作出吊销许可证以及处多少元以上罚款的治安管理处罚决定前，应告知有权要求听证？', opts: ['A. 1000元', 'B. 2000元', 'C. 5000元', 'D. 10000元'], correct: 1, type: 'single', quizIndex: 13,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。治安管理处罚法规定2000元以上罚款应告知听证权利。<br><b>C</b>：错误。5000元是广东省行政处罚听证的个人标准。<br><b>D</b>：错误。10000元是行政处罚听证的组织标准。',
              t: '治安案件罚款2000元以上就可以申请听证了，门槛比一般行政处罚低。' },
            { q: '当场收缴的罚款，执法人员应当自收缴之日起几日内交至所属行政机关？', opts: ['A. 当日', 'B. 2日', 'C. 5日', 'D. 7日'], correct: 1, type: 'single', quizIndex: 14,
              d: '<b>A</b>：错误。<br><b>B</b>：正确。执法人员应在2日内将罚款交至行政机关。<br><b>C</b>：错误。<br><b>D</b>：错误。7日是送达和登记保存的期限。',
              t: '收了钱2天内上缴，水上从抵岸起算，列车上从返回起算。' },
            { q: '关于行政处罚的追究时效，涉及生命健康安全且有危害后果的，时效为多久？', opts: ['A. 2年', 'B. 3年', 'C. 5年', 'D. 10年'], correct: 2, type: 'single', quizIndex: 15,
              d: '<b>A</b>：错误。2年是普通情形的追究时效。<br><b>B</b>：错误。<br><b>C</b>：正确。涉及公民生命健康安全、金融安全且有危害后果的，追究时效延长至5年。<br><b>D</b>：错误。',
              t: '一般违法2年不发现不罚；涉及人身健康或金融安全且后果严重的，5年。' },
            { q: '行政机关实施行政处罚时，应当责令当事人改正或限期改正违法行为。责令限期改正的性质是？', opts: ['A. 行政处罚', 'B. 行政强制措施', 'C. 行政命令', 'D. 行政强制执行'], correct: 2, type: 'single', quizIndex: 16,
              d: '<b>A</b>：错误。责令限期改正不属于行政处罚的种类。<br><b>B</b>：错误。不是强制措施。<br><b>C</b>：正确。主流观点认为责令限期改正是行政命令，与行政处罚并列。<br><b>D</b>：错误。',
              t: '“责令停产停业”是处罚，“责令限期改正”是命令。前者罚你，后者叫你改。' },
            { q: '对当事人的同一个违法行为，违反多个法律规范应当给予罚款处罚的，应如何处理？', opts: ['A. 分别处罚，合并执行', 'B. 按照罚款数额最高的规定处罚', 'C. 由最先立案的机关处罚', 'D. 由上级机关指定处罚'], correct: 1, type: 'single', quizIndex: 17,
              d: '<b>A</b>：错误。一事不再罚原则禁止分别罚款。<br><b>B</b>：正确。按罚款数额最高的规定处罚。<br><b>C</b>：错误。这适用于管辖争议。<br><b>D</b>：错误。',
              t: '同一件事触犯多个法条？挑罚得最重的那个罚一次就行了，不能叠加。' },
            { q: '行政处罚决定书应当在宣告后当场交付当事人；当事人不在场的，行政机关应在几日内送达？', opts: ['A. 3日', 'B. 5日', 'C. 7日', 'D. 15日'], correct: 2, type: 'single', quizIndex: 18,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。5日是听证申请期限。<br><b>C</b>：正确。当事人不在场的，7日内按民事诉讼法的规定送达。<br><b>D</b>：错误。15日是缴纳罚款的期限。',
              t: '当事人不在场，7天内寄送决定书。没送达的，处罚决定不生效。' },
            { q: '下列哪项不是治安管理处罚法规定的从重处罚情形？', opts: ['A. 有较严重后果的', 'B. 教唆他人违反治安管理的', 'C. 主动投案如实供述的', 'D. 六个月内曾受过治安管理处罚的'], correct: 2, type: 'single', quizIndex: 19,
              d: '<b>A</b>：属于从重情形。<br><b>B</b>：属于从重情形。<br><b>C</b>：不属于。主动投案如实供述是从轻或减轻处罚的情形。<br><b>D</b>：属于从重情形。',
              t: '主动认错=从轻；后果严重、教唆、报复、有前科=从重。' },
            { q: '关于行政处罚的委托，下列说法正确的是？', opts: ['A. 行政机关可以委托其他行政机关实施处罚', 'B. 受委托组织可以再委托其他组织', 'C. 受委托组织以自己名义实施处罚', 'D. 受委托组织以委托机关名义实施处罚，责任由委托机关承担'], correct: 3, type: 'single', quizIndex: 20,
              d: '<b>A</b>：错误。行政处罚只能委托给管理公共事务的组织，不能委托给其他行政机关。<br><b>B</b>：错误。受委托组织不得再转委托。<br><b>C</b>：错误。必须以委托机关名义实施。<br><b>D</b>：正确。',
              t: '行政处罚委托=找“组织”代办，以委托机关名义，责任由委托机关扛。和行政许可相反（许可只能委托行政机关）。' },
            { q: '行政处罚法规定，执法人员不得少于几人？', opts: ['A. 1人', 'B. 2人', 'C. 3人', 'D. 5人'], correct: 1, type: 'single', quizIndex: 21,
              d: '<b>A</b>：错误。2021年修订后统一要求不少于2人。<br><b>B</b>：正确。执法人员不得少于两人，法律另有规定的除外。<br><b>C</b>：错误。<br><b>D</b>：错误。',
              t: '执法至少两人，互相监督，防止意外。2021年新法统一了要求。' },
            { q: '当事人到期不缴纳罚款的，每日按罚款数额的多少加处罚款？', opts: ['A. 1%', 'B. 2%', 'C. 3%', 'D. 5%'], correct: 2, type: 'single', quizIndex: 22,
              d: '<b>A</b>：错误。<br><b>B</b>：错误。<br><b>C</b>：正确。每日按罚款数额的3%加处罚款，最多加罚到原罚款本金。<br><b>D</b>：错误。',
              t: '每天3%，一个月翻倍。加罚不能超过原罚款额。' },
            { q: '根据治安管理处罚法，醉酒的人违反治安管理的，应如何处理？', opts: ['A. 不予处罚', 'B. 可以从轻处罚', 'C. 应当给予处罚', 'D. 免予处罚'], correct: 2, type: 'single', quizIndex: 23,
              d: '<b>A</b>：错误。醉酒不是免责理由。<br><b>B</b>：错误。没有从轻规定。<br><b>C</b>：正确。醉酒的人违反治安管理，应当给予处罚。<br><b>D</b>：错误。',
              t: '喝醉了不是免罪金牌！你能控制喝不喝，就要对酒后行为负责。' },
            { q: '行政机关作出较重行政处罚前应告知听证权利。下列哪项不属于应告知听证的情形？', opts: ['A. 较大数额罚款', 'B. 吊销许可证', 'C. 行政拘留', 'D. 责令停产停业'], correct: 2, type: 'single', quizIndex: 24,
              d: '<b>A</b>：属于应告知听证的情形。<br><b>B</b>：属于。<br><b>C</b>：不属于。行政拘留不适用听证程序，因为被拘留人可能有社会危害性。<br><b>D</b>：属于。',
              t: '拘留是最重的处罚，但反而不需要听证——怕你跑了！' },
            { q: '关于行政处罚的管辖，下列说法正确的是？', opts: ['A. 行政处罚只能由违法行为发生地的行政机关管辖', 'B. 违法行为发生地包括行为实施地和结果发生地', 'C. 乡镇政府具有行政处罚权', 'D. 最先立案的机关必须将案件移送给其他有管辖权的机关'], correct: 1, type: 'single', quizIndex: 25,
              d: '<b>A</b>：错误。违法行为发生地是主要管辖原则，但不是“只能”。<br><b>B</b>：正确。违法行为发生地包括行为实施地、结果发生地、运输地等。<br><b>C</b>：错误。乡镇政府一般没有行政处罚权。<br><b>D</b>：错误。最先立案的机关优先管辖，无需移送。',
              t: '违法在哪发生（包括结果在哪出现），哪里的机关就能管。乡镇府一般管不了行政处罚。' }
        ]
    },
    // ===== 判断题20道 =====
    {
        id: 'mod_tf', iconClass: 'icon-blue', iconEmoji: '✅',
        title: '综合练习 · 判断题（20道）',
        subtitle: '行政处罚法 + 治安管理处罚法',
        quizzes: [
            { q: '行政法规可以设定行政拘留的行政处罚。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf1',
              d: '<b>A"正确"</b>：错误。限制人身自由的行政处罚只能由法律设定，行政法规无权设定行政拘留。<br><b>B"错误"</b>：正确。',
              t: '拘留只能由“法律”规定，行政法规不够格。' },
            { q: '行政处罚的听证费用由当事人承担。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf2',
              d: '<b>A"正确"</b>：错误。听证费用由行政机关承担。<br><b>B"错误"</b>：正确。',
              t: '听证不要钱，行政机关买单。' },
            { q: '对当事人的同一个违法行为，不得给予两次以上罚款的行政处罚。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf3',
              d: '<b>A"正确"</b>：正确。这是“一事不再罚”原则的核心内容。<br><b>B"错误"</b>：错误。',
              t: '同一件事只能罚一次钱——这就是一事不再罚。' },
            { q: '行政机关作出行政处罚决定后，当事人不在场的，应当在5日内送达。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf4',
              d: '<b>A"正确"</b>：错误。当事人不在场的，应在7日内送达。<br><b>B"错误"</b>：正确。',
              t: '送文书=7天，不是5天。5天是申请听证的期限。' },
            { q: '治安管理处罚的追究时效为2年。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf5',
              d: '<b>A"正确"</b>：错误。治安管理处罚的追究时效是6个月，不是2年。<br><b>B"错误"</b>：正确。',
              t: '治安案件6个月没发现就不罚了，比行政处罚2年的时效短。' },
            { q: '已满14周岁不满16周岁的人违反治安管理的，不执行行政拘留处罚。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf6',
              d: '<b>A"正确"</b>：正确。14-16岁不执行行政拘留，不受“初次”条件限制。<br><b>B"错误"</b>：错误。',
              t: '14-16岁不管第几次都不关。16-18岁必须是“初次”才不关。' },
            { q: '醉酒的人违反治安管理的，可以从轻或减轻处罚。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf7',
              d: '<b>A"正确"</b>：错误。醉酒的人应当给予处罚，没有从轻减轻的规定。<br><b>B"错误"</b>：正确。',
              t: '喝醉了不是从轻的理由，照罚！' },
            { q: '行政机关执法人员当场作出的行政处罚决定，必须报所属行政机关备案。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf8',
              d: '<b>A"正确"</b>：正确。简易程序的决定也须报机关备案。<br><b>B"错误"</b>：错误。',
              t: '当场罚完也要回去登记备案，不能罚完就完事。' },
            { q: '行政处罚的罚款必须全部上缴国库，不得与行政机关的考核考评挂钩。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf9',

            { q: '派出所可以决定警告和500元以下的罚款。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf10',

            { q: '治安调解的协议具有强制执行力。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf14',

            { q: '先行登记保存的期限为30日。', opts: ['✅ 正确', '❌ 错误'], correct: 1, type: 'single', isTF: true, tfId: 'tf15',

            { q: '行政处罚没有依据或实施主体不具有行政主体资格的，行政处罚无效。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf16',

              d: '<b>A"正确"</b>：错误。需经行政机关负责人批准，执法人员不能自行决定。<br><b>B"错误"</b>：正确。',
              t: '登记保存要领导批，执法人员不能自己说了算。' },
            { q: '违反治安管理行为与犯罪行为在行为方式上没有区别。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf19',
              d: '<b>A"正确"</b>：正确。两者的区别在于危害程度，不在于行为方式。例如赌博，规模小的属违反治安管理，规模大的构成犯罪。<br><b>B"错误"</b>：错误。',
              t: '同样一个行为（如赌博），规模小=治安违法，规模大=犯罪。行为方式一样，危害程度不同。' },
            { q: '限制人身自由的行政处罚权只能由公安机关和法律规定的其他机关行使。', opts: ['✅ 正确', '❌ 错误'], correct: 0, type: 'single', isTF: true, tfId: 'tf20',
              d: '<b>A"正确"</b>：正确。这是行政处罚法第18条的原文，其他机关如海警机构在法定范围内也可以行使。<br><b>B"错误"</b>：错误。',
              t: '拘留这种限制自由的事，只有公安和少数法律特别授权的机关能干。' }
        ]

    {

<script>
// ==================== 渲染引擎 ====================
function renderAll(){var m=document.getElementById('mainContent');var h='';knowledgeData.forEach(function(mod){h+='<div class="card" id="'+mod.id+'"><div class="section-title"><div class="icon '+mod.iconClass+'">'+mod.iconEmoji+'</div>'+mod.title+'</div>';if(mod.subtitle)h+='<div class="subtitle">'+mod.subtitle+'</div>';if(mod.items&&mod.items.length>0){h+='<div class="ki-grid">';mod.items.forEach(function(item){if(item.type==='table')h+=item.html;else if(item.type==='ki')h+=renderKI(item);});h+='</div>';}if(mod.quizzes&&mod.quizzes.length>0){mod.quizzes.forEach(function(q,qi){h+=renderQuiz(q,mod.id+'-q'+qi);});}h+='</div>';});m.innerHTML=h;generateTOC();}
function renderKI(item){var h='<div class="ki-item">';h+='<div class="ki-title-row">'+(item.badge?'<span class="badge '+(item.badgeClass||'badge-num')+'">'+item.badge+'</span> ':'')+item.title+'</div>';h+='<div class="ki-content">'+item.content+'</div>';if(item.extra)h+='<div style="margin-top:6px;color:#5c5347;font-size:0.88rem;">'+item.extra+'</div>';if(item.example){h+='<div class="example-block"><div class="ex-label">📖 生动案例</div><div class="ex-q">'+item.example.q+'</div><div class="ex-a">'+item.example.a+'</div></div>';}h+='</div>';return h;}
function renderQuiz(q,qid){var qTypeLabel=q.multi?'【多选题】':'【单选题】';var h='<div class="quiz-wrap" data-qid="'+qid+'">';if(q.quizIndex){h+='<div class="q-type">📝 '+qTypeLabel+' · 第'+q.quizIndex+'题</div>';}else if(q.tfId){h+='<div class="q-type">📝 '+qTypeLabel+' · '+q.tfId+'</div>';}else{h+='<div class="q-type">📝 '+qTypeLabel+'</div>';}h+='<div class="q-text">'+q.q+'</div><ul class="opt-list">';for(var i=0;i<q.opts.length;i++){h+='<li data-idx="'+i+'" onclick="selectOpt(this,\''+qid+'\','+i+','+(q.multi||false)+')">'+q.opts[i]+'</li>';}h+='</ul><div class="btn-row"><button class="btn btn-primary" onclick="submitQuiz(\''+qid+'\','+JSON.stringify(q.correct)+','+(q.multi||false)+')">✅ 提交答案</button><button class="btn btn-outline" onclick="resetQuiz(\''+qid+'\')">🔄 重做</button></div><div class="explain-card" id="ex-'+qid+'"><div class="ex-head"></div><div class="ex-body"></div>';if(q.d){var detailHtml=q.d;detailHtml=detailHtml.replace(/<b>([A-E])"正确"<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])"错误"<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(正确)/g,'<span style="color:#145a32;">✅ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：(错误)/g,'<span style="color:#b22222;">❌ $1选项</b>：$2</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：正确/g,'<span style="color:#145a32;">✅ $1选项</b>：正确</span>');detailHtml=detailHtml.replace(/<b>([A-E])<\/b>：错误/g,'<span style="color:#b22222;">❌ $1选项</b>：错误</span>');h+='<div class="ex-detail" style="margin-top:10px;padding:10px 14px;background:#fff;border-radius:6px;font-size:0.88rem;line-height:1.8;display:none;">📋 <b>逐项解析：</b><br>'+detailHtml+'</div>';}h+='<div class="ex-tip">💡 <b>大白话理解：</b>'+q.t+'</div></div></div>';return h;}
function selectOpt(el,qid,idx,multi){var w=el.closest('.quiz-wrap');if(w.classList.contains('submitted'))return;var o=w.querySelectorAll('.opt-list li');if(multi){el.classList.toggle('selected');}else{o.forEach(function(x){x.classList.remove('selected');});el.classList.add('selected');}}
function submitQuiz(qid,correct,multi){var w=document.querySelector('[data-qid="'+qid+'"]');if(w.classList.contains('submitted'))return;w.classList.add('submitted');var o=w.querySelectorAll('.opt-list li');var ca=Array.isArray(correct)?correct:[correct];var si=[];for(var i=0;i<o.length;i++){if(o[i].classList.contains('selected'))si.push(i);}var ic;if(multi){ic=si.length===ca.length;for(var j=0;j<si.length;j++){if(ca.indexOf(si[j])===-1){ic=false;break;}}}else{ic=si.length===1&&si[0]===ca[0];}for(var k=0;k<o.length;k++){o[k].classList.add('disabled');if(ca.indexOf(k)!==-1)o[k].classList.add('correct');}if(!ic){for(var m=0;m<si.length;m++){if(ca.indexOf(si[m])===-1)o[si[m]].classList.add('wrong');}}var ex=document.getElementById('ex-'+qid);ex.classList.add('show');if(ic){ex.classList.add('correct-ex');ex.classList.remove('wrong-ex');ex.querySelector('.ex-head').textContent='🎉 回答正确！';ex.querySelector('.ex-body').textContent='';var ed=ex.querySelector('.ex-detail');if(ed)ed.style.display='block';}else{ex.classList.add('wrong-ex');ex.classList.remove('correct-ex');ex.querySelector('.ex-head').textContent='😞 回答错误';var lt=['A','B','C','D','E'];var cl=ca.map(function(c){return lt[c];}).join('、');ex.querySelector('.ex-body').innerHTML='正确答案是：<b>'+cl+'</b>';var ed2=ex.querySelector('.ex-detail');if(ed2)ed2.style.display='block';}}
function resetQuiz(qid){var w=document.querySelector('[data-qid="'+qid+'"]');w.classList.remove('submitted');w.querySelectorAll('.opt-list li').forEach(function(o){o.classList.remove('selected','correct','wrong','disabled');});var ex=document.getElementById('ex-'+qid);ex.classList.remove('show','correct-ex','wrong-ex');}
function generateTOC(){var toc=document.getElementById('toc');if(!toc)return;var th='<div class="toc-title">📑 行政处罚法+治安处罚法 · 知识目录</div>';var links='';knowledgeData.forEach(function(mod){links+='<a href="#'+mod.id+'">'+mod.title+'</a>';});toc.innerHTML=th+links;document.querySelectorAll('.toc a').forEach(function(link){link.addEventListener('click',function(){if(window.innerWidth<=768)closeToc();});});}
function toggleToc(){document.getElementById('toc').classList.toggle('show');document.getElementById('tocOverlay').classList.toggle('show');}
function closeToc(){document.getElementById('toc').classList.remove('show');document.getElementById('tocOverlay').classList.remove('show');}
document.addEventListener('DOMContentLoaded',renderAll);
</script>
</body>
</html>
